  function wireInlineEditors() {
    const animalId = getParam('id');
    if (!animalId) return;
    // Habitat + Diet text + Fun-Facts rows — generic editable spans.
    document.querySelectorAll('.editable-text').forEach(el => {
      if (el._wired) return;
      el._wired = true;
      el.addEventListener('click', () => beginEditText(el, animalId));
    });
    // Add-a-fun-fact placeholder row.
    const addRow = document.getElementById('factAddRow');
    if (addRow && !addRow._wired) {
      addRow._wired = true;
      addRow.addEventListener('click', () => addFunFactRow(animalId));
      addRow.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); addFunFactRow(animalId); }
      });
    }
    // Remove-a-fact buttons.
    document.querySelectorAll('.fact-remove').forEach(b => {
      if (b._wired) return;
      b._wired = true;
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const li = b.closest('li');
        if (!li) return;
        li.remove();
        flushFunFacts(animalId);
      });
    });
    // ＋ Add a topic
    const addTopicBtn = document.getElementById('addTopicBtn');
    if (addTopicBtn && !addTopicBtn._wired) {
      addTopicBtn._wired = true;
      addTopicBtn.addEventListener('click', () => addNewTopic(animalId));
    }
    // Topic delete buttons + topic-item add rows + per-row removes
    document.querySelectorAll('.topic-delete').forEach(b => {
      if (b._wired) return;
      b._wired = true;
      b.addEventListener('click', () => {
        const card = b.closest('.topic-card');
        if (card && confirm('Delete this whole topic?')) {
          card.remove();
          flushTopics(animalId);
        }
      });
    });
    document.querySelectorAll('.topic-add-row').forEach(row => {
      if (row._wired) return;
      row._wired = true;
      row.addEventListener('click', () => addTopicItem(row, animalId));
      row.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); addTopicItem(row, animalId); }
      });
    });
    document.querySelectorAll('.topic-item-remove').forEach(b => {
      if (b._wired) return;
      b._wired = true;
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const li = b.closest('li');
        if (!li) return;
        li.remove();
        flushTopics(animalId);
      });
    });
    // 📋 Paste-image buttons on each gallery cell.
    document.querySelectorAll('.photo-edit-fab').forEach(b => {
      if (b._wired) return;
      b._wired = true;
      b.addEventListener('click', (e) => {
        e.stopPropagation(); // don't trigger cell-click navigation
        beginPhotoPaste(b.dataset.paste, animalId);
      });
    });
    // Topic emoji picker buttons.
    document.querySelectorAll('.topic-emoji-btn').forEach(b => {
      if (b._wired) return;
      b._wired = true;
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!document.body.classList.contains('student-editing')) return;
        openEmojiPicker(b, animalId);
      });
    });
  }

  function beginEditText(el, animalId) {
    if (!document.body.classList.contains('student-editing')) return;
    if (el._editing) return;
    el._editing = true;
    const original = el.textContent.trim();
    const ta = document.createElement('textarea');
    ta.className = 'inline-textarea';
    ta.value = original;
    el.replaceWith(ta);
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    let committed = false;
    async function commit() {
      if (committed) return;
      committed = true;
      const v = ta.value.trim();
      el.textContent = v;
      ta.replaceWith(el);
      el._editing = false;
      if (v === original) return;  // nothing changed
      const field = el.dataset.field;
      if (field === 'habitat' || field === 'diet') {
        await saveField(animalId, { [field]: v });
      } else {
        // Inside a Fun Facts <li> — collect all rows and save the full array.
        await flushFunFacts(animalId);
      }
    }
    function cancel() {
      committed = true;
      ta.replaceWith(el);
      el._editing = false;
    }
    ta.addEventListener('blur', commit);
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
      if (e.key === 'Escape')                { e.preventDefault(); cancel(); }
    });
  }

  function addFunFactRow(animalId) {
    if (!document.body.classList.contains('student-editing')) return;
    // Make sure the facts-card is visible (it can be hidden when the
    // animal originally had no facts).
    const card = document.getElementById('factsCard');
    if (card) card.style.display = '';
    const list = document.getElementById('factsList');
    if (!list) return;
    const li = document.createElement('li');
    li.innerHTML = '<div class="editable-text" data-placeholder="a fun fact"></div>'
                 + '<button type="button" class="fact-remove" title="Remove this fact">✕</button>';
    list.appendChild(li);
    wireInlineEditors();
    beginEditText(li.querySelector('.editable-text'), animalId);
  }

  async function flushFunFacts(animalId) {
    const list = document.getElementById('factsList');
    if (!list) return;
    const facts = Array.from(list.querySelectorAll('li .editable-text'))
      .map(el => el.textContent.trim())
      .filter(t => t);
    await saveField(animalId, { funFacts: facts });
    // If everything's gone, hide the card again.
    const card = document.getElementById('factsCard');
    if (card && !facts.length) card.style.display = 'none';
  }

  async function saveField(animalId, patch) {
    // Compare against the current cloud row to decide whether this
    // is an ADDITION (grew the text / added an array item) vs a
    // pure deletion / shrink. Additions promote the user to the
    // contributors table, which gates the comment box + posting.
    let prevCloud = null;
    try { prevCloud = await fetchAnimalCustomFromCloud(animalId); } catch (e) {}
    const isAddition = detectAdditionAgainst(prevCloud, patch);
    try {
      await saveAnimalCustomToCloud(animalId, patch, _editorMe || currentSession());
      broadcastEdit(animalId, patch);
      if (isAddition) {
        const who = _editorMe || currentSession();
        if (who && who.id) {
          window.WCDB.animalContributions.record(animalId, who).catch(() => {});
          // Re-evaluate the comment box visibility after our save —
          // it's possible we're the very first contributor.
          setTimeout(() => refreshCommentBoxVisibility(animalId), 200);
        }
      }
    } catch (e) {
      alert('Could not save: ' + (e.message || e));
    }
  }

  // True if `patch` represents net-growth on at least one field
  // compared to `prev`. Empty → non-empty counts; new array entry
  // counts; pure delete / shrink / no-change does NOT count.
  function detectAdditionAgainst(prev, patch) {
    const prevText = (k) => (prev && typeof prev[k] === 'string') ? prev[k] : '';
    const prevArr  = (k) => (prev && Array.isArray(prev[k])) ? prev[k] : [];
    // String fields
    if (typeof patch.habitat === 'string') {
      const before = prevText('habitat');
      if (patch.habitat.length > before.length) return true;
    }
    if (typeof patch.diet === 'string') {
      const before = prevText('diet');
      if (patch.diet.length > before.length) return true;
    }
    // Array fields (length grew)
    if (Array.isArray(patch.funFacts)     && patch.funFacts.length     > prevArr('fun_facts').length)     return true;
    if (Array.isArray(patch.customTopics) && patch.customTopics.length > prevArr('custom_topics').length) return true;
    if (Array.isArray(patch.photos)        && patch.photos.length        > prevArr('photos').length)        return true;
    if (Array.isArray(patch.cartoons)      && patch.cartoons.length      > prevArr('cartoons').length)      return true;
    if (Array.isArray(patch.coloringPages) && patch.coloringPages.length > prevArr('coloring_pages').length) return true;
    return false;
  }

  // ---- Custom topics --------------------------------------------
  // Build a topic-card DOM element from a topic object
  // {heading, emoji, items: []}. The whole `customTopics` array is
  // saved as JSONB whenever any topic changes (simpler than
  // per-item diffing for the JSONB column).
  const TOPIC_EMOJI_OPTIONS = ['📚','🌿','🌊','⛰️','🦴','🐣','🌙','☀️','❄️','🔥','🌳','🐾','🏞️','🎵','💡','❓','🌎','⭐','🍃','🐺'];

  function renderTopicCard(topic, animalId) {
    const card = document.createElement('div');
    card.className = 'topic-card';
    const emoji = topic.emoji || '📚';
    card.innerHTML =
      '<h3>' +
        '<button type="button" class="topic-emoji-btn info-icon" title="Pick an icon">' +
          escapeHTML(emoji) +
        '</button>' +
        '<div class="editable-text topic-heading" data-placeholder="topic name">' +
          escapeHTML(topic.heading || '') + '</div>' +
        '<button type="button" class="topic-delete">Delete topic</button>' +
      '</h3>' +
      '<ul class="topic-items">' +
        (topic.items || []).map(it =>
          '<li><div class="editable-text" data-placeholder="say something here">' +
            escapeHTML(it) +
          '</div><button type="button" class="fact-remove topic-item-remove" title="Remove this row">✕</button></li>'
        ).join('') +
      '</ul>' +
      '<div class="topic-add-row" tabindex="0">＋ Click to add a row</div>';
    return card;
  }

  // Show a tiny emoji-picker popover anchored under the given
  // button. Clicking an option swaps the button text + saves.
  function openEmojiPicker(btn, animalId) {
    // Reuse existing popover if open — close it.
    const existing = document.getElementById('topicEmojiPop');
    if (existing) { existing.remove(); return; }
    const pop = document.createElement('div');
    pop.id = 'topicEmojiPop';
    pop.style.cssText =
      'position:absolute; z-index:200; background:white;' +
      'border:2px solid var(--mint); border-radius:14px;' +
      'box-shadow:var(--shadow-lg); padding:8px;' +
      'display:grid; grid-template-columns:repeat(5,1fr); gap:4px;';
    TOPIC_EMOJI_OPTIONS.forEach(e => {
      const opt = document.createElement('button');
      opt.type = 'button';
      opt.textContent = e;
      opt.style.cssText =
        'width:36px; height:36px; font-size:22px; line-height:1;' +
        'border:0; background:transparent; border-radius:8px; cursor:pointer;';
      opt.addEventListener('mouseenter', () => opt.style.background = 'rgba(176,224,230,0.3)');
      opt.addEventListener('mouseleave', () => opt.style.background = 'transparent');
      opt.addEventListener('click', async () => {
        btn.textContent = e;
        pop.remove();
        await flushTopics(animalId);
      });
      pop.appendChild(opt);
    });
    const r = btn.getBoundingClientRect();
    pop.style.left = (window.scrollX + r.left) + 'px';
    pop.style.top  = (window.scrollY + r.bottom + 4) + 'px';
    document.body.appendChild(pop);
    // Click-outside closes the popover.
    setTimeout(() => {
      const closer = (ev) => {
        if (!pop.contains(ev.target) && ev.target !== btn) {
          pop.remove();
          document.removeEventListener('mousedown', closer, true);
        }
      };
      document.addEventListener('mousedown', closer, true);
    }, 0);
  }

  function renderAllTopicsFromCloud(topics, animalId) {
    const host = document.getElementById('topicsHost');
    if (!host) return;
    // Skip re-render if any editing is in progress to avoid wiping
    // the user's input.
    if (host.querySelector('.inline-textarea')) return;
    host.innerHTML = '';
    (topics || []).forEach(t => host.appendChild(renderTopicCard(t, animalId)));
    wireInlineEditors();
  }

  function readAllTopicsFromDom() {
    const host = document.getElementById('topicsHost');
    if (!host) return [];
    return Array.from(host.querySelectorAll('.topic-card')).map(card => {
      const heading = (card.querySelector('.topic-heading')?.textContent || '').trim();
      const emoji   = (card.querySelector('.topic-emoji-btn')?.textContent || '📚').trim() || '📚';
      const items   = Array.from(card.querySelectorAll('.topic-items li .editable-text'))
        .map(el => el.textContent.trim()).filter(Boolean);
      return { heading, items, emoji };
    });
  }

  async function flushTopics(animalId) {
    const topics = readAllTopicsFromDom();
    await saveField(animalId, { customTopics: topics });
  }

  function addNewTopic(animalId) {
    const host = document.getElementById('topicsHost');
    if (!host) return;
    const card = renderTopicCard({ heading: '', items: [], emoji: '📚' }, animalId);
    host.appendChild(card);
    wireInlineEditors();
    // Focus the heading so the student can start typing immediately.
    const heading = card.querySelector('.topic-heading');
    if (heading) beginEditText(heading, animalId);
  }

  function addTopicItem(addRow, animalId) {
    const card = addRow.closest('.topic-card');
    if (!card) return;
    const ul = card.querySelector('.topic-items');
    if (!ul) return;
    const li = document.createElement('li');
    li.innerHTML = '<div class="editable-text" data-placeholder="say something here"></div>'
                 + '<button type="button" class="fact-remove topic-item-remove" title="Remove this row">✕</button>';
    ul.appendChild(li);
    wireInlineEditors();
    beginEditText(li.querySelector('.editable-text'), animalId);
  }

  // Hook into beginEditText so saving a topic heading or item also
  // triggers flushTopics (the per-field switch in beginEditText only
  // knew about habitat/diet/funFacts). Patch by wrapping the original.
  const _origBeginEditText = beginEditText;
  beginEditText = function (el, animalId) {
    if (el.closest && el.closest('.topic-card')) {
      // Use a small custom commit path for topic edits.
      if (!document.body.classList.contains('student-editing')) return;
      if (el._editing) return;
      el._editing = true;
      const original = el.textContent.trim();
      const ta = document.createElement('textarea');
      ta.className = 'inline-textarea';
      ta.value = original;
      el.replaceWith(ta);
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      let committed = false;
      const commit = async () => {
        if (committed) return;
        committed = true;
        const v = ta.value.trim();
        el.textContent = v;
        ta.replaceWith(el);
        el._editing = false;
        if (v !== original) await flushTopics(animalId);
      };
      ta.addEventListener('blur', commit);
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
        if (e.key === 'Escape')                { committed = true; ta.replaceWith(el); el._editing = false; }
      });
      return;
    }
    return _origBeginEditText.call(this, el, animalId);
  };

  // ---- Photo paste ----------------------------------------------
  // Cache per-category pasted images locally so multiple pastes
  // before save aren't lost on reload (purely UX nicety).
  let _activePasteCat = null;

  function showPasteToast(msg) {
    const t = document.getElementById('pasteToast');
    if (!t) return;
    if (msg) t.innerHTML = msg;
    t.classList.add('shown');
  }
  function hidePasteToast() {
    const t = document.getElementById('pasteToast');
    if (t) t.classList.remove('shown');
  }

  function beginPhotoPaste(category, animalId) {
    _activePasteCat = category;
    showPasteToast('📋 Press <b>Ctrl+V</b> (or Cmd+V) to paste your copied image for <b>' +
      category.replace('coloringPages', 'coloring') + '</b>');
    setTimeout(hidePasteToast, 8000);
  }

  document.addEventListener('paste', async (e) => {
    if (!_activePasteCat) return;
    const items = (e.clipboardData && e.clipboardData.items) || [];
    let blob = null;
    for (const it of items) {
      if (it.type && it.type.startsWith('image/')) { blob = it.getAsFile(); break; }
    }
    if (!blob) return;
    e.preventDefault();
    const cat = _activePasteCat;
    _activePasteCat = null;
    hidePasteToast();
    try {
      const dataUrl = await compressClipboardImage(blob);
      await appendCustomImage(getParam('id'), cat, dataUrl);
    } catch (err) {
      alert('Could not paste image: ' + (err.message || err));
    }
  });

  function compressClipboardImage(blob, maxDim = 720, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function appendCustomImage(animalId, category, dataUrl) {
    // Fetch the current cloud row, append, save back. Cheap and
    // avoids us tracking local-only state that could fall out of
    // sync with other tabs.
    const cur = await fetchAnimalCustomFromCloud(animalId);
    const dbField = category === 'coloringPages' ? 'coloring_pages' : category;
    const existing = Array.isArray(cur?.[dbField]) ? cur[dbField] : [];
    const next = existing.concat([{ src: dataUrl, source: 'custom' }]);
    const patch = {};
    patch[category] = next; // saveAnimalCustomToCloud maps camelCase → snake_case
    await saveField(animalId, patch);
    // In-place gallery update — no reload needed.
    if (typeof window.__appendToCellInPlace === 'function') {
      window.__appendToCellInPlace(category, dataUrl);
    }
  }

  // ---- Realtime ------------------------------------------------
  function ensureRealtime() {
    if (_editChannel) return;
    const animalId = getParam('id');
    if (!animalId || !window.supabase || !window.WC_SUPABASE) return;
    const client = window.supabase.createClient(window.WC_SUPABASE.url, window.WC_SUPABASE.anon);
    _editChannel = client.channel('animal-' + animalId, {
      config: { broadcast: { self: false } },
    });
    _editChannel.on('broadcast', { event: 'animal-edit' }, (msg) => {
      const p = msg && msg.payload;
      if (!p || !p.patch) return;
      applyRemotePatch(p.patch);
      showLiveEditChip(p.who && p.who.name || 'Someone');
    });
    // Admin "Reset" sends an animal-reset event — reload so the
    // page falls back to the base ANIMALS data right away.
    _editChannel.on('broadcast', { event: 'animal-reset' }, () => {
      if (!document.querySelector('.inline-textarea')) {
        setTimeout(() => location.reload(), 200);
      }
    });
    // New comment posted by someone else on this animal — reload
    // the thread so it appears live.
    _editChannel.on('broadcast', { event: 'animal-comment' }, () => {
      loadAndRenderComments(animalId);
    });
    _editChannel.subscribe();
  }

  function broadcastEdit(animalId, patch) {
    ensureRealtime();
    if (!_editChannel) return;
    try {
      _editChannel.send({
        type: 'broadcast',
        event: 'animal-edit',
        payload: {
          patch,
          who: _editorMe ? { id: _editorMe.id, name: _editorMe.real_name } : null,
          ts:  Date.now(),
        },
      });
    } catch (e) {}
  }

  function applyRemotePatch(patch) {
    // Don't clobber a field while the user is actively editing it.
    document.querySelectorAll('.editable-text').forEach(el => {
      const f = el.dataset.field;
      if (!f || el._editing) return;
      if (f in patch && typeof patch[f] === 'string') {
        el.textContent = patch[f];
      }
    });
    if (Array.isArray(patch.funFacts)) {
      const list = document.getElementById('factsList');
      const card = document.getElementById('factsCard');
      // If any fact row in this tab is actively being edited, skip
      // the remote re-render so we don't trash the local input.
      const anyEditing = list && list.querySelector('.inline-textarea');
      if (list && !anyEditing) {
        // Remote-arrived facts are "existing" from this viewer's
        // perspective → no ✕ button (they can't delete others'
        // content). Their own additions stay in this session only.
        list.innerHTML = patch.funFacts.map((f, i) =>
          `<li data-idx="${i}" data-original="1"><div class="editable-text" data-placeholder="a fun fact">${escapeHTML(f)}</div></li>`
        ).join('');
        if (card) card.style.display = patch.funFacts.length ? '' : 'none';
        wireInlineEditors();
      }
    }
    if (Array.isArray(patch.customTopics)) {
      renderAllTopicsFromCloud(patch.customTopics, getParam('id'));
    }
    // Photo updates — if we can update in place, do that; otherwise
    // fall back to a reload (defer if the user is mid-edit).
    const photoCats = ['photos', 'cartoons', 'coloringPages'];
    let photoChanged = false;
    photoCats.forEach(cat => {
      if (!Array.isArray(patch[cat])) return;
      photoChanged = true;
      const state = window.__galleryCellState && window.__galleryCellState[cat];
      // We don't have the full default-image list out here, so we
      // diff against state and only paint NEW custom images. New
      // entries are appended in order to keep dot-cycling intact.
      if (state && typeof window.__appendToCellInPlace === 'function') {
        patch[cat].forEach(p => {
          const src = (p && p.src) || '';
          if (src && state.indexOf(src) === -1) {
            window.__appendToCellInPlace(cat, src);
          }
        });
      }
    });
    // If the renderer wasn't ready (e.g. first paint hasn't run),
    // fall back to a reload as a safety net.
    if (photoChanged && !window.__galleryCellState && !document.querySelector('.inline-textarea')) {
      setTimeout(() => location.reload(), 250);
    }
  }

  function showLiveEditChip(name) {
    const chip = document.getElementById('liveEditChip');
    const msg  = document.getElementById('liveEditMsg');
    if (!chip || !msg) return;
    msg.textContent = name + ' is editing this page';
    chip.classList.add('shown');
    if (_liveTimer) clearTimeout(_liveTimer);
    _liveTimer = setTimeout(() => chip.classList.remove('shown'), 3000);
  }

  // ============================================================
  //  Comment thread (per animal)
  // ============================================================
  let _commentsLoaded = false;
  let _canPostComment = false;
  let _animalHasContrib = false;

  async function refreshCommentBoxVisibility(animalId) {
    if (!window.WCDB || !window.WCDB.animalContributions) return;
    try {
      _animalHasContrib = await window.WCDB.animalContributions.hasAnyOnAnimal(animalId);
    } catch (e) { _animalHasContrib = false; }
    const me = currentSession();
    if (me && me.id) {
      try { _canPostComment = await window.WCDB.animalContributions.hasAny(me.id); }
      catch (e) { _canPostComment = false; }
    } else {
      _canPostComment = false;
    }
    applyCommentUiState(animalId);
  }

  function applyCommentUiState(animalId) {
    const card    = document.getElementById('commentsCard');
    const form    = document.getElementById('commentForm');
    const locked  = document.getElementById('commentLocked');
    const hint    = document.getElementById('commentUnlockHint');
    if (!card) return;
    if (!_animalHasContrib) {
      // No contributor on this animal yet → no comment box, show
      // the bottom hint so visitors know how to unlock it.
      card.classList.remove('shown');
      if (hint) hint.style.display = '';
      return;
    }
    card.classList.add('shown');
    if (hint) hint.style.display = 'none';
    if (!_commentsLoaded) loadAndRenderComments(animalId);
    const me = currentSession();
    if (me && me.id && _canPostComment) {
      form.style.display = '';
      locked.style.display = 'none';
    } else {
      form.style.display = 'none';
      locked.style.display = '';
      locked.textContent = me && me.id
        ? 'Add some content to an animal page first, then you can comment here.'
        : 'Sign in on Ako to join the conversation.';
    }
  }

  async function loadAndRenderComments(animalId) {
    if (!window.WCDB || !window.WCDB.animalComments) return;
    let rows = [];
    try { rows = await window.WCDB.animalComments.listForAnimal(animalId); }
    catch (e) { return; }
    _commentsLoaded = true;
    renderComments(rows);
  }

  function renderComments(rows) {
    const list = document.getElementById('commentList');
    if (!list) return;
    if (!rows.length) {
      list.innerHTML = '<li class="comment-empty">No comments yet — be the first!</li>';
      return;
    }
    // Build a tree (1-level nesting). Anything with parent_id goes
    // under that parent's replies array; orphans (parent missing)
    // are promoted to top level.
    const byId = new Map();
    rows.forEach(r => byId.set(r.id, Object.assign({ replies: [] }, r)));
    const top = [];
    byId.forEach(r => {
      if (r.parent_id && byId.has(r.parent_id)) {
        byId.get(r.parent_id).replies.push(r);
      } else {
        top.push(r);
      }
    });
    list.innerHTML = '';
    top.forEach(r => list.appendChild(makeCommentNode(r)));
  }

  function makeCommentNode(c) {
    const li = document.createElement('li');
    li.dataset.id = c.id;
    const stamp = friendlyTime(c.created_at);
    li.innerHTML =
      '<div class="comment-row">' +
        '<div class="meta"><span class="author">' + escapeHTML(c.author_name || 'Anonymous') +
          '</span><span class="when">' + escapeHTML(stamp) + '</span></div>' +
        '<div class="body">' + escapeHTML(c.text || '') + '</div>' +
        (_canPostComment ? '<button type="button" class="reply-btn">Reply</button>' : '') +
      '</div>';
    if (c.replies && c.replies.length) {
      const ul = document.createElement('ul');
      ul.className = 'replies';
      c.replies.forEach(rep => ul.appendChild(makeCommentNode(rep)));
      li.appendChild(ul);
    }
    const replyBtn = li.querySelector('.reply-btn');
    if (replyBtn) {
      replyBtn.addEventListener('click', () => showReplyForm(li, c.id));
    }
    return li;
  }

  function friendlyTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      const now = Date.now();
      const diff = (now - d.getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' h ago';
      return d.toLocaleDateString();
    } catch (e) { return ''; }
  }

  function showReplyForm(parentLi, parentId) {
    // Toggle — clicking Reply again on the same parent closes it.
    const existing = parentLi.querySelector('.reply-form');
    if (existing) { existing.remove(); return; }
    const form = document.createElement('div');
    form.className = 'comment-form reply-form';
    form.innerHTML =
      '<textarea placeholder="Write a reply…" maxlength="500"></textarea>' +
      '<button type="button">Reply</button>';
    parentLi.appendChild(form);
    const ta = form.querySelector('textarea');
    const btn = form.querySelector('button');
    ta.focus();
    btn.addEventListener('click', async () => {
      const text = ta.value.trim();
      if (!text) return;
      btn.disabled = true;
      try {
        await submitComment(getParam('id'), text, parentId);
        form.remove();
      } catch (e) {
        alert('Could not post reply: ' + (e.message || e));
        btn.disabled = false;
      }
    });
  }

  async function submitComment(animalId, text, parentId) {
    const me = currentSession();
    if (!me || !me.id) throw new Error('not signed in');
    const row = await window.WCDB.animalComments.post({
      animalId, parentId,
      authorId:   me.id,
      authorName: me.real_name || me.name || 'Anonymous',
      text,
    });
    // Optimistic re-fetch + broadcast.
    await loadAndRenderComments(animalId);
    broadcastNewComment(animalId, row);
  }

  function broadcastNewComment(animalId, comment) {
    ensureRealtime();
    if (!_editChannel) return;
    try {
      _editChannel.send({
        type: 'broadcast',
        event: 'animal-comment',
        payload: { animalId, comment, ts: Date.now() },
      });
    } catch (e) {}
  }

  // Wire the top-level comment form (only fires when shown).
  (function wireCommentForm() {
    const btn = document.getElementById('commentSubmit');
    const ta  = document.getElementById('commentInput');
    if (!btn || !ta) return;
    btn.addEventListener('click', async () => {
      const text = ta.value.trim();
      if (!text) return;
      btn.disabled = true;
      try {
        await submitComment(getParam('id'), text, null);
        ta.value = '';
      } catch (e) {
        alert('Could not post comment: ' + (e.message || e));
      } finally {
        btn.disabled = false;
      }
    });
  })();

  // ---- Initial cloud fetch + listen even when not editing -------
  // Everyone (read-only viewers too) listens for Realtime edits so a
  // page that's been open for a while picks up new edits live.
  (async function loadCloudCustomThenSubscribe() {
    const animalId = getParam('id');
    if (!animalId) return;
    try {
      const cloud = await fetchAnimalCustomFromCloud(animalId);
      if (cloud) {
        const patch = {};
        if (cloud.habitat !== null && cloud.habitat !== undefined) patch.habitat = cloud.habitat;
        if (cloud.diet    !== null && cloud.diet    !== undefined) patch.diet    = cloud.diet;
        if (Array.isArray(cloud.fun_facts))     patch.funFacts     = cloud.fun_facts;
        if (Array.isArray(cloud.custom_topics)) patch.customTopics = cloud.custom_topics;
        applyRemotePatch(patch);
        // Photos: merge custom ones into the gallery cells. The
        // renderer ran first with the base set, then this appends.
        // We do this directly (not via reload) so the page only
        // reloads on subsequent broadcasts, not on first load.
        appendCloudPhotosToGallery(cloud);
      }
    } catch (e) {}
    ensureRealtime();
    // Comment box visibility is checked independently — it depends
    // on whether ANY user has ever contributed to this animal,
    // which is its own table.
    refreshCommentBoxVisibility(animalId);
  })();

  // After the initial cloud fetch, append any custom photos /
  // cartoons / coloring pages onto the existing cell state. The
  // renderer's `cells` map is not in our scope here, so we read
  // the DOM directly and push into a hidden data attribute that
  // the next click cycles through. Simpler approach: just call
  // setCellImage on the first custom one if no base image is set.
  function appendCloudPhotosToGallery(cloud) {
    const map = { photos: 'photos', cartoons: 'cartoons', coloring_pages: 'coloringPages' };
    Object.keys(map).forEach(dbKey => {
      const arr = Array.isArray(cloud[dbKey]) ? cloud[dbKey] : [];
      if (!arr.length) return;
      const domKey = map[dbKey];
      const cell = document.querySelector(`#heroGallery .gallery-cell[data-cat="${domKey}"]`);
      if (!cell) return;
      // Make sure the cell is visible (in case the base render hid
      // it for being empty).
      cell.style.display = '';
      // If no base image had loaded yet, paint the first custom one
      // so the kid sees something now. If a base IS loaded, leave
      // it — the next ◀▶ cycle (or page reload) will surface them.
      const img = cell.querySelector('img');
      if (img && !cell.classList.contains('has-image')) {
        img.onload = () => cell.classList.add('has-image');
        img.src = arr[0].src;
      }
    });
    if (typeof balanceGallery === 'function') balanceGallery();
  }

  // True when the active Ako session belongs to a teacher.
  // The session is shared across the whole focus/* family of apps
  // via localStorage('wc.session.v1').
  function isAkoTeacher() {
    try {
      const s = JSON.parse(localStorage.getItem('wc.session.v1') || 'null');
      return !!(s && s.role === 'teacher');
    } catch (e) { return false; }
  }

  // Footer "Mr. Charlie" → bounce to the Ako teacher sign-in
  // page (no separate password here any more).
  function charlieLogin() {
    if (isAkoTeacher()) { window.location = 'admin.html'; return; }
    window.location = '../edu/index.html';
  }
  const charlieEl = document.getElementById('charlieLink');
  if (charlieEl) {
    charlieEl.addEventListener('click', charlieLogin);
    charlieEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); charlieLogin(); }
    });
  }
</script>
