<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animal Friends 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFF7EC;
    --bg2: #FFE8D6;
    --card: #FFFFFF;
    --text: #4A3B47;
    --muted: #8B7B85;
    --primary: #FF9AA2;
    --primary-dark: #F4747E;
    --accent: #FFD166;
    --shadow: 0 6px 18px rgba(202, 122, 122, 0.15);
    --shadow-lg: 0 14px 32px rgba(202, 122, 122, 0.22);
  }

  body {
    font-family: 'Fredoka', 'Quicksand', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  /* floating background sparkles */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255, 209, 102, 0.15) 0, transparent 40px),
      radial-gradient(circle at 80% 10%, rgba(255, 154, 162, 0.18) 0, transparent 50px),
      radial-gradient(circle at 30% 80%, rgba(176, 224, 230, 0.2) 0, transparent 55px),
      radial-gradient(circle at 90% 70%, rgba(199, 206, 234, 0.18) 0, transparent 45px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header.hero {
    text-align: center;
    margin-bottom: 36px;
    padding: 18px;
  }

  .hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 700;
    color: var(--primary-dark);
    letter-spacing: -0.02em;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(255, 154, 162, 0.25);
    margin-bottom: 8px;
  }

  .hero p {
    font-size: 1.2rem;
    color: var(--muted);
    font-weight: 500;
  }

  .hero .paw-row {
    font-size: 1.8rem;
    margin-top: 6px;
    letter-spacing: 8px;
  }

  .admin-link {
    position: fixed;
    top: 18px;
    right: 18px;
    background: white;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    box-shadow: var(--shadow);
    border: 2px solid rgba(0,0,0,0.05);
    z-index: 10;
    transition: transform 0.15s ease;
  }
  .admin-link:hover { transform: translateY(-2px); }

  .search-bar {
    max-width: 480px;
    margin: 0 auto 36px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    padding: 14px 20px 14px 50px;
    border-radius: 999px;
    border: 3px solid white;
    background: white;
    font-family: inherit;
    font-size: 1rem;
    color: var(--text);
    box-shadow: var(--shadow);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--primary); }
  .search-bar::before {
    content: "🔎";
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
  }

  .category-section {
    margin-bottom: 44px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    padding: 0 8px;
  }

  .category-emoji {
    font-size: 2.2rem;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow);
  }

  .category-name {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
  }

  .category-count {
    margin-left: auto;
    background: white;
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: var(--shadow);
  }

  .animals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 18px;
  }

  .animal-card {
    background: var(--card);
    border-radius: 22px;
    padding: 12px 10px 14px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border: 3px solid transparent;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .animal-card:hover {
    transform: translateY(-6px) rotate(-1.5deg);
    box-shadow: var(--shadow-lg);
    border-color: rgba(255,154,162,0.5);
  }

  .animal-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #FFF6E6, #FFE5D1);
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
    display: grid;
    place-items: center;
  }
  .animal-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .animal-photo.loaded img { opacity: 1; }
  .animal-emoji {
    font-size: 3rem;
    line-height: 1;
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    transition: transform 0.25s ease, opacity 0.3s ease;
  }
  .animal-photo.loaded .animal-emoji { opacity: 0; }
  .animal-card:hover .animal-emoji { transform: scale(1.15) rotate(8deg); }

  .animal-name {
    font-size: 0.95rem;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1.1rem;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  #charlieLink {
    cursor: pointer;
    outline: none;
    border-radius: 4px;
    padding: 1px 3px;
  }
  #charlieLink:hover, #charlieLink:focus {
    color: var(--primary-dark);
    background: rgba(255, 154, 162, 0.1);
  }

  @media (max-width: 600px) {
    .animals-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .animal-emoji { font-size: 2.4rem; }
    .category-emoji { font-size: 1.6rem; width: 48px; height: 48px; }
    .category-name { font-size: 1.3rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="paw-row">🐾 🐾 🐾</div>
      <h1>Animal Friends</h1>
      <p>Meet 100 amazing animals! Click any one to learn more 💖</p>
    </header>

    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search for an animal..." aria-label="Search animals" />
    </div>

    <main id="categoriesRoot"></main>

    <footer>Made by <span id="charlieLink" tabindex="0" role="button" title="Teacher login">Mr. Charlie</span> with 💖 for curious learners</footer>
  </div>

<script src="animals-data.js"></script>
<script>
  const root = document.getElementById('categoriesRoot');
  const searchInput = document.getElementById('searchInput');
  const all = getMergedAnimals();

  function render(filter = "") {
    const q = filter.trim().toLowerCase();
    root.innerHTML = "";
    let total = 0;

    ANIMAL_CATEGORIES.forEach(cat => {
      const animals = all
        .filter(a => a.category === cat.id)
        .filter(a => !q || a.name.toLowerCase().includes(q));

      if (animals.length === 0) return;
      total += animals.length;

      const section = document.createElement('section');
      section.className = 'category-section';
      section.innerHTML = `
        <div class="category-header">
          <div class="category-emoji" style="background:${cat.color}">${cat.emoji}</div>
          <div class="category-name">${cat.name}</div>
          <div class="category-count">${animals.length}</div>
        </div>
        <div class="animals-grid"></div>
      `;

      const grid = section.querySelector('.animals-grid');
      animals.forEach(a => {
        const card = document.createElement('a');
        card.className = 'animal-card';
        card.href = `animal-detail.html?id=${encodeURIComponent(a.id)}`;
        card.innerHTML = `
          <div class="animal-photo">
            <img alt="${a.name}">
            <div class="animal-emoji">${a.emoji}</div>
          </div>
          <div class="animal-name">${a.name}</div>
        `;
        grid.appendChild(card);

        // Lazy-load the photo when the card scrolls into view.
        const photoEl = card.querySelector('.animal-photo');
        const imgEl = card.querySelector('.animal-photo img');
        const loadPhoto = () => {
          getAnimalImage(a).then(src => {
            if (!src) return;
            imgEl.onload = () => photoEl.classList.add('loaded');
            imgEl.onerror = () => {};
            imgEl.src = src.replace(/\/(\d+)px-([^/]+)$/, '/240px-$2');
          }).catch(() => {});
        };
        if ('IntersectionObserver' in window) {
          const io = new IntersectionObserver(entries => {
            entries.forEach(e => {
              if (e.isIntersecting) {
                loadPhoto();
                io.disconnect();
              }
            });
          }, { rootMargin: '200px' });
          io.observe(card);
        } else {
          loadPhoto();
        }
      });

      root.appendChild(section);
    });

    if (total === 0) {
      root.innerHTML = `<div class="empty-state">No animals match "${filter}" 🥲</div>`;
    }
  }

  searchInput.addEventListener('input', e => render(e.target.value));
  render();

  // Teacher login: click "Mr. Charlie" in the footer → password 2316 → admin page.
  function charlieLogin() {
    const pw = prompt('Teacher password:');
    if (pw === null) return;
    if (pw === '2316') {
      localStorage.setItem('admin_auth', '2316');
      window.location = 'animals-admin.html';
    } else {
      alert('Wrong password.');
    }
  }
  const charlieEl = document.getElementById('charlieLink');
  charlieEl.addEventListener('click', charlieLogin);
  charlieEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); charlieLogin(); }
  });
</script>
</body>
</html>
