<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animal Friends 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFF7EC;
    --bg2: #FFE8D6;
    --card: #FFFFFF;
    --text: #4A3B47;
    --muted: #8B7B85;
    --primary: #FF9AA2;
    --primary-dark: #F4747E;
    --accent: #FFD166;
    --shadow: 0 6px 18px rgba(202, 122, 122, 0.15);
    --shadow-lg: 0 14px 32px rgba(202, 122, 122, 0.22);
  }

  body {
    font-family: 'Fredoka', 'Quicksand', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  /* floating background sparkles */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255, 209, 102, 0.15) 0, transparent 40px),
      radial-gradient(circle at 80% 10%, rgba(255, 154, 162, 0.18) 0, transparent 50px),
      radial-gradient(circle at 30% 80%, rgba(176, 224, 230, 0.2) 0, transparent 55px),
      radial-gradient(circle at 90% 70%, rgba(199, 206, 234, 0.18) 0, transparent 45px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header.hero {
    text-align: center;
    margin-bottom: 36px;
    padding: 18px;
  }

  .hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 700;
    color: var(--primary-dark);
    letter-spacing: -0.02em;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(255, 154, 162, 0.25);
    margin-bottom: 8px;
  }

  .hero p {
    font-size: 1.2rem;
    color: var(--muted);
    font-weight: 500;
  }

  .hero .paw-row {
    font-size: 1.8rem;
    margin-top: 6px;
    letter-spacing: 8px;
  }

  .admin-link {
    position: fixed;
    top: 18px;
    right: 18px;
    background: white;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    box-shadow: var(--shadow);
    border: 2px solid rgba(0,0,0,0.05);
    z-index: 10;
    transition: transform 0.15s ease;
  }
  .admin-link:hover { transform: translateY(-2px); }

  /* Top-left "← Ako" pill — goes back to the Ako home page. */
  .go-back-link {
    position: fixed;
    top: 18px;
    left: 18px;
    background: white;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
    box-shadow: var(--shadow);
    border: 2px solid rgba(0,0,0,0.05);
    z-index: 10;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  .go-back-link:hover { transform: translateX(-3px); color: var(--primary-dark); }

  /* "Which animals do our class love?" — clickable tagline that
     toggles a filter showing only animals with at least one heart. */
  .class-loves {
    display: inline-block;
    margin-top: 8px;
    background: white;
    color: var(--primary-dark);
    border: 2px solid var(--primary);
    padding: 8px 18px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s ease, background 0.15s ease, color 0.15s ease;
  }
  .class-loves:hover  { transform: translateY(-2px); }
  .class-loves:active { transform: translateY(1px); }
  .class-loves.active {
    background: var(--primary);
    color: white;
  }
  .class-loves .cl-hint { margin-left: 6px; opacity: 0.8; font-weight: 600; font-size: 0.85rem; }

  .search-bar {
    max-width: 480px;
    margin: 0 auto 36px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    padding: 14px 20px 14px 50px;
    border-radius: 999px;
    border: 3px solid white;
    background: white;
    font-family: inherit;
    font-size: 1rem;
    color: var(--text);
    box-shadow: var(--shadow);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--primary); }
  .search-bar::before {
    content: "🔎";
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
  }

  .category-section {
    margin-bottom: 44px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    padding: 0 8px;
  }

  .category-emoji {
    font-size: 2.2rem;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow);
  }

  .category-name {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
  }

  .category-count {
    margin-left: auto;
    background: white;
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: var(--shadow);
  }

  .animals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 18px;
  }

  .animal-card {
    background: var(--card);
    border-radius: 22px;
    padding: 12px 10px 14px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border: 3px solid transparent;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .animal-card:hover {
    transform: translateY(-6px) rotate(-1.5deg);
    box-shadow: var(--shadow-lg);
    border-color: rgba(255,154,162,0.5);
  }

  .animal-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #FFF6E6, #FFE5D1);
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
    display: grid;
    place-items: center;
  }
  .animal-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .animal-photo.loaded img { opacity: 1; }
  .animal-emoji {
    font-size: 3rem;
    line-height: 1;
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    transition: transform 0.25s ease, opacity 0.3s ease;
  }
  .animal-photo.loaded .animal-emoji { opacity: 0; }
  .animal-card:hover .animal-emoji { transform: scale(1.15) rotate(8deg); }

  .animal-name {
    font-size: 0.95rem;
    font-weight: 600;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  /* Heart button — sits next to the animal name. Big tap target,
     muted when empty, red + bigger when the current user has
     hearted this one. Number after is the count of voters. */
  .heart-btn {
    background: transparent;
    border: none;
    padding: 2px 4px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    font-size: 0.95rem;
    line-height: 1;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 3px;
    transition: transform 0.1s ease, color 0.15s ease;
  }
  .heart-btn:hover  { color: var(--primary-dark); transform: scale(1.12); }
  .heart-btn:active { transform: scale(0.95); }
  .heart-btn.mine   { color: var(--primary-dark); font-weight: 800; }
  .heart-btn.mine .heart-icon { filter: none; }
  .heart-icon { font-size: 1rem; }

  /* Heart-change confirmation modal */
  .heart-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .heart-modal-backdrop.open { display: flex; }
  .heart-modal {
    background: white;
    border-radius: 22px;
    padding: 26px 24px 22px;
    max-width: 420px; width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  }
  .heart-modal h3   { margin: 0 0 10px; color: var(--text); font-size: 1.2rem; }
  .heart-modal p    { margin: 0 0 8px; color: var(--text); line-height: 1.45; }
  .heart-modal .hm-muted { color: var(--muted); font-size: 0.9rem; }
  .heart-modal-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px;
  }
  .heart-modal-actions button {
    border: 0; border-radius: 999px; padding: 10px 18px;
    font: inherit; font-weight: 700; cursor: pointer;
  }
  .hm-cancel  { background: #f3f4f6; color: var(--text); }
  .hm-confirm { background: var(--primary-dark); color: white; }
  .hm-pw      {
    width: 100%; margin-top: 10px;
    padding: 10px 14px; border-radius: 12px;
    border: 2px solid var(--bg2); font: inherit; font-size: 1rem;
  }
  .hm-pw.bad  { border-color: var(--primary-dark); }
  .hm-error   { color: var(--primary-dark); font-size: 0.85rem; margin-top: 6px; min-height: 18px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1.1rem;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  #charlieLink {
    cursor: pointer;
    outline: none;
    border-radius: 4px;
    padding: 1px 3px;
  }
  #charlieLink:hover, #charlieLink:focus {
    color: var(--primary-dark);
    background: rgba(255, 154, 162, 0.1);
  }

  @media (max-width: 600px) {
    .animals-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .animal-emoji { font-size: 2.4rem; }
    .category-emoji { font-size: 1.6rem; width: 48px; height: 48px; }
    .category-name { font-size: 1.3rem; }
  }
</style>
</head>
<body>
  <a class="go-back-link" href="../edu/home.html" title="Back to Ako home">← Ako</a>
  <div class="container">
    <header class="hero">
      <div class="paw-row">🐾 🐾 🐾</div>
      <h1>Animal Friends</h1>
      <!-- Click to filter the list down to animals the class has
           hearted. Toggles back to "all" on a second click. -->
      <button type="button" id="classLovesBtn" class="class-loves">
        Which animals do our class love?
        <span class="cl-hint">(tap to filter ❤️)</span>
      </button>
    </header>

    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search for an animal..." aria-label="Search animals" />
    </div>

    <main id="categoriesRoot"></main>

    <footer>Made by <span id="charlieLink" tabindex="0" role="button" title="Teacher login">Mr. Charlie</span> with 💖 for curious learners</footer>
  </div>

  <!-- Heart-change confirmation modal — surfaces when a logged-in
       user clicks a NEW animal's heart while already having an old
       one. Mr. Charlie's password (2316) is required to switch. -->
  <div class="heart-modal-backdrop" id="hmBackdrop" aria-hidden="true">
    <div class="heart-modal" role="dialog" aria-labelledby="hmTitle">
      <h3 id="hmTitle">Change your favourite?</h3>
      <p id="hmMsg">Loading…</p>
      <p class="hm-muted">Go talk to Mr. Charlie before you switch.</p>
      <div id="hmConfirmStage" style="display:none;">
        <input id="hmPw" class="hm-pw" type="password" inputmode="numeric" pattern="\d*" maxlength="4" placeholder="Mr. Charlie's password" autocomplete="off">
        <div class="hm-error" id="hmErr"></div>
      </div>
      <div class="heart-modal-actions">
        <button class="hm-cancel"  id="hmCancel"  type="button">Cancel</button>
        <button class="hm-confirm" id="hmConfirm" type="button">Confirm</button>
      </div>
    </div>
  </div>

<script src="../edu/js/supabase-config.js"></script>
<script src="../edu/js/db.js"></script>
<script src="animals-data.js"></script>
<script>
  const root = document.getElementById('categoriesRoot');
  const searchInput = document.getElementById('searchInput');
  const all = getMergedAnimals();

  // ---- Hearts ----------------------------------------------------
  // Live state: counts per animal id, and the current user's heart.
  let heartCounts = new Map();   // animal_id → number
  let myHeartId   = null;        // animal_id (or null)
  function currentUser() {
    try { return JSON.parse(localStorage.getItem('wc.session.v1') || 'null'); }
    catch (e) { return null; }
  }
  async function loadHearts() {
    if (!window.WCDB || !window.WCDB.animalHearts) return;
    try {
      const rows = await window.WCDB.animalHearts.listAll();
      heartCounts = new Map();
      rows.forEach(r => {
        heartCounts.set(r.animal_id, (heartCounts.get(r.animal_id) || 0) + 1);
      });
      const me = currentUser();
      myHeartId = me ? (rows.find(r => r.user_id === me.id) || {}).animal_id || null : null;
    } catch (e) { console.warn('[hearts] load failed', e); }
  }
  function applyHeartsToDom() {
    document.querySelectorAll('.heart-btn').forEach(btn => {
      const aid = btn.dataset.animalId;
      const count = heartCounts.get(aid) || 0;
      btn.querySelector('.heart-count').textContent = count > 0 ? count : '';
      btn.classList.toggle('mine', myHeartId === aid);
      btn.querySelector('.heart-icon').textContent = myHeartId === aid ? '❤️' : '🤍';
    });
  }
  function animalNameById(id) {
    const a = all.find(x => x.id === id); return a ? a.name : id;
  }

  // ---- Heart-change confirmation modal ---------------------------
  const hmBackdrop = document.getElementById('hmBackdrop');
  const hmMsg      = document.getElementById('hmMsg');
  const hmConfirm  = document.getElementById('hmConfirm');
  const hmCancel   = document.getElementById('hmCancel');
  const hmStage    = document.getElementById('hmConfirmStage');
  const hmPw       = document.getElementById('hmPw');
  const hmErr      = document.getElementById('hmErr');
  let   pendingNewAnimal = null;   // animal_id to switch to

  function openHeartChangeModal(oldAnimalId, newAnimalId) {
    pendingNewAnimal = newAnimalId;
    hmMsg.textContent = 'You already know all about ' + animalNameById(oldAnimalId)
      + '. Sure you want to switch to ' + animalNameById(newAnimalId) + '?';
    hmStage.style.display = 'none';
    hmPw.value = ''; hmErr.textContent = ''; hmPw.classList.remove('bad');
    hmConfirm.textContent = 'Confirm';
    hmBackdrop.classList.add('open');
  }
  function closeHeartModal() {
    hmBackdrop.classList.remove('open');
    pendingNewAnimal = null;
  }
  hmCancel.addEventListener('click', closeHeartModal);
  hmBackdrop.addEventListener('click', (e) => { if (e.target === hmBackdrop) closeHeartModal(); });
  hmConfirm.addEventListener('click', async () => {
    // Two-stage: first click reveals password input, second submits.
    if (hmStage.style.display === 'none') {
      hmStage.style.display = '';
      hmConfirm.textContent = 'Switch heart';
      setTimeout(() => hmPw.focus(), 50);
      return;
    }
    const pw = hmPw.value.trim();
    if (pw !== '2316') {
      hmErr.textContent = 'Wrong password. Ask Mr. Charlie.';
      hmPw.classList.add('bad');
      return;
    }
    hmErr.textContent = '';
    await commitHeart(pendingNewAnimal);
    closeHeartModal();
  });
  hmPw.addEventListener('keydown', (e) => { if (e.key === 'Enter') hmConfirm.click(); });

  async function commitHeart(animalId) {
    const me = currentUser();
    if (!me || !me.id) return;
    try {
      await window.WCDB.animalHearts.setHeart(me.id, animalId);
      await loadHearts();
      applyHeartsToDom();
      // If the "class loves" filter is active, the new vote may
      // change which animals are visible — re-render the list.
      if (showHeartedOnly) render(searchInput.value);
    } catch (e) {
      alert('Could not update heart: ' + (e.message || e));
    }
  }

  async function onHeartClick(e, animalId) {
    e.preventDefault();
    e.stopPropagation();
    const me = currentUser();
    if (!me || !me.id) {
      alert('Sign in on Ako first to vote for an animal.');
      return;
    }
    if (myHeartId && myHeartId !== animalId) {
      openHeartChangeModal(myHeartId, animalId);
      return;
    }
    if (myHeartId === animalId) {
      // already hearted — clicking again is a no-op (the requirement
      // says ONE heart total, can be moved with the password, but
      // doesn't say it can be unset — leave it alone).
      return;
    }
    await commitHeart(animalId);
  }

  // When true, the list is filtered to only show animals that have
  // at least one heart from someone in the class. Toggled by the
  // "Which animals do our class love?" pill in the header.
  let showHeartedOnly = false;

  function render(filter = "") {
    const q = filter.trim().toLowerCase();
    root.innerHTML = "";
    let total = 0;

    ANIMAL_CATEGORIES.forEach(cat => {
      const animals = all
        .filter(a => a.category === cat.id)
        .filter(a => !q || a.name.toLowerCase().includes(q))
        .filter(a => !showHeartedOnly || (heartCounts.get(a.id) || 0) > 0);

      if (animals.length === 0) return;
      total += animals.length;

      const section = document.createElement('section');
      section.className = 'category-section';
      section.innerHTML = `
        <div class="category-header">
          <div class="category-emoji" style="background:${cat.color}">${cat.emoji}</div>
          <div class="category-name">${cat.name}</div>
          <div class="category-count">${animals.length}</div>
        </div>
        <div class="animals-grid"></div>
      `;

      const grid = section.querySelector('.animals-grid');
      animals.forEach(a => {
        const card = document.createElement('a');
        card.className = 'animal-card';
        card.href = `animal-detail.html?id=${encodeURIComponent(a.id)}`;
        card.innerHTML = `
          <div class="animal-photo">
            <img alt="${a.name}">
            <div class="animal-emoji">${a.emoji}</div>
          </div>
          <div class="animal-name">
            <span>${a.name}</span>
            <button class="heart-btn" type="button" data-animal-id="${a.id}"
                    title="Heart this animal — one heart per person">
              <span class="heart-icon">🤍</span><span class="heart-count"></span>
            </button>
          </div>
        `;
        grid.appendChild(card);
        // Heart button click — stop the card's navigation, run our
        // own handler.
        const heartBtn = card.querySelector('.heart-btn');
        heartBtn.addEventListener('click', (e) => onHeartClick(e, a.id));

        // Lazy-load the photo when the card scrolls into view.
        const photoEl = card.querySelector('.animal-photo');
        const imgEl = card.querySelector('.animal-photo img');
        const loadPhoto = () => {
          getAnimalImage(a).then(src => {
            if (!src) return;
            imgEl.onload = () => photoEl.classList.add('loaded');
            imgEl.onerror = () => {};
            imgEl.src = src.replace(/\/(\d+)px-([^/]+)$/, '/240px-$2');
          }).catch(() => {});
        };
        if ('IntersectionObserver' in window) {
          const io = new IntersectionObserver(entries => {
            entries.forEach(e => {
              if (e.isIntersecting) {
                loadPhoto();
                io.disconnect();
              }
            });
          }, { rootMargin: '200px' });
          io.observe(card);
        } else {
          loadPhoto();
        }
      });

      root.appendChild(section);
    });

    if (total === 0) {
      const msg = showHeartedOnly
        ? 'Nobody has hearted an animal yet. Tap a 🤍 on any animal to be first! 💖'
        : `No animals match "${filter}" 🥲`;
      root.innerHTML = `<div class="empty-state">${msg}</div>`;
    }
  }

  searchInput.addEventListener('input', e => render(e.target.value));
  render();

  // "Which animals do our class love?" pill — toggles the filter.
  const classLovesBtn = document.getElementById('classLovesBtn');
  classLovesBtn.addEventListener('click', () => {
    showHeartedOnly = !showHeartedOnly;
    classLovesBtn.classList.toggle('active', showHeartedOnly);
    classLovesBtn.querySelector('.cl-hint').textContent =
      showHeartedOnly ? '(tap to show all)' : '(tap to filter ❤️)';
    render(searchInput.value);
  });

  // Fetch hearts after the initial paint so the counts arrive when
  // they arrive — the page is usable instantly either way. Re-run
  // render afterwards so the "Which animals do our class love?"
  // filter has data the first time it's toggled.
  loadHearts().then(() => {
    applyHeartsToDom();
    if (showHeartedOnly) render(searchInput.value);
  });

  // Teacher login: a Ako teacher session (set via
  // ../edu/index.html) is the only gate. If you're already a
  // teacher, "Mr. Charlie" jumps to the admin editor; otherwise it
  // sends you to the Ako sign-in page so you can log in.
  function isAkoTeacher() {
    try {
      const s = JSON.parse(localStorage.getItem('wc.session.v1') || 'null');
      return !!(s && s.role === 'teacher');
    } catch (e) { return false; }
  }
  function charlieLogin() {
    if (isAkoTeacher()) { window.location = 'admin.html'; return; }
    window.location = '../edu/index.html';
  }
  const charlieEl = document.getElementById('charlieLink');
  charlieEl.addEventListener('click', charlieLogin);
  charlieEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); charlieLogin(); }
  });
</script>
</body>
</html>
