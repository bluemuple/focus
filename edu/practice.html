<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ako — Practice</title>
  <link rel="stylesheet" href="./css/styles.css?v=practice-1">
  <style>
    body.pr-page { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                   background: #fefcf6; color: #1f2937; min-height: 100vh; margin: 0;
                   padding: 22px 16px 60px; display: flex; flex-direction: column; align-items: center; }
    .pr-top { width: 100%; max-width: 720px; display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; }
    .pr-title { margin: 0; font-size: 22px; font-weight: 800; }
    .pr-back { color: #6b7280; font-size: 14px; font-weight: 600; text-decoration: none; padding: 6px 12px; border-radius: 999px; }
    .pr-back:hover { background: rgba(0,0,0,.05); color: #1f2937; }
    .pr-meta { width: 100%; max-width: 720px; display:flex; justify-content:space-between; font-size: 14px; color: #6b7280; margin-bottom: 12px; }
    .pr-card { width: 100%; max-width: 720px; background: #fff; border: 1px solid #e5e7eb; border-radius: 18px;
               box-shadow: 0 4px 14px rgba(0,0,0,.06); padding: 28px 26px; }
    .pr-level-label { font-size: 12px; font-weight: 800; letter-spacing: 1.2px; color: #ef4444; text-transform: uppercase; margin-bottom: 8px; }
    .pr-q { font-size: 36px; font-weight: 800; line-height: 1.2; margin-bottom: 18px; text-align: center; color: #ef4444; }
    .pr-visual { display:flex; justify-content:center; margin: 0 0 18px; }
    .pr-frame { display: grid; grid-template-columns: repeat(5, 56px); grid-template-rows: repeat(2, 56px);
                gap: 4px; background: #fff; padding: 8px; border: 2.5px solid #475569; border-radius: 10px; }
    .pr-cell { width: 56px; height: 56px; border: 1px solid #cbd5e1; border-radius: 8px; display: grid; place-items: center; background: #fcfdff; }
    .pr-dot { width: 38px; height: 38px; border-radius: 50%; background: #3b82f6; box-shadow: 0 2px 0 rgba(0,0,0,.15); }
    .pr-dot.taken { background: #f97316; opacity: .85; position: relative; }
    .pr-dot.taken::after { content: '×'; color:#fff; font-weight: 900; font-size: 24px; position: absolute; inset: 0; display: grid; place-items: center; }
    .pr-frames-row { display:flex; gap: 14px; }
    .pr-input { width: 110px; height: 64px; font-size: 32px; font-weight: 800; text-align: center;
                border: 2.5px solid #fcd34d; border-radius: 12px; background: #fffbeb; color: #92400e; }
    .pr-input:focus { outline: 0; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,.25); }
    .pr-answer-row { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom: 14px; font-size: 32px; font-weight: 800; color: #ef4444; }
    /* Decomposition input for L5 */
    .pr-decomp { display:flex; justify-content:center; align-items:center; gap:8px; font-size: 28px; font-weight: 800; color: #ef4444; flex-wrap: wrap; }
    .pr-decomp .slot { width: 70px; height: 56px; border: 2.5px dashed #cbd5e1; border-radius: 10px;
                       display: grid; place-items: center; background:#fff; color:#1f2937; min-width: 70px; }
    .pr-decomp .slot.filled { border-style: solid; border-color: #3aa776; background: #dcfce7; color: #15803d; }
    .pr-chips { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top: 14px; }
    .pr-chip  { padding: 8px 18px; border: 1.5px solid #cbd5e1; background:#fff; border-radius: 999px; font:inherit; font-size:18px; font-weight:700; cursor:pointer; user-select:none; }
    .pr-chip:hover { background:#f1f5f9; }
    .pr-chip:disabled { opacity:.4; cursor:default; }
    .pr-instr { color: #6b7280; font-size: 13px; margin: 10px 0 0; text-align: center; }
    .pr-feedback { margin-top: 16px; padding: 12px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5;
                   background: #f1f5f9; border-left: 4px solid #94a3b8; display: none; }
    .pr-feedback.show { display: block; }
    .pr-feedback.ok  { background: #dcfce7; border-left-color: #22c55e; }
    .pr-feedback.err { background: #fef3c7; border-left-color: #f59e0b; }
    .pr-actions { display:flex; justify-content:flex-end; gap:10px; margin-top: 16px; }
    .pr-next { background: #3aa776; color:#fff; border:0; font:inherit; font-size:15px; font-weight:800;
               padding: 10px 24px; border-radius: 999px; cursor: pointer; }
    .pr-next:disabled { background: #cbd5e1; cursor: default; }
    .pr-cumulative { font-weight: 700; color: #1f2937; }
    .pr-choices { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pr-choice { background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 12px; padding: 14px 16px;
                 font:inherit; font-size: 20px; font-weight: 800; color: #1f2937; cursor: pointer; }
    .pr-choice.correct { background: #dcfce7; border-color: #22c55e; color: #15803d; }
    .pr-choice.wrong   { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
    .pr-choice:disabled { cursor:default; }
    /* Floating "Level up!" celebration toast — slides in from the
       top, holds for ~2 s, then fades out. */
    .pr-levelup { position: fixed; top: 18px; left: 50%; transform: translate(-50%, -120%);
                  background: linear-gradient(135deg, #fde68a, #fbbf24); color: #78350f;
                  border: 2px solid #f59e0b; padding: 12px 22px; border-radius: 999px;
                  font-size: 18px; font-weight: 800; box-shadow: 0 10px 24px rgba(0,0,0,.18);
                  z-index: 9999; opacity: 0; transition: transform .4s cubic-bezier(.2,1,.3,1), opacity .4s; }
    .pr-levelup.show { transform: translate(-50%, 0); opacity: 1; }
    .pr-levelup strong { color: #b45309; }
  </style>
</head>
<body class="pr-page">
  <header class="pr-top">
    <h1 class="pr-title">🎯 Practice — Mental Subtraction</h1>
    <a class="pr-back" href="./home.html">← Home</a>
  </header>
  <div class="pr-meta">
    <span id="levelInfo">Level 3</span>
    <span class="pr-cumulative">Cumulative: <span id="cumulative">0</span></span>
  </div>
  <main class="pr-card" id="card"></main>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/practice.js?v=2"></script>
</body>
</html>
