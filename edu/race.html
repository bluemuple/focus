<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ako — Race</title>
  <link rel="stylesheet" href="./css/styles.css?v=race-1">
  <style>
    body.rc-page { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                   background: #fefcf6; color: #1f2937; min-height: 100vh; margin: 0;
                   padding: 22px 16px 60px; display: flex; flex-direction: column; align-items: center; }
    .rc-top { width: 100%; max-width: 1100px; display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; }
    .rc-title { margin: 0; font-size: 24px; font-weight: 800; }
    .rc-back { color: #6b7280; font-size: 14px; font-weight: 600; text-decoration: none; padding: 6px 12px; border-radius: 999px; }
    .rc-back:hover { background: rgba(0,0,0,.05); color: #1f2937; }
    .rc-card { width: 100%; max-width: 720px; background: #fff; border: 1px solid #e5e7eb;
               border-radius: 18px; box-shadow: 0 4px 14px rgba(0,0,0,.06); padding: 28px 26px; }
    .rc-q { font-size: 44px; font-weight: 800; text-align:center; color: #ef4444; margin: 30px 0; }
    .rc-input { width: 130px; height: 70px; font-size: 36px; font-weight: 800; text-align: center;
                border: 3px solid #fcd34d; border-radius: 14px; background: #fffbeb; color: #92400e; display: block; margin: 0 auto; }
    .rc-input:focus { outline: 0; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,.25); }
    .rc-timer { font-size: 16px; font-weight: 800; color: #ef4444; text-align: center; margin: 8px 0 16px; }
    .rc-timer .bar { width: 100%; height: 8px; background: #fee2e2; border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .rc-timer .bar .fill { height: 100%; background: #ef4444; width: 100%; transition: width 0.1s linear; }
    .rc-actions { display:flex; justify-content:center; gap: 10px; margin-top: 20px; }
    .rc-btn { background:#3aa776; color:#fff; border:0; font:inherit; font-size:15px; font-weight:800;
              padding: 10px 22px; border-radius: 999px; cursor: pointer; }
    .rc-btn.secondary { background: #4c8bf5; }
    .rc-btn:hover { filter: brightness(1.05); }

    /* Level / speed picker */
    .rc-picker h2 { margin: 0 0 8px; font-size: 22px; }
    .rc-picker p { color: #6b7280; margin: 0 0 18px; }
    .rc-levels { display:flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
    .rc-level { padding: 8px 16px; border-radius: 999px; border: 1.5px solid #cbd5e1; background: #fff;
                font:inherit; font-weight: 700; cursor: pointer; }
    .rc-level.active { background: #ef4444; color: #fff; border-color: #b91c1c; }
    .rc-speed-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .rc-speed { padding: 18px 14px; border-radius: 14px; border: 2px solid #cbd5e1; background: #fff;
                font:inherit; font-weight: 700; cursor: pointer; text-align: center; }
    .rc-speed:hover { background: #f1f5f9; }
    .rc-speed .lbl  { font-size: 16px; font-weight: 800; }
    .rc-speed .rng  { display: block; font-size: 13px; color: #6b7280; margin-top: 4px; font-weight: 500; }
    .rc-speed.beg  { border-color: #22c55e; }
    .rc-speed.int  { border-color: #f59e0b; }
    .rc-speed.adv  { border-color: #ef4444; }

    /* Summary + leaderboards */
    .rc-summary { text-align: center; padding: 16px 0; }
    .rc-score-big { font-size: 60px; font-weight: 900; color: #1f2937; margin: 10px 0; }
    .rc-score-big .pts { font-size: 18px; color: #6b7280; vertical-align: middle; margin-left: 6px; }
    .rc-meta-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 14px 0; }
    .rc-meta-cell { background: #f8fafc; border-radius: 10px; padding: 12px; }
    .rc-meta-cell .lbl { font-size: 11px; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; }
    .rc-meta-cell .val { font-size: 22px; font-weight: 800; color: #1f2937; }

    .rc-boards { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 22px; }
    @media (max-width: 720px) {
      .rc-boards { grid-template-columns: 1fr; }
    }
    .rc-board { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; }
    .rc-board h3 { margin: 0 0 12px; font-size: 16px; font-weight: 800; }
    .rc-board table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .rc-board th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #e5e7eb; font-weight: 700; color: #6b7280; }
    .rc-board td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; }
    .rc-board tr.podium-1 td { background: #fee2e2; }
    .rc-board tr.podium-2 td { background: #fef3c7; }
    .rc-board tr.podium-3 td { background: #ecfccb; }
    .rc-board tr.podium-1, .rc-board tr.podium-2, .rc-board tr.podium-3 {
      outline: 2px solid #ef4444;
      outline-offset: -2px;
    }
    .rc-board .rank { font-weight: 800; width: 28px; }
    .rc-board .name { font-weight: 700; }
    .rc-board .score { text-align: right; font-weight: 800; }
  </style>
</head>
<body class="rc-page">
  <header class="rc-top">
    <h1 class="rc-title">🏁 Race — Mental Subtraction</h1>
    <a class="rc-back" href="./home.html">← Home</a>
  </header>
  <main class="rc-card" id="card"></main>
  <div class="rc-boards" id="boards"></div>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/race.js?v=3"></script>
</body>
</html>
