<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ako — My Profile</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="wc-shell">
    <header class="wc-header">
      <div class="wc-logo" onclick="location.href='./home.html'">A<span class="catch">ko</span></div>
      <div class="wc-user-chip">
        <span id="userName">…</span>
        <span class="coin" title="Coins">💰 <span id="userMoney">0</span></span>
        <a href="./home.html" style="color:var(--brand-2); font-weight:600;">Lessons</a>
        <span style="color:var(--line);">|</span>
        <a href="#" id="logoutBtn" style="color:var(--ink-soft);">Sign out</a>
      </div>
    </header>

    <!-- HERO chip — quick stats -->
    <section id="hero" class="wc-card wc-hero-chip"></section>

    <!-- COLLECTION — per-set grids -->
    <section class="wc-card wc-mt-24">
      <h2 style="margin: 0 0 6px;">🐾 My Collection</h2>
      <p class="wc-muted" style="margin: 0 0 18px;">
        Catch them all! Coloured ones are yours; the dark ones are still hiding.
      </p>
      <div id="collection"></div>
    </section>

    <!-- WORD STATS -->
    <section class="wc-card wc-mt-24">
      <h2 style="margin: 0 0 6px;">🍦 My word ice creams</h2>
      <div id="wordStats"></div>
    </section>

    <!-- MESSAGES from teacher -->
    <section class="wc-card wc-mt-24">
      <h2 style="margin: 0 0 6px;">💌 Messages from my teacher</h2>
      <div id="messages" class="wc-msg-list"></div>
    </section>
  </div>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/assets.js"></script>
  <script src="./js/profile.js"></script>
</body>
</html>
