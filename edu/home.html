<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brightly — Home</title>
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    /* Home-page layout: slim header, then a big tile grid for the
       sibling apps, then the Reading lesson list. The tiles are the
       primary navigation now — the top bar only carries identity. */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin: 6px 0 28px;
    }
    .app-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 26px 14px;
      background: var(--card, #fff);
      border: 3px solid var(--ink, #1d1d24);
      border-radius: 18px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12);
      text-decoration: none;
      color: var(--ink, #1d1d24);
      font-weight: 800;
      font-size: 18px;
      text-align: center;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .app-tile:hover  { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.15); }
    .app-tile:active { transform: translateY(2px);  box-shadow: 0 3px 0 rgba(0,0,0,0.18); }
    .app-tile .ico { font-size: 44px; line-height: 1; }
    .app-tile .sub { font-size: 12px; font-weight: 600; color: var(--ink-soft, #6c6c75); }
    .app-tile.pets    { background: #fce7f3; }
    .app-tile.space   { background: #ddd6fe; }
    .app-tile.maths   { background: #fed7aa; }
    .app-tile.phonics { background: #bae6fd; }
    .app-tile.animals { background: #bbf7d0; }

    /* Slim top-right user chip — identity only. */
    #userChip { gap: 12px; }
    #userChip .sep { color: var(--line, #d1d5db); }
  </style>
</head>
<body>
  <div class="wc-shell">
    <header class="wc-header">
      <div class="wc-logo" onclick="location.href='./home.html'">Bright<span class="catch">ly</span></div>
      <div class="wc-user-chip" id="userChip">
        <span id="userName">…</span>
        <span class="coin" title="Coins">🪙 <span id="userMoney">0</span></span>
        <span class="sep">|</span>
        <a href="#" id="logoutBtn" style="color:var(--ink-soft);">Sign out</a>
      </div>
    </header>

    <!-- App tiles — large tappable cards. Same per-class teacher
         hide-toggles as before; each tile carries its own id so the
         settings flag flips its display. -->
    <div class="app-grid" id="appGrid">
      <a class="app-tile pets"    href="./profile.html"          id="navMyPets"><span class="ico">🐾</span>My Pets</a>
      <a class="app-tile space"   href="../virtual/index.html"   id="navTheSpace"><span class="ico">🌌</span>The Space</a>
      <a class="app-tile maths"   href="../maths/student.html"   id="navMaths"><span class="ico">➗</span>Maths</a>
      <a class="app-tile phonics" href="../phonics/index.html"   id="navPhonics"><span class="ico">🔤</span>Phonics</a>
      <a class="app-tile animals" href="../animals/index.html"   id="navAnimals"><span class="ico">🦁</span>Animals</a>
    </div>

    <h1 style="margin: 8px 0 18px; font-size: 28px;">Reading</h1>

    <div id="lessonList" class="wc-list">
      <div class="wc-list-item">
        <div>
          <div class="title">Loading lessons…</div>
          <div class="meta">Hang on a sec</div>
        </div>
      </div>
    </div>

    <div id="empty" class="wc-card wc-center wc-hidden" style="margin-top:24px;">
      <p class="wc-muted">No lessons yet. Your teacher will add some soon!</p>
    </div>
  </div>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script>
  (async () => {
    const me = window.WCAuth.requireStudent('./index.html');
    if (!me) return;

    document.getElementById('userName').textContent = me.real_name;
    document.getElementById('userMoney').textContent = me.money || 0;
    document.getElementById('logoutBtn').addEventListener('click', e => {
      e.preventDefault();
      window.WCAuth.logout();
      location.href = './index.html';
    });

    // Apply per-class navigation toggles from wc_classes.hide_features.
    // Fail-open: any error keeps every tile visible so a transient
    // network blip never locks students out of features.
    try {
      if (me.class_id) {
        const cls = await window.WCDB.classes.byId(me.class_id);
        const flags = (cls && cls.hide_features) || {};
        if (flags.hideMyPets)   document.getElementById('navMyPets').style.display   = 'none';
        if (flags.hideTheSpace) document.getElementById('navTheSpace').style.display = 'none';
        if (flags.hideMaths)    document.getElementById('navMaths').style.display    = 'none';
        if (flags.hidePhonics)  document.getElementById('navPhonics').style.display  = 'none';
        if (flags.hideAnimals)  document.getElementById('navAnimals').style.display  = 'none';
      }
    } catch (e) { /* keep tiles visible on error */ }

    const list = document.getElementById('lessonList');
    list.innerHTML = '';

    if (!me.class_id) {
      document.getElementById('empty').classList.remove('wc-hidden');
      document.getElementById('empty').querySelector('p').textContent =
        'You’re not in a class yet. Ask your teacher.';
      return;
    }

    let lessons = [];
    try {
      lessons = await window.WCDB.lessons.listForClass(me.class_id);
    } catch (e) {
      console.error(e);
    }

    if (!lessons.length) {
      document.getElementById('empty').classList.remove('wc-hidden');
      return;
    }

    lessons.forEach(L => {
      const row = document.createElement('a');
      row.href = './lesson.html?id=' + encodeURIComponent(L.id);
      row.className = 'wc-list-item';
      row.style.color = 'inherit';
      row.style.textDecoration = 'none';
      row.innerHTML = `
        <div>
          <div class="title">${escapeHtml(L.title)}</div>
          <div class="meta">${escapeHtml(animalSetLabel(L.animal_set))} · ${new Date(L.created_at).toLocaleDateString('en-NZ')}</div>
        </div>
        <button class="wc-btn">Read</button>
      `;
      list.appendChild(row);
    });

    function animalSetLabel(s) {
      return ({
        'animals': 'World animals',
        'nz-animals': 'NZ animals',
        'penguin': 'Penguins',
        'mixed': 'Mixed animals',
      })[s] || 'Animals';
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
    }
  })();
  </script>
</body>
</html>
