<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ako — Reading</title>
  <link rel="stylesheet" href="./css/styles.css?v=hint-merge-1">
  <!-- Dyslexia-friendly & readability fonts loaded only on the lesson
       page (where the "Read Better" toggle uses them). Cheap because
       they're fetched once and cached by the CDN, and the browser
       only downloads woff2 when the toggle is on. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap">
  <link rel="stylesheet"
        href="https://fonts.cdnfonts.com/css/open-dyslexic">
  <!-- Preload the self-hosted OpenDyslexic OTF so the first Read Better
       toggle swaps fonts without a flash. `crossorigin` is harmless on
       same-origin requests and lets browsers reuse the preload for the
       @font-face fetch instead of double-fetching. -->
  <link rel="preload" href="./OpenDyslexic-Regular.otf"
        as="font" type="font/otf" crossorigin>
</head>
<body class="wc-lesson-layout">
  <!-- Stash the header in a hidden element so the lesson-page renders
       chrome-less per spec; profile / coin info still accessible via
       the bottom-bar 📋 button which routes to profile.html. -->
  <div id="userName" hidden>…</div>
  <div id="userMoney" hidden>0</div>
  <a href="#" id="logoutBtn" hidden></a>

  <div class="wc-shell wc-shell-wide">
    <div class="wc-lesson-grid">
      <!-- ============================================================
           MAIN reading card  (또박또박 layout)
           ============================================================ -->
      <article class="wc-lesson-main">

        <!-- Header — just back chip + title + 1문장씩, no thumbnail.
             The thumbnail used to mirror 또박또박's layout but the
             page counter moved to the bottom bar and lessons don't
             carry per-lesson thumbnail images, so it had no purpose
             remaining. -->
        <div class="wc-lesson-titlerow">
          <a class="back-btn" href="./home.html" aria-label="뒤로">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                 stroke="currentColor" stroke-width="2.4"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="15 6 9 12 15 18"/>
            </svg>
          </a>
          <h1 id="lessonTitle">Loading…</h1>
        </div>
        <div class="wc-lesson-head">
          <button class="ht-btn" id="btnSingle" type="button" aria-pressed="false"
                  title="Show one sentence at a time, 2× size">
            <span class="ht-ico">📜</span>
            <span class="ht-label">Single sentence</span>
          </button>
          <!-- Mute toggle for chunk-level auto-TTS. Default = muted.
               Mute affects ONLY chunk-on-word-click; full sentence play
               (▶), sidebar headword 🔊 and other TTS calls bypass it. -->
          <button class="ht-btn" id="btnChunkMute" type="button" aria-pressed="true"
                  title="Chunk audio on word tap — click to toggle">
            <span class="ht-ico" id="btnChunkMuteIco">🔇</span>
            <span class="ht-label" id="btnChunkMuteLabel">Mute chunk</span>
          </button>
          <!-- Font-size and dyslexia-friendly font controls. State is
               per-device (localStorage) so a student's preferred reading
               setup follows them across lessons. -->
          <button class="ht-btn ht-btn-fz" id="btnFontMinus" type="button" title="Smaller text">A−</button>
          <button class="ht-btn ht-btn-fz" id="btnFontPlus"  type="button" title="Bigger text">A+</button>
          <button class="ht-btn ht-btn-fz" id="btnLhMinus"   type="button" title="Tighter line spacing">↕−</button>
          <button class="ht-btn ht-btn-fz" id="btnLhPlus"    type="button" title="Looser line spacing">↕+</button>
          <button class="ht-btn" id="btnReadBetter" type="button" aria-pressed="false"
                  title="Switch to a dyslexia-friendly font">
            <span class="ht-ico">👓</span>
            <span class="ht-label">Read Better</span>
          </button>
          <!-- Per-device toggle to pause the animal-encounter system.
               Active state means encounters are HIDDEN (no quizzes
               pop up when the student marks words). State persists
               across lessons via localStorage. -->
          <button class="ht-btn" id="btnHideEncounters" type="button" aria-pressed="false"
                  title="Pause animal quizzes — quiet reading mode">
            <span class="ht-ico" id="btnHideEncountersIco">🐾</span>
            <span class="ht-label" id="btnHideEncountersLabel">Animals on</span>
          </button>
        </div>

        <!-- Body. Paginated by paragraph: each <p class="para"> is one
             "page" the user steps through via the bottom-bar arrows. -->
        <div class="wc-lesson-text-wrap">
          <div id="lessonBody" class="wc-lesson-text">
            <p class="wc-muted">Loading lesson…</p>
          </div>
        </div>
      </article>

      <!-- ============================================================
           SIDEBAR  (또박또박-style: scroll body + bottom-fixed level-bar)
           ============================================================ -->
      <aside class="wc-sidebar" aria-label="Word details">
        <button class="wc-side-toggle" id="sideToggle" aria-expanded="true">⟩</button>
        <div class="wc-sidebar-scroll" id="sideScroll">
          <section id="sideWord"        class="wc-side-section wc-side-word"></section>
          <section id="sideViz"         class="wc-side-section"></section>
          <section id="sideReplies"     class="wc-side-section"></section>
        </div>
        <!-- Bottom-fixed level picker — same 6-circle layout as
             또박또박's .ls-bottom-fixed (🗑 1 2 3 4 ✓). Hidden until
             a word is selected so the sidebar doesn't feel busy when
             the student first lands on the lesson. -->
        <div class="wc-side-bottom-fixed" id="sideLevelBar" hidden></div>
      </aside>
    </div>
  </div>

  <!-- ============================================================
       STICKY BOTTOM BAR — 또박또박 style, 6 buttons
         ▶  ‹‹ (prev page)  ‹ (prev word)  N / total  › (next word)  ›› (next page)
       ============================================================ -->
  <div class="wc-lesson-bar" id="lessonBar">
    <button class="lb-play" id="btnPlay" aria-label="재생">▶</button>
    <button class="lb-arrow lb-arrow-page" id="btnPagePrev" aria-label="이전 페이지" title="이전 페이지">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="18 6 12 12 18 18"/>
        <polyline points="12 6 6 12 12 18"/>
      </svg>
    </button>
    <button class="lb-arrow" id="btnPrev" aria-label="이전 단어" title="이전 단어">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 6 9 12 15 18"/>
      </svg>
    </button>
    <span class="lb-page-count" id="lbPageCount">1 / 1</span>
    <button class="lb-arrow" id="btnNext" aria-label="다음 단어" title="다음 단어">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="9 6 15 12 9 18"/>
      </svg>
    </button>
    <button class="lb-arrow lb-arrow-page" id="btnPageNext" aria-label="다음 페이지" title="다음 페이지">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 6 12 12 6 18"/>
        <polyline points="12 6 18 12 12 18"/>
      </svg>
    </button>
  </div>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/assets.js"></script>
  <script src="./js/levels.js"></script>
  <script src="./js/tts.js?v=bullets-1"></script>
  <script src="./js/word-info.js"></script>
  <script src="./js/chunks.js"></script>
  <script src="./js/lesson.js?v=click-fix-1"></script>
  <script src="./js/sidebar.js?v=hint-merge-1"></script>
  <script src="./js/quiz.js"></script>
  <script src="./js/encounter.js"></script>
  <script>
    // Sidebar collapse toggle (tablet/mobile).
    (function () {
      const btn  = document.getElementById('sideToggle');
      const root = document.body;
      btn.addEventListener('click', () => {
        const collapsed = root.classList.toggle('wc-sidebar-collapsed');
        btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        btn.textContent = collapsed ? '⟨' : '⟩';
      });
    })();
  </script>
</body>
</html>
