<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ako — Back to Basic</title>
  <link rel="stylesheet" href="./css/styles.css?v=basic-rem-1">
  <style>
    /* Diagnosis test — focused, single-card layout. Kept inline so
       this page is self-contained and doesn't bloat styles.css. */
    body.btb-page {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "Apple SD Gothic Neo", sans-serif;
      background: #fdfcf7;
      color: #1f2937;
      min-height: 100vh;
      margin: 0;
      padding: 22px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .btb-top {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .btb-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }
    .btb-back {
      color: #6b7280;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
    }
    .btb-back:hover { background: rgba(0,0,0,0.05); color: #1f2937; }

    .btb-progress {
      width: 100%;
      max-width: 720px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .btb-progress .stage {
      font-weight: 700;
      color: #1f2937;
      font-size: 15px;
    }
    .btb-bar {
      width: 100%;
      max-width: 720px;
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }
    .btb-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e 0%, #3aa776 100%);
      width: 0;
      transition: width .3s ease;
    }

    .btb-card {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 14px rgba(0,0,0,.06);
      padding: 28px 26px;
    }

    .btb-stage-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: #3aa776;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .btb-stage-name {
      font-size: 16px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 18px;
    }
    .btb-q {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      color: #1f2937;
      margin-bottom: 22px;
    }
    /* Numbers AND the minus / equals signs inside math questions
       all read in red — keeps "this is a maths bit" obvious to the
       student and matches the rest of the Maths app's palette. */
    .btb-q .num { color: #ef4444; }
    .btb-q .op  { color: #ef4444; }
    .btb-q .answer-blank { color: #f59e0b; }

    /* Remediation badge that hangs off the stage header during
       extra practice — a small amber chip so the student knows
       this is the second-chance practice loop, not the initial test. */
    .btb-rem-tag {
      display: inline-block;
      background: #fef3c7;
      color: #b45309;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Concept-explanation page styling — shown between rem Q1 and
       rem Q2 so the student gets context before more practice. */
    .btb-concept {
      background: #eff6ff;
      border: 1.5px solid #bfdbfe;
      border-radius: 14px;
      padding: 18px 20px;
      color: #1e3a8a;
      font-size: 15.5px;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .btb-concept strong { color: #1d4ed8; }

    .btb-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btb-choice {
      background: #f8fafc;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      cursor: pointer;
      text-align: left;
      transition: background .12s, border-color .12s, transform .1s;
    }
    .btb-choice:hover:not(:disabled) {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    .btb-choice:active:not(:disabled) { transform: translateY(1px); }
    .btb-choice:disabled { cursor: default; }
    .btb-choice.picked  { background: #dbeafe; border-color: #4c8bf5; }
    .btb-choice.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #15803d;
    }
    .btb-choice.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #b91c1c;
    }
    .btb-choice-label {
      display: inline-block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e2e8f0;
      color: #475569;
      font-size: 13px;
      font-weight: 800;
      line-height: 22px;
      text-align: center;
      margin-right: 10px;
    }
    .btb-choice.correct .btb-choice-label { background: #22c55e; color: #fff; }
    .btb-choice.wrong   .btb-choice-label { background: #ef4444; color: #fff; }

    .btb-feedback {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.55;
      background: #f1f5f9;
      border-left: 4px solid #94a3b8;
      display: none;
    }
    .btb-feedback.show { display: block; }
    .btb-feedback.ok  { background: #dcfce7; border-left-color: #22c55e; }
    .btb-feedback.err { background: #fef3c7; border-left-color: #f59e0b; }
    .btb-feedback h4  { margin: 0 0 6px; font-size: 14px; font-weight: 800; letter-spacing: .4px; }
    .btb-feedback p   { margin: 0; }

    .btb-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .btb-next {
      background: #3aa776;
      color: #fff;
      border: 0;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      padding: 12px 30px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 3px 0 #1f7a52;
      transition: transform .1s, box-shadow .1s, background .15s;
    }
    .btb-next:hover  { background: #2f9466; }
    .btb-next:active { transform: translateY(2px); box-shadow: 0 1px 0 #1f7a52; }
    .btb-next:disabled { background: #cbd5e1; box-shadow: 0 3px 0 #94a3b8; cursor: default; }

    /* End-of-stage / end-of-test summary screen. */
    .btb-summary {
      text-align: center;
      padding: 30px 10px;
    }
    .btb-summary h2 {
      font-size: 26px;
      margin: 0 0 10px;
    }
    .btb-summary .big-score {
      font-size: 60px;
      font-weight: 900;
      margin: 18px 0;
    }
    .btb-summary .big-score .num   { color: #22c55e; }
    .btb-summary .big-score .total { color: #6b7280; }
    .btb-summary .verdict { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
    .btb-summary .verdict.ok  { color: #15803d; }
    .btb-summary .verdict.stay { color: #b45309; }
    .btb-summary .all-done {
      background: linear-gradient(135deg, #fcd34d, #fbbf24);
      color: #1f2937;
      padding: 22px 18px;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 800;
      margin: 18px 0;
      box-shadow: 0 4px 0 #d97706;
    }
    .btb-restart {
      background: #4c8bf5;
      color: #fff;
      border: 0;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 12px;
    }
    .btb-restart:hover { background: #3b78dd; }

    @media (max-width: 520px) {
      .btb-choices { grid-template-columns: 1fr; }
      .btb-q { font-size: 19px; }
    }
  </style>
</head>
<body class="btb-page">
  <header class="btb-top">
    <h1 class="btb-title">↩️ Back to Basic</h1>
    <a class="btb-back" href="./home.html">← Home</a>
  </header>

  <div class="btb-progress">
    <span class="stage" id="stageInfo">Stage 1 — Recognise symbols</span>
    <span id="qInfo">Question 1 / 5</span>
  </div>
  <div class="btb-bar"><div class="btb-bar-fill" id="barFill"></div></div>

  <main class="btb-card" id="card">
    <!-- JS renders question / summary here. -->
  </main>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/back-to-basic.js?v=4"></script>
</body>
</html>
