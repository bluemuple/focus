<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Make 10 — Number Bonds</title>
  <link rel="stylesheet" href="./make10.css?v=5">
</head>
<body>
  <header class="m10-top">
    <h1 class="m10-title">🍦 Make 10</h1>
  </header>

  <main class="m10-main">
    <!-- Equation row. Three layouts:
           add        [L] + [R] = 10
           sub-left   [L] = 10 − [R]
           sub-right  [R] = 10 − [L]
         JS rebuilds the row when the form changes; a brief
         flying-arc element handles the "+ 3 swoops to the right of
         10" animation in between. -->
    <section class="m10-eq-wrap">
      <div class="m10-eq" id="eqRow"></div>
    </section>

    <!-- Stage: green sis (LEFT), 5×2 frame, red sis (RIGHT). The
         frame is built by JS so each cell can host either a green
         popsicle, a red popsicle, or be empty. -->
    <section class="m10-stage">
      <button class="m10-sis m10-sis-green" id="greenSis" type="button"
              title="Add a green popsicle (double-click to flip equation)">
        <img src="./green-sis-sm.png" alt="" draggable="false">
      </button>

      <div class="m10-frame" id="frame"></div>

      <button class="m10-sis m10-sis-red" id="redSis" type="button"
              title="Add a red popsicle (double-click to flip equation)">
        <img src="./red-sis-sm.png" alt="" draggable="false">
      </button>
    </section>

    <p class="m10-desc" id="desc"></p>

    <!-- Sequential progression link — points students toward the
         subtract-up-to-99 page once they're comfortable with
         number bonds to 10. -->
    <a class="m10-stage-nav" href="./index.html">Next stage →</a>
  </main>

  <!-- Bottom-left corner — Hide toggle. Mirrors the same control
       on /maths/mental/index.html (which hides the tens frame
       below the equation). Here it hides the EQUATION at the
       top, so the student can "make a bond" purely by looking at
       the popsicles. Shortcut: h. -->
  <div class="m10-corner">
    <button class="m10-hide-btn" id="hideBtn" type="button"
            aria-pressed="false" title="Hide the equation (h)">Hide</button>
  </div>

  <!-- Arc-flight overlay used by JS to morph + → − between forms. -->
  <div class="m10-flyer-host" id="flyerHost" aria-hidden="true"></div>

  <audio id="clickSound" src="../sounds/click.mp3" preload="auto"></audio>
  <script src="./make10.js?v=5"></script>
</body>
</html>
