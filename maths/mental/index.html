<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mental Subtraction — Tens Frame</title>
  <link rel="stylesheet" href="./style.css?v=16">
</head>
<body class="cells-popsicle">
  <header class="mh-top">
    <h1 class="mh-title">🍦 Mental Subtraction</h1>
  </header>

  <main class="mh-main">
    <!-- ========================================================
         Equation row.

         Every NUMBER lives inside a `.mh-num-wrap` with three
         pieces:
           1. (optional) `.mh-bubbles` row above — holds the
              gradient bubble that toggles per-digit colour-coding,
              and (Y only, when Y≥10) a "?" bubble that fills the
              decomposition boxes with the correct values.
           2. the editable number input itself
           3. an overlay div that paints each digit (tens / ones)
              in red / green when colour-coding is active. The
              input's own text fades to transparent in that mode
              so the overlay reads cleanly.

         Layout shape grows with the subtrahend (Y):
           Y < 10                   [X] − [Y] = [ans]
           Y ≥ 10, ones digit = 0   [X] − [Y] = [ans]    (no decomp)
           Y ≥ 10, ones digit > 0   [X] − [Y] = [X] − [tens] − [ones] = [ans]
         ======================================================== -->
    <section class="mh-eq" id="eqRow">

      <!-- X with its own gradient bubble + overlay. -->
      <div class="mh-num-wrap" id="xWrap">
        <div class="mh-bubbles">
          <button class="mh-grad-btn" data-target="x" type="button"
                  title="Colour-code the tens (red) and ones (green) of this number" aria-label="Colour-code X"></button>
        </div>
        <input type="number" class="mh-eq-num mh-num-input" id="inputX" value="29"
               inputmode="numeric" autocomplete="off" maxlength="2" max="99" min="0">
        <div class="mh-num-overlay" id="xOverlay" aria-hidden="true"></div>
      </div>

      <span class="mh-eq-op">−</span>

      <!-- Y: gradient bubble + (when Y≥10) "?" bubble + overlay. -->
      <div class="mh-num-wrap" id="yWrap">
        <div class="mh-bubbles">
          <button class="mh-grad-btn" data-target="y" type="button"
                  title="Colour-code Y and the decomposition boxes" aria-label="Colour-code Y"></button>
          <button class="mh-q-btn" id="qBtn" type="button" hidden
                  title="Fill in the decomposition (tens + ones)">?</button>
        </div>
        <input type="number" class="mh-eq-num mh-num-input" id="inputY" value="13"
               inputmode="numeric" autocomplete="off" maxlength="2" max="99" min="0">
        <div class="mh-num-overlay" id="yOverlay" aria-hidden="true"></div>
      </div>

      <span class="mh-eq-op">=</span>

      <!-- Decomposition row — shown only when Y ≥ 10 with non-zero ones. -->
      <span class="mh-decomp" id="decompRow" hidden>
        <div class="mh-num-wrap">
          <input type="number" class="mh-eq-num mh-eq-static mh-num-input"
                 id="inputDecX" value="29" disabled>
          <div class="mh-num-overlay" id="decXOverlay" aria-hidden="true"></div>
        </div>
        <span class="mh-eq-op">−</span>
        <div class="mh-num-wrap">
          <input type="number" class="mh-eq-num mh-eq-dec mh-dec-tens mh-num-input"
                 id="inputDecTens" placeholder="?" inputmode="numeric" autocomplete="off" maxlength="2" max="99" min="0">
          <div class="mh-num-overlay" id="decTensOverlay" aria-hidden="true"></div>
        </div>
        <span class="mh-eq-op" id="decOnesOp">−</span>
        <div class="mh-num-wrap">
          <input type="number" class="mh-eq-num mh-eq-dec mh-dec-ones mh-num-input"
                 id="inputDecOnes" placeholder="?" inputmode="numeric" autocomplete="off" maxlength="2" max="99" min="0">
          <div class="mh-num-overlay" id="decOnesOverlay" aria-hidden="true"></div>
        </div>
        <span class="mh-eq-op">=</span>
      </span>

      <input type="number" class="mh-eq-num mh-eq-ans" id="inputAns" placeholder="?"
             inputmode="numeric" autocomplete="off" maxlength="2" max="99" min="0">
    </section>

    <section class="mh-frames" id="framesHost" aria-label="Tens frames"></section>

    <section class="mh-actions">
      <button class="mh-check" id="checkBtn" type="button">Check answer ✔</button>
      <div class="mh-hint" id="hint" aria-live="polite"></div>
    </section>

    <div class="mh-reset-wrap">
      <button class="mh-reset" id="resetBtn" type="button">↺ Reset dogs</button>
    </div>

    <!-- Previous stage — back to the simpler "make 10" number-
         bonds page for warm-up. -->
    <a class="mh-stage-nav" href="./make10.html">← Previous stage</a>
  </main>

  <!-- Bottom-left controls.

       Row 1 (top)    : Hide toggle — collapses the tens-frame area
                        so only the equation is visible (handy for a
                        "do it in your head" round).
       Row 2 (bottom) : Cell-style picker — dog faces / plain white
                        circles / popsicles. Radio-style chips. -->
  <div class="mh-corner">
    <button class="mh-hide-btn" id="hideBtn" type="button"
            aria-pressed="false" title="Hide the boxes below">Hide</button>
    <div class="mh-style-picker" role="radiogroup" aria-label="Cell style">
      <button class="mh-style-btn" data-style="dog" type="button"
              role="radio" aria-checked="false" title="Dog faces">🐶</button>
      <button class="mh-style-btn" data-style="circle" type="button"
              role="radio" aria-checked="false" title="Plain white circles">⚪</button>
      <button class="mh-style-btn active" data-style="popsicle" type="button"
              role="radio" aria-checked="true" title="Popsicles">🍦</button>
    </div>
  </div>

  <!-- Welcome overlay — fills the screen with a dark backdrop and
       a centred mode-themed image (dog at first paint, popsicle the
       first time the student opens that mode). Click anywhere or
       press Esc to dismiss. Each mode's welcome shows ONCE per
       page session — refresh to see them again. -->
  <div class="mh-welcome" id="welcome" hidden role="dialog" aria-label="Welcome">
    <img id="welcomeImg" alt="">
  </div>

  <!-- Pre-loaded click sound — every button press plays a clone of
       this so rapid taps overlap rather than queueing. -->
  <audio id="clickSound" src="../sounds/click.mp3" preload="auto"></audio>

  <script src="./app.js?v=18"></script>
</body>
</html>
