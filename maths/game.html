<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Maths Game</title>
<style>
  :root {
    --bg:#fff7ec; --ink:#1d1d24; --muted:#6c6c75;
    --primary:#ff8a3d; --primary-ink:#a84a00;
    --good:#2ebf72; --good-ink:#0e6b37;
    --bad:#e45858;  --bad-ink:#8a1e1e;
    --pink-bg:#ffd1e2; --pink-ink:#c2185b;
    --shadow:0 5px 0 rgba(0,0,0,0.14);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; min-height:100vh; font-family:'Nunito','Trebuchet MS',sans-serif;
              background:var(--bg); color:var(--ink); }
  .wrap { max-width:880px; margin:0 auto; padding:14px 16px 60px; }

  /* Top bar: timer slider + score */
  header.bar {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:#fff; border:3px solid var(--ink); border-radius:18px;
    padding:10px 14px; box-shadow:var(--shadow); margin-bottom:14px;
  }
  .game-name { font-weight:900; font-size:16px; min-width:0; flex:1; }
  .score-pill {
    background:var(--primary); color:#fff; border:3px solid var(--ink);
    border-radius:999px; padding:4px 14px; font-weight:900; font-size:18px;
    box-shadow:0 4px 0 var(--primary-ink);
  }
  .timer {
    width:100%; height:46px; background:#fff5e0; border:3px solid var(--ink);
    border-radius:14px; position:relative; overflow:hidden;
  }
  .timer .bar {
    position:absolute; top:0; bottom:0; left:0;
    background: linear-gradient(180deg, #ffe6c2, #ffb368);
    width:0%; transition: width 0.25s linear;
  }
  .timer .marker {
    position:absolute; top:-3px; bottom:-3px; width:5px;
    background:#222; opacity:0.85;
    transform:translateX(-2px); transition: left 0.25s linear;
  }
  .timer .endpoints {
    position:absolute; inset:0; display:flex; justify-content:space-between;
    padding:0 10px; pointer-events:none;
    font-weight:900; font-size:13px; color:#222; align-items:center;
  }
  .timer .left-text { display:flex; align-items:center; gap:6px; }
  .timer .countdown {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    background:transparent;       /* transparent — vertical bar stays visible */
    color:#0a0a0a; font-weight:900; font-size:22px; letter-spacing:0.5px;
    text-shadow:0 1px 0 rgba(255,255,255,0.7);
    pointer-events:none;
  }

  /* Question card */
  .card { background:#fff; border:3px solid var(--ink); border-radius:20px;
          padding:20px; box-shadow:var(--shadow); }
  .level-pill { display:inline-block; padding:3px 10px; border:2px solid var(--ink);
                border-radius:999px; font-size:12px; font-weight:900; background:#fff7e3; }
  .level-pill.l1 { background:#e4f7e7; }
  .level-pill.l2 { background:#fff1d8; }
  .level-pill.l3 { background:#ffe7c2; }
  .level-pill.l4 { background:#ffd6cf; }
  .level-pill.l5 { background:#ffd1e2; color:var(--pink-ink); }

  .q-text { font-size:22px; font-weight:800; line-height:1.35; margin:10px 0 12px; }
  .q-shape { display:flex; justify-content:center; padding:6px 0; min-height:120px; }
  .q-shape svg { max-width:240px; height:auto; max-height:200px; }

  .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  @media (max-width:520px) { .options { grid-template-columns:1fr; } }
  .opt {
    background:#fff; border:3px solid var(--ink); border-radius:14px;
    padding:14px; font-size:18px; font-weight:800; cursor:pointer;
    text-align:center; min-height:56px;
    box-shadow:0 4px 0 rgba(0,0,0,0.12);
  }
  .opt:hover { background:#fff4e0; }
  .opt.selected { background:var(--primary); color:#fff; }
  .opt.correct  { background:var(--good); color:#fff; border-color:var(--good-ink); }
  .opt.wrong    { background:var(--bad);  color:#fff; border-color:var(--bad-ink); }
  .opt.disabled { pointer-events:none; opacity:0.85; }

  .sa-row { margin-top:14px; display:flex; gap:8px; }
  .sa-row input { flex:1; border:3px solid var(--ink); border-radius:12px;
                  padding:12px 14px; font-size:18px; font-weight:800; background:#fff8e8; }

  .btn { background:var(--primary); color:#fff; border:3px solid var(--ink);
         border-radius:12px; padding:10px 18px; font-size:16px; font-weight:900;
         cursor:pointer; box-shadow:0 4px 0 var(--primary-ink); }
  .btn:active { transform:translateY(2px); box-shadow:0 2px 0 var(--primary-ink); }
  .btn[disabled] { opacity:0.4; cursor:not-allowed; }
  .btn.good { background:var(--good); box-shadow:0 4px 0 var(--good-ink); }
  .btn.secondary { background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,0.25); }

  .feedback { font-size:18px; font-weight:800; margin-top:14px; }
  .feedback.good { color:var(--good-ink); }
  .feedback.bad  { color:var(--bad-ink); }
  .btn-row { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }

  /* Game-over screens */
  .end-card { text-align:center; }
  .big-score { font-size:60px; font-weight:900; color:var(--primary-ink); margin:6px 0; }
  .end-sub { color:var(--muted); font-weight:700; }
  table.tbl { width:100%; border-collapse:collapse; margin-top:10px; }
  table.tbl th, table.tbl td { border-bottom:2px solid #eee; padding:10px 8px; text-align:left; font-size:14px; }
  table.tbl th { background:#fff3df; }
  .top3 td { background:var(--pink-bg) !important; font-weight:900; color:var(--pink-ink); }
  .me-row td { outline:3px dashed var(--primary); outline-offset:-3px; }

  .hidden { display:none !important; }

  /* Click-to-read affordances */
  .clickable-tts { cursor:pointer; position:relative; }
  .clickable-tts:hover { color: var(--primary-ink); }
  .clickable-tts::after { content:" 🔊"; font-size:0.7em; opacity:0.55; }
  .opt.speaking { outline:4px dashed var(--primary); outline-offset:2px; }

  /* Shape SVG fills (loaded from shapes.js) */
</style>
</head>
<body>
<div class="wrap">
  <a href="student.html" id="back-to-menu" style="display:inline-block; text-decoration:none; font-weight:900; color:#a84a00; padding:8px 14px; border:3px solid #1d1d24; border-radius:14px; background:#fff; box-shadow:0 4px 0 rgba(0,0,0,0.12); margin-bottom:12px;">🏠 Back to menu</a>
  <header class="bar">
    <div class="game-name" id="game-name">Loading…</div>
    <div class="score-pill"><span id="score">0</span> pts</div>
    <div class="timer" style="flex-basis:100%;">
      <div class="bar" id="timer-bar"></div>
      <div class="marker" id="timer-marker"></div>
      <div class="endpoints">
        <span class="left-text">⏱ <span id="t-left">0</span></span>
        <span id="t-right">2 min</span>
      </div>
      <div class="countdown" id="t-countdown">2:00</div>
    </div>
  </header>

  <!-- Question screen -->
  <section id="screen-q" class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
      <span class="level-pill" id="lvl-pill">Level —</span>
      <span style="font-weight:800; font-size:13px; color:var(--muted);">Q <span id="q-num">1</span></span>
    </div>
    <p class="q-text clickable-tts" id="q-text" title="Tap to hear">…</p>
    <div class="q-shape" id="q-shape"></div>
    <div class="options" id="q-options"></div>
    <div class="sa-row hidden" id="sa-row">
      <input type="text" id="sa-input" placeholder="Type your answer here…" autocomplete="off" />
    </div>
    <p class="feedback hidden" id="q-feedback"></p>
    <div class="btn-row">
      <button class="btn" id="btn-submit" disabled>Submit ✅</button>
      <button class="btn good hidden" id="btn-next">Next ➡️</button>
    </div>
  </section>

  <!-- End screen -->
  <section id="screen-end" class="card end-card hidden">
    <div id="end-avatar" style="width:120px; height:120px; margin:0 auto 8px; border:3px solid var(--ink); border-radius:18px; background:#fff; padding:4px; box-shadow:var(--shadow); overflow:hidden;"></div>
    <h2 style="margin:0 0 6px;">⏰ Time's up!</h2>
    <p class="end-sub" id="end-sub">Great effort.</p>
    <div class="big-score"><span id="end-score">0</span> pts</div>
    <p style="font-weight:800;" id="end-stats">—</p>

    <div id="my-rank" class="hidden" style="text-align:left;">
      <h3 style="margin:18px 0 6px;">Your scores so far</h3>
      <table class="tbl"><thead><tr><th>Rank</th><th>When</th><th>Score</th></tr></thead><tbody id="my-rank-rows"></tbody></table>
    </div>

    <div id="class-rank" class="hidden" style="text-align:left;">
      <h3 style="margin:18px 0 6px;">Class ranking — best score per student</h3>
      <table class="tbl"><thead><tr><th>Rank</th><th>Student</th><th>Best score</th><th>When</th></tr></thead><tbody id="class-rank-rows"></tbody></table>
    </div>

    <div class="btn-row" style="justify-content:center; gap:12px; flex-wrap:wrap;">
      <button class="btn secondary" id="btn-home">← Back to menu</button>
      <button class="btn" id="btn-replay">Play again 🔁</button>
      <button class="btn good hidden" id="btn-go-game2">Continue to Game 2 ➜</button>
    </div>
  </section>
</div>

<audio id="a-click"  src="2d/click.mp3" preload="auto"></audio>
<audio id="a-tts"    preload="auto"></audio>
<audio id="a-reward" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/avatar.js"></script>
<script src="js/shapes.js"></script>
<script src="js/questions.js"></script>
<script src="js/ef1-questions.js"></script>
<script src="js/ef2-questions.js"></script>
<script src="js/ef3-questions.js"></script>
<script src="js/ef4-questions.js"></script>
<script>
// Inject shape fills
const styleEl = document.createElement('style'); styleEl.textContent = window.SHAPE_CSS; document.head.appendChild(styleEl);

const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
const STUDENT_ID = params.get('student');
// Subject can be passed via URL or inferred from the game slot once loaded.
const SUBJECT_HINT = params.get('subject') || null;
const GAME_ID    = params.get('game');

let game = null;       // game row
let student = null;
let durationSec = 120;

let state = {
  level: 2,            // start middle of L1-L5
  qNum: 0,
  score: 0,
  correctCount: 0,
  wrongCount: 0,
  asked: new Set(),
  currentQ: null,
  selected: null,
  startedAt: null,
  endsAt: null,
  finished: false,
};
let tickHandle = null;

// Subject-aware question source. Filled in after we know the game slot.
let SUBJECT = null;          // '2dshapes' | 'ef1' | 'ef2' | 'ef3'
let QUESTION_BANK = null;    // array of questions
let BY_LEVEL = null;         // { 1:[…], 2:[…], … }
let LEVEL_POINTS = null;     // { 1:2, 2:4, … }
let MAX_LEVEL = 5;

function inferSubject(gameSlot) {
  if (SUBJECT_HINT) return SUBJECT_HINT;
  if (gameSlot && gameSlot.endsWith('_ef4')) return 'ef4';
  if (gameSlot && gameSlot.endsWith('_ef3')) return 'ef3';
  if (gameSlot && gameSlot.endsWith('_ef2')) return 'ef2';
  if (gameSlot && gameSlot.endsWith('_ef1')) return 'ef1';
  return '2dshapes';
}
function configureSubject(subject) {
  SUBJECT = subject;
  if (subject === 'ef1') {
    QUESTION_BANK = window.EF1_GAME_QUESTIONS;
    BY_LEVEL      = window.EF1_GAME_BY_LEVEL;
    LEVEL_POINTS  = window.EF1_GAME_LEVEL_POINTS;
    MAX_LEVEL     = window.EF1_GAME_MAX_LEVEL;
  } else if (subject === 'ef2') {
    QUESTION_BANK = window.EF2_GAME_QUESTIONS;
    BY_LEVEL      = window.EF2_GAME_BY_LEVEL;
    LEVEL_POINTS  = window.EF2_GAME_LEVEL_POINTS;
    MAX_LEVEL     = window.EF2_GAME_MAX_LEVEL;
  } else if (subject === 'ef3') {
    QUESTION_BANK = window.EF3_GAME_QUESTIONS;
    BY_LEVEL      = window.EF3_GAME_BY_LEVEL;
    LEVEL_POINTS  = window.EF3_GAME_LEVEL_POINTS;
    MAX_LEVEL     = window.EF3_GAME_MAX_LEVEL;
  } else if (subject === 'ef4') {
    QUESTION_BANK = window.EF4_GAME_QUESTIONS;
    BY_LEVEL      = window.EF4_GAME_BY_LEVEL;
    LEVEL_POINTS  = window.EF4_GAME_LEVEL_POINTS;
    MAX_LEVEL     = window.EF4_GAME_MAX_LEVEL;
  } else {
    QUESTION_BANK = window.QUESTIONS;
    BY_LEVEL      = window.QUESTIONS_BY_LEVEL;
    LEVEL_POINTS  = window.LEVEL_POINTS;
    MAX_LEVEL     = 5;
  }
}

// ---------------------- BOOT ----------------------
(async () => {
  if (!STUDENT_ID || !GAME_ID) { abort('Missing student or game id.'); return; }
  const [students, games] = await Promise.all([DB.listStudents(), DB.listGames()]);
  student = students.find(s => s.id === STUDENT_ID);
  game    = games.find(g => g.id === GAME_ID);
  if (!student || !game) { abort('Student or game not found.'); return; }
  configureSubject(inferSubject(game.slot));
  durationSec = Math.max(60, Math.min(7*60, (game.duration_minutes||2) * 60));
  $('game-name').textContent = `${game.name} · ${student.name}`;
  $('t-right').textContent = (game.duration_minutes||2) + ' min';
  startTimer();
  nextQuestion();
})();

function abort(msg) {
  document.body.innerHTML = `<div style="padding:30px; font-family:sans-serif;">
    <h2>Couldn't start the game</h2><p>${escapeHtml(msg)}</p>
    <p><a href="student.html">← Back</a></p></div>`;
}

// ---------------------- TIMER ----------------------
function startTimer() {
  state.startedAt = Date.now();
  state.endsAt = state.startedAt + durationSec * 1000;
  if (tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(tick, 200);
  tick();
}
function tick() {
  const now = Date.now();
  const elapsed = Math.max(0, now - state.startedAt);
  const remaining = Math.max(0, state.endsAt - now);
  const pct = Math.min(100, (elapsed / (durationSec*1000)) * 100);
  $('timer-bar').style.width = pct + '%';
  $('timer-marker').style.left = pct + '%';
  // Countdown mm:ss
  const sec = Math.ceil(remaining / 1000);
  const mm = Math.floor(sec / 60), ss = sec % 60;
  $('t-countdown').textContent = mm + ':' + (ss<10?'0':'') + ss;
  if (remaining <= 0 && !state.finished) finish();
}

// ---------------------- QUESTIONS ----------------------
function pickQuestion() {
  const tries = [state.level, state.level-1, state.level+1, state.level-2, state.level+2,
                 state.level-3, state.level+3, state.level-4, state.level+4];
  for (const lv of tries) {
    if (lv < 1 || lv > MAX_LEVEL) continue;
    const pool = (BY_LEVEL[lv] || []).filter(q => !state.asked.has(q.id));
    if (pool.length) return pool[Math.floor(Math.random() * pool.length)];
  }
  state.asked.clear();
  return pickQuestion();
}

function nextQuestion() {
  if (state.finished) return;
  state.currentQ = pickQuestion();
  state.asked.add(state.currentQ.id);
  state.selected = null;
  state.qNum++;
  renderQuestion();
}

// ---------------------- AUDIO HELPERS ----------------------
const aClick  = $('a-click');
const aTts    = $('a-tts');
const aReward = $('a-reward');
const REWARD_POOL = [
  '2d/sarang.mp3','2d/You_got_it.mp3','2d/tamil.mp3',
  '2d/kapai.mp3','2d/welldone.mp3','2d/mahal.mp3',
];
function playClick() {
  try { aClick.currentTime = 0; aClick.play(); } catch(e){}
}
function playReward() {
  try {
    aReward.src = REWARD_POOL[Math.floor(Math.random() * REWARD_POOL.length)];
    aReward.currentTime = 0;
    aReward.play();
  } catch(e){}
}
let _ttsHi = null;
function stopTTS() {
  try { aTts.pause(); } catch(e){}
  if (_ttsHi) { _ttsHi.classList.remove('speaking'); _ttsHi = null; }
}
function playTTS(src, hiEl) {
  stopTTS();
  try {
    aTts.src = src;
    aTts.currentTime = 0;
    aTts.play().catch(()=>{});
    if (hiEl) { hiEl.classList.add('speaking'); _ttsHi = hiEl; }
    aTts.onended = aTts.onerror = () => {
      if (hiEl) hiEl.classList.remove('speaking');
      if (_ttsHi === hiEl) _ttsHi = null;
    };
  } catch(e){}
}

function renderQuestion() {
  const q = state.currentQ;
  $('q-num').textContent = state.qNum;
  const pill = $('lvl-pill');
  pill.className = 'level-pill l' + q.level;
  pill.textContent = `Level ${q.level} · ${LEVEL_POINTS[q.level]} pts`;
  $('q-text').textContent = q.text;
  // Click question text → William reads it
  $('q-text').onclick = () => playTTS('2d/tts/q_' + q.id + '_q.mp3', $('q-text'));
  // Subject-aware visual: 2D Shapes uses q.shape (lookup in SHAPES), EF1 uses q.visual (object).
  if (q.visual && window.EF1_renderVisual) {
    $('q-shape').innerHTML = window.EF1_renderVisual(q.visual);
  } else if (q.shape) {
    $('q-shape').innerHTML = window.SHAPES[q.shape] || '';
  } else {
    $('q-shape').innerHTML = '';
  }
  $('q-feedback').classList.add('hidden');
  $('btn-next').classList.add('hidden');
  $('btn-submit').classList.remove('hidden');
  $('btn-submit').disabled = true;

  const opts = $('q-options'); opts.innerHTML = '';
  const sa = $('sa-row'); const saInput = $('sa-input'); saInput.value = '';
  if (q.type === 'mc') {
    sa.classList.add('hidden');
    opts.classList.remove('hidden');
    q.options.forEach((label, idx) => {
      const b = document.createElement('div');
      b.className = 'opt';
      b.textContent = label;
      b.dataset.idx = idx;
      b.onclick = () => {
        playClick();                                 // click sound
        selectOption(b, idx);
        playTTS('2d/tts/q_' + q.id + '_o' + idx + '.mp3', b);
      };
      opts.appendChild(b);
    });
  } else { // sa
    sa.classList.remove('hidden');
    opts.classList.add('hidden');
    saInput.oninput = () => { state.selected = saInput.value; $('btn-submit').disabled = !saInput.value.trim(); };
    saInput.onkeydown = (e) => { if (e.key === 'Enter' && !$('btn-submit').disabled) submitAnswer(); };
    setTimeout(() => saInput.focus(), 50);
  }
}

function selectOption(node, idx) {
  if (node.classList.contains('disabled')) return;
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  node.classList.add('selected');
  state.selected = idx;
  $('btn-submit').disabled = false;
}

$('btn-submit').onclick = submitAnswer;
$('btn-next').onclick   = nextQuestion;

function submitAnswer() {
  if (state.finished) return;
  const q = state.currentQ;
  let correct = false;
  if (q.type === 'mc') {
    if (state.selected === null || state.selected === undefined) return;
    correct = (state.selected === q.answer);
  } else {
    if (SUBJECT === 'ef4' && window.EF4_checkSA) correct = window.EF4_checkSA(q, state.selected);
    else if (SUBJECT === 'ef3' && window.EF3_checkSA) correct = window.EF3_checkSA(q, state.selected);
    else if (SUBJECT === 'ef2' && window.EF2_checkSA) correct = window.EF2_checkSA(q, state.selected);
    else if (SUBJECT === 'ef1' && window.EF1_checkSA) correct = window.EF1_checkSA(q, state.selected);
    else correct = window.checkSA(q, state.selected);
  }
  // Click sound on Submit, then a random reward sound if they got it right
  playClick();
  stopTTS();
  if (correct) setTimeout(playReward, 180);  // tiny gap so click + reward don't crash

  // disable + colour options
  document.querySelectorAll('.opt').forEach(o => {
    o.classList.add('disabled');
    if (q.type === 'mc') {
      const idx = Number(o.dataset.idx);
      if (idx === q.answer) o.classList.add('correct');
      if (idx === state.selected && !correct) o.classList.add('wrong');
    }
  });

  // points + level adjust + correct/wrong tally
  if (correct) {
    state.score += LEVEL_POINTS[q.level];
    state.correctCount++;
    if (state.level < MAX_LEVEL) state.level++;
  } else {
    state.wrongCount++;
    if (state.level > 1) state.level--;
  }
  $('score').textContent = state.score;

  // Feedback
  const fb = $('q-feedback');
  fb.classList.remove('hidden','good','bad');
  if (correct) {
    fb.classList.add('good');
    fb.textContent = `✅ Correct! +${LEVEL_POINTS[q.level]} pts (next question gets harder)`;
  } else {
    let answerText;
    if (q.type === 'mc') answerText = q.options[q.answer];
    else answerText = q.answer;
    fb.classList.add('bad');
    fb.textContent = `❌ Not quite. The answer was: ${answerText} (next question will be easier)`;
  }
  $('btn-submit').classList.add('hidden');
  $('btn-next').classList.remove('hidden');
}

// ---------------------- END ----------------------
async function finish() {
  state.finished = true;
  if (tickHandle) clearInterval(tickHandle);

  // ── 1) Persist the score FIRST (in parallel with markCompleted for game1)
  //    so the data is safely in Supabase even if the student clicks Back/Play
  //    again the moment the end screen appears. Two parallel writes are fast
  //    (typically <500 ms), so the screen-swap still feels nearly instant.
  const writes = [DB.recordScore(STUDENT_ID, GAME_ID, state.score, state.correctCount, state.wrongCount)];
  // Mark completion using the actual slot value so subject-specific kinds
  // ('game1_ef1', 'game2_ef1') are stored too.
  if (game.slot === 'game1' || game.slot === 'game1_ef1' || game.slot === 'game1_ef2' || game.slot === 'game1_ef3' || game.slot === 'game1_ef4') writes.push(DB.markCompleted(STUDENT_ID, game.slot));
  if (game.slot === 'game2' || game.slot === 'game2_ef1' || game.slot === 'game2_ef2' || game.slot === 'game2_ef3' || game.slot === 'game2_ef4') writes.push(DB.markCompleted(STUDENT_ID, game.slot));
  try { await Promise.allSettled(writes); } catch(e) { console.warn('finish writes failed:', e); }

  // ── 2) Now swap to the end screen with the score we know
  $('end-score').textContent = state.score;
  $('end-stats').textContent = `${state.qNum} questions answered · highest level reached: L${maxLevelHit()}`;
  $('end-sub').textContent = encouragement(state.score);
  $('my-rank').classList.add('hidden');
  $('class-rank').classList.add('hidden');
  $('btn-go-game2').classList.add('hidden');
  $('screen-q').classList.add('hidden');
  $('screen-end').classList.remove('hidden');
  // Render avatar at the top of the end card
  renderEndAvatar();

  // Personal rank table
  try {
    const myScores = await DB.listScoresFor(STUDENT_ID, GAME_ID);
    const sorted = [...myScores].sort((a,b) => b.score - a.score);
    const myRows = $('my-rank-rows'); myRows.innerHTML = '';
    sorted.slice(0,10).forEach((s, i) => {
      const tr = document.createElement('tr');
      if (s.played_at && Math.abs(new Date(s.played_at) - new Date()) < 60000) tr.classList.add('me-row');
      tr.innerHTML = `<td>${i+1}</td><td>${formatDate(s.played_at)}</td><td><b>${s.score}</b></td>`;
      myRows.appendChild(tr);
    });
    $('my-rank').classList.remove('hidden');
  } catch(e){}

  // Class ranking for Game 2 / custom
  if (game.slot === 'game2' || game.slot === 'game2_ef1' || game.slot === 'game2_ef2' || game.slot === 'game2_ef3' || game.slot === 'game2_ef4' || game.slot === 'custom') {
    try {
      const allScores = await DB.listScores();
      const students = await DB.listStudents();
      const stuById = Object.fromEntries(students.map(s => [s.id, s]));
      const best = {};
      for (const s of allScores.filter(x => x.game_id === GAME_ID)) {
        if (!best[s.student_id] || s.score > best[s.student_id].score) best[s.student_id] = s;
      }
      const ranking = Object.values(best).sort((a,b) => b.score - a.score);
      const rows = $('class-rank-rows'); rows.innerHTML = '';
      ranking.forEach((s, i) => {
        const stu = stuById[s.student_id];
        const tr = document.createElement('tr');
        if (i < 3) tr.classList.add('top3');
        if (s.student_id === STUDENT_ID) tr.classList.add('me-row');
        tr.innerHTML = `<td>${i+1}</td><td>${escapeHtml(stu?stu.name:'(unknown)')}</td>
                        <td><b>${s.score}</b></td><td>${formatDate(s.played_at)}</td>`;
        rows.appendChild(tr);
      });
      $('class-rank').classList.remove('hidden');
    } catch(e){}
  }

  // Show "Continue to Game 2" button only after finishing Game 1
  if (game.slot === 'game1' || game.slot === 'game1_ef1' || game.slot === 'game1_ef2' || game.slot === 'game1_ef3' || game.slot === 'game1_ef4') {
    try {
      const games = await DB.listGames();
      // Find the matching Game 2 for the same subject
      const targetSlot =
        (game.slot === 'game1_ef4') ? 'game2_ef4' :
        (game.slot === 'game1_ef3') ? 'game2_ef3' :
        (game.slot === 'game1_ef2') ? 'game2_ef2' :
        (game.slot === 'game1_ef1') ? 'game2_ef1' :
        'game2';
      const g2 = games.find(g => g.slot === targetSlot);
      if (g2) {
        $('btn-go-game2').classList.remove('hidden');
        $('btn-go-game2').onclick = () => {
          const q = new URLSearchParams({ student: STUDENT_ID, game: g2.id });
          if (SUBJECT === 'ef1') q.set('subject', 'ef1');
          else if (SUBJECT === 'ef2') q.set('subject', 'ef2');
          else if (SUBJECT === 'ef3') q.set('subject', 'ef3');
          else if (SUBJECT === 'ef4') q.set('subject', 'ef4');
          location.href = 'game.html?' + q.toString();
        };
      }
    } catch(e){}
  }
}

// Renders the student's saved avatar at the top of the end screen.
// Locked behind Game 2 completion — before that we show the gender emoji.
// Note: if the student is finishing Game 2 right now, markCompleted has already
// run before this function, so the unlock will reflect immediately.
async function renderEndAvatar() {
  const slot = document.getElementById('end-avatar');
  if (!slot || !window.AVATAR) return;
  // Mirror student.html's isAvatarUnlocked: Practice + Game 1 + Game 2 in any
  // subject combination unlocks the saved avatar at the end of the game.
  let unlocked = false;
  try {
    if (DB.hasCompleted) {
      const all = await Promise.all([
        DB.hasCompleted(STUDENT_ID, 'practice'),
        DB.hasCompleted(STUDENT_ID, 'practice_ef1'),
        DB.hasCompleted(STUDENT_ID, 'practice_ef2'),
        DB.hasCompleted(STUDENT_ID, 'practice_ef3'),
        DB.hasCompleted(STUDENT_ID, 'practice_ef4'),
        DB.hasCompleted(STUDENT_ID, 'game1'),
        DB.hasCompleted(STUDENT_ID, 'game1_ef1'),
        DB.hasCompleted(STUDENT_ID, 'game1_ef2'),
        DB.hasCompleted(STUDENT_ID, 'game1_ef3'),
        DB.hasCompleted(STUDENT_ID, 'game1_ef4'),
        DB.hasCompleted(STUDENT_ID, 'game2'),
        DB.hasCompleted(STUDENT_ID, 'game2_ef1'),
        DB.hasCompleted(STUDENT_ID, 'game2_ef2'),
        DB.hasCompleted(STUDENT_ID, 'game2_ef3'),
        DB.hasCompleted(STUDENT_ID, 'game2_ef4'),
      ]);
      const anyP  = all.slice(0, 5).some(Boolean);
      const anyG1 = all.slice(5, 10).some(Boolean);
      const anyG2 = all.slice(10, 15).some(Boolean);
      unlocked = anyP && anyG1 && anyG2;
    }
  } catch(e){}

  if (!unlocked) {
    const gender = (student && student.gender) || 'girl';
    const isBoy = gender === 'boy';
    slot.style.background = isBoy ? '#cfeafd' : '#ffd6e6';
    slot.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:96px; line-height:1;">${isBoy ? '👦' : '👧'}</div>`;
    return;
  }

  let profile = null;
  try { if (DB.getStudentProfile) profile = await DB.getStudentProfile(STUDENT_ID); } catch(e){}
  slot.style.background = '#fff';
  if (profile) slot.innerHTML = window.AVATAR.render(profile);
  else slot.innerHTML = `<img src="2d/no-profile.png" alt="" style="width:100%; height:100%; object-fit:cover; border-radius:14px;"
                              onerror="this.parentNode.innerHTML='${window.AVATAR.render(window.AVATAR.DEFAULT).replace(/"/g,'&quot;')}'" />`;
}

function maxLevelHit() {
  let mx = 1;
  for (const id of state.asked) {
    const q = QUESTION_BANK.find(x => x.id === id);
    if (q && q.level > mx) mx = q.level;
  }
  return mx;
}
function encouragement(score) {
  if (score >= 80) return '🥇 Outstanding work — you really know your shapes!';
  if (score >= 50) return '🌟 Awesome effort! Keep practising the tricky ones.';
  if (score >= 20) return '👍 Nice start — try once more and beat your score!';
  return 'Keep going — every question makes you stronger.';
}
function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
function escapeHtml(s) { return (s||'').toString().replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

$('btn-home').onclick = () => { location.href = 'student.html'; };
$('btn-replay').onclick = () => { location.reload(); };

// ---------- idle auto-logout (30 min of no input → log out + leave game) ----------
const IDLE_MS = 30 * 60 * 1000;
let _idleTimer = null;
async function _idleLogout() {
  if (STUDENT_ID && window.DB && DB.removeStudentLogin) {
    try { await DB.removeStudentLogin(STUDENT_ID); } catch(e){}
  }
  try { sessionStorage.removeItem('mg.session.v1'); } catch(e){}
  location.href = 'student.html';
}
function _resetIdle() {
  if (_idleTimer) clearTimeout(_idleTimer);
  _idleTimer = setTimeout(_idleLogout, IDLE_MS);
}
['click','keydown','touchstart','pointerdown'].forEach(ev =>
  document.addEventListener(ev, _resetIdle, { passive: true }));
_resetIdle();

// Enter shortcut: advances to the next question after a result, or to the
// follow-on game when the run is over. Doesn't fire while typing in the SA box.
document.addEventListener('keydown', (ev) => {
  if (ev.key !== 'Enter') return;
  const t = ev.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
  const candidates = ['btn-next','btn-go-game2','btn-replay'];
  for (const id of candidates) {
    const b = document.getElementById(id);
    if (!b || b.classList.contains('hidden')) continue;
    const sec = b.closest('section');
    if (sec && sec.classList.contains('hidden')) continue;
    ev.preventDefault();
    b.click();
    return;
  }
});
</script>
