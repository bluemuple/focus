<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Equivalent Fractions 4 · Practice</title>
<style>
  :root {
    --bg:#fff7ec; --ink:#1d1d24; --muted:#6c6c75;
    --primary:#ff8a3d; --primary-ink:#a84a00;
    --good:#2ebf72; --good-ink:#0e6b37;
    --bad:#e45858;  --bad-ink:#8a1e1e;
    --shadow:0 5px 0 rgba(0,0,0,0.14);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; min-height:100vh; font-family:'Nunito','Trebuchet MS',sans-serif;
              background:var(--bg); color:var(--ink); }
  .wrap { max-width:760px; margin:0 auto; padding:14px 16px 60px; }
  a.back { display:inline-block; text-decoration:none; font-weight:900; color:var(--primary-ink);
           padding:8px 14px; border:3px solid var(--ink); border-radius:14px; background:#fff;
           box-shadow:0 4px 0 rgba(0,0,0,0.12); margin-bottom:12px; }
  header.bar { display:flex; align-items:center; gap:14px; flex-wrap:wrap;
               background:#fff; border:3px solid var(--ink); border-radius:18px;
               padding:10px 14px; box-shadow:var(--shadow); margin-bottom:14px; }
  .title { font-weight:900; font-size:18px; flex:1; }
  .lvl-pill { padding:3px 10px; border:2px solid var(--ink); border-radius:999px; font-size:12px; font-weight:900; background:#fff7e3; }
  .lvl-pill.l1 { background:#e4f7e7; }
  .lvl-pill.l2 { background:#fff1d8; }
  .lvl-pill.l3 { background:#ffe7c2; }
  .lvl-pill.l4 { background:#ffd1e2; color:#c2185b; }
  .score-pill { background:var(--primary); color:#fff; border:3px solid var(--ink); border-radius:999px;
                padding:4px 12px; font-weight:900; font-size:16px; box-shadow:0 4px 0 var(--primary-ink); }

  .card { background:#fff; border:3px solid var(--ink); border-radius:20px; padding:20px; box-shadow:var(--shadow); }
  .q-text { font-size:22px; font-weight:800; line-height:1.35; margin:8px 0 12px; }
  .q-visual { display:flex; justify-content:center; padding:6px 0 12px; min-height:80px; }
  .q-visual svg { max-width:280px; height:auto; }
  .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  @media (max-width:520px) { .options { grid-template-columns:1fr; } }
  .opt { background:#fff; border:3px solid var(--ink); border-radius:14px; padding:14px; font-size:18px;
         font-weight:800; cursor:pointer; text-align:center; min-height:56px;
         box-shadow:0 4px 0 rgba(0,0,0,0.12); }
  .opt:hover { background:#fff4e0; }
  .opt.selected { background:var(--primary); color:#fff; }
  .opt.correct  { background:var(--good); color:#fff; border-color:var(--good-ink); }
  .opt.wrong    { background:var(--bad);  color:#fff; border-color:var(--bad-ink); }
  .opt.disabled { pointer-events:none; opacity:0.85; }
  .sa-row { margin-top:10px; }
  .sa-row input { width:100%; border:3px solid var(--ink); border-radius:14px; padding:12px 14px;
                  font-size:20px; font-weight:800; background:#fff8e8; }

  .feedback { font-size:18px; font-weight:800; margin-top:14px; }
  .feedback.good { color:var(--good-ink); }
  .feedback.bad  { color:var(--bad-ink); }
  .explain { background:#fff7dc; border:3px dashed var(--ink); border-radius:14px;
             padding:12px 14px; margin-top:10px; font-size:17px; line-height:1.45; }

  .btn { background:var(--primary); color:#fff; border:3px solid var(--ink);
         border-radius:12px; padding:10px 18px; font-size:16px; font-weight:900;
         cursor:pointer; box-shadow:0 4px 0 var(--primary-ink); }
  .btn:active { transform:translateY(2px); box-shadow:0 2px 0 var(--primary-ink); }
  .btn[disabled] { opacity:0.4; cursor:not-allowed; }
  .btn.good { background:var(--good); box-shadow:0 4px 0 var(--good-ink); }
  .btn.secondary { background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,0.25); }
  .btn-row { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }

  .hidden { display:none !important; }
  .end-card { text-align:center; }
  .big-score { font-size:60px; font-weight:900; color:var(--primary-ink); margin:6px 0; }
  .end-sub { color:var(--muted); font-weight:700; }
  .review-list { text-align:left; margin-top:14px; }
  .review-item { background:#fff6f6; border:2px solid var(--bad); border-radius:12px;
                 padding:10px 14px; margin-bottom:8px; font-weight:700; font-size:14px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="student.html" class="back">🏠 Back to menu</a>

  <header class="bar">
    <div class="title">⚖️ Equivalent Fractions 4 · Practice</div>
    <span class="lvl-pill" id="lvl-pill">Level 2</span>
    <span class="score-pill"><span id="score">0</span> ✓</span>
  </header>

  <section id="screen-q" class="card">
    <p class="q-text" id="q-text">Loading…</p>
    <div class="q-visual" id="q-visual"></div>
    <div class="options" id="q-options"></div>
    <div class="sa-row hidden" id="sa-row">
      <input type="text" id="sa-input" placeholder="Type your answer (e.g. < or > or =)…" autocomplete="off" />
    </div>
    <p class="feedback hidden" id="feedback"></p>
    <div class="explain hidden" id="explain"></div>
    <div class="btn-row">
      <button class="btn" id="btn-submit" disabled>Submit ✅</button>
      <button class="btn good hidden" id="btn-next">Next ➡️</button>
    </div>
  </section>

  <section id="screen-end" class="card end-card hidden">
    <h2 style="margin:0 0 6px;">🏆 You did it!</h2>
    <p class="end-sub" id="end-sub"></p>
    <div class="big-score" id="end-score">0</div>
    <p style="font-weight:800;">questions correct · highest level reached: L<span id="end-lvl">1</span></p>
    <div class="review-list" id="review-list"></div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn secondary" id="btn-home">← Back to menu</button>
      <button class="btn" id="btn-replay">Play again 🔁</button>
      <button class="btn good hidden" id="btn-go-game1">Continue to Game 1 ➜</button>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/ef1-questions.js"></script>
<script src="js/ef4-questions.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const PARAMS = new URLSearchParams(location.search);
const STUDENT_ID = PARAMS.get('student');
const FROM_STUDENT = PARAMS.get('from') === 'student';

const QUESTIONS = window.EF4_PRACTICE_QUESTIONS;
const BY_LEVEL  = window.EF4_PRACTICE_BY_LEVEL;
const MAX_LVL   = window.EF4_MAX_LEVEL;

const state = {
  level: 2,
  qNum: 0,
  correct: 0,
  asked: new Set(),
  topStreak: 0,
  history: [],
  current: null,
  selected: null,
  finished: false,
  MAX_Q: 24,
};

function pickQuestion() {
  for (const lv of [state.level, state.level-1, state.level+1, state.level-2, state.level+2, state.level-3, state.level+3]) {
    if (lv < 1 || lv > MAX_LVL) continue;
    const pool = (BY_LEVEL[lv] || []).filter(q => !state.asked.has(q.id));
    if (pool.length) return pool[Math.floor(Math.random() * pool.length)];
  }
  state.asked.clear();
  return pickQuestion();
}

function showScreen(id) {
  ['screen-q','screen-end'].forEach(s => $(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
}

function renderQuestion() {
  if (state.finished) return;
  const q = pickQuestion();
  state.current = q;
  state.asked.add(q.id);
  state.selected = null;
  state.qNum++;

  const pill = $('lvl-pill');
  pill.className = 'lvl-pill l' + q.level;
  pill.textContent = `Level ${q.level}`;
  $('q-text').textContent = q.text;
  $('q-visual').innerHTML = q.visual && window.EF1_renderVisual ? window.EF1_renderVisual(q.visual) : '';
  $('feedback').classList.add('hidden');
  $('explain').classList.add('hidden');
  $('btn-next').classList.add('hidden');
  $('btn-submit').classList.remove('hidden');
  $('btn-submit').disabled = true;

  const opts = $('q-options'); opts.innerHTML = '';
  const sa = $('sa-row'); const inp = $('sa-input'); inp.value = ''; inp.disabled = false;
  if (q.type === 'mc') {
    sa.classList.add('hidden');
    opts.classList.remove('hidden');
    q.options.forEach((label, idx) => {
      const b = document.createElement('div');
      b.className = 'opt';
      b.textContent = label;
      b.dataset.idx = idx;
      b.onclick = () => selectOption(b, idx);
      opts.appendChild(b);
    });
  } else {
    sa.classList.remove('hidden');
    opts.classList.add('hidden');
    inp.oninput = () => { state.selected = inp.value; $('btn-submit').disabled = !inp.value.trim(); };
    inp.onkeydown = (e) => { if (e.key === 'Enter' && !$('btn-submit').disabled) submitAnswer(); };
    setTimeout(() => inp.focus(), 50);
  }
  showScreen('screen-q');
}

function selectOption(node, idx) {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  node.classList.add('selected');
  state.selected = idx;
  $('btn-submit').disabled = false;
}

function submitAnswer() {
  const q = state.current;
  let correct = false;
  let givenLabel = '', correctLabel = '';
  if (q.type === 'mc') {
    if (state.selected == null) return;
    correct = (state.selected === q.answer);
    givenLabel = q.options[state.selected];
    correctLabel = q.options[q.answer];
  } else {
    correct = window.EF4_checkSA(q, state.selected);
    givenLabel = (state.selected || '').toString();
    correctLabel = q.answer;
  }

  document.querySelectorAll('.opt').forEach(o => {
    o.classList.add('disabled');
    const idx = Number(o.dataset.idx);
    if (q.type === 'mc') {
      if (idx === q.answer) o.classList.add('correct');
      if (idx === state.selected && !correct) o.classList.add('wrong');
    }
  });
  $('sa-input').disabled = true;

  if (correct) {
    state.correct++;
    if (state.level === MAX_LVL) state.topStreak++;
    else state.topStreak = 0;
    if (state.level < MAX_LVL) state.level++;
  } else {
    state.topStreak = 0;
    if (state.level > 1) state.level--;
  }

  state.history.push({ q, correct, givenLabel, correctLabel });

  const fb = $('feedback');
  fb.classList.remove('hidden','good','bad');
  if (correct) {
    fb.textContent = `✅ Correct! ${correctLabel}`;
    fb.classList.add('good');
  } else {
    fb.textContent = `❌ Not quite. The answer was: ${correctLabel}`;
    fb.classList.add('bad');
  }
  if (q.explain) {
    const ex = $('explain');
    ex.innerHTML = '<b>Why?</b> ' + q.explain;
    ex.classList.remove('hidden');
  }
  $('btn-submit').classList.add('hidden');
  $('btn-next').classList.remove('hidden');
}

function nextQuestion() {
  if (state.topStreak >= 3) return finish('🥇 You passed the top level with 3 in a row!');
  if (state.qNum >= state.MAX_Q) return finish('You finished the whole practice!');
  renderQuestion();
}

async function finish(msg) {
  state.finished = true;
  $('end-sub').textContent = msg;
  $('end-score').textContent = state.correct;
  $('end-lvl').textContent = Math.max(...state.history.map(h => h.q.level), 1);

  const list = $('review-list'); list.innerHTML = '';
  const wrongs = state.history.filter(h => !h.correct);
  if (wrongs.length) {
    list.innerHTML = '<p style="text-align:center; font-weight:800; margin:10px 0 6px;">Let\'s review these:</p>';
    wrongs.forEach(w => {
      const d = document.createElement('div');
      d.className = 'review-item';
      d.innerHTML = `<div>${w.q.text}</div>
        <div style="color:#8a1e1e; font-weight:700; margin-top:4px;">You chose: ${w.givenLabel}</div>
        <div style="color:#0e6b37; font-weight:700;">Correct: ${w.correctLabel}</div>
        ${w.q.explain ? '<div style="font-weight:500; margin-top:4px;">' + w.q.explain + '</div>' : ''}`;
      list.appendChild(d);
    });
  }

  $('btn-go-game1').classList.toggle('hidden', !FROM_STUDENT);

  try {
    if (STUDENT_ID && window.DB) {
      const games = await DB.listGames();
      let practiceGame = games.find(g => g.slot === 'practice_ef4');
      if (practiceGame) {
        const wrong = Math.max(0, state.qNum - state.correct);
        await DB.recordScore(STUDENT_ID, practiceGame.id, state.correct, state.correct, wrong);
      }
      if (DB.markCompleted) await DB.markCompleted(STUDENT_ID, 'practice_ef4');
    }
  } catch(e) { console.warn('Could not save EF4 practice:', e); }

  showScreen('screen-end');
}

$('btn-submit').onclick = submitAnswer;
$('btn-next').onclick   = nextQuestion;
$('btn-home').onclick   = () => { location.href = 'student.html'; };
$('btn-replay').onclick = () => {
  state.level = 2; state.qNum = 0; state.correct = 0;
  state.asked = new Set(); state.topStreak = 0; state.history = []; state.finished = false;
  renderQuestion();
};
$('btn-go-game1').onclick = () => { location.href = 'student.html?subject=ef4&go=game1'; };

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (e.target.tagName === 'INPUT') return;
  for (const id of ['btn-next','btn-submit']) {
    const b = document.getElementById(id);
    if (b && !b.classList.contains('hidden') && !b.disabled) { e.preventDefault(); b.click(); return; }
  }
});

const IDLE_MS = 30*60*1000;
let _idle = null;
function _resetIdle() {
  if (_idle) clearTimeout(_idle);
  _idle = setTimeout(async () => {
    if (STUDENT_ID && DB.removeStudentLogin) { try { await DB.removeStudentLogin(STUDENT_ID); } catch(e){} }
    try { sessionStorage.removeItem('mg.session.v1'); } catch(e){}
    location.href = 'student.html';
  }, IDLE_MS);
}
['click','keydown','touchstart','pointerdown'].forEach(ev =>
  document.addEventListener(ev, _resetIdle, { passive:true }));
_resetIdle();

renderQuestion();
</script>
</body>
</html>
