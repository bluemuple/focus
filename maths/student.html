<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ako — Maths</title>
  <link rel="stylesheet" href="../edu/css/styles.css">
  <style>
    /* Landing-page polish — the WordCatch stylesheet already covers
       the shell, header, buttons and cards. These rules only style
       the topic chooser specific to Maths. */
    .ms-hero {
      background: linear-gradient(135deg, #fde68a 0%, #fb923c 100%);
      color: #1d1d24;
      border-radius: 16px;
      padding: 22px 24px;
      margin: 8px 0 22px;
    }
    .ms-hero h1 { margin: 0 0 6px; font-size: 26px; }
    .ms-hero p  { margin: 0; opacity: 0.85; }

    .ms-section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 14px 0 8px;
    }
    .ms-quiz-empty {
      color: var(--ink-soft);
      font-style: italic;
      padding: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wc-shell">
    <header class="wc-header">
      <div class="wc-logo" onclick="location.href='../edu/home.html'">A<span class="catch">ko</span></div>
      <div class="wc-user-chip" id="userChip">
        <span id="userName">…</span>
        <span class="coin" title="Coins">🪙 <span id="userMoney">0</span></span>
        <a href="../edu/home.html" style="color:var(--brand-2); font-weight:600;">← Lessons</a>
        <span style="color:var(--line);">|</span>
        <a href="#" id="logoutBtn" style="color:var(--ink-soft);">Sign out</a>
      </div>
    </header>

    <div class="ms-hero">
      <h1>Maths · Mental Subtraction</h1>
      <p>Practise subtracting in your head. Pick a quiz below.</p>
    </div>

    <div class="ms-section-label">Mental Subtraction quizzes</div>
    <div id="quizList" class="wc-list">
      <!-- Quiz buttons render here. When there are none, the empty
           placeholder below is shown instead. -->
      <div class="wc-card ms-quiz-empty" id="quizEmpty">
        No Mental Subtraction quizzes yet — your teacher will add some soon.
      </div>
    </div>
  </div>

  <script src="../edu/js/supabase-config.js"></script>
  <script src="../edu/js/db.js"></script>
  <script src="../edu/js/auth.js"></script>
  <script>
  (async () => {
    // Same gate the rest of the WordCatch student pages use — if
    // there's no valid session, bounce back to the sign-in page.
    const me = window.WCAuth.requireStudent('../edu/index.html');
    if (!me) return;

    document.getElementById('userName').textContent  = me.real_name;
    document.getElementById('userMoney').textContent = me.money || 0;
    document.getElementById('logoutBtn').addEventListener('click', e => {
      e.preventDefault();
      window.WCAuth.logout();
      location.href = '../edu/index.html';
    });

    // Quiz list is a stub for now — the next iteration will fetch
    // Mental Subtraction quizzes from Supabase and render real
    // buttons here. Until then we keep the empty placeholder so
    // the page reads correctly.
    //
    //  Expected hookup once quizzes exist:
    //    const quizzes = await window.WCDB.mentalSubtraction.list();
    //    if (quizzes.length) { hide #quizEmpty; render buttons; }
  })();
  </script>
</body>
</html>
