<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>English · 영어 학습</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="behind">
  <header class="topbar">
    <a class="brand" href="index.html">또박또박</a>
    <div class="spacer"></div>
    <a class="bidoro-tab" href="../index.html" title="비도로 사이트로 돌아가기">
      <span class="text">Bidoro</span><span class="ico" aria-hidden="true">ƒ</span>
    </a>
    <div class="acct" id="acct-chip">
      <span class="avatar" id="acct-avatar">·</span>
      <span id="acct-name">게스트</span>
    </div>
    <button class="btn ghost" id="signout-btn" title="로그아웃" style="display:none">로그아웃</button>
  </header>

  <main class="container">

    <section class="section section-tight">
      <h2>계속 학습하기</h2>

      <!-- Status row: three pill buttons summarising the user's progress.
           Tap each one to open a detail modal. Numbers are filled in JS. -->
      <div class="status-row" id="status-row">
        <button class="status-btn" id="status-streak" type="button"
                title="연속 학습일 — 달력 보기">
          <span class="status-ico">🔥</span>
          <span class="status-num" id="status-streak-num">0</span>
          <span class="status-label">연속 학습일</span>
        </button>
        <button class="status-btn" id="status-money" type="button"
                title="모은 돈 — 지출 기록">
          <span class="status-ico">💰</span>
          <span class="status-num" id="status-money-num">$0.00</span>
          <span class="status-label">NZD 모은 돈</span>
        </button>
        <button class="status-btn" id="status-mastered" type="button"
                title="완전히 아는 단어 모음">
          <span class="status-ico">✓</span>
          <span class="status-num" id="status-mastered-num">0</span>
          <span class="status-label">마스터한 단어</span>
        </button>
      </div>

      <!-- 4 tabs share the same row. The first two filter the lesson
           cards grid (모든/찜한); the last two switch the panel below to
           a different content type (워드 마스터 chip grid / 단어 스토리
           bar list). The "(N)" count beside the title is always shown so
           the user can see how many items are inside. -->
      <div class="tabrow" id="lesson-tabs">
        <a href="#" class="active" data-filter="all">모든 레슨</a>
        <a href="#" data-filter="bookmarked">찜한 레슨</a>
        <a href="#" data-filter="wm">워드 마스터 <span class="tab-count" id="wm-tab-count">(0)</span></a>
        <a href="#" data-filter="ws">단어 스토리 <span class="tab-count" id="ws-tab-count">(0)</span></a>
      </div>

      <!-- Three swappable panels — only one is visible at a time, chosen
           by the active tab above. -->
      <div id="lessons-grid" class="cards"></div>
      <div id="wm-section" hidden>
        <div id="wm-grid" class="wm-grid"></div>
      </div>
      <div id="ws-section" hidden>
        <div class="ws-progress-line muted" id="ws-progress"></div>
        <div id="ws-list" class="ws-list"></div>
      </div>
    </section>

  </main>

  <button class="fab" id="import-btn" title="새 레슨 가져오기" aria-label="가져오기">＋</button>
</div>

<!-- Supabase + app modules -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/tts.js"></script>
<script src="js/translate.js"></script>
<script src="js/story.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  // Show auth gate. After authed (or "체험하기"), render home.
  Auth.gate(async () => {
    await renderHeader();
    await renderHome();
  });

  // ---- header ----
  async function renderHeader() {
    const chip = document.getElementById('acct-chip');
    const avatar = document.getElementById('acct-avatar');
    const name = document.getElementById('acct-name');
    const so = document.getElementById('signout-btn');

    if (DB.isTryMode()) {
      name.textContent = '체험 모드';
      avatar.textContent = '체';
      so.style.display = '';
      so.textContent = '나가기';
    } else {
      const u = await DB.currentUser();
      const label = (u && (u.email || '').split('@')[0]) || '사용자';
      name.textContent = label;
      avatar.textContent = (label[0] || 'U').toUpperCase();
      so.style.display = '';
      so.textContent = '로그아웃';
    }
    so.onclick = () => Auth.signOutAndReload();

    // Tapping the account chip opens the settings panel.
    if (chip) {
      chip.style.cursor = 'pointer';
      chip.onclick = (e) => {
        // Don't open settings when the user is actually clicking the
        // sign-out button that lives next to the chip.
        if (e.target === so || (so && so.contains(e.target))) return;
        openSettingsModal();
      };
    }
  }

  // ===== Settings modal =====
  // Lives on the home page only; opened by tapping the account chip.
  //   • 레슨 글자 크기 (font-size) and 행간 (line-height) pickers with a
  //     LIVE preview paragraph below — the preview re-renders as the user
  //     clicks +/-. Changes only persist when 저장 is tapped.
  //   • Three 초기화 buttons that wipe word colours / streak / money
  //     locally AND in the cloud.
  const FONT_KEY = 'eng.v1.lessonFontPx';
  const LH_KEY   = 'eng.v1.lessonLineHeight';
  const FONT_DEFAULT = 18;
  const LH_DEFAULT   = 2.4;
  function getLessonFontPx() {
    const n = parseFloat(localStorage.getItem(FONT_KEY) || '');
    return (Number.isFinite(n) && n >= 12 && n <= 40) ? n : FONT_DEFAULT;
  }
  function getLessonLineHeight() {
    const n = parseFloat(localStorage.getItem(LH_KEY) || '');
    return (Number.isFinite(n) && n >= 1.2 && n <= 3.6) ? n : LH_DEFAULT;
  }

  function openSettingsModal() {
    // Pending values — user's edits stay LOCAL to the modal until 저장.
    let pendFont = getLessonFontPx();
    let pendLH   = getLessonLineHeight();

    const overlay = document.createElement('div');
    overlay.className = 'status-overlay settings-overlay';
    overlay.innerHTML = `
      <div class="status-card settings-card">
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>⚙ 환경 설정</h3>

        <section class="set-block">
          <h4>레슨 페이지</h4>

          <div class="set-row">
            <span class="set-label">글자 크기</span>
            <div class="set-stepper">
              <button class="btn" id="set-font-down" type="button">A−</button>
              <span class="set-stepper-val" id="set-font-val">18px</span>
              <button class="btn" id="set-font-up"   type="button">A+</button>
            </div>
          </div>

          <div class="set-row">
            <span class="set-label">행간</span>
            <div class="set-stepper">
              <button class="btn" id="set-lh-down" type="button">−</button>
              <span class="set-stepper-val" id="set-lh-val">2.4</span>
              <button class="btn" id="set-lh-up"   type="button">+</button>
            </div>
          </div>

          <div class="set-preview-label">미리보기</div>
          <div class="set-preview" id="set-preview"><p class="para">
            The morning sun rose over the hills. She opened her notebook and began to write. Every word felt important now — a small step toward something she could not yet name.
          </p></div>

          <div class="set-actions">
            <button class="btn"           id="set-cancel" type="button">취소</button>
            <button class="btn primary"   id="set-save"   type="button">저장</button>
          </div>
        </section>

        <section class="set-block">
          <h4>초기화</h4>
          <div class="set-resets">
            <button class="btn danger block" id="reset-words"  type="button">🎨 단어 색깔 초기화</button>
            <button class="btn danger block" id="reset-streak" type="button">🔥 연속 학습일 초기화</button>
            <button class="btn danger block" id="reset-money"  type="button">💰 NZD 모은 돈 초기화</button>
          </div>
          <p class="muted set-hint">초기화는 되돌릴 수 없습니다. 클라우드에 동기화된 데이터도 함께 지워집니다.</p>
        </section>
      </div>
    `;
    document.body.appendChild(overlay);

    function close() {
      overlay.remove();
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.closest('.sc-close')) close();
    });

    // ----- font / line-height steppers + live preview -----
    const fontVal = overlay.querySelector('#set-font-val');
    const lhVal   = overlay.querySelector('#set-lh-val');
    const preview = overlay.querySelector('#set-preview');
    function applyPreview() {
      fontVal.textContent = pendFont + 'px';
      lhVal.textContent   = pendLH.toFixed(1);
      preview.style.fontSize   = pendFont + 'px';
      preview.style.lineHeight = String(pendLH);
    }
    applyPreview();
    function bumpFont(d) {
      pendFont = Math.max(12, Math.min(40, pendFont + d));
      applyPreview();
    }
    function bumpLH(d) {
      // Steps of 0.2 keep the value readable (1.6, 1.8, 2.0, …).
      pendLH = Math.max(1.4, Math.min(3.4, Math.round((pendLH + d) * 10) / 10));
      applyPreview();
    }
    overlay.querySelector('#set-font-down').onclick = () => bumpFont(-2);
    overlay.querySelector('#set-font-up'  ).onclick = () => bumpFont(+2);
    overlay.querySelector('#set-lh-down'  ).onclick = () => bumpLH(-0.2);
    overlay.querySelector('#set-lh-up'    ).onclick = () => bumpLH(+0.2);

    overlay.querySelector('#set-cancel').onclick = close;
    overlay.querySelector('#set-save').onclick = () => {
      try {
        localStorage.setItem(FONT_KEY, String(pendFont));
        localStorage.setItem(LH_KEY,   String(pendLH));
      } catch (e) {}
      close();
    };

    // ----- reset buttons -----
    overlay.querySelector('#reset-words').onclick = async () => {
      if (!confirm('모든 단어의 색깔(학습 단계)을 초기화할까요? 되돌릴 수 없어요.')) return;
      await DB.resetWordStates();
      await renderMasterAndStories();
      alert('단어 색깔이 초기화됐어요.');
    };
    overlay.querySelector('#reset-streak').onclick = async () => {
      if (!confirm('연속 학습일 기록을 초기화할까요?')) return;
      await DB.resetStreak();
      const states = await DB.loadWordStates();
      refreshStatusNumbers(states);
      alert('연속 학습일이 초기화됐어요.');
    };
    overlay.querySelector('#reset-money').onclick = async () => {
      if (!confirm('NZD 모은 돈을 초기화할까요? 모든 적립과 지출 기록이 삭제됩니다.')) return;
      await DB.resetMoney();
      const states = await DB.loadWordStates();
      refreshStatusNumbers(states);
      alert('모은 돈이 초기화됐어요.');
    };
  }

  // ---- home content ----
  let ALL_LESSONS = [];
  let CURRENT_FILTER = 'all';   // 'all' | 'bookmarked' | 'wm' | 'ws'

  async function renderHome() {
    const grid = document.getElementById('lessons-grid');
    grid.parentElement.querySelectorAll('.empty').forEach(el => el.remove());
    grid.innerHTML = '<div class="muted">불러오는 중...</div>';
    // Pull money + streak down from Supabase so a freshly-opened mobile
    // tab sees the cents earned on PC (and vice-versa). No-op when the
    // user is in try mode or signed out.
    try { await DB.bootstrapUserState(); } catch (e) {}
    ALL_LESSONS = await DB.listLessons();
    setupTabs();
    setupStatusRow();
    paintGrid();
    // Word Master + Word Story sections (after we have word states loaded).
    await renderMasterAndStories();
  }

  // ===== Status row (streak / money / mastered) =====
  function refreshStatusNumbers(states) {
    const s = (DB.getStreak && DB.getStreak()) || { count: 0 };
    const sNum = document.getElementById('status-streak-num');
    if (sNum) sNum.textContent = String(s.count || 0);

    const totalC = (DB.getTotalCents && DB.getTotalCents()) || 0;
    const dollars = (totalC / 100).toFixed(2);
    const mNum = document.getElementById('status-money-num');
    if (mNum) mNum.textContent = '$' + dollars;

    let masteredCount = 0;
    if (states) {
      for (const v of Object.values(states)) {
        if (v && v.state === 5) masteredCount++;
      }
    }
    const wNum = document.getElementById('status-mastered-num');
    if (wNum) wNum.textContent = String(masteredCount);
  }
  function setupStatusRow() {
    const sb = document.getElementById('status-streak');
    const mb = document.getElementById('status-money');
    const wb = document.getElementById('status-mastered');
    if (sb) sb.onclick = openStreakModal;
    if (mb) mb.onclick = openMoneyModal;
    if (wb) wb.onclick = openMasteredModal;
  }

  // ---- modal scaffolding ----
  function openModal(innerHTML, opts) {
    opts = opts || {};
    const overlay = document.createElement('div');
    overlay.className = 'status-overlay';
    overlay.innerHTML = `
      <div class="status-card">
        <button class="sc-close" aria-label="닫기">×</button>
        ${innerHTML}
      </div>
    `;
    document.body.appendChild(overlay);
    function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', e => {
      if (e.target === overlay || e.target.closest('.sc-close')) close();
    });
    if (opts.onMount) opts.onMount(overlay, close);
    return overlay;
  }

  // ---- streak detail (calendar of recorded days) ----
  function openStreakModal() {
    const s = DB.getStreak();
    const set = new Set(s.days || []);
    const today = new Date();
    // 6-week sliding window ending today.
    const weeks = [];
    const startOffset = today.getDay();   // 0=Sun..6=Sat
    const start = new Date(today);
    start.setDate(start.getDate() - startOffset - 35);
    let cursor = new Date(start);
    for (let w = 0; w < 6; w++) {
      const row = [];
      for (let d = 0; d < 7; d++) {
        const ymd = cursor.getFullYear() + '-'
          + String(cursor.getMonth() + 1).padStart(2, '0') + '-'
          + String(cursor.getDate()).padStart(2, '0');
        row.push({
          ymd,
          day: cursor.getDate(),
          isToday: ymd === ymdOf(today),
          done: set.has(ymd),
          inFuture: cursor > today,
        });
        cursor.setDate(cursor.getDate() + 1);
      }
      weeks.push(row);
    }
    const html = `
      <h3>🔥 연속 학습일</h3>
      <div class="streak-big">${s.count || 0}<span class="su">일</span></div>
      <div class="streak-cap">최근 6주 — 학습한 날에 표시</div>
      <div class="streak-cal">
        <div class="cal-row cal-head">
          ${['일','월','화','수','목','금','토'].map(d => `<span>${d}</span>`).join('')}
        </div>
        ${weeks.map(row => `
          <div class="cal-row">
            ${row.map(c => `
              <span class="cal-cell ${c.done?'done':''} ${c.isToday?'today':''} ${c.inFuture?'future':''}">${c.day}</span>
            `).join('')}
          </div>
        `).join('')}
      </div>
    `;
    openModal(html);
  }
  function ymdOf(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // ---- money detail (weekly bar chart + expense list + add-expense flow) ----
  function openMoneyModal() {
    function render(card) {
      const total = DB.getTotalCents();
      const today = DB.getTodayCents();
      const week = DB.getDailyHistory(7);
      const expenses = DB.listExpenses();
      const maxCent = Math.max(10, ...week.map(d => d.cents));
      card.innerHTML = `
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>💰 NZD 모은 돈</h3>
        <div class="money-totals">
          <div class="mt-big">$${(total/100).toFixed(2)}</div>
          <div class="mt-sub">오늘 ${today}¢ · 단어 클릭으로 모은 돈</div>
        </div>
        <div class="money-week">
          ${week.map(d => `
            <div class="mw-col" title="${d.date}: ${d.cents}¢">
              <div class="mw-bar" style="height:${Math.round(d.cents / maxCent * 60)}px"></div>
              <div class="mw-lbl">${d.date.slice(5)}</div>
              <div class="mw-c">${d.cents}¢</div>
            </div>
          `).join('')}
        </div>
        <div class="money-row">
          <button class="btn primary" id="exp-add-btn">＋ 지출 기록</button>
          <span class="muted">사용한 돈을 빼면 합계가 줄어요</span>
        </div>
        <div class="money-exp-list">
          ${expenses.length ? '' : '<div class="muted">아직 기록된 지출이 없어요.</div>'}
          ${expenses.map(e => `
            <div class="me-row">
              <span class="me-date">${escapeHtml(e.date)}</span>
              <span class="me-note">${escapeHtml(e.note || '지출')}</span>
              <span class="me-cents">−$${(e.cents/100).toFixed(2)}</span>
            </div>
          `).join('')}
        </div>
        <div class="money-add" id="exp-add-form" hidden>
          <input class="ma-cents" id="exp-cents" type="number" min="1" step="1" placeholder="센트 (예: 50)">
          <input class="ma-note"  id="exp-note"  type="text" maxlength="40" placeholder="메모 (선택)">
          <button class="btn primary" id="exp-save-btn">저장</button>
        </div>
      `;
      const addBtn = card.querySelector('#exp-add-btn');
      const form   = card.querySelector('#exp-add-form');
      const save   = card.querySelector('#exp-save-btn');
      const cents  = card.querySelector('#exp-cents');
      const note   = card.querySelector('#exp-note');
      addBtn.onclick = () => { form.hidden = false; cents.focus(); };
      save.onclick = () => {
        const c = parseInt(cents.value, 10);
        if (!c || c <= 0) { cents.focus(); return; }
        DB.addExpense(c, note.value);
        // Re-render the card with updated totals.
        render(card);
        // And refresh the home button number.
        DB.loadWordStates().then(refreshStatusNumbers);
      };
    }
    openModal('', { onMount: (overlay) => {
      const card = overlay.querySelector('.status-card');
      render(card);
      // Re-attach close click handler since we replaced innerHTML.
      overlay.addEventListener('click', e => {
        if (e.target === overlay || e.target.closest('.sc-close')) overlay.remove();
      });
    }});
  }

  // ---- mastered word list ----
  async function openMasteredModal() {
    const states = await DB.loadWordStates();
    const list = (DB.listMasteredWords && DB.listMasteredWords(states)) || [];
    const html = `
      <h3>✓ 완전히 아는 단어 <span class="hsub">${list.length}</span></h3>
      ${list.length ? `
        <div class="mw-list">
          ${list.map(e => `
            <button class="mw-pill" data-w="${escapeAttr(e.word)}">
              <span class="mw-en">${escapeHtml(e.word)}</span>
            </button>
          `).join('')}
        </div>
      ` : `
        <p class="muted">아직 완전히 아는 단어가 없어요. 레슨에서 단어를 ✓ 로 표시하면 여기에 모입니다.</p>
      `}
    `;
    openModal(html, { onMount: (overlay) => {
      overlay.querySelectorAll('.mw-pill').forEach(b => {
        b.onclick = () => {
          const w = b.getAttribute('data-w');
          if (window.TTS && TTS.speak) TTS.speak(w);
        };
      });
    }});
  }

  async function renderMasterAndStories() {
    const states = await DB.loadWordStates();
    // Auto-generate any stories the user has earned since last visit.
    await maybeGenerateStories(states);
    refreshStatusNumbers(states);
    paintWordMaster(states);
    paintWordStories(states);
  }

  // ===== 워드 마스터 — every word at state 5. =====
  function paintWordMaster(states) {
    const grid = document.getElementById('wm-grid');
    const count = document.getElementById('wm-tab-count');
    const mastered = Object.entries(states || {})
      .filter(([_, v]) => v && v.state === 5)
      .map(([w]) => w)
      .sort();
    // Always show the parenthesised count — even (0) — on the tab pill.
    if (count) count.textContent = `(${mastered.length})`;
    if (!mastered.length) {
      grid.innerHTML = `<div class="empty">
        <p>아직 완전히 아는 단어가 없어요.<br>레슨에서 단어를 ✓ 로 표시하면 여기에 모입니다.</p>
      </div>`;
      return;
    }
    // Small chip grid; each chip plays the word on click and shows meaning
    // in a subtitle row that fills lazily from the translation cache.
    grid.innerHTML = '';
    for (const w of mastered) {
      const chip = document.createElement('button');
      chip.className = 'wm-chip';
      chip.innerHTML =
        `<span class="wm-en">${escapeHtml(w)}</span>` +
        `<span class="wm-ko muted">…</span>`;
      chip.onclick = () => {
        if (window.TTS && TTS.speak) TTS.speak(w);
      };
      grid.appendChild(chip);
      // Lazy-fill Korean meaning (cache hit is instant).
      Translate.translate(w).then(ko => {
        const ko_el = chip.querySelector('.wm-ko');
        if (ko_el) { ko_el.textContent = ko || ''; ko_el.classList.remove('muted'); }
      }).catch(()=>{});
    }
  }

  // ===== 단어 스토리 — bar list of auto-generated mini lessons =====
  // Stories are produced by GPT-4o-mini through the Supabase Edge Function
  // `story-gpt` (see js/story.js + supabase-functions/story-gpt/index.ts).
  // If GPT is unreachable (function not deployed, network blip, etc.) we
  // fall back to a small set of grammar-safe templates so the home page
  // never gets stuck.
  const STORY_TEMPLATES = [
    ws => `Today I practiced "${ws[0]}", "${ws[1]}", and "${ws[2]}". They are starting to feel familiar.`,
    ws => `Three words on my journey: "${ws[0]}", "${ws[1]}", and "${ws[2]}". Each one is a small step forward.`,
    ws => `I love how "${ws[0]}" and "${ws[1]}" sit together. "${ws[2]}" surprised me with its meaning.`,
    ws => `Words I'm holding close today: "${ws[0]}", "${ws[1]}", and "${ws[2]}". Reading them feels like remembering an old friend.`,
    ws => `"${ws[0]}", "${ws[1]}", "${ws[2]}" — three small victories I want to remember.`,
  ];

  async function maybeGenerateStories(states) {
    const stories = DB.listStories();
    const masteredCount = DB.countMastered(states);
    // Compute thresholds for each story slot until we exceed the count.
    // generateOneStory is async because it round-trips to GPT for the body.
    let need = stories.length;
    while (DB.thresholdForNthStory(need + 1) <= masteredCount) {
      const story = await generateOneStory(states, need + 1);
      if (!story) break;
      DB.addStory(story);
      need++;
    }
  }
  function pickThreeWords(states) {
    // Pick 3 mastered (state-5) words, falling back to states 4 and 3 if
    // there aren't enough. Random sample without replacement.
    const pool = [];
    for (const tier of [5, 4, 3]) {
      for (const [w, v] of Object.entries(states || {})) {
        if (v && v.state === tier && !pool.includes(w)) pool.push(w);
      }
      if (pool.length >= 3) break;
    }
    if (pool.length < 3) return null;
    const picked = [];
    const cp = pool.slice();
    while (picked.length < 3 && cp.length) {
      const i = Math.floor(Math.random() * cp.length);
      picked.push(cp.splice(i, 1)[0]);
    }
    return picked;
  }
  async function generateOneStory(states, indexHint) {
    const picked = pickThreeWords(states);
    if (!picked) return null;

    // 1) Try GPT first — it produces varied, naturally-flowing copy that
    //    actually uses the words in context. Falls back on any error.
    if (window.Story && Story.generate) {
      try {
        const out = await Story.generate(picked, { level: 'easy' });
        return {
          id: 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title: out.title,
          body:  out.body,
          words: picked,
          source: 'gpt',
          created_at: new Date().toISOString(),
        };
      } catch (e) {
        console.warn('[story-gpt] falling back to templates:', e && e.message);
      }
    }

    // 2) Local template fallback (no network).
    const tpl = STORY_TEMPLATES[indexHint % STORY_TEMPLATES.length];
    return {
      id: 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title: (picked[0] + ' ' + picked[1]),   // "두 단어로 요약"
      body:  tpl(picked),
      words: picked,
      source: 'template',
      created_at: new Date().toISOString(),
    };
  }

  function paintWordStories(states) {
    const list     = document.getElementById('ws-list');
    const count    = document.getElementById('ws-tab-count');
    const progress = document.getElementById('ws-progress');
    const stories  = DB.listStories();
    const masteredCount = DB.countMastered(states);
    const nextThreshold = DB.thresholdForNthStory(stories.length + 1);
    const remaining = Math.max(0, nextThreshold - masteredCount);
    // Count goes into the tab pill next to the title; the "다음 스토리까지
    // N개" hint sits as a small subtitle above the bar list.
    if (count)    count.textContent    = `(${stories.length})`;
    if (progress) progress.textContent = `다음 스토리까지 ${remaining}개`;

    if (!stories.length) {
      list.innerHTML = `<div class="empty">
        <p>아직 만들어진 스토리가 없어요.<br>레슨에서 단어들을 익숙해진 단어/배운 단어/완전히 아는 단어로 올려보세요.<br>10개째에 첫 스토리가 생성됩니다.</p>
      </div>`;
      return;
    }
    list.innerHTML = '';
    for (const s of stories) {
      const bar = document.createElement('button');
      bar.className = 'ws-bar';
      bar.innerHTML = `
        <span class="ws-bar-title">${escapeHtml(s.title)}</span>
        <span class="ws-bar-meta">${escapeHtml((s.words || []).join(' · '))}</span>
      `;
      bar.onclick = () => openStory(s);
      list.appendChild(bar);
    }
  }

  function openStory(s) {
    // Simple read-only modal showing the story body.
    const overlay = document.createElement('div');
    overlay.className = 'story-overlay';
    overlay.innerHTML = `
      <div class="story-card">
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>${escapeHtml(s.title)}</h3>
        <div class="sc-body">${escapeHtml(s.body)}</div>
        <div class="sc-words">
          ${(s.words || []).map(w => `<button class="sc-word">${escapeHtml(w)}</button>`).join('')}
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => {
      if (e.target === overlay || e.target.closest('.sc-close')) overlay.remove();
    });
    overlay.querySelectorAll('.sc-word').forEach(b => {
      b.onclick = () => { if (window.TTS && TTS.speak) TTS.speak(b.textContent); };
    });
  }

  function setupTabs() {
    const tabs = document.querySelectorAll('#lesson-tabs a');
    tabs.forEach(t => {
      // Re-binding on each home render is fine since the elements are stable.
      t.onclick = (e) => {
        e.preventDefault();
        tabs.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        CURRENT_FILTER = t.dataset.filter || 'all';
        paintGrid();
      };
    });
  }

  // Renders the panel that matches CURRENT_FILTER. Lesson grid + WM grid +
  // WS list are siblings in the DOM; we just toggle [hidden] so switching
  // tabs is instant (the grids are kept up-to-date by paintWordMaster /
  // paintWordStories on every renderHome).
  function paintGrid() {
    const grid   = document.getElementById('lessons-grid');
    const wmSec  = document.getElementById('wm-section');
    const wsSec  = document.getElementById('ws-section');
    // Always clear any previous "empty state" before deciding what to show.
    grid.parentElement.querySelectorAll('.empty').forEach(el => el.remove());

    if (CURRENT_FILTER === 'wm') {
      grid.hidden  = true;
      wmSec.hidden = false;
      wsSec.hidden = true;
      return;
    }
    if (CURRENT_FILTER === 'ws') {
      grid.hidden  = true;
      wmSec.hidden = true;
      wsSec.hidden = false;
      return;
    }
    grid.hidden  = false;
    wmSec.hidden = true;
    wsSec.hidden = true;
    grid.innerHTML = '';

    let lessons = ALL_LESSONS;
    if (CURRENT_FILTER === 'bookmarked') {
      lessons = lessons.filter(l => !!l.bookmarked);
    }

    if (!lessons.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      if (CURRENT_FILTER === 'bookmarked') {
        empty.innerHTML = `
          <h3>아직 찜한 레슨이 없어요</h3>
          <p>레슨 페이지의 <b>찜</b> 버튼을 누르면 여기에 모입니다.</p>
        `;
      } else {
        empty.innerHTML = `
          <h3>아직 레슨이 없어요</h3>
          <p>오른쪽 아래 <b>＋</b> 버튼을 눌러 첫 레슨을 가져와 보세요.<br>
             영어 텍스트와 (선택) 오디오 파일을 업로드하면 학습이 시작됩니다.</p>
          <div style="margin-top:14px"><a class="btn primary" href="import.html">＋ 새 레슨 가져오기</a></div>
        `;
      }
      grid.parentElement.appendChild(empty);
      return;
    }
    for (const l of lessons) grid.appendChild(makeCard(l));
  }

  function makeCard(l) {
    // Wrapper is a div so the kebab menu can sit OUTSIDE the link's click
    // target — stops kebab taps from also navigating to the lesson page.
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    const a = document.createElement('a');
    a.className = 'card';
    a.href = 'lesson.html?id=' + encodeURIComponent(l.id);
    const initials = (l.title || '?').trim().slice(0, 2).toUpperCase();
    const wordCount = ((l.body || '').match(/\b[\p{L}']+\b/gu) || []).length;
    const hasThumb = !!l.thumbnail_url;
    const thumbStyle = hasThumb
      ? `style="background-image:url('${escapeAttr(l.thumbnail_url)}');background-size:cover;background-position:center;"`
      : '';
    // Two badges, both shown when present: every lesson has text, and
    // audio lessons stack a 🎧 오디오 badge on top of the 텍스트 one.
    const audioBadge = l.audio_url ? '<span class="badge audio">🎧 오디오</span>' : '';
    a.innerHTML = `
      <div class="thumb" ${thumbStyle}>
        <span class="badges">
          <span class="badge">📄 텍스트</span>
          ${audioBadge}
        </span>
        ${hasThumb ? '' : `<span>${escapeHtml(initials)}</span>`}
        ${l.bookmarked ? '<span class="bm-flag" title="찜한 레슨">♥</span>' : ''}
      </div>
      <div class="body">
        <div class="title">${escapeHtml(l.title || '제목 없음')}</div>
        <div class="meta">
          <span>${wordCount} 단어</span>
          <span>·</span>
          <span>${formatDate(l.created_at)}</span>
        </div>
      </div>
    `;

    // Kebab (⋮) button at the bottom-right of the card. Clicks here open a
    // small popover with 수정 / 삭제. Stop propagation so the card's link
    // doesn't fire.
    const kebab = document.createElement('button');
    kebab.className = 'card-kebab';
    kebab.type = 'button';
    kebab.setAttribute('aria-label', '레슨 옵션');
    kebab.innerHTML = '<span aria-hidden="true">⋮</span>';
    kebab.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      openCardMenu(kebab, l);
    });

    wrap.appendChild(a);
    wrap.appendChild(kebab);
    return wrap;
  }

  // ---- card kebab menu ----
  // Single global menu element; we move it next to whichever kebab opened it.
  function openCardMenu(anchorEl, lesson) {
    closeCardMenu();   // close any previous one
    const menu = document.createElement('div');
    menu.className = 'card-menu';
    menu.innerHTML = `
      <button class="cm-item" data-act="rename">✎ 수정</button>
      <button class="cm-item danger" data-act="delete">🗑 삭제</button>
    `;
    document.body.appendChild(menu);

    // Position below the kebab, right-aligned.
    const r = anchorEl.getBoundingClientRect();
    menu.style.top  = (r.bottom + window.scrollY + 6) + 'px';
    menu.style.left = (r.right  + window.scrollX - menu.offsetWidth) + 'px';
    // After paint, snap right edge to align with kebab right edge.
    requestAnimationFrame(() => {
      menu.style.left = (r.right + window.scrollX - menu.getBoundingClientRect().width) + 'px';
    });

    menu.addEventListener('click', async (e) => {
      const btn = e.target.closest('.cm-item');
      if (!btn) return;
      e.stopPropagation();
      const act = btn.dataset.act;
      closeCardMenu();
      if (act === 'rename') {
        const next = (window.prompt('레슨 제목 수정', lesson.title || '') || '').trim();
        if (!next || next === lesson.title) return;
        const ok = await DB.renameLesson(lesson.id, next);
        if (ok) await renderHome();
        else alert('수정에 실패했어요. 잠시 뒤 다시 시도해 주세요.');
      } else if (act === 'delete') {
        if (!window.confirm(`"${lesson.title || '이 레슨'}"을 삭제할까요?`)) return;
        await DB.deleteLesson(lesson.id);
        await renderHome();
      }
    });

    // Close on outside click / Esc / scroll.
    setTimeout(() => {  // defer so the click that opened us doesn't immediately close
      document.addEventListener('click',    closeCardMenu, { once: true });
      document.addEventListener('keydown',  onCardMenuKey);
      window.addEventListener('scroll',     closeCardMenu, { once: true, passive: true });
      window.addEventListener('resize',     closeCardMenu, { once: true });
    }, 0);
  }
  function closeCardMenu() {
    document.querySelectorAll('.card-menu').forEach(m => m.remove());
    document.removeEventListener('keydown', onCardMenuKey);
  }
  function onCardMenuKey(e) {
    if (e.key === 'Escape') closeCardMenu();
  }
  function escapeAttr(s){ return (s||'').replace(/"/g, '&quot;'); }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }
  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' });
  }

  document.getElementById('import-btn').addEventListener('click', () => {
    location.href = 'import.html';
  });
})();
</script>
