<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>또박또박</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="behind">
  <header class="topbar">
    <a class="brand" href="index.html">또박또박</a>
    <!-- Language switcher: green pill next to the brand. Shows the
         current target language's flag; click to toggle the dropdown
         with EN / JP options. Each option's flag is the country
         flag emoji (🇬🇧 / 🇯🇵). State persists in localStorage as
         `eng.v1.language` and namespaces all per-language data
         (streak, money, mastered, lessons, word states, phrases). -->
    <div class="lang-switch" id="lang-switch">
      <button class="lang-switch-btn" id="lang-switch-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="lang-flag" id="lang-flag-current">🇬🇧</span>
        <span class="lang-caret" aria-hidden="true">▾</span>
      </button>
      <ul class="lang-menu" id="lang-menu" role="listbox" hidden>
        <li><button class="lang-opt" data-lang="en" type="button" role="option">
          <span class="lang-flag">🇬🇧</span><span class="lang-name">영어</span>
        </button></li>
        <li><button class="lang-opt" data-lang="ja" type="button" role="option">
          <span class="lang-flag">🇯🇵</span><span class="lang-name">일본어</span>
        </button></li>
      </ul>
    </div>
    <div class="spacer"></div>
    <a class="bidoro-tab" href="../index.html" title="비도로 사이트로 돌아가기">
      <span class="text">Bidoro</span><span class="ico" aria-hidden="true">ƒ</span>
    </a>
    <div class="acct" id="acct-chip">
      <span class="avatar" id="acct-avatar">·</span>
      <span id="acct-name">게스트</span>
    </div>
    <button class="btn ghost" id="signout-btn" title="로그아웃" style="display:none">로그아웃</button>
  </header>

  <main class="container">

    <section class="section section-tight">
      <h2>계속 학습하기</h2>

      <!-- Status row: three pill buttons summarising the user's progress.
           Tap each one to open a detail modal. Numbers are filled in JS. -->
      <div class="status-row" id="status-row">
        <button class="status-btn" id="status-streak" type="button"
                title="연속 학습일 — 달력 보기">
          <span class="status-ico">🔥</span>
          <span class="status-num" id="status-streak-num">0</span>
          <span class="status-label">연속 학습일</span>
        </button>
        <button class="status-btn" id="status-money" type="button"
                title="모은 돈 — 지출 기록">
          <span class="status-ico">💰</span>
          <span class="status-num" id="status-money-num">$0.00</span>
          <span class="status-label">NZD 모은 돈</span>
        </button>
        <button class="status-btn" id="status-mastered" type="button"
                title="완전히 아는 단어 모음">
          <span class="status-ico">✓</span>
          <span class="status-num" id="status-mastered-num">0</span>
          <span class="status-label">마스터한 단어</span>
        </button>
      </div>

      <!-- 4 tabs share the same row. The first two filter the lesson
           cards grid (모든/찜한); the last two switch the panel below to
           a different content type (워드 마스터 chip grid / 단어 스토리
           bar list). The "(N)" count beside the title is always shown so
           the user can see how many items are inside. -->
      <div class="tabrow" id="lesson-tabs">
        <a href="#" class="active" data-filter="all">모든 레슨</a>
        <a href="#" data-filter="bookmarked">찜한 레슨</a>
        <a href="#" data-filter="wm">워드 마스터 <span class="tab-count" id="wm-tab-count">(0)</span></a>
        <a href="#" data-filter="ws">단어 스토리 <span class="tab-count" id="ws-tab-count">(0)</span></a>
      </div>

      <!-- Three swappable panels — only one is visible at a time, chosen
           by the active tab above. -->
      <div id="lessons-grid" class="cards"></div>
      <div id="wm-section" hidden>
        <!-- Level filter row — horizontal buttons. Picking one shows the
             words in that state below. Counts update from the live word
             states; an empty state is displayed if a tier has no words. -->
        <div class="wm-filter" id="wm-filter">
          <button class="wm-filter-btn s2" data-state="2" type="button">
            <span class="wm-filter-dot">2</span>
            <span class="wm-filter-label">어디서 본 단어</span>
            <span class="wm-filter-count" data-count="2">0</span>
          </button>
          <button class="wm-filter-btn s3" data-state="3" type="button">
            <span class="wm-filter-dot">3</span>
            <span class="wm-filter-label">어디서 많이 본 단어</span>
            <span class="wm-filter-count" data-count="3">0</span>
          </button>
          <button class="wm-filter-btn s4" data-state="4" type="button">
            <span class="wm-filter-dot">4</span>
            <span class="wm-filter-label">익숙한 단어</span>
            <span class="wm-filter-count" data-count="4">0</span>
          </button>
          <button class="wm-filter-btn s5 active" data-state="5" type="button">
            <span class="wm-filter-dot">✓</span>
            <span class="wm-filter-label">완전히 아는 단어</span>
            <span class="wm-filter-count" data-count="5">0</span>
          </button>
        </div>
        <div id="wm-grid" class="wm-grid"></div>
      </div>
      <div id="ws-section" hidden>
        <div class="ws-progress-line muted" id="ws-progress"></div>
        <div id="ws-list" class="ws-list"></div>
      </div>
    </section>

  </main>

  <button class="fab" id="import-btn" title="새 레슨 가져오기" aria-label="가져오기">＋</button>
</div>

<!-- Supabase + app modules -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/tts.js"></script>
<script src="js/translate.js"></script>
<script src="js/story.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  // Fallback header click handler — runs IMMEDIATELY (before Auth.gate
  // resolves) so a user landing in a logged-out state where the auth
  // modal failed to mount for some reason can still summon the login
  // form by tapping the "게스트" chip. renderHeader() (called inside
  // gate's authed callback) overrides this with the full handler that
  // also routes signed-in users to the settings panel.
  (function setupFallbackChipClick() {
    const chip = document.getElementById('acct-chip');
    if (!chip) return;
    chip.style.cursor = 'pointer';
    chip.onclick = (e) => {
      const so = document.getElementById('signout-btn');
      if (e.target === so || (so && so.contains(e.target))) return;
      // Always show the login modal in this fallback path — covers both
      // try-mode users wanting to upgrade and logged-out users whose
      // gate-rendered modal didn't appear.
      Auth.showModal(() => location.reload());
    };
  })();

  // Language switcher (next to the brand). Drops down a 2-option list:
  // 영어 (🇬🇧) / 일본어 (🇯🇵). Selecting a different language updates
  // DB's stored language preference and reloads the page so all
  // language-namespaced data (streak, money, lessons, …) re-fetches
  // from the right slot. Phase 1: English fully supported, Japanese
  // is scaffolding-only (a "준비 중" banner shows in Japanese mode
  // until tokenizer / TTS / dictionary are wired up).
  (function setupLangSwitcher() {
    const wrap = document.getElementById('lang-switch');
    const btn  = document.getElementById('lang-switch-btn');
    const menu = document.getElementById('lang-menu');
    const flagCur = document.getElementById('lang-flag-current');
    if (!wrap || !btn || !menu) return;
    const FLAGS = { en: '🇬🇧', ja: '🇯🇵' };
    const cur = (DB && DB.getLang) ? DB.getLang() : 'en';
    if (flagCur) flagCur.textContent = FLAGS[cur] || '🇬🇧';
    // Browser tab title — reflects the active learning language so the
    // user can tell which mode the site is in from the OS task switcher
    // / pinned tabs. Toggling the language already triggers a reload
    // (below), so this runs every time the choice changes.
    document.title = '또박또박 (' + (cur === 'ja' ? '일본어' : '영어') + ')';
    menu.querySelectorAll('.lang-opt').forEach(opt => {
      if (opt.dataset.lang === cur) opt.classList.add('active');
      opt.addEventListener('click', () => {
        const next = opt.dataset.lang;
        if (!next || next === cur) { menu.hidden = true; return; }
        // Phases 1-4 done — JP mode is now fully functional (TTS,
        // dictionary, kuromoji tokenizer, furigana, multi-color
        // inflection, JP chunking, manual). No more placeholder
        // warning; switch silently and reload.
        DB.setLang && DB.setLang(next);
        location.reload();
      });
    });
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = !menu.hidden;
      menu.hidden = open;
      btn.setAttribute('aria-expanded', open ? 'false' : 'true');
    });
    // Click outside closes the menu.
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) {
        menu.hidden = true;
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();

  // Show auth gate. After authed (or "체험하기"), render home.
  Auth.gate(async () => {
    await renderHeader();
    await renderHome();
  });

  // ---- header ----
  async function renderHeader() {
    const chip = document.getElementById('acct-chip');
    const avatar = document.getElementById('acct-avatar');
    const name = document.getElementById('acct-name');
    const so = document.getElementById('signout-btn');

    if (DB.isTryMode()) {
      name.textContent = '체험 모드';
      avatar.textContent = '체';
      so.style.display = '';
      so.textContent = '나가기';
    } else {
      const u = await DB.currentUser();
      const label = (u && (u.email || '').split('@')[0]) || '사용자';
      name.textContent = label;
      avatar.textContent = (label[0] || 'U').toUpperCase();
      so.style.display = '';
      so.textContent = '로그아웃';
    }
    so.onclick = () => Auth.signOutAndReload();

    // Tapping the account chip:
    //   • Try-mode (체험 모드 / 게스트) → open the sign-in / sign-up modal
    //     so the user can upgrade to a real account.
    //   • Signed in            → open the settings panel.
    if (chip) {
      chip.style.cursor = 'pointer';
      chip.onclick = (e) => {
        // Don't intercept when the user is actually clicking the
        // sign-out / 나가기 button that lives next to the chip.
        if (e.target === so || (so && so.contains(e.target))) return;
        if (DB.isTryMode()) {
          // Show the auth modal — on success, re-render the home page so
          // counts / status / lessons reload from the new account.
          Auth.showModal(async () => {
            await renderHeader();
            await renderHome();
          });
        } else {
          openSettingsModal();
        }
      };
    }
  }

  // ===== Settings modal =====
  // Lives on the home page only; opened by tapping the account chip.
  //   • 레슨 글자 크기 (font-size) and 행간 (line-height) pickers with a
  //     LIVE preview paragraph below — the preview re-renders as the user
  //     clicks +/-. Changes only persist when 저장 is tapped.
  //   • Three 초기화 buttons that wipe word colours / streak / money
  //     locally AND in the cloud.
  const FONT_KEY = 'eng.v1.lessonFontPx';
  const LH_KEY   = 'eng.v1.lessonLineHeight';
  const FONT_DEFAULT = 18;
  const LH_DEFAULT   = 2.4;
  function getLessonFontPx() {
    const n = parseFloat(localStorage.getItem(FONT_KEY) || '');
    return (Number.isFinite(n) && n >= 12 && n <= 40) ? n : FONT_DEFAULT;
  }
  function getLessonLineHeight() {
    const n = parseFloat(localStorage.getItem(LH_KEY) || '');
    return (Number.isFinite(n) && n >= 1.2 && n <= 3.6) ? n : LH_DEFAULT;
  }

  function openSettingsModal() {
    // Pending values — user's edits stay LOCAL to the modal until 저장.
    let pendFont = getLessonFontPx();
    let pendLH   = getLessonLineHeight();

    const overlay = document.createElement('div');
    overlay.className = 'status-overlay settings-overlay';
    overlay.innerHTML = `
      <div class="status-card settings-card">
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>⚙ 환경 설정</h3>

        <section class="set-block">
          <h4>레슨 페이지</h4>

          <div class="set-row">
            <span class="set-label">글자 크기</span>
            <div class="set-stepper">
              <button class="btn" id="set-font-down" type="button">A−</button>
              <span class="set-stepper-val" id="set-font-val">18px</span>
              <button class="btn" id="set-font-up"   type="button">A+</button>
            </div>
          </div>

          <div class="set-row">
            <span class="set-label">행간</span>
            <div class="set-stepper">
              <button class="btn" id="set-lh-down" type="button">−</button>
              <span class="set-stepper-val" id="set-lh-val">2.4</span>
              <button class="btn" id="set-lh-up"   type="button">+</button>
            </div>
          </div>

          <div class="set-preview-label">미리보기</div>
          <div class="set-preview" id="set-preview"><p class="para">
            The morning sun rose over the hills. She opened her notebook and began to write. Every word felt important now — a small step toward something she could not yet name.
          </p></div>

          <div class="set-actions">
            <button class="btn"           id="set-cancel" type="button">취소</button>
            <button class="btn primary"   id="set-save"   type="button">저장</button>
          </div>
        </section>

        <section class="set-block">
          <h4>초기화</h4>
          <div class="set-resets">
            <button class="btn danger block" id="reset-words"  type="button">🎨 단어 색깔 초기화</button>
            <button class="btn danger block" id="reset-streak" type="button">🔥 연속 학습일 초기화</button>
            <button class="btn danger block" id="reset-money"  type="button">💰 NZD 모은 돈 초기화</button>
          </div>
          <p class="muted set-hint">초기화는 되돌릴 수 없습니다. 클라우드에 동기화된 데이터도 함께 지워집니다.</p>
        </section>
      </div>
    `;
    document.body.appendChild(overlay);

    function close() {
      overlay.remove();
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.closest('.sc-close')) close();
    });

    // ----- font / line-height steppers + live preview -----
    const fontVal = overlay.querySelector('#set-font-val');
    const lhVal   = overlay.querySelector('#set-lh-val');
    const preview = overlay.querySelector('#set-preview');
    function applyPreview() {
      fontVal.textContent = pendFont + 'px';
      lhVal.textContent   = pendLH.toFixed(1);
      preview.style.fontSize   = pendFont + 'px';
      preview.style.lineHeight = String(pendLH);
    }
    applyPreview();
    function bumpFont(d) {
      pendFont = Math.max(12, Math.min(40, pendFont + d));
      applyPreview();
    }
    function bumpLH(d) {
      // Steps of 0.2 keep the value readable (1.6, 1.8, 2.0, …).
      pendLH = Math.max(1.4, Math.min(3.4, Math.round((pendLH + d) * 10) / 10));
      applyPreview();
    }
    overlay.querySelector('#set-font-down').onclick = () => bumpFont(-2);
    overlay.querySelector('#set-font-up'  ).onclick = () => bumpFont(+2);
    overlay.querySelector('#set-lh-down'  ).onclick = () => bumpLH(-0.2);
    overlay.querySelector('#set-lh-up'    ).onclick = () => bumpLH(+0.2);

    overlay.querySelector('#set-cancel').onclick = close;
    overlay.querySelector('#set-save').onclick = () => {
      try {
        localStorage.setItem(FONT_KEY, String(pendFont));
        localStorage.setItem(LH_KEY,   String(pendLH));
      } catch (e) {}
      close();
    };

    // ----- reset buttons -----
    overlay.querySelector('#reset-words').onclick = async () => {
      if (!confirm('모든 단어의 색깔(학습 단계)을 초기화할까요? 되돌릴 수 없어요.')) return;
      await DB.resetWordStates();
      await renderMasterAndStories();
      alert('단어 색깔이 초기화됐어요.');
    };
    overlay.querySelector('#reset-streak').onclick = async () => {
      if (!confirm('연속 학습일 기록을 초기화할까요?')) return;
      await DB.resetStreak();
      const states = await DB.loadWordStates();
      refreshStatusNumbers(states);
      alert('연속 학습일이 초기화됐어요.');
    };
    overlay.querySelector('#reset-money').onclick = async () => {
      if (!confirm('NZD 모은 돈을 초기화할까요? 모든 적립과 지출 기록이 삭제됩니다.')) return;
      await DB.resetMoney();
      const states = await DB.loadWordStates();
      refreshStatusNumbers(states);
      alert('모은 돈이 초기화됐어요.');
    };
  }

  // ---- home content ----
  let ALL_LESSONS = [];
  let CURRENT_FILTER = 'all';   // 'all' | 'bookmarked' | 'wm' | 'ws'

  async function renderHome() {
    const grid = document.getElementById('lessons-grid');
    grid.parentElement.querySelectorAll('.empty').forEach(el => el.remove());
    grid.innerHTML = '<div class="muted">불러오는 중...</div>';
    // Pull money + streak down from Supabase so a freshly-opened mobile
    // tab sees the cents earned on PC (and vice-versa). No-op when the
    // user is in try mode or signed out.
    try { await DB.bootstrapUserState(); } catch (e) {}
    ALL_LESSONS = await DB.listLessons();
    setupTabs();
    setupStatusRow();
    paintGrid();
    // Word Master + Word Story sections (after we have word states loaded).
    await renderMasterAndStories();
  }

  // ===== Status row (streak / money / mastered) =====
  function refreshStatusNumbers(states) {
    const s = (DB.getStreak && DB.getStreak()) || { count: 0 };
    const sNum = document.getElementById('status-streak-num');
    if (sNum) sNum.textContent = String(s.count || 0);

    const totalC = (DB.getTotalCents && DB.getTotalCents()) || 0;
    const dollars = (totalC / 100).toFixed(2);
    const mNum = document.getElementById('status-money-num');
    if (mNum) mNum.textContent = '$' + dollars;

    let masteredCount = 0;
    if (states) {
      for (const v of Object.values(states)) {
        if (v && v.state === 5) masteredCount++;
      }
    }
    const wNum = document.getElementById('status-mastered-num');
    if (wNum) wNum.textContent = String(masteredCount);
  }
  function setupStatusRow() {
    const sb = document.getElementById('status-streak');
    const mb = document.getElementById('status-money');
    const wb = document.getElementById('status-mastered');
    if (sb) sb.onclick = openStreakModal;
    if (mb) mb.onclick = openMoneyModal;
    if (wb) wb.onclick = openMasteredModal;
  }

  // ---- modal scaffolding ----
  function openModal(innerHTML, opts) {
    opts = opts || {};
    const overlay = document.createElement('div');
    overlay.className = 'status-overlay';
    overlay.innerHTML = `
      <div class="status-card">
        <button class="sc-close" aria-label="닫기">×</button>
        ${innerHTML}
      </div>
    `;
    document.body.appendChild(overlay);
    function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
    overlay.addEventListener('click', e => {
      if (e.target === overlay || e.target.closest('.sc-close')) close();
    });
    if (opts.onMount) opts.onMount(overlay, close);
    return overlay;
  }

  // ---- streak detail (calendar of recorded days) ----
  function openStreakModal() {
    const s = DB.getStreak();
    const set = new Set(s.days || []);
    const today = new Date();
    // 6-week sliding window ending today.
    const weeks = [];
    const startOffset = today.getDay();   // 0=Sun..6=Sat
    const start = new Date(today);
    start.setDate(start.getDate() - startOffset - 35);
    let cursor = new Date(start);
    for (let w = 0; w < 6; w++) {
      const row = [];
      for (let d = 0; d < 7; d++) {
        const ymd = cursor.getFullYear() + '-'
          + String(cursor.getMonth() + 1).padStart(2, '0') + '-'
          + String(cursor.getDate()).padStart(2, '0');
        row.push({
          ymd,
          day: cursor.getDate(),
          isToday: ymd === ymdOf(today),
          done: set.has(ymd),
          inFuture: cursor > today,
        });
        cursor.setDate(cursor.getDate() + 1);
      }
      weeks.push(row);
    }
    const html = `
      <h3>🔥 연속 학습일</h3>
      <div class="streak-big">${s.count || 0}<span class="su">일</span></div>
      <div class="streak-cap">최근 6주 — 학습한 날에 표시</div>
      <div class="streak-cal">
        <div class="cal-row cal-head">
          ${['일','월','화','수','목','금','토'].map(d => `<span>${d}</span>`).join('')}
        </div>
        ${weeks.map(row => `
          <div class="cal-row">
            ${row.map(c => `
              <span class="cal-cell ${c.done?'done':''} ${c.isToday?'today':''} ${c.inFuture?'future':''}">${c.day}</span>
            `).join('')}
          </div>
        `).join('')}
      </div>
    `;
    openModal(html);
  }
  function ymdOf(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // ---- money detail (weekly bar chart + expense list + add-expense flow) ----
  function openMoneyModal() {
    function render(card) {
      const total = DB.getTotalCents();
      const today = DB.getTodayCents();
      const week = DB.getDailyHistory(7);
      const expenses = DB.listExpenses();
      const maxCent = Math.max(10, ...week.map(d => d.cents));
      card.innerHTML = `
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>💰 NZD 모은 돈</h3>
        <div class="money-totals">
          <div class="mt-big">$${(total/100).toFixed(2)}</div>
          <div class="mt-sub">오늘 ${today}¢ · 단어 클릭으로 모은 돈</div>
        </div>
        <div class="money-week">
          ${week.map(d => `
            <div class="mw-col" title="${d.date}: ${d.cents}¢">
              <div class="mw-bar" style="height:${Math.round(d.cents / maxCent * 60)}px"></div>
              <div class="mw-lbl">${d.date.slice(5)}</div>
              <div class="mw-c">${d.cents}¢</div>
            </div>
          `).join('')}
        </div>
        <div class="money-row">
          <button class="btn primary" id="exp-add-btn">＋ 지출 기록</button>
          <span class="muted">사용한 돈을 빼면 합계가 줄어요</span>
        </div>
        <div class="money-exp-list">
          ${expenses.length ? '' : '<div class="muted">아직 기록된 지출이 없어요.</div>'}
          ${expenses.map(e => `
            <div class="me-row">
              <span class="me-date">${escapeHtml(e.date)}</span>
              <span class="me-note">${escapeHtml(e.note || '지출')}</span>
              <span class="me-cents">−$${(e.cents/100).toFixed(2)}</span>
            </div>
          `).join('')}
        </div>
        <div class="money-add" id="exp-add-form" hidden>
          <input class="ma-cents" id="exp-cents" type="text" inputmode="decimal" autocomplete="off" placeholder="$ 금액 (예: 3.30)">
          <input class="ma-note"  id="exp-note"  type="text" maxlength="40" placeholder="메모 (선택)">
          <button class="btn primary" id="exp-save-btn">저장</button>
        </div>
      `;
      const addBtn = card.querySelector('#exp-add-btn');
      const form   = card.querySelector('#exp-add-form');
      const save   = card.querySelector('#exp-save-btn');
      const cents  = card.querySelector('#exp-cents');
      const note   = card.querySelector('#exp-note');
      addBtn.onclick = () => { form.hidden = false; cents.focus(); };
      save.onclick = () => {
        // Input is a DOLLAR amount (e.g. "3.30" = $3 30¢ → 330 cents).
        // Strip currency symbols / commas / whitespace before parsing so
        // copy-pasted values like "$3.30" or "3,300.00" still work.
        const raw = String(cents.value || '').trim().replace(/[$₩,\s]/g, '');
        const dollars = parseFloat(raw);
        if (!Number.isFinite(dollars) || dollars <= 0) { cents.focus(); return; }
        const c = Math.round(dollars * 100);
        if (!c || c <= 0) { cents.focus(); return; }
        DB.addExpense(c, note.value);
        // Re-render the card with updated totals.
        render(card);
        // And refresh the home button number.
        DB.loadWordStates().then(refreshStatusNumbers);
      };
    }
    openModal('', { onMount: (overlay) => {
      const card = overlay.querySelector('.status-card');
      render(card);
      // Re-attach close click handler since we replaced innerHTML.
      overlay.addEventListener('click', e => {
        if (e.target === overlay || e.target.closest('.sc-close')) overlay.remove();
      });
    }});
  }

  async function renderMasterAndStories() {

  // ===== 워드 마스터 — filterable view across states 2..5. =====
  // Layout: a row of 4 filter buttons (●2 / ●3 / ●4 / ✓5) that switch
  // the chip grid below to show ONLY the words at that state. The
  // active filter is module-scoped so it persists across re-renders
  // (e.g. when a lesson visit pushes a new word into a state).
  // Default = state 5 (preserves the prior "mastered words" landing).
  // Words ARE language-separated already — `loadWordStates()` reads
  // from the active language's slot — so EN and JP each have their
  // own collection without any extra plumbing here.
  let _wmActiveState = 5;
  function _wmCountByState(states) {
    const c = { 2: 0, 3: 0, 4: 0, 5: 0 };
    for (const v of Object.values(states || {})) {
      if (!v) continue;
      if (c[v.state] !== undefined) c[v.state]++;
    }
    return c;
  }
  function paintWordMaster(states) {
    const grid    = document.getElementById('wm-grid');
    const count   = document.getElementById('wm-tab-count');
    const filter  = document.getElementById('wm-filter');

    const counts = _wmCountByState(states);
    const totalAcrossStates = counts[2] + counts[3] + counts[4] + counts[5];

    // Tab pill count = total across all 4 tiers (the entire word library
    // the user has accumulated, not just state-5).
    if (count) count.textContent = `(${totalAcrossStates})`;

    // Per-filter counts in the row — keep in sync on every paint.
    if (filter) {
      for (const s of [2, 3, 4, 5]) {
        const el = filter.querySelector('.wm-filter-count[data-count="' + s + '"]');
        if (el) el.textContent = String(counts[s]);
      }
      // Wire the filter buttons once per paint — idempotent because we
      // overwrite onclick.
      filter.querySelectorAll('.wm-filter-btn').forEach(btn => {
        const s = parseInt(btn.dataset.state, 10);
        btn.classList.toggle('active', s === _wmActiveState);
        btn.onclick = () => {
          if (_wmActiveState === s) return;
          _wmActiveState = s;
          paintWordMaster(states);          // re-render with new filter
        };
      });
    }

    // Pull the words at the currently-selected state, sorted alphabetically.
    const words = Object.entries(states || {})
      .filter(([_, v]) => v && v.state === _wmActiveState)
      .map(([w]) => w)
      .sort();

    if (!words.length) {
      const labelByState = {
        2: '어디서 본 단어',
        3: '어디서 많이 본 단어',
        4: '익숙한 단어',
        5: '완전히 아는 단어',
      };
      const lbl = labelByState[_wmActiveState] || '';
      grid.innerHTML = `<div class="empty">
        <p>아직 ${escapeHtml(lbl)}가 없어요.<br>레슨에서 단어 단계를 올리면 여기에 모입니다.</p>
      </div>`;
      return;
    }

    // Toggle chip — shows the source word (EN/JP) by default. Tap once
    // to play the word's pronunciation AND swap the visible text to its
    // Korean meaning. Tap again to swap back to the source word. Korean
    // is fetched lazily on first reveal and cached on the chip's
    // dataset so subsequent toggles are instant.
    grid.innerHTML = '';
    for (const w of words) {
      const chip = document.createElement('button');
      chip.className = 'wm-chip';
      chip.dataset.word    = w;
      chip.dataset.showing = 'word';   // 'word' | 'ko'
      chip.innerHTML = `<span class="wm-text">${escapeHtml(w)}</span>`;
      const textEl = chip.querySelector('.wm-text');
      chip.onclick = async () => {
        // Always speak the source word — TTS doesn't change with the
        // visible label (the user is learning the EN/JP pronunciation,
        // not Korean readings of it).
        if (window.TTS && TTS.speak) TTS.speak(w);
        if (chip.dataset.showing === 'word') {
          if (chip.dataset.koLoaded === '1') {
            textEl.textContent = chip.dataset.ko || '';
          } else {
            textEl.textContent = '…';
            try {
              const ko = await Translate.translate(w);
              chip.dataset.ko = ko || '';
              chip.dataset.koLoaded = '1';
              // The user might have toggled back during the await — only
              // paint Korean if we're still on the "ko" intent.
              if (chip.dataset.showing === 'word') {
                textEl.textContent = chip.dataset.ko || '';
              }
            } catch (_) {
              textEl.textContent = w;          // give up — restore the word
              return;
            }
          }
          chip.classList.add('wm-chip-ko');
          chip.dataset.showing = 'ko';
        } else {
          textEl.textContent = w;
          chip.classList.remove('wm-chip-ko');
          chip.dataset.showing = 'word';
        }
      };
      grid.appendChild(chip);
    }
  }

  // ===== 단어 스토리 — bar list of auto-generated mini lessons =====
  // Stories are produced by GPT-4o-mini through the Supabase Edge Function
  // `story-gpt` (see js/story.js + supabase-functions/story-gpt/index.ts).
  // If GPT is unreachable (function not deployed, network blip, etc.) we
  // fall back to a small set of grammar-safe templates so the home page
  // never gets stuck.
  // Local fallback templates used when story-gpt is unreachable. Picked
  // by language so JP fallback doesn't dump kanji-mixed words inside an
  // English sentence (and vice versa).
  const STORY_TEMPLATES_EN = [
    ws => `Today I practiced "${ws[0]}", "${ws[1]}", and "${ws[2]}". They are starting to feel familiar.`,
    ws => `Three words on my journey: "${ws[0]}", "${ws[1]}", and "${ws[2]}". Each one is a small step forward.`,
    ws => `I love how "${ws[0]}" and "${ws[1]}" sit together. "${ws[2]}" surprised me with its meaning.`,
    ws => `Words I'm holding close today: "${ws[0]}", "${ws[1]}", and "${ws[2]}". Reading them feels like remembering an old friend.`,
    ws => `"${ws[0]}", "${ws[1]}", "${ws[2]}" — three small victories I want to remember.`,
  ];
  const STORY_TEMPLATES_JA = [
    ws => `今日は「${ws[0]}」「${ws[1]}」「${ws[2]}」を練習した。少しずつ慣れてきた。`,
    ws => `「${ws[0]}」と「${ws[1]}」、そして「${ws[2]}」。三つの小さな一歩。`,
    ws => `「${ws[0]}」「${ws[1]}」「${ws[2]}」— 覚えておきたい三つの言葉。`,
  ];
  function _storyTemplatesForLang() {
    const lang = (window.DB && window.DB.getLang && window.DB.getLang()) || 'en';
    return lang === 'ja' ? STORY_TEMPLATES_JA : STORY_TEMPLATES_EN;
  }

  async function maybeGenerateStories(states) {
    const stories = DB.listStories();
    const masteredCount = DB.countMastered(states);
    // Compute thresholds for each story slot until we exceed the count.
    // generateOneStory is async because it round-trips to GPT for the body.
    let need = stories.length;
    while (DB.thresholdForNthStory(need + 1) <= masteredCount) {
      const story = await generateOneStory(states, need + 1);
      if (!story) break;
      DB.addStory(story);
      need++;
    }
  }
  function pickThreeWords(states) {
    // Pick 3 mastered (state-5) words, falling back to states 4 and 3 if
    // there aren't enough. Random sample without replacement.
    const pool = [];
    for (const tier of [5, 4, 3]) {
      for (const [w, v] of Object.entries(states || {})) {
        if (v && v.state === tier && !pool.includes(w)) pool.push(w);
      }
      if (pool.length >= 3) break;
    }
    if (pool.length < 3) return null;
    const picked = [];
    const cp = pool.slice();
    while (picked.length < 3 && cp.length) {
      const i = Math.floor(Math.random() * cp.length);
      picked.push(cp.splice(i, 1)[0]);
    }
    return picked;
  }
  async function generateOneStory(states, indexHint) {
    const picked = pickThreeWords(states);
    if (!picked) return null;

    // 1) Try GPT first — it produces varied, naturally-flowing copy that
    //    actually uses the words in context. Falls back on any error.
    if (window.Story && Story.generate) {
      try {
        const out = await Story.generate(picked, { level: 'easy' });
        return {
          id: 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title: out.title,
          body:  out.body,
          words: picked,
          source: 'gpt',
          created_at: new Date().toISOString(),
        };
      } catch (e) {
        console.warn('[story-gpt] falling back to templates:', e && e.message);
      }
    }

    // 2) Local template fallback (no network).
    const tpls = _storyTemplatesForLang();
    const tpl = tpls[indexHint % tpls.length];
    return {
      id: 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title: (picked[0] + ' ' + picked[1]),   // "두 단어로 요약"
      body:  tpl(picked),
      words: picked,
      source: 'template',
      created_at: new Date().toISOString(),
    };
  }

  function paintWordStories(states) {
    const list     = document.getElementById('ws-list');
    const count    = document.getElementById('ws-tab-count');
    const progress = document.getElementById('ws-progress');
    const stories  = DB.listStories();
    const masteredCount = DB.countMastered(states);
    const nextThreshold = DB.thresholdForNthStory(stories.length + 1);
    const remaining = Math.max(0, nextThreshold - masteredCount);
    // Count goes into the tab pill next to the title; the "다음 스토리까지
    // N개" hint sits as a small subtitle above the bar list.
    if (count)    count.textContent    = `(${stories.length})`;
    if (progress) progress.textContent = `다음 스토리까지 ${remaining}개`;

    if (!stories.length) {
      list.innerHTML = `<div class="empty">
        <p>아직 만들어진 스토리가 없어요.<br>레슨에서 단어들을 익숙해진 단어/배운 단어/완전히 아는 단어로 올려보세요.<br>10개째에 첫 스토리가 생성됩니다.</p>
      </div>`;
      return;
    }
    list.innerHTML = '';
    for (const s of stories) {
      const bar = document.createElement('button');
      bar.className = 'ws-bar';
      bar.innerHTML = `
        <span class="ws-bar-title">${escapeHtml(s.title)}</span>
        <span class="ws-bar-meta">${escapeHtml((s.words || []).join(' · '))}</span>
      `;
      bar.onclick = () => openStory(s);
      list.appendChild(bar);
    }
  }

  function openStory(s) {
    // Simple read-only modal showing the story body.
    const overlay = document.createElement('div');
    overlay.className = 'story-overlay';
    overlay.innerHTML = `
      <div class="story-card">
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>${escapeHtml(s.title)}</h3>
        <div class="sc-body">${escapeHtml(s.body)}</div>
        <div class="sc-words">
          ${(s.words || []).map(w => `<button class="sc-word">${escapeHtml(w)}</button>`).join('')}
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => {
      if (e.target === overlay || e.target.closest('.sc-close')) overlay.remove();
    });
    overlay.querySelectorAll('.sc-word').forEach(b => {
      b.onclick = () => { if (window.TTS && TTS.speak) TTS.speak(b.textContent); };
    });
  }

  function setupTabs() {
    const tabs = document.querySelectorAll('#lesson-tabs a');
    tabs.forEach(t => {
      // Re-binding on each home render is fine since the elements are stable.
      t.onclick = (e) => {
        e.preventDefault();
        tabs.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        CURRENT_FILTER = t.dataset.filter || 'all';
        paintGrid();
      };
    });
  }

  // Renders the panel that matches CURRENT_FILTER. Lesson grid + WM grid +
  // WS list are siblings in the DOM; we toggle inline `display:none` so
  // CSS rules like `.cards { display: grid }` (which beat the `[hidden]`
  // attribute) can't accidentally keep the wrong panel visible.
  function paintGrid() {
    const grid   = document.getElementById('lessons-grid');
    const wmSec  = document.getElementById('wm-section');
    const wsSec  = document.getElementById('ws-section');
    // Always clear any previous "empty state" before deciding what to show.
    grid.parentElement.querySelectorAll('.empty').forEach(el => el.remove());

    function show(el, on) {
      if (!el) return;
      // Toggle BOTH the hidden attribute AND inline display so we win
      // against any CSS rule (e.g. `.cards { display: grid }` overrides
      // the [hidden] attribute by itself).
      el.hidden = !on;
      el.style.display = on ? '' : 'none';
    }

    if (CURRENT_FILTER === 'wm') {
      show(grid,  false);
      show(wmSec, true);
      show(wsSec, false);
      return;
    }
    if (CURRENT_FILTER === 'ws') {
      show(grid,  false);
      show(wmSec, false);
      show(wsSec, true);
      return;
    }
    show(grid,  true);
    show(wmSec, false);
    show(wsSec, false);
    grid.innerHTML = '';

    let lessons = ALL_LESSONS;
    if (CURRENT_FILTER === 'bookmarked') {
      lessons = lessons.filter(l => !!l.bookmarked);
    }

    if (!lessons.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      if (CURRENT_FILTER === 'bookmarked') {
        empty.innerHTML = `
          <h3>아직 찜한 레슨이 없어요</h3>
          <p>레슨 페이지의 <b>찜</b> 버튼을 누르면 여기에 모입니다.</p>
        `;
      } else {
        empty.innerHTML = `
          <h3>아직 레슨이 없어요</h3>
          <p>오른쪽 아래 <b>＋</b> 버튼을 눌러 첫 레슨을 가져와 보세요.<br>
             영어 텍스트와 (선택) 오디오 파일을 업로드하면 학습이 시작됩니다.</p>
          <div style="margin-top:14px"><a class="btn primary" href="import.html">＋ 새 레슨 가져오기</a></div>
        `;
      }
      grid.parentElement.appendChild(empty);
      return;
    }
    for (const l of lessons) grid.appendChild(makeCard(l));
  }

  function makeCard(l) {
    // Wrapper is a div so the kebab menu can sit OUTSIDE the link's click
    // target — stops kebab taps from also navigating to the lesson page.
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    const a = document.createElement('a');
    a.className = 'card';
    a.href = 'lesson.html?id=' + encodeURIComponent(l.id);
    const initials = (l.title || '?').trim().slice(0, 2).toUpperCase();
    // Word-count regex (\b…\b) only works for space-separated languages.
    // Japanese has no word boundaries between morphemes, so this returns
    // 0 for every JP lesson. Fall back to a character count (whitespace
    // stripped) and label it "N 글자" instead — character count is the
    // natural unit for JP learners anyway.
    const _lang = (window.DB && window.DB.getLang && window.DB.getLang()) || 'en';
    const lessonCount = (_lang === 'ja')
      ? ((l.body || '').replace(/\s+/g, '').length) + ' 글자'
      : (((l.body || '').match(/\b[\p{L}']+\b/gu) || []).length) + ' 단어';
    const hasThumb = !!l.thumbnail_url;
    const thumbStyle = hasThumb
      ? `style="background-image:url('${escapeAttr(l.thumbnail_url)}');background-size:cover;background-position:center;"`
      : '';
    // Badges (📄 텍스트 / 🎧 오디오) were removed per spec; the heart
    // button below now occupies the top-right of the thumb. The heart
    // is ALWAYS shown (filled when bookmarked, hollow otherwise) so the
    // user can toggle bookmark state directly from the gallery without
    // entering the lesson page.
    a.innerHTML = `
      <div class="thumb" ${thumbStyle}>
        ${hasThumb ? '' : `<span>${escapeHtml(initials)}</span>`}
      </div>
      <div class="body">
        <div class="title">${escapeHtml(l.title || '제목 없음')}</div>
        <div class="meta">
          <span>${lessonCount}</span>
          <span>·</span>
          <span>${formatDate(l.created_at)}</span>
        </div>
      </div>
    `;

    // Bookmark heart button — sits absolutely at the top-right of the
    // card thumb. Like the kebab below, it lives OUTSIDE the <a> so its
    // click doesn't navigate to the lesson page.
    const heart = document.createElement('button');
    heart.className = 'card-heart';
    heart.type = 'button';
    heart.setAttribute('aria-label', '찜하기');
    heart.setAttribute('aria-pressed', l.bookmarked ? 'true' : 'false');
    if (l.bookmarked) heart.classList.add('bookmarked');
    heart.innerHTML = '<span class="ch-ico" aria-hidden="true">' +
                      (l.bookmarked ? '♥' : '♡') + '</span>';
    heart.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const next = !l.bookmarked;
      l.bookmarked = next;
      heart.classList.toggle('bookmarked', next);
      heart.setAttribute('aria-pressed', next ? 'true' : 'false');
      const ico = heart.querySelector('.ch-ico');
      if (ico) ico.textContent = next ? '♥' : '♡';
      try { await DB.setBookmark(l.id, next); }
      catch (err) {
        // Roll back UI if the DB write failed.
        console.error('bookmark toggle failed', err);
        l.bookmarked = !next;
        heart.classList.toggle('bookmarked', !next);
        heart.setAttribute('aria-pressed', !next ? 'true' : 'false');
        if (ico) ico.textContent = !next ? '♥' : '♡';
      }
    });

    // Kebab (⋮) button at the bottom-right of the card. Clicks here open a
    // small popover with 수정 / 삭제. Stop propagation so the card's link
    // doesn't fire.
    const kebab = document.createElement('button');
    kebab.className = 'card-kebab';
    kebab.type = 'button';
    kebab.setAttribute('aria-label', '레슨 옵션');
    kebab.innerHTML = '<span aria-hidden="true">⋮</span>';
    kebab.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      openCardMenu(kebab, l);
    });

    wrap.appendChild(a);
    wrap.appendChild(heart);
    wrap.appendChild(kebab);
    return wrap;
  }

  // ---- card kebab menu ----
  // Single global menu element; we move it next to whichever kebab opened it.
  function openCardMenu(anchorEl, lesson) {
    closeCardMenu();   // close any previous one
    const menu = document.createElement('div');
    menu.className = 'card-menu';
    menu.innerHTML = `
      <button class="cm-item" data-act="prewarm"><span class="cm-icon">⚡</span> 캐시 준비</button>
      <button class="cm-item" data-act="rename"><span class="cm-icon">✏️</span> 수정</button>
      <button class="cm-item danger" data-act="delete"><span class="cm-icon">🗑</span> 삭제</button>
    `;
    document.body.appendChild(menu);

    // Position below the kebab, right-aligned.
    const r = anchorEl.getBoundingClientRect();
    menu.style.top  = (r.bottom + window.scrollY + 6) + 'px';
    menu.style.left = (r.right  + window.scrollX - menu.offsetWidth) + 'px';
    // After paint, snap right edge to align with kebab right edge.
    requestAnimationFrame(() => {
      menu.style.left = (r.right + window.scrollX - menu.getBoundingClientRect().width) + 'px';
    });

    menu.addEventListener('click', async (e) => {
      const btn = e.target.closest('.cm-item');
      if (!btn) return;
      e.stopPropagation();
      const act = btn.dataset.act;
      closeCardMenu();
      if (act === 'prewarm') {
        openPrewarmModal(lesson);
      } else if (act === 'rename') {
        // Navigate to the edit form (import.html in edit mode). The
        // page lets the user change title, body, replace or remove
        // thumbnail / audio, then 확인 to save or 취소 to bail.
        location.href = 'import.html?edit=' + encodeURIComponent(lesson.id);
      } else if (act === 'delete') {
        if (!window.confirm(`"${lesson.title || '이 레슨'}"을 삭제할까요?`)) return;
        await DB.deleteLesson(lesson.id);
        await renderHome();
      }
    });

    // Close on outside click / Esc / scroll.
    setTimeout(() => {  // defer so the click that opened us doesn't immediately close
      document.addEventListener('click',    closeCardMenu, { once: true });
      document.addEventListener('keydown',  onCardMenuKey);
      window.addEventListener('scroll',     closeCardMenu, { once: true, passive: true });
      window.addEventListener('resize',     closeCardMenu, { once: true });
    }, 0);
  }
  function closeCardMenu() {
    document.querySelectorAll('.card-menu').forEach(m => m.remove());
    document.removeEventListener('keydown', onCardMenuKey);
  }

  // ===== Lesson cache prewarm =====
  // Opens the lesson in a hidden iframe with `?prewarm=1`. The lesson
  // page itself handles the actual prefetch (chunks, word-info,
  // translations, JP kuromoji + furigana) since it has all the
  // language-specific knowledge already wired up. The iframe
  // postMessages progress + done back here. The cloud caches
  // (chunk_gpt_cache / word_info_gpt_cache / translate_*_cache /
  // furigana_gpt_cache) get populated once → every other device for
  // the same lesson hits the cache instantly.
  function openPrewarmModal(lesson) {
    const overlay = document.createElement('div');
    overlay.className = 'status-overlay prewarm-overlay';
    overlay.innerHTML = `
      <div class="status-card prewarm-card">
        <button class="sc-close" aria-label="닫기">×</button>
        <h3>⚡ 캐시 준비</h3>
        <p class="prewarm-title">${escapeHtml(lesson.title || '레슨')}</p>
        <p class="prewarm-desc">
          GPT 호출을 미리 진행해 클라우드 캐시를 채웁니다.<br>
          이후 학생들이 같은 레슨을 열 때 즉시 응답합니다.
        </p>
        <div class="prewarm-bar-wrap">
          <div class="prewarm-bar" id="prewarm-bar"></div>
        </div>
        <div class="prewarm-status" id="prewarm-status">시작 중…</div>
        <div class="prewarm-actions">
          <button class="btn" id="prewarm-stop" type="button">중단</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const barEl    = overlay.querySelector('#prewarm-bar');
    const statusEl = overlay.querySelector('#prewarm-status');
    const stopBtn  = overlay.querySelector('#prewarm-stop');
    let finished   = false;
    let lastBeat   = Date.now();
    // Hard timeout — even if the iframe never signals "done", close
    // after 5 minutes so the user isn't stuck staring at a frozen
    // progress bar. Most lessons finish in well under a minute.
    const HARD_TIMEOUT_MS = 5 * 60 * 1000;
    const start = Date.now();
    function setProgress(done, total, label) {
      if (finished) return;
      const pct = total ? Math.min(100, Math.round((done / total) * 100)) : 0;
      if (barEl) barEl.style.width = pct + '%';
      if (statusEl) statusEl.textContent = label
        ? `${label} — ${done} / ${total}`
        : `${done} / ${total}`;
    }
    function close(success) {
      finished = true;
      window.removeEventListener('message', onMessage);
      clearInterval(watchdog);
      try { iframe.remove(); } catch (_) {}
      try { overlay.remove(); } catch (_) {}
    }
    function onMessage(e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || d.kind !== 'eng:prewarm') return;
      lastBeat = Date.now();
      if (d.type === 'progress') {
        setProgress(d.done || 0, d.total || 0, d.label || '진행 중');
      } else if (d.type === 'done') {
        if (barEl)   barEl.style.width = '100%';
        if (statusEl) statusEl.textContent = `✅ 완료 — ${d.done || 0} / ${d.total || 0}`;
        if (stopBtn)  stopBtn.textContent = '닫기';
        try { iframe.remove(); } catch (_) {}
        clearInterval(watchdog);
        finished = true;
      }
    }
    window.addEventListener('message', onMessage);

    // Watchdog — if the iframe goes quiet for 90 s OR exceeds the
    // hard timeout, give up gracefully. Most lessons signal progress
    // every few seconds while running.
    const watchdog = setInterval(() => {
      if (finished) return;
      const sinceBeat = Date.now() - lastBeat;
      const sinceStart = Date.now() - start;
      if (sinceStart > HARD_TIMEOUT_MS) {
        if (statusEl) statusEl.textContent = '⏱ 시간 초과 — 일부만 캐시됨';
        if (stopBtn)  stopBtn.textContent = '닫기';
        try { iframe.remove(); } catch (_) {}
        clearInterval(watchdog);
        finished = true;
      } else if (sinceBeat > 90 * 1000) {
        if (statusEl) statusEl.textContent = '응답 없음 — 일부만 캐시됨';
        if (stopBtn)  stopBtn.textContent = '닫기';
        try { iframe.remove(); } catch (_) {}
        clearInterval(watchdog);
        finished = true;
      }
    }, 5000);

    stopBtn.addEventListener('click', () => close(false));
    overlay.querySelector('.sc-close').addEventListener('click', () => close(false));

    // Hidden iframe runs the lesson page with ?prewarm=1.
    const iframe = document.createElement('iframe');
    iframe.style.cssText =
      'position:absolute;left:-99999px;top:0;width:1024px;height:768px;' +
      'border:0;visibility:hidden;';
    iframe.src = 'lesson.html?id=' + encodeURIComponent(lesson.id) + '&prewarm=1';
    document.body.appendChild(iframe);
  }
  function onCardMenuKey(e) {
    if (e.key === 'Escape') closeCardMenu();
  }
  function escapeAttr(s){ return (s||'').replace(/"/g, '&quot;'); }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }
  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' });
  }

  document.getElementById('import-btn').addEventListener('click', () => {
    location.href = 'import.html';
  });
})();
</script>

</body>
