<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>English · 영어 학습</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="signed-out">

<div class="behind">
  <header class="topbar">
    <a class="brand" href="index.html">또박또박</a>
    <div class="spacer"></div>
    <a class="bidoro-tab" href="../index.html" title="비도로 사이트로 돌아가기">
      <span class="text">Bidoro</span><span class="ico" aria-hidden="true">ƒ</span>
    </a>
    <div class="acct" id="acct-chip">
      <span class="avatar" id="acct-avatar">·</span>
      <span id="acct-name">게스트</span>
    </div>
    <button class="btn ghost" id="signout-btn" title="로그아웃" style="display:none">로그아웃</button>
  </header>

  <main class="container">

    <section class="section section-tight">
      <h2>계속 학습하기</h2>
      <div class="tabrow" id="lesson-tabs">
        <a href="#" class="active" data-filter="all">모든 레슨</a>
        <a href="#" data-filter="bookmarked">찜한 레슨</a>
      </div>
      <div id="lessons-grid" class="cards"></div>
    </section>

  </main>

  <button class="fab" id="import-btn" title="새 레슨 가져오기" aria-label="가져오기">＋</button>
</div>

<!-- Supabase + app modules -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/tts.js"></script>
<script src="js/translate.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  // Show auth gate. After authed (or "체험하기"), render home.
  Auth.gate(async () => {
    await renderHeader();
    await renderHome();
  });

  // ---- header ----
  async function renderHeader() {
    const chip = document.getElementById('acct-chip');
    const avatar = document.getElementById('acct-avatar');
    const name = document.getElementById('acct-name');
    const so = document.getElementById('signout-btn');

    if (DB.isTryMode()) {
      name.textContent = '체험 모드';
      avatar.textContent = '체';
      so.style.display = '';
      so.textContent = '나가기';
    } else {
      const u = await DB.currentUser();
      const label = (u && (u.email || '').split('@')[0]) || '사용자';
      name.textContent = label;
      avatar.textContent = (label[0] || 'U').toUpperCase();
      so.style.display = '';
      so.textContent = '로그아웃';
    }
    so.onclick = () => Auth.signOutAndReload();
  }

  // ---- home content ----
  let ALL_LESSONS = [];
  let CURRENT_FILTER = 'all';   // 'all' | 'bookmarked'

  async function renderHome() {
    const grid = document.getElementById('lessons-grid');
    // Drop any "empty" element left from a previous render so it doesn't stack.
    grid.parentElement.querySelectorAll('.empty').forEach(el => el.remove());
    grid.innerHTML = '<div class="muted">불러오는 중...</div>';
    ALL_LESSONS = await DB.listLessons();
    setupTabs();
    paintGrid();
  }

  function setupTabs() {
    const tabs = document.querySelectorAll('#lesson-tabs a');
    tabs.forEach(t => {
      // Re-binding on each home render is fine since the elements are stable.
      t.onclick = (e) => {
        e.preventDefault();
        tabs.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        CURRENT_FILTER = t.dataset.filter || 'all';
        paintGrid();
      };
    });
  }

  function paintGrid() {
    const grid = document.getElementById('lessons-grid');
    grid.parentElement.querySelectorAll('.empty').forEach(el => el.remove());
    grid.innerHTML = '';

    let lessons = ALL_LESSONS;
    if (CURRENT_FILTER === 'bookmarked') {
      lessons = lessons.filter(l => !!l.bookmarked);
    }

    if (!lessons.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      if (CURRENT_FILTER === 'bookmarked') {
        empty.innerHTML = `
          <h3>아직 찜한 레슨이 없어요</h3>
          <p>레슨 페이지의 <b>찜</b> 버튼을 누르면 여기에 모입니다.</p>
        `;
      } else {
        empty.innerHTML = `
          <h3>아직 레슨이 없어요</h3>
          <p>오른쪽 아래 <b>＋</b> 버튼을 눌러 첫 레슨을 가져와 보세요.<br>
             영어 텍스트와 (선택) 오디오 파일을 업로드하면 학습이 시작됩니다.</p>
          <div style="margin-top:14px"><a class="btn primary" href="import.html">＋ 새 레슨 가져오기</a></div>
        `;
      }
      grid.parentElement.appendChild(empty);
      return;
    }
    for (const l of lessons) grid.appendChild(makeCard(l));
  }

  function makeCard(l) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = 'lesson.html?id=' + encodeURIComponent(l.id);
    const initials = (l.title || '?').trim().slice(0, 2).toUpperCase();
    const wordCount = ((l.body || '').match(/\b[\p{L}']+\b/gu) || []).length;
    const hasThumb = !!l.thumbnail_url;
    const thumbStyle = hasThumb
      ? `style="background-image:url('${escapeAttr(l.thumbnail_url)}');background-size:cover;background-position:center;"`
      : '';
    a.innerHTML = `
      <div class="thumb" ${thumbStyle}>
        <span class="badge">${l.audio_url ? '🎧 오디오' : '📄 텍스트'}</span>
        ${hasThumb ? '' : `<span>${escapeHtml(initials)}</span>`}
        ${l.bookmarked ? '<span class="bm-flag" title="찜한 레슨">♥</span>' : ''}
      </div>
      <div class="body">
        <div class="title">${escapeHtml(l.title || '제목 없음')}</div>
        <div class="meta">
          <span>${wordCount} 단어</span>
          <span>·</span>
          <span>${formatDate(l.created_at)}</span>
        </div>
      </div>
    `;
    return a;
  }
  function escapeAttr(s){ return (s||'').replace(/"/g, '&quot;'); }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }
  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' });
  }

  document.getElementById('import-btn').addEventListener('click', () => {
    location.href = 'import.html';
  });
})();
</script>

</body>
</html>
