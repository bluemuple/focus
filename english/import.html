<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>가져오기 · 또박또박</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="behind">
  <header class="topbar">
    <a class="btn ghost" href="index.html" aria-label="뒤로">‹ 뒤로</a>
    <a class="brand" href="index.html">또박또박</a>
    <div class="spacer"></div>
    <a class="bidoro-tab" href="../index.html" title="비도로 사이트로 돌아가기">
      <span class="text">Bidoro</span><span class="ico" aria-hidden="true">ƒ</span>
    </a>
    <div class="acct" id="acct-chip">
      <span class="avatar" id="acct-avatar">·</span>
      <span id="acct-name">게스트</span>
    </div>
  </header>

  <main class="container">
    <h1 id="page-title" style="margin:6px 0 16px">새 레슨 가져오기</h1>

    <form class="import-form" id="import-form">
      <div class="field">
        <label for="f-title">제목</label>
        <input id="f-title" name="title" type="text" placeholder="레슨 제목을 입력하세요" maxlength="120" required>
      </div>

      <div class="field">
        <label for="f-body">텍스트</label>
        <textarea id="f-body" name="body" placeholder="여기에 영어 텍스트를 붙여 넣으세요." required></textarea>
      </div>

      <div class="field">
        <label>썸네일 이미지 (선택)</label>
        <div class="audio-zone thumb-zone" id="f-thumb-zone">
          <div class="thumb-placeholder" id="f-thumb-placeholder">
            <div class="icon">🖼️</div>
            <div id="thumb-zone-text">클릭하거나 이미지를 끌어다 놓아 썸네일 추가</div>
            <div class="muted" style="font-size:12px;margin-top:4px">레슨 카드에 표시됩니다.</div>
          </div>
          <img id="f-thumb-preview" alt="썸네일 미리보기" style="display:none">
          <input id="f-thumb" type="file" accept="image/*" style="display:none">
        </div>
        <!-- Paste-zone — three input paths:
             • PC: click to focus, then ⌘/Ctrl+V (image bytes or URL).
             • Mobile: tap. Async Clipboard API reads the image, OR
               detects a text URL and fetches it (handles iOS Safari
               "Copy image from web" producing a URL only). -->
        <div class="thumb-paste-zone" id="f-thumb-paste" tabindex="0"
             aria-label="클립보드 이미지 붙여넣기">
          <span class="tp-icon" aria-hidden="true">📋</span>
          <span class="tp-text">
            <strong>탭</strong>(모바일) · 클릭 후 <kbd>⌘V</kbd>/<kbd>Ctrl+V</kbd>(PC) — 이미지 또는 이미지 URL 붙여넣기
          </span>
        </div>
        <button type="button" id="f-thumb-clear" class="btn ghost"
                style="display:none;margin-top:8px;font-size:13px">🗑 썸네일 삭제</button>
      </div>

      <div class="field">
        <label>오디오 파일 (선택)</label>
        <div class="audio-zone" id="f-zone">
          <div class="icon">🎧</div>
          <div id="zone-text">클릭하거나 파일을 끌어다 놓아 오디오(MP3 등)를 추가</div>
          <div class="muted" style="font-size:12px;margin-top:4px">텍스트 듣기에 사용됩니다. 비워두면 영국식 여성 음성(TTS)으로 자동 생성됩니다.</div>
          <input id="f-audio" type="file" accept="audio/*" style="display:none">
        </div>
        <button type="button" id="f-audio-clear" class="btn ghost"
                style="display:none;margin-top:8px;font-size:13px">🗑 오디오 삭제</button>
      </div>

      <div class="err" id="form-err" style="color:#b03a3a;font-size:13px;min-height:18px"></div>

      <div class="actions">
        <a class="btn ghost" href="index.html">취소</a>
        <button class="btn primary lg" type="submit" id="save-btn">가져오기</button>
      </div>
    </form>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/tts.js"></script>
<script src="js/translate.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  Auth.gate(async () => {
    await renderHeader();
    bindForm();
  });

  async function renderHeader() {
    const avatar = document.getElementById('acct-avatar');
    const name = document.getElementById('acct-name');
    if (DB.isTryMode()) { name.textContent = '체험 모드'; avatar.textContent = '체'; return; }
    const u = await DB.currentUser();
    const label = (u && (u.email || '').split('@')[0]) || '사용자';
    name.textContent = label;
    avatar.textContent = (label[0] || 'U').toUpperCase();
  }

  async function bindForm() {
    const form = document.getElementById('import-form');
    const zone = document.getElementById('f-zone');
    const fileInput = document.getElementById('f-audio');
    const zoneText = document.getElementById('zone-text');
    const errBox = document.getElementById('form-err');
    const saveBtn = document.getElementById('save-btn');

    // Thumbnail zone
    const thumbZone   = document.getElementById('f-thumb-zone');
    const thumbInput  = document.getElementById('f-thumb');
    const thumbPh     = document.getElementById('f-thumb-placeholder');
    const thumbPrev   = document.getElementById('f-thumb-preview');

    let chosenFile  = null;     // audio
    let chosenThumb = null;     // image

    // Edit-mode detection: ?edit=<lessonId> rewires the form to load
    // the existing lesson and submit via DB.updateLesson instead of
    // DB.addLesson. The home page's kebab "수정" entry navigates here.
    const params = new URLSearchParams(location.search);
    const editId = params.get('edit');
    let isEditMode = false;
    let clearAudioFlag = false;
    let clearThumbnailFlag = false;
    let editLesson = null;
    if (editId) {
      try {
        editLesson = await DB.getLesson(editId);
      } catch (err) { console.error('getLesson', err); }
      if (editLesson) {
        isEditMode = true;
        document.getElementById('page-title').textContent = '레슨 수정';
        document.getElementById('f-title').value = editLesson.title || '';
        document.getElementById('f-body').value  = editLesson.body  || '';
        saveBtn.textContent = '확인';
        // Pre-populate the thumbnail preview if one exists.
        if (editLesson.thumbnail_url) {
          thumbPrev.src = editLesson.thumbnail_url;
          thumbPrev.style.display = '';
          thumbPh.style.display = 'none';
          thumbZone.classList.add('has-file');
          document.getElementById('f-thumb-clear').style.display = '';
        }
        // Pre-populate the audio zone text if a recording exists.
        if (editLesson.audio_url) {
          zone.classList.add('has-file');
          zoneText.innerHTML = '✓ 기존 오디오 사용 중 <span class="muted" style="font-weight:400">· 새 파일을 올리거나 삭제할 수 있어요</span>';
          document.getElementById('f-audio-clear').style.display = '';
        }
      }
    }
    // Wire the delete buttons (always present in DOM; visibility is
    // controlled above for edit mode and below when a NEW file is set).
    const thumbClearBtn = document.getElementById('f-thumb-clear');
    const audioClearBtn = document.getElementById('f-audio-clear');
    if (thumbClearBtn) thumbClearBtn.addEventListener('click', () => {
      chosenThumb = null;
      clearThumbnailFlag = true;
      thumbPrev.style.display = 'none';
      thumbPh.style.display = '';
      thumbZone.classList.remove('has-file');
      thumbClearBtn.style.display = 'none';
      thumbInput.value = '';
    });
    if (audioClearBtn) audioClearBtn.addEventListener('click', () => {
      chosenFile = null;
      clearAudioFlag = true;
      zone.classList.remove('has-file');
      zoneText.innerHTML = '클릭하거나 파일을 끌어다 놓아 오디오(MP3 등)를 추가';
      audioClearBtn.style.display = 'none';
      fileInput.value = '';
    });

    // ---- audio zone ----
    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.style.borderColor = '';
      if (e.dataTransfer.files && e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files && fileInput.files[0]) setFile(fileInput.files[0]);
    });
    function setFile(f) {
      if (!/^audio\//.test(f.type)) { errBox.textContent = '오디오 파일만 업로드 가능합니다.'; return; }
      chosenFile = f;
      clearAudioFlag = false;
      zone.classList.add('has-file');
      zoneText.innerHTML = '✓ ' + escapeHtml(f.name) + ' <span class="muted" style="font-weight:400">· 다른 파일로 변경하려면 클릭</span>';
      errBox.textContent = '';
      const btn = document.getElementById('f-audio-clear');
      if (btn) btn.style.display = '';
    }

    // ---- thumbnail zone ----
    thumbZone.addEventListener('click', () => thumbInput.click());
    thumbZone.addEventListener('dragover', (e) => { e.preventDefault(); thumbZone.style.borderColor = 'var(--accent)'; });
    thumbZone.addEventListener('dragleave', () => { thumbZone.style.borderColor = ''; });
    thumbZone.addEventListener('drop', (e) => {
      e.preventDefault();
      thumbZone.style.borderColor = '';
      if (e.dataTransfer.files && e.dataTransfer.files[0]) setThumb(e.dataTransfer.files[0]);
    });
    thumbInput.addEventListener('change', () => {
      if (thumbInput.files && thumbInput.files[0]) setThumb(thumbInput.files[0]);
    });
    function setThumb(f) {
      if (!/^image\//.test(f.type)) { errBox.textContent = '이미지 파일만 업로드 가능합니다.'; return; }
      chosenThumb = f;
      clearThumbnailFlag = false;
      const reader = new FileReader();
      reader.onload = () => {
        thumbPrev.src = reader.result;
        thumbPrev.style.display = '';
        thumbPh.style.display = 'none';
        thumbZone.classList.add('has-file');
      };
      reader.readAsDataURL(f);
      errBox.textContent = '';
      const btn = document.getElementById('f-thumb-clear');
      if (btn) btn.style.display = '';
    }

    // ---- thumbnail PASTE zone ----
    // Three input paths into the same `setThumb()` pipeline:
    //   1. PC ⌘V/Ctrl+V with image bytes in clipboardData (paste event).
    //   2. PC ⌘V/Ctrl+V with a text URL → fetched as an image.
    //   3. MOBILE TAP → Async Clipboard API. Reads image bytes if
    //      present; if the clipboard only has a URL (typical on iOS
    //      "Copy image" from a webpage — examples: media.cnn.com /
    //      vid.alarabiya.net image URLs) the URL is fetched and the
    //      response blob becomes the thumbnail.
    // CORS-friendly hosts (Supabase Storage, S3, jsdelivr, GitHub
    // raw, most major CDNs) fetch directly. Hosts that block fetch
    // but allow image loading are picked up by an `<img
    // crossOrigin="anonymous">` + canvas re-encode fallback.
    const pasteZone = document.getElementById('f-thumb-paste');
    function _flashPasted() {
      if (!pasteZone) return;
      pasteZone.classList.add('pasted');
      setTimeout(() => pasteZone.classList.remove('pasted'), 800);
    }
    function _setThumbFromBlob(blob) {
      if (!blob) return false;
      const ext = (blob.type.split('/')[1] || 'png').split('+')[0];
      const named = new File(
        [blob],
        'pasted-' + Date.now() + '.' + ext,
        { type: blob.type || 'image/png' }
      );
      setThumb(named);
      _flashPasted();
      return true;
    }
    // Single-URL → image. Direct cross-origin fetch first; falls
    // back to <img>+canvas for hosts that allow img tag loading but
    // block fetch (some CDNs do this).
    async function _fetchUrlAsImage(url) {
      // Path A — direct cross-origin fetch.
      try {
        const r = await fetch(url, { mode: 'cors' });
        if (r.ok) {
          const blob = await r.blob();
          if (blob && /^image\//i.test(blob.type || '')) {
            return _setThumbFromBlob(blob);
          }
        }
      } catch (e) {
        console.warn('[paste] direct fetch failed', e && e.message);
      }
      // Path B — <img crossOrigin="anonymous"> + canvas re-encode.
      try {
        const img = await new Promise((resolve, reject) => {
          const im = new Image();
          im.crossOrigin = 'anonymous';
          im.onload  = () => resolve(im);
          im.onerror = (er) => reject(er);
          im.src = url;
        });
        if (!img.naturalWidth || !img.naturalHeight) return false;
        const canvas = document.createElement('canvas');
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
        const blob = await new Promise((resolve) => {
          canvas.toBlob((b) => resolve(b), 'image/jpeg', 0.9);
        });
        if (blob) return _setThumbFromBlob(blob);
      } catch (e) {
        console.warn('[paste] img+canvas fallback failed', e && e.message);
      }
      return false;
    }
    // Top-level handler. Builds a list of URL candidates from the
    // pasted text and tries each until one returns an image:
    //   1. The whole text if it's a single clean URL.
    //   2. Any image-extension URL (.jpg/.jpeg/.png/.gif/.webp/.bmp/
    //      .avif/.svg) found ANYWHERE inside the text — handles
    //      cases where iOS pastes more than the bare URL (HTML
    //      fragments, surrounding text, etc.) and where a wrapper
    //      URL embeds the actual image URL as a query parameter.
    async function _tryPasteUrlAsImage(text) {
      const raw = (text || '').trim();
      if (!raw) return false;
      const candidates = [];
      const seen = new Set();
      function _push(u) {
        if (!u || seen.has(u)) return;
        seen.add(u);
        candidates.push(u);
      }
      // 1. Whole text as a URL.
      if (/^https?:\/\//i.test(raw)) _push(raw);
      // 2. Image-extension URLs anywhere in the text.
      const IMG_URL_RE =
        /https?:\/\/[^\s'"<>]+?\.(?:jpe?g|png|gif|webp|bmp|svg|avif)(?:\?[^\s'"<>]*)?/gi;
      let m;
      while ((m = IMG_URL_RE.exec(raw)) !== null) _push(m[0]);
      // Try each candidate; first success wins.
      for (const url of candidates) {
        if (await _fetchUrlAsImage(url)) return true;
      }
      return false;
    }
    // Async Clipboard API — used by the mobile tap path. Reads image
    // bytes first, then falls back to text/plain (which iOS's "Copy
    // image" often produces in place of bytes).
    async function tryAsyncPaste() {
      if (!navigator.clipboard) return false;
      if (navigator.clipboard.read) {
        try {
          const items = await navigator.clipboard.read();
          // 1) Image bytes.
          for (const item of items) {
            for (const type of item.types || []) {
              if (typeof type === 'string' && type.startsWith('image/')) {
                const blob = await item.getType(type);
                if (_setThumbFromBlob(blob)) return true;
              }
            }
          }
          // 2) text/plain URL among the items.
          for (const item of items) {
            if ((item.types || []).indexOf('text/plain') >= 0) {
              try {
                const tblob = await item.getType('text/plain');
                const text  = await tblob.text();
                if (await _tryPasteUrlAsImage(text)) return true;
              } catch (e) {}
            }
          }
        } catch (e) {
          console.warn('[paste] clipboard.read failed', e && e.message);
        }
      }
      // 3) Last resort — readText() for older iOS versions.
      if (navigator.clipboard.readText) {
        try {
          const text = await navigator.clipboard.readText();
          if (await _tryPasteUrlAsImage(text)) return true;
        } catch (e) {}
      }
      return false;
    }
    if (pasteZone) {
      pasteZone.addEventListener('click', async () => {
        const pasted = await tryAsyncPaste();
        if (!pasted) {
          // Desktop fallback: focus so the next ⌘V/Ctrl+V is captured
          // by the `paste` listener below.
          pasteZone.focus();
          if (navigator.clipboard) {
            errBox.textContent = '클립보드에 이미지나 이미지 URL이 없습니다.';
          }
        }
      });
      pasteZone.addEventListener('paste', async (e) => {
        const items = (e.clipboardData && e.clipboardData.items) || [];
        // 1) Image bytes directly in clipboardData.
        for (const item of items) {
          if (item && item.type && item.type.startsWith('image/')) {
            const blob = item.getAsFile();
            if (_setThumbFromBlob(blob)) {
              e.preventDefault();
              return;
            }
          }
        }
        // 2) text/plain URL — fetch and convert.
        for (const item of items) {
          if (item && item.kind === 'string' && item.type === 'text/plain') {
            e.preventDefault();
            const text = await new Promise((resolve) => item.getAsString(resolve));
            if (await _tryPasteUrlAsImage(text)) return;
            errBox.textContent = '클립보드 URL을 이미지로 가져오지 못했습니다 (서버 CORS 제한일 수 있습니다).';
            return;
          }
        }
        errBox.textContent = '클립보드에 이미지가 없습니다.';
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.textContent = '';
      const title = document.getElementById('f-title').value.trim();
      const body  = document.getElementById('f-body').value.trim();
      if (!title || !body) { errBox.textContent = '제목과 텍스트를 모두 입력해 주세요.'; return; }
      saveBtn.disabled = true;
      saveBtn.textContent = isEditMode ? '저장 중...' : '저장 중...';
      try {
        // Shrink the thumbnail before uploading. Cards display ~220–280 px
        // wide so 1024×640 @ JPEG q0.85 is plenty and saves storage / bandwidth.
        let thumbToUpload = chosenThumb;
        if (thumbToUpload) {
          try { thumbToUpload = await resizeImage(thumbToUpload, 1024, 640, 0.85); }
          catch (err) { console.warn('thumb resize failed, uploading original', err); }
        }
        if (isEditMode) {
          // Edit existing lesson — patch with whatever changed.
          const ok = await DB.updateLesson(editId, {
            title, body,
            audioFile: chosenFile || null,
            thumbFile: thumbToUpload || null,
            clearAudio:     clearAudioFlag && !chosenFile,
            clearThumbnail: clearThumbnailFlag && !chosenThumb,
          });
          if (!ok) throw new Error('업데이트 실패');
          location.href = 'index.html';
        } else {
          const row = await DB.addLesson({
            title, body,
            audioFile: chosenFile,
            thumbFile: thumbToUpload,
          });
          location.href = 'lesson.html?id=' + encodeURIComponent(row.id);
        }
      } catch (err) {
        console.error(err);
        errBox.textContent = (isEditMode ? '수정' : '저장') + '에 실패했습니다: ' + ((err && err.message) || err);
        saveBtn.disabled = false;
        saveBtn.textContent = isEditMode ? '확인' : '가져오기';
      }
    });
  }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

  // Client-side image downscale. Reads the file into an Image, draws onto a
  // canvas at the target size (preserving aspect), and returns a new
  // JPEG-encoded File. If the image is already small enough or the input
  // isn't a regular image, returns the original file unchanged.
  async function resizeImage(file, maxW, maxH, quality) {
    if (!file || !/^image\//.test(file.type)) return file;
    // GIFs lose animation when redrawn — leave them alone.
    if (/^image\/gif$/i.test(file.type)) return file;

    const url = URL.createObjectURL(file);
    let img;
    try {
      img = await new Promise((resolve, reject) => {
        const i = new Image();
        i.onload  = () => resolve(i);
        i.onerror = (e) => reject(e);
        i.src = url;
      });
    } finally { URL.revokeObjectURL(url); }

    const w = img.naturalWidth, h = img.naturalHeight;
    if (!w || !h) return file;

    // Already within bounds → keep original to avoid quality loss from
    // re-encoding small PNGs as JPEG.
    if (w <= maxW && h <= maxH && file.size <= 250 * 1024) return file;

    const ratio   = Math.min(maxW / w, maxH / h, 1);
    const targetW = Math.max(1, Math.round(w * ratio));
    const targetH = Math.max(1, Math.round(h * ratio));

    const canvas = document.createElement('canvas');
    canvas.width  = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    // White background so transparent PNGs don't become black after JPEG.
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, targetW, targetH);
    ctx.drawImage(img, 0, 0, targetW, targetH);

    const blob = await new Promise(resolve =>
      canvas.toBlob(b => resolve(b), 'image/jpeg', quality)
    );
    if (!blob) return file;
    // Don't bother if the "shrunk" version somehow ended up larger.
    if (blob.size >= file.size) return file;

    const baseName = (file.name || 'thumbnail').replace(/\.[^.]+$/, '');
    return new File([blob], baseName + '.jpg', { type: 'image/jpeg' });
  }
})();
</script>

</body>
</html>
