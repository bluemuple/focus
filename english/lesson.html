  // ===== Word practice (Anki-style cards with simple SR) =====
  async function startWordPractice() {
    const stage = document.getElementById('practice-stage');
    const queue = DB.dueWordsForPractice(20);
    if (!queue.length) {
      stage.innerHTML = practiceFrame(`
        <div class="empty-msg">
          <h3>외울 단어가 없어요</h3>
          <p>레슨에서 단어를 클릭하고 ♡ 버튼을 눌러 카드에 추가해보세요.</p>
          <button class="btn primary" data-back>← 메뉴로</button>
        </div>
      `);
      stage.querySelector('[data-back]').onclick = renderPracticeMenu;
      return;
    }
    // Pre-translate all words in parallel (uses cache if available).
    const translations = {};
    await Promise.all(queue.map(async w => {
      try { translations[w] = await Translate.translate(w); } catch (e) { translations[w] = ''; }
    }));

    let idx = 0;
    let flipped = false;
    const session = { right: 0, again: 0 };

    function paint() {
      const word = queue[idx];
      const ko = translations[word] || '';
      stage.innerHTML = practiceFrame(`
        <div class="wp-progress"><div class="wp-progress-bar" style="width:${(idx/queue.length)*100}%"></div></div>
        <div class="wp-meta">${idx + 1} / ${queue.length}</div>
        <div class="flip-card ${flipped ? 'flipped' : ''}" id="flip-card">
          <div class="fc-inner">
            <div class="fc-front">
              <button class="fc-speak" aria-label="발음" data-speak>🔊</button>
              <div class="fc-en">${escapeHtml(word)}</div>
              <div class="fc-hint">탭하면 뜻 보기</div>
            </div>
            <div class="fc-back">
              <div class="fc-ko">${escapeHtml(ko || '(번역 없음)')}</div>
              <div class="fc-en-small">${escapeHtml(word)}</div>
            </div>
          </div>
        </div>
        <div class="wp-rating">
          <button class="wp-rate r0" data-rate="0">다시<span>1분 후</span></button>
          <button class="wp-rate r1" data-rate="1">알겠음<span>1일 후</span></button>
          <button class="wp-rate r2" data-rate="2">쉬움<span>3일+</span></button>
        </div>
      `);
      const card = stage.querySelector('#flip-card');
      card.onclick = (e) => {
        if (e.target.closest('[data-speak]')) return;
        flipped = !flipped;
        card.classList.toggle('flipped', flipped);
      };
      stage.querySelector('[data-speak]').onclick = (e) => { e.stopPropagation(); TTS.speak(word); };
      stage.querySelectorAll('[data-rate]').forEach(b => {
        b.onclick = () => {
          const r = Number(b.dataset.rate);
          DB.rateReview(word, r);
          if (r === 0) session.again++; else session.right++;
          idx++;
          flipped = false;
          if (idx >= queue.length) finish();
          else paint();
        };
      });
      // Auto-speak on each new card so listening practice is a freebie.
      TTS.speak(word);
    }
    function finish() {
      stage.innerHTML = practiceFrame(`
        <div class="empty-msg">
          <h3>🎉 완료!</h3>
          <p>맞힘 ${session.right}개 · 다시 볼 단어 ${session.again}개</p>
          <div class="row" style="gap:10px;justify-content:center;margin-top:14px">
            <button class="btn" data-back>← 메뉴로</button>
            <button class="btn primary" data-again>다시 한 번</button>
          </div>
        </div>
      `);
      stage.querySelector('[data-back]').onclick  = renderPracticeMenu;
      stage.querySelector('[data-again]').onclick = startWordPractice;
    }
    paint();
  }

  // ===== Sentence practice (tap-to-reorder) =====
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function startSentencePractice() {
    const stage = document.getElementById('practice-stage');
    const phrases = DB.listPhrases().filter(p => /\s/.test(p.phrase || ''));
    if (!phrases.length) {
      stage.innerHTML = practiceFrame(`
        <div class="empty-msg">
          <h3>등록된 구문이 없어요</h3>
          <p>"이어서" 모드에서 여러 단어를 선택한 뒤 "+ 구문에 추가" 버튼을 눌러보세요.</p>
          <button class="btn primary" data-back>← 메뉴로</button>
        </div>
      `);
      stage.querySelector('[data-back]').onclick = renderPracticeMenu;
      return;
    }

    const list = shuffle(phrases);
    let idx = 0;
    let answer = [];        // selected token indices in order
    let revealed = false;

    function tokenize(s) { return (s || '').match(/[\p{L}][\p{L}\p{M}'’-]*/gu) || []; }

    function paint() {
      const p = list[idx];
      const tokens = tokenize(p.phrase);
      const shuffled = shuffle(tokens.map((t, i) => ({ t, i })));
      // (Re-shuffle every time paint() is called for the same idx is OK
      // because we paint() once at start; subsequent paints re-render answer
      // and remaining via inner functions below.)
      const answerSet = new Set(answer);
      const correctSoFar = answer.every((origIdx, k) => origIdx === k);

      stage.innerHTML = practiceFrame(`
        <div class="wp-meta">${idx + 1} / ${list.length} · 한글 뜻</div>
        <div class="sp-ko">${escapeHtml(p.ko || '(번역 없음)')}</div>
        <div class="sp-answer" id="sp-answer"></div>
        <div class="sp-pool" id="sp-pool"></div>
        <div class="row" style="gap:10px;justify-content:center;margin-top:16px">
          <button class="btn" data-clear>지우기</button>
          <button class="btn primary" data-check ${answer.length !== tokens.length ? 'disabled' : ''}>확인</button>
        </div>
        <div class="sp-feedback" id="sp-feedback"></div>
      `);

      const ansEl  = stage.querySelector('#sp-answer');
      const poolEl = stage.querySelector('#sp-pool');

      // Answer line: tokens placed so far. Tap one to remove it.
      answer.forEach((origIdx, slotIdx) => {
        const b = document.createElement('button');
        b.className = 'sp-tile placed';
        b.textContent = tokens[origIdx];
        b.onclick = () => { answer.splice(slotIdx, 1); paint(); };
        ansEl.appendChild(b);
      });

      // Pool: remaining shuffled tokens. Tap one to append to answer.
      shuffled.forEach(({ t, i }) => {
        if (answerSet.has(i)) return;
        const b = document.createElement('button');
        b.className = 'sp-tile';
        b.textContent = t;
        b.onclick = () => { answer.push(i); paint(); };
        poolEl.appendChild(b);
      });

      stage.querySelector('[data-clear]').onclick = () => { answer = []; revealed = false; paint(); };
      stage.querySelector('[data-check]').onclick = () => {
        if (answer.length !== tokens.length) return;
        const correct = answer.every((origIdx, k) => origIdx === k);
        const fb = stage.querySelector('#sp-feedback');
        if (correct) {
          fb.innerHTML = '<div class="sp-ok">✓ 정답!</div>' +
                         '<button class="btn primary" data-next>다음 →</button>';
          fb.querySelector('[data-next]').onclick = () => {
            idx++; answer = []; revealed = false;
            if (idx >= list.length) finish();
            else paint();
          };
        } else {
          fb.innerHTML = '<div class="sp-bad">정답: <b>' + escapeHtml(tokens.join(' ')) + '</b></div>' +
                         '<button class="btn" data-retry>다시 시도</button>' +
                         '<button class="btn primary" data-skip>건너뛰기</button>';
          fb.querySelector('[data-retry]').onclick = () => { answer = []; paint(); };
          fb.querySelector('[data-skip]').onclick  = () => {
            idx++; answer = []; revealed = false;
            if (idx >= list.length) finish();
            else paint();
          };
        }
      };

      // Read the phrase aloud as a hint.
      TTS.speak(p.phrase);
    }
    function finish() {
      stage.innerHTML = practiceFrame(`
        <div class="empty-msg">
          <h3>🎉 모든 구문 완료</h3>
          <div class="row" style="gap:10px;justify-content:center;margin-top:14px">
            <button class="btn" data-back>← 메뉴로</button>
            <button class="btn primary" data-again>다시 한 번</button>
          </div>
        </div>
      `);
      stage.querySelector('[data-back]').onclick  = renderPracticeMenu;
      stage.querySelector('[data-again]').onclick = startSentencePractice;
    }
    paint();
  }

  // ===== Quiz (12 questions, 4-option multi-choice) =====
  // Layout follows the reference quiz1–quiz4 mocks:
  //   header  : ✕ (close)  ─── progress ───  ⚙ (settings)
  //   prompt  : audio = big ▶ + 🐢 (slow)   /   text = audio icon + word
  //   options : 4 white cards with subtle outline + generous padding
  //   bottom  : "I don't know" link
  //   feedback: dialog card with Correct/Incorrect, context sentence,
  //             level-picker bar (🗑 1 2 3 4 ✓), "Continue" full-width button.
  async function startQuiz() {
    const stage = document.getElementById('practice-stage');
    stage.innerHTML = quizFrame(0, 12, `<div class="qz-loading">퀴즈 준비 중…</div>`);

    const pool = [...DB.getHearted()];
    if (pool.length < 8) {
      for (const [w, v] of Object.entries(WORD_STATES || {})) {
        if (v && v.state >= 1 && !pool.includes(w)) pool.push(w);
        if (pool.length >= 16) break;
      }
    }
    if (pool.length < 4) {
      stage.innerHTML = practiceFrame(`
        <div class="empty-msg">
          <h3>단어가 너무 적어요</h3>
          <p>퀴즈를 시작하려면 최소 4개 단어가 필요합니다. 레슨에서 단어를 더 클릭하거나 ♡로 추가해보세요.</p>
          <button class="btn primary" data-back>← 메뉴로</button>
        </div>
      `);
      stage.querySelector('[data-back]').onclick = renderPracticeMenu;
      return;
    }

    const tx = {};
    await Promise.all(pool.map(async w => {
      try { tx[w] = await Translate.translate(w); } catch (e) { tx[w] = ''; }
    }));

    // Look up an example sentence from the user's lessons that contains
    // the target word — used as context in the feedback card.
    const lessons = await DB.listLessons().catch(() => []);
    function findContext(word) {
      const re = new RegExp('([^.!?]*\\b' + escapeRegex(word) + '\\b[^.!?]*[.!?])', 'i');
      for (const l of (lessons || [])) {
        const m = (l.body || '').match(re);
        if (m && m[1]) return m[1].trim();
      }
      return '';
    }

    const targets = shuffle(pool).slice(0, 12);
    const questions = targets.map((target, i) => {
      const kind = i < 4 ? 'audio' : (i < 8 ? 'ko-to-en' : 'en-to-ko');
      const distractors = shuffle(pool.filter(w => w !== target)).slice(0, 3);
      const optsRaw = shuffle([target, ...distractors]);
      const correctIdx = optsRaw.indexOf(target);
      let prompt, optionLabels;
      if (kind === 'ko-to-en') {
        prompt = { type: 'text', text: tx[target] || '(번역 없음)' };
        optionLabels = optsRaw;
      } else if (kind === 'en-to-ko') {
        prompt = { type: 'text', text: target, audio: true };
        optionLabels = optsRaw.map(w => tx[w] || w);
      } else {
        prompt = { type: 'audio', word: target };
        optionLabels = optsRaw.map(w => tx[w] || w);
      }
      return { kind, prompt, options: optsRaw, optionLabels, correctIdx };
    });

    let qi = 0, score = 0, chosen = null;

    function paint() {
      const q = questions[qi];
      let promptHtml;
      if (q.prompt.type === 'audio') {
        // Big ▶ in a circle with a smaller turtle "slow" circle in the corner.
        promptHtml = `
          <div class="qz-audio-prompt">
            <button class="qz-play"  data-audio="normal" aria-label="발음 듣기">
              <svg viewBox="0 0 24 24" width="38" height="38" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="qz-slow"  data-audio="slow"   aria-label="천천히 듣기">🐢</button>
          </div>`;
      } else {
        // Word/phrase prompt with a small audio icon above.
        promptHtml = `
          <div class="qz-text-prompt">
            <button class="qz-icon-speak" data-audio="normal" aria-label="발음 듣기">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
            </button>
            <div class="qz-prompt-word">${escapeHtml(q.prompt.text)}</div>
          </div>`;
      }
      const helper = q.kind === 'ko-to-en'
        ? '올바른 영어 단어를 고르세요.'
        : 'Select the correct meaning.';

      stage.innerHTML = quizFrame(qi, questions.length, `
        ${promptHtml}
        <div class="qz-helper">${helper}</div>
        <div class="qz-options" id="qz-options"></div>
        <button class="qz-skip" data-skip>I don't know</button>
      `);
      const optsEl = stage.querySelector('#qz-options');
      q.optionLabels.forEach((label, i) => {
        const b = document.createElement('button');
        b.className = 'qz-option';
        b.textContent = label;
        b.onclick = () => choose(i);
        optsEl.appendChild(b);
      });
      stage.querySelectorAll('[data-audio]').forEach(b => {
        b.onclick = () => TTS.speak(targetWord(q), { rate: b.dataset.audio === 'slow' ? 0.65 : 0.95 });
      });
      stage.querySelector('[data-skip]').onclick = () => choose(-1);
      // Auto-play the spoken word if relevant.
      if (q.prompt.type === 'audio' || (q.prompt.type === 'text' && q.prompt.audio)) {
        TTS.speak(targetWord(q));
      }
    }
    function targetWord(q) {
      return q.options[q.correctIdx];
    }
    function choose(i) {
      if (chosen !== null) return;
      chosen = i;
      const q = questions[qi];
      const correct = (i === q.correctIdx);
      if (correct) score++;
      DB.rateReview(targetWord(q), correct ? 1 : 0);
      // Feedback card overlays the existing screen.
      paintFeedback(q, i, correct);
    }
    function paintFeedback(q, picked, correct) {
      const target = targetWord(q);
      const koAns  = tx[target] || '';
      const ctx    = findContext(target);
      const youSaid = picked < 0 ? null : q.optionLabels[picked];

      stage.innerHTML = quizFrame(qi, questions.length, `
        ${youSaid ? `<div class="qz-you-said">You answered: ${escapeHtml(youSaid)}</div>` : ''}
        <div class="qz-feedback-card">
          <div class="qz-fb-status ${correct ? 'ok' : 'bad'}">
            ${correct ? 'Correct 🎉' : 'Incorrect 😟'}
          </div>
          <button class="qz-icon-speak" data-audio="normal" aria-label="발음 듣기">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
          </button>
          <div class="qz-fb-word">${escapeHtml(target)}</div>
          <div class="qz-fb-ko">${escapeHtml(koAns)}</div>
          ${ctx ? `<div class="qz-fb-ctx">${escapeHtml(ctx)}</div>` : ''}
          <div class="level-bar" id="qz-level"></div>
        </div>
        <button class="qz-continue" data-continue>Continue</button>
      `);
      stage.querySelector('[data-audio]').onclick = () => TTS.speak(target);
      mountLevelBar(stage.querySelector('#qz-level'), target);
      stage.querySelector('[data-continue]').onclick = () => {
        qi++; chosen = null;
        if (qi >= questions.length) finish();
        else paint();
      };
    }
    function finish() {
      const pct = Math.round((score / questions.length) * 100);
      stage.innerHTML = practiceFrame(`
        <div class="empty-msg">
          <h3>🎉 퀴즈 완료</h3>
          <p style="font-size:28px;font-weight:800;margin:8px 0">${score} / ${questions.length}
            <span class="muted" style="font-size:14px;font-weight:600">(${pct}%)</span></p>
          <div class="row" style="gap:10px;justify-content:center;margin-top:14px">
            <button class="btn" data-back>← 메뉴로</button>
            <button class="btn primary" data-again>새 퀴즈</button>
          </div>
        </div>
      `);
      stage.querySelector('[data-back]').onclick  = renderPracticeMenu;
      stage.querySelector('[data-again]').onclick = startQuiz;
    }
    paint();
  }
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  // Reusable header chrome for quiz screens (matches the reference mock).
  function quizFrame(currentIdx, total, inner) {
    const pct = total ? (currentIdx / total) * 100 : 0;
    return `
      <div class="quiz-screen">
        <div class="quiz-header">
          <button class="qz-x" data-close-overlay aria-label="닫기">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6L18 18M6 18L18 6"/></svg>
          </button>
          <div class="qz-bar"><div class="qz-bar-fill" style="width:${pct}%"></div></div>
          <button class="qz-gear" aria-label="설정">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
          </button>
        </div>
        <div class="quiz-body">${inner}</div>
      </div>
    `;
  }

  // Shared component: a level-picker strip (🗑 1 2 3 4 ✓) used in the quiz
  // feedback card AND the PC sidebar. Hooks into DB.setWordState directly.
  function mountLevelBar(host, word) {
    if (!host || !word) return;
    const lower = word.toLowerCase();
    const cur = (WORD_STATES[lower] && WORD_STATES[lower].state) || 0;
    function btn(s, label, cls) {
      const active = (cur === s);
      return `<button class="lv-btn ${cls || ''} ${active ? 'active' : ''}" data-lv="${s}" aria-label="단계 ${label}">${label}</button>`;
    }
    host.innerHTML =
      btn(-1, '🗑', 'ignore') +
      btn(1,  '1') +
      btn(2,  '2') +
      btn(3,  '3') +
      btn(4,  '4') +
      btn(5,  '✓', 'known');
    host.querySelectorAll('[data-lv]').forEach(b => {
      b.onclick = async () => {
        const s = Number(b.dataset.lv);
        await DB.setWordState(lower, s);
        WORD_STATES[lower] = { state: s, last: new Date().toISOString().slice(0,10) };
        // Re-mount to reflect the new active circle.
        mountLevelBar(host, word);
        // Update any visible word elements on the page so the colour change
        // is immediate.
        document.querySelectorAll('.w').forEach(el => {
          if (!el.dataset.word) return;
          if (el.dataset.word.toLowerCase() === lower) {
            ['s1','s2','s3','s4','s5','sx'].forEach(c => el.classList.remove(c));
            const cls = classFor(s);
            if (cls) el.classList.add(cls);
          }
        });
      };
    });
  }

  function practiceFrame(inner) {
    return `<div class="practice-card">
      <button class="pm-close" data-back-to-menu aria-label="메뉴로">←</button>
      <button class="pm-x" data-close-overlay aria-label="닫기">×</button>
      ${inner}
    </div>`;
    // (back-to-menu / close-overlay are wired below right after innerHTML
    // is set, in renderPracticeStage helpers.)
  }
  // Delegate clicks for the back-to-menu and close-overlay buttons that are
  // injected by practiceFrame() into every practice stage.
  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-back-to-menu]')) renderPracticeMenu();
    if (e.target.closest('[data-close-overlay]')) {
      const ov = document.getElementById('practice-overlay');
      if (ov) ov.hidden = true;
    }
  });

  // ---- toggle UI wiring ----
  function applyModeClass() {
    document.querySelectorAll('.lesson-text').forEach(el => {
      // Only the underlined "이어서" mode (contU) gets inline translations
      // and the wider line-height. Plain "이어서" (cont) keeps the same line
      // spacing as 하나씩 and uses a popup card instead.
      el.classList.toggle('mode-contU',  MODE === 'contU');
      el.classList.toggle('mode-cont',   MODE === 'cont');
      el.classList.toggle('mode-single', MODE === 'single');
    });
  }
  function setupToggles() {
    // All four toggles are single-button "flip" controls — the label of the
    // button is the CURRENT setting and clicking flips to the other option.
    // (User-facing visual: pale sky-blue background, never black.)

    // Mode toggle: cycles 하나씩 → 이어서 → 이어서(밑줄) → 하나씩.
    const modeBtn = document.getElementById('mode-toggle-btn');
    function refreshMode() { modeBtn.innerHTML = modeLabel(MODE); }
    modeBtn.addEventListener('click', () => {
      MODE = nextMode(MODE);
      refreshMode(); savePrefs(); onModeChanged();
    });
    refreshMode();

    // Translator toggle (DL ↔ G). Selected engine is the primary; the other
    // remains an automatic fallback inside Translate.translate().
    const txBtn = document.getElementById('tx-toggle-btn');
    function refreshTx() {
      const cur = (window.Translate && Translate.getEngine && Translate.getEngine()) || 'deepl';
      txBtn.textContent = cur === 'deepl' ? 'DL' : 'G';
    }
    txBtn.addEventListener('click', () => {
      const cur = Translate.getEngine();
      Translate.setEngine(cur === 'deepl' ? 'google' : 'deepl');
      refreshTx();
    });
    refreshTx();

    // TTS engine toggle (GC ↔ WS).
    const ttsBtn = document.getElementById('tts-toggle-btn');
    function refreshTts() {
      const cur = (window.TTS && TTS.getEngine && TTS.getEngine()) || 'cloud';
      ttsBtn.textContent = cur === 'cloud' ? 'GC' : 'WS';
    }
    ttsBtn.addEventListener('click', () => {
      const cur = TTS.getEngine();
      TTS.setEngine(cur === 'cloud' ? 'web' : 'cloud');
      refreshTts();
    });
    refreshTts();

    // Bookmark toggle (찜). Pink when on. Stays "찜" text either way; only
    // the colour communicates state.
    const bmBtn = document.getElementById('bookmark-btn');
    bmBtn.addEventListener('click', async () => {
      if (!LESSON) return;
      const next = !LESSON.bookmarked;
      LESSON.bookmarked = next;
      refreshBookmarkBtn();
      try { await DB.setBookmark(LESSON.id, next); }
      catch (e) {
        console.error('bookmark toggle failed', e);
        // Roll back the visual state on failure.
        LESSON.bookmarked = !next;
        refreshBookmarkBtn();
      }
    });
  }

  function refreshBookmarkBtn() {
    const b = document.getElementById('bookmark-btn');
    if (!b) return;
    const on = !!(LESSON && LESSON.bookmarked);
    b.classList.toggle('bookmarked', on);
    b.textContent = on ? '찜♥' : '찜';
  }
  function onModeChanged() {
    // Clean up state from the previous mode.
    hidePopup();
    clearContSelection();
    clearSidebar();
    applyModeClass();
    applySidebarVisibility();
    // Spacing differs between modes → re-paginate.
    if (!LESSON) return;
    requestAnimationFrame(() => {
      PAGES = paginateByHeight(LESSON.body || '');
      computePageCharCounts();
      if (pageIdx >= PAGES.length) pageIdx = PAGES.length - 1;
      if (pageIdx < 0) pageIdx = 0;
      renderInto(document.getElementById('lesson-text'), PAGES[pageIdx] || []);
      bindWordInteractions(document.getElementById('lesson-text'));
      buildSentenceMap(document.getElementById('lesson-text'));
      setCurrentSentence(-1);
      updateProgress();
    });
  }
  // ---- sentence map for the rendered page (used by playback underline) ----
  function buildSentenceMap(root) {
    SENTENCE_MAP = [];
    if (!root) return;
    let curr = { text: '', words: [] };
    for (const el of root.querySelectorAll('.w')) {
      curr.text += el.textContent;
      curr.words.push(el);
      if (el.classList.contains('punct') && /[.!?]/.test(el.textContent)) {
        if (curr.text.trim()) SENTENCE_MAP.push(curr);
        curr = { text: '', words: [] };
      }
    }
    if (curr.text.trim()) SENTENCE_MAP.push(curr);
  }
  function setCurrentSentence(idx) {
    CURRENT_SENTENCE = idx;
    document.querySelectorAll('.w.reading').forEach(el => el.classList.remove('reading'));
    if (idx < 0 || idx >= SENTENCE_MAP.length) return;
    for (const w of SENTENCE_MAP[idx].words) {
      if (!w.classList.contains('punct')) w.classList.add('reading');
    }
  }

  // ---- finger-follow page swipe ----
  function startSwipeFollow(direction) {
    if (animating) return null;
    if (direction > 0 && pageIdx >= PAGES.length - 1) return null;
    if (direction < 0 && pageIdx <= 0) return null;

    const wrap = document.getElementById('lesson-text-wrap');
    const currentRoot = document.getElementById('lesson-text');
    const peekRoot = document.createElement('div');
    peekRoot.className = 'lesson-text';
    if (MODE === 'cont')  peekRoot.classList.add('mode-cont');
    if (MODE === 'contU') peekRoot.classList.add('mode-contU');
    renderInto(peekRoot, PAGES[pageIdx + direction] || []);

    const width = currentRoot.offsetWidth;
    peekRoot.style.transition = 'none';
    peekRoot.style.transform  = direction > 0 ? `translateX(${width}px)` : `translateX(-${width}px)`;
    currentRoot.style.transition = 'none';
    wrap.appendChild(peekRoot);
    bindWordInteractions(peekRoot);
    return { direction, peekRoot, currentRoot, width };
  }
  function updateSwipeFollow(dx) {
    if (!SWIPE) return;
    const { direction, peekRoot, currentRoot, width } = SWIPE;
    // Slight rubber-band when the user drags AGAINST the swipe direction.
    let cdx = dx;
    if ((direction > 0 && cdx > 0) || (direction < 0 && cdx < 0)) cdx = cdx * 0.3;
    currentRoot.style.transform = `translateX(${cdx}px)`;
    const peekX = direction > 0 ? width + cdx : -width + cdx;
    peekRoot.style.transform = `translateX(${peekX}px)`;
  }
  function endSwipeFollow(dx) {
    if (!SWIPE) return;
    const { direction, peekRoot, currentRoot, width } = SWIPE;
    SWIPE = null;
    animating = true;
    lastSwipeT = Date.now();

    const threshold = Math.min(120, width * 0.25);
    const willCommit = (direction > 0 && dx < -threshold) ||
                       (direction < 0 && dx >  threshold);

    const ease = 'transform .22s cubic-bezier(.22,.6,.36,1)';
    currentRoot.style.transition = ease;
    peekRoot.style.transition    = ease;

    if (willCommit) {
      currentRoot.style.transform = direction > 0 ? `translateX(-${width}px)` : `translateX(${width}px)`;
      peekRoot.style.transform    = 'translateX(0)';
      setTimeout(() => {
        currentRoot.id = '';
        currentRoot.remove();
        peekRoot.id = 'lesson-text';
        peekRoot.style.transition = '';
        peekRoot.style.transform  = '';
        pageIdx += direction;
        updateProgress();
        buildSentenceMap(peekRoot);
        setCurrentSentence(-1);
        animating = false;
      }, 230);
    } else {
      currentRoot.style.transform = 'translateX(0)';
      peekRoot.style.transform    = direction > 0 ? `translateX(${width}px)` : `translateX(-${width}px)`;
      setTimeout(() => {
        peekRoot.remove();
        currentRoot.style.transition = '';
        currentRoot.style.transform  = '';
        animating = false;
      }, 230);
    }
  }

  // ---- bottom bar swap: lesson-bar ⇄ playbar ----
  function showLessonBar() {
    document.getElementById('lesson-bar').hidden = false;
    document.getElementById('playbar').hidden    = true;
    setCurrentSentence(-1);   // wipe any reading underline when leaving playback
    sizeLessonMain();
  }
  function showPlaybar() {
    document.getElementById('lesson-bar').hidden = true;
    document.getElementById('playbar').hidden    = false;
    sizeLessonMain();
    // Forward the click to the playbar's existing play button so audio
    // actually starts on the first press.
    const pb = document.getElementById('play-btn');
    if (pb) pb.click();
  }
  function setupLessonBar() {
    const lbPlay = document.getElementById('lb-play');
    const pbClose = document.getElementById('pb-close');
    if (lbPlay) lbPlay.addEventListener('click', showPlaybar);
    if (pbClose) pbClose.addEventListener('click', () => {
      // Stop any audio before hiding the playbar.
      try {
        if (audioEl && !audioEl.paused) audioEl.pause();
        if (typeof TTS !== 'undefined' && TTS.stop) TTS.stop();
      } catch (e) {}
      showLessonBar();
    });
  }

  function clearContSelection() {
    document.querySelectorAll('.w.cont-sel').forEach(el => el.classList.remove('cont-sel'));
    document.querySelectorAll('.cont-trans').forEach(el => el.remove());
    CONT_SELECTED.clear();
  }

  function sizeLessonMain() {
    const main = document.getElementById('lesson-main');
    if (!main) return;
    const topY = main.getBoundingClientRect().top;
    // Whichever of lesson-bar / playbar is visible owns the bottom strip.
    const lb = document.getElementById('lesson-bar');
    const pb = document.getElementById('playbar');
    const bottomEl = (pb && !pb.hidden) ? pb : lb;
    const bottomH = (bottomEl && !bottomEl.hidden) ? bottomEl.offsetHeight : 0;
    const bottomGap = 16;
    const h = Math.max(320, window.innerHeight - topY - bottomH - bottomGap);
    main.style.height = h + 'px';
  }

  function paginateByHeight(body) {
    const paragraphs = body.split(/\n{2,}|\r\n{2,}/).map(p => p.trim()).filter(Boolean);
    if (!paragraphs.length) return [['']];
    const wrap = document.getElementById('lesson-text-wrap');
    const maxH = wrap.clientHeight - 4;
    if (maxH <= 0) return [paragraphs];

    const mirror = document.createElement('div');
    mirror.className = 'lesson-text';
    if (MODE === 'cont')  mirror.classList.add('mode-cont');   // measure with the same spacing as the live page
    if (MODE === 'contU') mirror.classList.add('mode-contU');
    mirror.style.position = 'absolute';
    mirror.style.visibility = 'hidden';
    mirror.style.pointerEvents = 'none';
    mirror.style.inset = '';
    mirror.style.left = '-9999px';
    mirror.style.top = '0';
    mirror.style.width = wrap.clientWidth + 'px';
    mirror.style.overflow = 'visible';
    document.body.appendChild(mirror);

    const paraEls = [];
    for (const text of paragraphs) {
      const pEl = renderParagraph(text);
      mirror.appendChild(pEl);
      paraEls.push({ text, el: pEl });
    }
    void mirror.offsetHeight;

    const pages = [];
    let curr = [];
    let pageStartTop = paraEls[0].el.offsetTop;
    for (const info of paraEls) {
      const localBottom = (info.el.offsetTop - pageStartTop) + info.el.offsetHeight;
      if (curr.length && localBottom > maxH) {
        pages.push(curr);
        curr = [];
        pageStartTop = info.el.offsetTop;
      }
      curr.push(info.text);
    }
    if (curr.length) pages.push(curr);
    mirror.remove();
    return pages.length ? pages : [paragraphs];
  }

  function renderParagraph(par) {
    const p = document.createElement('p');
    p.className = 'para';
    const lines = par.split(/\n/);
    lines.forEach((line, li) => {
      const tokens = line.match(/([\p{L}][\p{L}\p{M}'’-]*)|([^\p{L}]+)/gu) || [];
      for (const tk of tokens) {
        if (/^[\p{L}]/u.test(tk)) {
          const span = document.createElement('span');
          span.className = 'w';
          span.dataset.word = tk;
          const lower = tk.toLowerCase();
          const st = WORD_STATES[lower];
          if (st) {
            const cls = classFor(st.state);
            if (cls) span.classList.add(cls);
          }
          span.textContent = tk;
          p.appendChild(span);
        } else {
          const sp = document.createElement('span');
          sp.className = 'w punct';
          sp.textContent = tk;
          p.appendChild(sp);
        }
      }
      if (li < lines.length - 1) p.appendChild(document.createElement('br'));
    });
    return p;
  }

  function renderInto(container, paragraphs) {
    container.innerHTML = '';
    let widx = 0;
    for (const text of paragraphs || []) {
      const pEl = renderParagraph(text);
      pEl.querySelectorAll('.w').forEach(el => { el.dataset.idx = String(widx++); });
      container.appendChild(pEl);
    }
  }

  function updateProgress() {
    const total = PAGES.length || 1;
    const cur = pageIdx + 1;
    const pct = total > 1 ? (pageIdx / (total - 1)) * 100 : 0;
    document.getElementById('lp-pages').textContent = `${cur} / ${total}`;
    document.getElementById('lp-fill').style.width = pct + '%';
    document.getElementById('lp-dot').style.left = pct + '%';
    document.getElementById('page-prev').disabled = pageIdx === 0;
    document.getElementById('page-next').disabled = pageIdx >= total - 1;
  }

  function goPage(delta) {
    if (animating) return;
    const next = pageIdx + delta;
    if (next < 0 || next >= PAGES.length) return;
    animating = true;
    closeStateMenu();
    hidePopup();
    clearContSelection();          // selection is per-page in 이어서 mode

    const wrap = document.getElementById('lesson-text-wrap');
    const oldRoot = document.getElementById('lesson-text');
    const goingForward = delta > 0;

    const newRoot = document.createElement('div');
    newRoot.className = 'lesson-text';
    if (MODE === 'cont')  newRoot.classList.add('mode-cont');
    if (MODE === 'contU') newRoot.classList.add('mode-contU');
    newRoot.classList.add(goingForward ? 'slide-from-right' : 'slide-from-left');
    pageIdx = next;
    renderInto(newRoot, PAGES[pageIdx] || []);
    wrap.appendChild(newRoot);
    bindWordInteractions(newRoot);

    void newRoot.offsetWidth;
    requestAnimationFrame(() => {
      oldRoot.classList.add('slide-anim');
      newRoot.classList.add('slide-anim');
      oldRoot.classList.add(goingForward ? 'slide-out-left' : 'slide-out-right');
      newRoot.classList.remove('slide-from-right', 'slide-from-left');
    });

    setTimeout(() => {
      oldRoot.id = '';
      oldRoot.remove();
      newRoot.id = 'lesson-text';
      newRoot.classList.remove('slide-anim');
      updateProgress();
      buildSentenceMap(newRoot);
      setCurrentSentence(-1);
      animating = false;
    }, 300);
  }

  document.getElementById('page-prev').addEventListener('click', () => goPage(-1));
  document.getElementById('page-next').addEventListener('click', () => goPage(+1));
  document.addEventListener('keydown', (e) => {
    if (/(INPUT|TEXTAREA)/.test((e.target.tagName || ''))) return;
    if (e.key === 'ArrowLeft')  goPage(-1);
    if (e.key === 'ArrowRight') goPage(+1);
    if (e.key === 'Escape')    hidePopup();
  });

  let resizeT = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => {
      sizeLessonMain();
      hidePopup();
      applySidebarVisibility();
      requestAnimationFrame(() => {
        if (!LESSON) return;
        PAGES = paginateByHeight(LESSON.body || '');
        computePageCharCounts();
        if (pageIdx >= PAGES.length) pageIdx = PAGES.length - 1;
        if (pageIdx < 0) pageIdx = 0;
        renderInto(document.getElementById('lesson-text'), PAGES[pageIdx] || []);
        bindWordInteractions(document.getElementById('lesson-text'));
        buildSentenceMap(document.getElementById('lesson-text'));
        setCurrentSentence(-1);
        updateProgress();
      });
    }, 200);
  });

  // ============== word click + drag-select + page swipe ==============
  function bindWordInteractions(root) {
    // Idempotent guard: re-renders that REUSE the same DOM element (mode
    // change, resize) must NOT add a second copy of these listeners — that
    // was making one click fire showWord twice and TTS speak the word twice
    // (the audible "be-begin" stutter).
    if (root.dataset.bound === '1') return;
    root.dataset.bound = '1';

    let dragging = false;
    let dragStartIdx = null, dragLastIdx = null;
    let didDrag = false;
    let touchStart = null;

    function getWordEl(target) {
      if (!target) return null;
      const el = target.closest && target.closest('.w');
      if (!el || el.classList.contains('punct')) return null;
      return el;
    }
    function clearSel() { root.querySelectorAll('.w.sel').forEach(el => el.classList.remove('sel')); }
    function selectRange(a, b) {
      clearSel();
      const lo = Math.min(a, b), hi = Math.max(a, b);
      for (const el of root.querySelectorAll('.w')) {
        const i = Number(el.dataset.idx);
        if (Number.isFinite(i) && i >= lo && i <= hi && !el.classList.contains('punct')) {
          el.classList.add('sel');
        }
      }
    }
    function getSelectedText() {
      const all = root.querySelectorAll('.w');
      let firstSel = -1, lastSel = -1;
      all.forEach((el, i) => { if (el.classList.contains('sel')) { if (firstSel < 0) firstSel = i; lastSel = i; } });
      if (firstSel < 0) return '';
      const chunks = [];
      for (let i = firstSel; i <= lastSel; i++) chunks.push(all[i].textContent);
      return chunks.join('').replace(/\s+/g, ' ').trim();
    }

    root.addEventListener('mousedown', (e) => {
      if (MODE === 'cont' || MODE === 'contU') return; // no drag-select in 이어서 modes
      const w = getWordEl(e.target);
      if (!w) return;
      dragging = true; didDrag = false;
      dragStartIdx = Number(w.dataset.idx);
      dragLastIdx  = dragStartIdx;
    });
    root.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const w = getWordEl(e.target);
      if (!w) return;
      const i = Number(w.dataset.idx);
      if (i !== dragLastIdx) {
        didDrag = didDrag || (i !== dragStartIdx);
        dragLastIdx = i;
        if (didDrag) selectRange(dragStartIdx, dragLastIdx);
      }
    });
    document.addEventListener('mouseup', async () => {
      if (!dragging) return;
      dragging = false;
      if (didDrag) {
        const phrase = getSelectedText();
        if (phrase) showPhrase(phrase, null);
      }
    });

    root.addEventListener('touchstart', (e) => {
      const t = e.touches[0]; if (!t) return;
      touchStart = { x: t.clientX, y: t.clientY, t: Date.now() };
      const w = getWordEl(e.target);
      // In 이어서 mode the touch is only used for page swipes — never as a
      // drag-select start, so don't arm dragStartIdx.
      if (w && MODE !== 'cont' && MODE !== 'contU') {
        dragging = true; didDrag = false;
        dragStartIdx = Number(w.dataset.idx);
        dragLastIdx  = dragStartIdx;
      } else {
        dragging = false;
      }
    }, { passive: true });

    root.addEventListener('touchmove', (e) => {
      if (!touchStart) return;
      const t = e.touches[0]; if (!t) return;
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      const dt = Date.now() - touchStart.t;

      // If we're already in finger-follow swipe, just keep updating it.
      if (SWIPE) {
        if (e.cancelable) e.preventDefault();
        updateSwipeFollow(dx);
        return;
      }

      // Detect transition from neutral / drag-select to finger-follow swipe:
      // a fast and decisively horizontal motion. Once we trigger, the page
      // moves under the finger in real time.
      const isFastHoriz = Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 400;
      if (isFastHoriz) {
        if (didDrag) clearSel();
        dragging = false;
        const direction = dx < 0 ? +1 : -1;
        SWIPE = startSwipeFollow(direction);
        if (SWIPE) {
          if (e.cancelable) e.preventDefault();
          updateSwipeFollow(dx);
        }
        return;
      }

      if (!dragging) return;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const w = getWordEl(el);
      if (!w) return;
      const i = Number(w.dataset.idx);
      if (i !== dragLastIdx) {
        didDrag = didDrag || (i !== dragStartIdx);
        dragLastIdx = i;
        if (didDrag) { e.preventDefault(); selectRange(dragStartIdx, dragLastIdx); }
      }
    }, { passive: false });

    root.addEventListener('touchend', (e) => {
      const ts = touchStart; touchStart = null;

      // Finish the finger-follow swipe if one is active.
      if (SWIPE) {
        const ct = e.changedTouches && e.changedTouches[0];
        const dx = (ct && ts) ? ct.clientX - ts.x : 0;
        endSwipeFollow(dx);
        return;
      }

      const wasDragging = dragging; dragging = false;
      if (!ts) return;
      if (wasDragging && didDrag) {
        const phrase = getSelectedText();
        if (phrase) showPhrase(phrase, null);
      }
    });

    root.addEventListener('click', async (e) => {
      // Suppress the synthetic click that follows a finger-follow swipe so
      // the touch that just changed the page doesn't also tap a word on the
      // newly-revealed page.
      if (Date.now() - lastSwipeT < 350) return;
      if (didDrag) { didDrag = false; return; }
      const w = getWordEl(e.target);
      if (!w) return;
      if (root.querySelectorAll('.w.sel').length > 0) clearSel();

      const word = w.dataset.word;
      // Always advance the learning state on a real click.
      const upd = await DB.clickWord(word);
      WORD_STATES[word.toLowerCase()] = { state: upd.state, last: upd.last };
      ['s1','s2','s3','s4','s5','sx'].forEach(c => w.classList.remove(c));
      const cls = classFor(upd.state);
      if (cls) w.classList.add(cls);

      if (MODE === 'cont' || MODE === 'contU') {
        // Both 이어서 modes share the same selection rules. Routing to the
        // popup vs the inline gray label happens inside refreshContTranslation.
        await handleContClick(w, word);
      } else {
        root.querySelectorAll('.w.active').forEach(x => x.classList.remove('active'));
        w.classList.add('active');
        showWord(word, upd, w);
      }
    });
  }

  // ============== 이어서 / 이어서(밑줄) modes ==============
  // Track the running selection. Selection is bound to a single sentence —
  // tapping a word in a different sentence clears the previous selection
  // and starts fresh. Tapping a word that's already in the selection
  // deselects just that one (when only one is left, that's a translate-it
  // request — we keep it).
  function wordsInParagraph(p) {
    return Array.from(p.querySelectorAll('.w:not(.punct)'));
  }
  function getSentenceIdxOf(wEl) {
    // Walk forward through siblings within the same paragraph, counting
    // sentence-ending punctuation. Words before the first ./!/? are sentence 0.
    if (!wEl) return -1;
    const p = wEl.parentElement; if (!p) return -1;
    let idx = 0;
    for (const el of p.children) {
      if (el === wEl) return idx;
      if (el.classList && el.classList.contains('punct') && /[.!?]/.test(el.textContent)) idx++;
    }
    return idx;
  }
  function selectionSentenceIdx() {
    if (!CONT_SELECTED.size) return -1;
    const any = CONT_SELECTED.values().next().value;
    return getSentenceIdxOf(any);
  }
  function selectionParagraph() {
    if (!CONT_SELECTED.size) return null;
    return CONT_SELECTED.values().next().value.parentElement || null;
  }
  function isInSameSentenceAsSelection(wEl) {
    if (!CONT_SELECTED.size) return true;             // first word of a fresh selection
    if (wEl.parentElement !== selectionParagraph()) return false;
    return getSentenceIdxOf(wEl) === selectionSentenceIdx();
  }
  function selectionToPhrase() {
    return Array.from(CONT_SELECTED)
      .sort((a, b) => {
        const cmp = a.compareDocumentPosition(b);
        if (cmp & Node.DOCUMENT_POSITION_FOLLOWING) return -1;
        if (cmp & Node.DOCUMENT_POSITION_PRECEDING) return 1;
        return 0;
      })
      .map(el => el.dataset.word)
      .join(' ');
  }

  async function handleContClick(wEl, word) {
    // Tap an already-selected word → deselect just that word. If selection
    // becomes empty, close any open card / inline label.
    if (CONT_SELECTED.has(wEl)) {
      CONT_SELECTED.delete(wEl);
      wEl.classList.remove('cont-sel');
      if (CONT_SELECTED.size === 0) {
        document.querySelectorAll('.cont-trans').forEach(el => el.remove());
        if (MODE === 'cont') {
          if (useSidebar()) clearSidebar();
          else              hidePopup();
        }
        return;
      }
      await refreshContTranslation();
      return;
    }

    // Tapping a word in a different sentence (or a different paragraph)
    // clears the previous selection and starts fresh from this word.
    if (!isInSameSentenceAsSelection(wEl)) clearContSelection();

    CONT_SELECTED.add(wEl);
    wEl.classList.add('cont-sel');
    TTS.speak(word);
    await refreshContTranslation(wEl);
  }

  // Shared updater. Routes the result to:
  //   • PC sidebar      — when MODE='cont' AND viewport ≥ 1024 px
  //   • popup card      — when MODE='cont' on mobile
  //   • inline gray     — when MODE='contU'
  async function refreshContTranslation(anchorEl) {
    const phrase = selectionToPhrase();
    if (!phrase) return;

    if (MODE === 'cont' && useSidebar()) {
      // Sidebar populates its own translation/senses asynchronously.
      showInSidebar(phrase);
      return;
    }

    let ko = '';
    try { ko = await Translate.translate(phrase); } catch (e) {}
    if (selectionToPhrase() !== phrase) return;        // selection changed mid-fetch

    if (MODE === 'cont') {
      // Mobile cont: show the popup card, anchored to the WHOLE sentence
      // (not just the last clicked word) so every word stays clickable.
      const wEl = anchorEl || Array.from(CONT_SELECTED).pop();
      await showWord(phrase, { isFirstClick: false }, wEl);
      placePopBySentence();
    } else {
      // contU: inline gray label below the line.
      renderContTranslation(ko);
    }
  }

  // Compute the on-screen position of the selection's last visual line and
  // place a single floating Korean label there.
  function renderContTranslation(ko) {
    document.querySelectorAll('.cont-trans').forEach(el => el.remove());
    if (!ko || !CONT_SELECTED.size) return;

    const sorted = Array.from(CONT_SELECTED).sort((a, b) => {
      const cmp = a.compareDocumentPosition(b);
      if (cmp & Node.DOCUMENT_POSITION_FOLLOWING) return -1;
      if (cmp & Node.DOCUMENT_POSITION_PRECEDING) return 1;
      return 0;
    });
    const last  = sorted[sorted.length - 1];
    const lastRect = last.getBoundingClientRect();

    // For multi-line selections, anchor to the leftmost selected word that
    // shares the LAST word's line — so the label sits below the last line
    // rather than below where the selection began.
    let leftAnchor = last;
    let leftMin = lastRect.left;
    for (const el of sorted) {
      const r = el.getBoundingClientRect();
      if (Math.abs(r.top - lastRect.top) < 2 && r.left < leftMin) {
        leftMin = r.left;
        leftAnchor = el;
      }
    }
    const leftRect = leftAnchor.getBoundingClientRect();

    const lt = document.getElementById('lesson-text');
    const ltRect = lt.getBoundingClientRect();

    const trans = document.createElement('div');
    trans.className = 'cont-trans';
    trans.textContent = ko;
    trans.style.top  = (lastRect.bottom - ltRect.top + 1) + 'px';
    trans.style.left = (leftRect.left   - ltRect.left)    + 'px';
    lt.appendChild(trans);
  }

  // ============== anchored word popup ==============
  const POP = document.getElementById('word-pop');

  // Anchor the popup relative to the *currently selected sentence* (이어서
  // mode) instead of a single word: if the sentence sits in the upper half
  // of the viewport the popup goes below it, otherwise it goes above. That
  // way every word in the sentence stays reachable by the user's thumb.
  function placePopBySentence() {
    if (!CONT_SELECTED.size) return false;
    const sorted = Array.from(CONT_SELECTED);
    const para = sorted[0].parentElement; if (!para) return false;
    const sIdx = getSentenceIdxOf(sorted[0]);
    // Collect every .w in this paragraph that belongs to the same sentence.
    const allInPara = Array.from(para.children);
    const sentenceWords = [];
    let cur = 0;
    for (const el of allInPara) {
      if (cur === sIdx && el.classList && el.classList.contains('w')) sentenceWords.push(el);
      if (el.classList && el.classList.contains('punct') && /[.!?]/.test(el.textContent)) cur++;
      if (cur > sIdx) break;
    }
    if (!sentenceWords.length) return false;

    // Bounding rectangle of the sentence (covers wrapped lines too).
    let top = Infinity, bottom = -Infinity;
    for (const w of sentenceWords) {
      const r = w.getBoundingClientRect();
      if (r.top < top) top = r.top;
      if (r.bottom > bottom) bottom = r.bottom;
    }

    POP.classList.remove('expanded');
    POP.removeAttribute('style');
    POP.style.top  = '0px';
    POP.style.left = '-9999px';
    POP.hidden = false;
    void POP.offsetHeight;
    const popH = POP.offsetHeight;
    const popW = POP.offsetWidth || 280;

    const margin = 8;
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const vw = window.innerWidth;
    const sentenceMid = (top + bottom) / 2;
    const placeAbove  = sentenceMid > vh / 2;          // sentence is in lower half

    let popTop = placeAbove ? (top - popH - margin)
                            : (bottom + margin);
    if (popTop + popH > vh - margin) popTop = vh - popH - margin;
    if (popTop < margin) popTop = margin;

    let popLeft = (vw - popW) / 2;                     // horizontally centered
    if (popLeft < margin) popLeft = margin;

    POP.style.top  = popTop  + 'px';
    POP.style.left = popLeft + 'px';
    return true;
  }

  function placePopBelowAnchor(anchorEl) {
    POP.classList.remove('expanded');
    // Clear ALL previous inline styles so leftovers from a prior interaction
    // (transform, top, opacity, etc.) can't leak into the new placement.
    POP.removeAttribute('style');
    // Pre-position off-screen so the very first paint after hidden=false is at
    // a safe location. (With position:fixed and no top set, the browser would
    // otherwise place it at its natural document position, which on a tall
    // page falls below the viewport — that was the visible bug.)
    POP.style.top  = '0px';
    POP.style.left = '-9999px';
    POP.hidden = false;
    // Force layout so we can read accurate dimensions.
    void POP.offsetHeight;
    const popH = POP.offsetHeight;
    const popW = POP.offsetWidth || 280;

    const margin = 8;
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const vw = window.innerWidth;
    const r = anchorEl.getBoundingClientRect();

    // Default: directly below the word, left-aligned with it.
    let top  = r.bottom + 6;
    let left = r.left;

    // Flip above if there's no room below.
    if (top + popH + margin > vh) {
      top = r.top - popH - 6;
    }
    // Hard clamp so the popup ALWAYS sits inside the viewport.
    if (top + popH > vh - margin) top = vh - popH - margin;
    if (top < margin) top = margin;

    // Horizontal: shift inward if it would overrun the right edge.
    if (left + popW + margin > vw) left = vw - popW - margin;
    if (left < margin) left = margin;

    POP.style.top  = top + 'px';
    POP.style.left = left + 'px';
  }

  function hidePopup() {
    closeStateMenu();
    POP.hidden = true;
    POP.classList.remove('expanded');
    POP.style.transform = '';
    POP.style.opacity = '';
    document.getElementById('wp-iframe').src = 'about:blank';
    CURRENT_WORD = null;
    CURRENT_WORD_EL = null;
    document.querySelectorAll('.w.active').forEach(x => x.classList.remove('active'));
  }

  // mode: 'naver' (default) | 'corpus'
  function expandPopup(mode) {
    if (!CURRENT_WORD) return;
    POP.classList.add('expanded');
    const word = CURRENT_WORD;

    const isCorpus = (mode === 'corpus');
    document.getElementById('wp-word-large').textContent = word;

    const iframe = document.getElementById('wp-iframe');
    const corpus = document.getElementById('wp-corpus');
    const headLink = document.getElementById('wp-naver-open');
    const fbLink   = document.getElementById('wp-naver-link');

    const fallback = document.querySelector('.wp-fallback');

    if (isCorpus) {
      // C: build a KWIC concordance from the user's OWN lessons. External
      // corpora (Reverso, Tatoeba, COCA) all block iframe embedding so we
      // render our own — no "open in COCA" link needed.
      iframe.src = 'about:blank';
      iframe.style.display = 'none';
      corpus.hidden = false;
      headLink.style.display = 'none';
      if (fallback) fallback.style.display = 'none';
      renderCorpus(word, corpus);
    } else {
      // N: Naver English Dictionary (definitions)
      const naverUrl = 'https://en.dict.naver.com/#/search?query=' + encodeURIComponent(word);
      const naverAlt = 'https://endic.naver.com/search.nhn?query=' + encodeURIComponent(word);
      iframe.style.display = '';
      corpus.hidden = true;
      headLink.style.display = '';
      if (fallback) fallback.style.display = '';
      iframe.src = naverUrl;
      headLink.href = naverUrl;
      headLink.textContent = 'Naver에서 열기 ↗';
      fbLink.href = naverAlt;
      fbLink.textContent = `"${word}" — Naver 사전에서 결과 열기 →`;
    }
  }

  // ---------- KWIC corpus from user lessons ----------
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function escapeHtml2(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

  function splitSentences(text) {
    // Roughly split on sentence-ending punctuation followed by whitespace.
    // We keep the punctuation attached to the preceding sentence.
    return (text || '')
      .replace(/\s+/g, ' ')
      .split(/(?<=[.!?])\s+(?=[A-Z"'(])/)
      .map(s => s.trim())
      .filter(Boolean);
  }

  async function renderCorpus(word, container) {
    container.innerHTML =
      '<div class="corpus-loading">"' + escapeHtml2(word) +
      '"이(가) 쓰인 문장을 내 레슨에서 찾는 중...</div>';

    let lessons = [];
    try { lessons = await DB.listLessons(); }
    catch (e) { console.warn('listLessons failed', e); }

    const re = new RegExp('\\b' + escapeRegex(word) + '\\b', 'gi');
    const hits = [];
    for (const lesson of (lessons || [])) {
      const sentences = splitSentences(lesson.body || '');
      for (const s of sentences) {
        re.lastIndex = 0;
        const m = re.exec(s);
        if (!m) continue;
        // Build left + match + right around the FIRST occurrence in the sentence.
        hits.push({
          title: lesson.title || '제목 없음',
          left:  s.slice(0, m.index),
          mid:   m[0],
          right: s.slice(m.index + m[0].length),
        });
      }
    }

    // If nothing came back, this word doesn't appear in any of the user's
    // imported lessons — show a friendly hint.
    if (!hits.length) {
      container.innerHTML =
        '<div class="corpus-empty">' +
        '내 레슨에 "<b>' + escapeHtml2(word) + '</b>"이(가) 사용된 문장이 아직 없어요.<br>' +
        '<span class="hint">레슨을 더 가져오면 이 단어가 쓰인 문장이 여기에 모입니다. ' +
        '또는 위쪽 "COCA에서 열기" 링크로 외부 코퍼스를 새 탭에서 볼 수 있습니다.</span>' +
        '</div>';
      return;
    }

    // Update the big title to show the count: "begin (5개)".
    const titleEl = document.getElementById('wp-word-large');
    if (titleEl) titleEl.textContent = word + ' (' + hits.length + '개)';

    // Single CSS-grid layout where all rows share the same columns. With
    // `text-align: right` on the left column, every keyword lines up in a
    // single vertical strip — that's the alignment the user asked for.
    // The grid lives inside one scroll container, so swiping any row pans
    // ALL rows together (mobile + desktop both get horizontal scroll).
    let html = '<div class="corpus-grid">';
    hits.forEach((h, i) => {
      html += '<span class="num">'  + (i + 1)            + '</span>';
      html += '<span class="left">' + escapeHtml2(h.left)  + '</span>';
      html += '<mark>'              + escapeHtml2(h.mid)   + '</mark>';
      html += '<span class="right">'+ escapeHtml2(h.right) + '</span>';
    });
    html += '</div>';
    container.innerHTML = html;

    // Center the keyword column in the visible viewport so the surrounding
    // context on both sides is visible from the start.
    requestAnimationFrame(() => {
      const grid = container.querySelector('.corpus-grid');
      const kw   = container.querySelector('mark');
      if (!grid || !kw) return;
      const target = kw.offsetLeft - (grid.clientWidth - kw.offsetWidth) / 2;
      grid.scrollLeft = Math.max(0, target);
    });
  }

  function setupPopupDrag() {
    const small = document.getElementById('wp-small');
    let down = null;
    let lastTouchT = 0;   // dedup mouse events that follow a touch on iOS/Android

    function onDown(e) {
      if (POP.classList.contains('expanded')) return;
      // Don't start a drag from interactive children.
      if (e.target.closest('a, button, .state-menu')) return;
      // Skip the synthetic mouse* events that touch devices fire ~50–300 ms
      // after a real touchstart/touchend. Without this, a single tap fires
      // onDown twice and the popup behaves unpredictably.
      if (e.type === 'mousedown' && Date.now() - lastTouchT < 700) return;
      if (e.type === 'touchstart') lastTouchT = Date.now();

      const isTouch = e.touches && e.touches.length;
      const x = isTouch ? e.touches[0].clientX : e.clientX;
      const y = isTouch ? e.touches[0].clientY : e.clientY;
      down = { x, y, isTouch: !!isTouch };
      POP.style.transition = 'none';
    }
    function onMove(e) {
      if (!down) return;
      const isTouch = e.touches && e.touches.length;
      // Ignore mouse-move stream while a touch drag is active.
      if (down.isTouch && e.type === 'mousemove') return;
      const x = isTouch ? e.touches[0].clientX : e.clientX;
      const y = isTouch ? e.touches[0].clientY : e.clientY;
      const dx = x - down.x;
      const dy = y - down.y;
      // Move the card with the finger in the dominant direction so the user
      // can see what gesture they're performing.
      const horiz = Math.abs(dx) > Math.abs(dy);
      POP.style.transform = horiz ? `translateX(${dx}px)` : `translateY(${dy}px)`;
      const dist = Math.max(Math.abs(dx), Math.abs(dy));
      POP.style.opacity = String(Math.max(0.5, 1 - dist / 240));
      // Prevent the page from scrolling while we drag the popup.
      if (isTouch && e.cancelable) e.preventDefault();
    }
    function onUp(e) {
      if (!down) return;
      if (down.isTouch && e.type === 'mouseup') return;   // ignore phantom mouseup
      if (e.type === 'touchend') lastTouchT = Date.now();

      const isTouch = e.changedTouches && e.changedTouches.length;
      const x = isTouch ? e.changedTouches[0].clientX : e.clientX;
      const y = isTouch ? e.changedTouches[0].clientY : e.clientY;
      const dx = x - down.x;
      const dy = y - down.y;
      down = null;
      POP.style.transition = 'transform .2s ease, opacity .2s ease';
      POP.style.transform = '';
      POP.style.opacity = '';

      // Direction-based dispatch:
      //   ↑   ⇒  Naver dictionary (full-screen)
      //   ←   ⇒  Corpus (KWIC view from user lessons)
      //   ↓   ⇒  close
      const horiz = Math.abs(dx) > Math.abs(dy);
      if (!horiz && dy < -40) {
        expandPopup('naver');
      } else if (horiz && dx < -50) {
        expandPopup('corpus');
      } else if (!horiz && dy > 50) {
        POP.style.transform = 'translateY(60px)';
        POP.style.opacity = '0';
        setTimeout(hidePopup, 180);
      }
    }

    small.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    small.addEventListener('touchstart', onDown, { passive: true });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
    document.addEventListener('touchcancel', onUp);

    document.getElementById('wp-close').addEventListener('click', hidePopup);
  }

  // ============== translation card population ==============
  function renderStateBadge(badgeEl, state) {
    if (!badgeEl) return;
    if (state === undefined || state === null || state === 0) {
      badgeEl.style.display = 'none';
      return;
    }
    badgeEl.style.display = '';
    badgeEl.classList.remove('s1','s2','s3','s4','s5','sx');
    const cls = classFor(state);
    if (cls) badgeEl.classList.add(cls);
    const k = String(state);
    badgeEl.textContent = STATE_GLYPH[k] || '·';
    badgeEl.setAttribute('aria-label', '단어 상태: ' + (STATE_LABEL[state] || ''));
  }

  function closeStateMenu() {
    document.querySelectorAll('.state-menu').forEach(m => m.remove());
  }

  function buildStateMenu(currentState, onPick) {
    const menu = document.createElement('div');
    menu.className = 'state-menu';
    const items = [
      { state: -1, label: '무시',              glyph: '🗑' },
      { state:  1, label: '새로운 단어',        glyph: '1' },
      { state:  2, label: '어디선가 본 단어',    glyph: '2' },
      { state:  3, label: '익숙한 단어',        glyph: '3' },
      { state:  4, label: '배운 단어',          glyph: '4' },
      { state:  5, label: '완전히 아는 단어',    glyph: '✓' },
    ];
    for (const it of items) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'state-menu-item';
      if (it.state === currentState) b.classList.add('active');
      b.dataset.state = String(it.state);
      b.innerHTML = `<span class="icon">${it.glyph}</span><span>${it.label}</span>`;
      b.addEventListener('click', (ev) => { ev.stopPropagation(); onPick(it.state); });
      menu.appendChild(b);
    }
    return menu;
  }

  function placeMenu(menu, anchor) {
    document.body.appendChild(menu);
    void menu.offsetHeight;
    const r = anchor.getBoundingClientRect();
    const margin = 8;
    const menuW = menu.offsetWidth;
    const menuH = menu.offsetHeight;
    const spaceBelow = window.innerHeight - r.bottom - margin - 10;
    const spaceAbove = r.top - margin - 10;
    let top;
    if (spaceBelow >= menuH) top = r.bottom + margin;
    else if (spaceAbove >= menuH) top = r.top - margin - menuH;
    else {
      top = (spaceBelow > spaceAbove)
        ? r.bottom + margin
        : Math.max(10, r.top - margin - Math.min(menuH, spaceAbove + 30));
      menu.style.maxHeight = (Math.max(spaceBelow, spaceAbove) + 30) + 'px';
    }
    let left = r.right - menuW;
    if (left < 10) left = 10;
    if (left + menuW > window.innerWidth - 10) left = window.innerWidth - menuW - 10;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
  }

  function bindBadgeClick() {
    const b = document.getElementById('wp-state');
    if (!b) return;
    b.onclick = (ev) => {
      ev.stopPropagation();
      const open = document.querySelector('.state-menu');
      if (open) { closeStateMenu(); return; }
      const cur = (WORD_STATES[CURRENT_WORD] && WORD_STATES[CURRENT_WORD].state) || 0;
      const menu = buildStateMenu(cur, async (newState) => {
        if (!CURRENT_WORD) { closeStateMenu(); return; }
        const upd = await DB.setWordState(CURRENT_WORD, newState);
        WORD_STATES[CURRENT_WORD] = { state: upd.state, last: upd.last };
        document.querySelectorAll('.w').forEach(el => {
          if (!el.dataset.word) return;
          if (el.dataset.word.toLowerCase() === CURRENT_WORD) {
            ['s1','s2','s3','s4','s5','sx'].forEach(c => el.classList.remove(c));
            const cls = classFor(upd.state);
            if (cls) el.classList.add(cls);
          }
        });
        renderStateBadge(document.getElementById('wp-state'), upd.state);
        closeStateMenu();
      });
      placeMenu(menu, b);
    };
  }

  async function showWord(word, info, anchorEl) {
    closeStateMenu();
    CURRENT_WORD = word.toLowerCase();
    CURRENT_WORD_EL = anchorEl;
    const stateNow = (WORD_STATES[CURRENT_WORD] && WORD_STATES[CURRENT_WORD].state) || 0;

    document.getElementById('wp-word').textContent = word;
    document.getElementById('wp-trans').innerHTML = '<span class="tx-loading">번역 중...</span>';
    const sensesEl = document.getElementById('wp-senses');
    if (sensesEl) { sensesEl.innerHTML = ''; sensesEl.hidden = true; }
    refreshHeart();

    if (info && info.isFirstClick) renderStateBadge(document.getElementById('wp-state'), 0);
    else                            renderStateBadge(document.getElementById('wp-state'), stateNow);

    bindBadgeClick();

    const sp = document.getElementById('wp-speak');
    sp.onclick = (ev) => { ev.stopPropagation(); TTS.speak(word); };
    TTS.speak(word);

    placePopBelowAnchor(anchorEl);

    // Primary translation (DeepL by default).
    try {
      const ko = await Translate.translate(word);
      document.getElementById('wp-trans').innerHTML = `<span class="ko">${escapeHtml(ko)}</span>`;
    } catch (err) {
      document.getElementById('wp-trans').innerHTML = '<span class="muted">번역을 불러오지 못했습니다.</span>';
    }

    // Bilingual-dictionary lookup (multi-meaning) in parallel; appended below.
    if (Translate.lookupSenses && sensesEl) {
      Translate.lookupSenses(word).then(senses => {
        if (CURRENT_WORD !== word.toLowerCase()) return;
        if (!senses || senses.length < 2) return;
        const byPos = {};
        for (const s of senses) {
          const k = s.pos || '';
          (byPos[k] = byPos[k] || []).push(s.ko);
        }
        sensesEl.innerHTML = '';
        for (const [pos, kos] of Object.entries(byPos)) {
          const li = document.createElement('li');
          li.innerHTML = (pos ? `<span class="pos">${escapeHtml(pos)}</span> ` : '') +
                         escapeHtml(kos.slice(0, 6).join(', '));
          sensesEl.appendChild(li);
        }
        sensesEl.hidden = false;
        if (CURRENT_WORD_EL) placePopBelowAnchor(CURRENT_WORD_EL);
      }).catch(()=>{});
    }
  }

  async function showPhrase(phrase, anchorEl) {
    closeStateMenu();
    CURRENT_WORD = phrase.toLowerCase();
    CURRENT_WORD_EL = anchorEl;

    document.getElementById('wp-word').textContent = phrase;
    document.getElementById('wp-trans').innerHTML = '<span class="tx-loading">번역 중...</span>';
    renderStateBadge(document.getElementById('wp-state'), 0);

    const sp = document.getElementById('wp-speak');
    sp.onclick = (ev) => { ev.stopPropagation(); TTS.speak(phrase); };

    // For phrases, anchor under the first selected word if available.
    let anchor = anchorEl;
    if (!anchor) anchor = document.querySelector('.w.sel') || document.querySelector('.w.active');
    if (anchor) placePopBelowAnchor(anchor);
    else {
      POP.hidden = false;
      POP.style.top = '20%'; POP.style.left = '50%';
      POP.style.transform = 'translateX(-50%)';
    }

    try {
      const ko = await Translate.translate(phrase);
      document.getElementById('wp-trans').innerHTML = `<span class="ko">${escapeHtml(ko)}</span>`;
    } catch (err) {
      document.getElementById('wp-trans').innerHTML = '<span class="muted">번역을 불러오지 못했습니다.</span>';
    }
  }

  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

  // Tap outside the popup or menu to close.
  document.addEventListener('click', (e) => {
    if (e.target.closest('.state-menu')) return;
    if (e.target.closest('.tx-state-badge')) return;
    closeStateMenu();
    if (POP.hidden) return;
    if (POP.contains(e.target)) return;
    if (e.target.closest('.lesson-text')) return;
    if (e.target.closest('.playbar')) return;
    if (e.target.closest('.lesson-progress')) return;
    hidePopup();
  });

  // ============== audio playback ==============
  let audioEl = null;
  let ttsPlaying = false;
  let ttsStartTime = 0;
  let ttsDuration  = 0;
  let ttsTimer = null;
  let speed = 1;
  const speeds = [0.75, 1, 1.25, 1.5];

  function setupAudio() {
    const playBtn = document.getElementById('play-btn');
    const speedBtn = document.getElementById('speed-btn');
    const fill = document.getElementById('prog-fill');
    const cur = document.getElementById('time-cur');
    const tot = document.getElementById('time-tot');
    const prog = document.getElementById('prog');

    function fmt(s) {
      s = Math.max(0, Math.floor(s || 0));
      const m = Math.floor(s/60);
      const r = s % 60;
      return `${m}:${r.toString().padStart(2,'0')}`;
    }

    if (LESSON && LESSON.audio_url) {
      audioEl = new Audio(LESSON.audio_url);
      audioEl.preload = 'metadata';
      audioEl.addEventListener('loadedmetadata', () => { tot.textContent = fmt(audioEl.duration); });
      audioEl.addEventListener('timeupdate', () => {
        cur.textContent = fmt(audioEl.currentTime);
        const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
        fill.style.width = pct + '%';

        // Skip page / sentence updates while the slide animation is running
        // — the DOM is mid-swap and SENTENCE_MAP isn't valid for the new page yet.
        if (animating) return;
        if (!audioEl.duration || TOTAL_CHARS === 0 || !PAGE_CHARS.length) return;

        // 1) Convert "where are we in the audio" into "how many chars into the
        //    whole lesson" so we can find the matching page and sentence.
        const ratio       = audioEl.currentTime / audioEl.duration;
        const targetChars = ratio * TOTAL_CHARS;

        let cum = 0;
        let targetPage = PAGE_CHARS.length - 1;
        for (let p = 0; p < PAGE_CHARS.length; p++) {
          if (cum + PAGE_CHARS[p] > targetChars) { targetPage = p; break; }
          cum += PAGE_CHARS[p];
        }

        // 2) If the audio has crossed into a different page, slide the page
        //    one step in that direction. Audio keeps playing.
        if (targetPage !== pageIdx) {
          goPage(targetPage > pageIdx ? +1 : -1);
          return;
        }

        // 3) Same page — underline the sentence the audio is currently on,
        //    using the LOCAL position within this page.
        if (SENTENCE_MAP.length > 0) {
          const localChars  = targetChars - cum;
          const sentTotal   = SENTENCE_MAP.reduce((s, x) => s + x.text.length, 0) || 1;
          let scum = 0, idx = SENTENCE_MAP.length - 1;
          for (let i = 0; i < SENTENCE_MAP.length; i++) {
            scum += SENTENCE_MAP[i].text.length;
            if (scum >= localChars) { idx = i; break; }
          }
          if (idx !== CURRENT_SENTENCE) setCurrentSentence(idx);
        }
      });
      audioEl.addEventListener('ended', () => {
        playBtn.textContent = '▶';
        setCurrentSentence(-1);
      });
      audioEl.addEventListener('pause', () => { playBtn.textContent = '▶'; });
      audioEl.addEventListener('play',  () => { playBtn.textContent = '⏸'; });
      playBtn.addEventListener('click', () => {
        if (audioEl.paused) audioEl.play();
        else                audioEl.pause();
      });
      prog.addEventListener('click', (e) => {
        const r = prog.getBoundingClientRect();
        const pct = (e.clientX - r.left) / r.width;
        if (audioEl.duration) audioEl.currentTime = pct * audioEl.duration;
      });
      speedBtn.addEventListener('click', () => {
        const i = (speeds.indexOf(speed) + 1) % speeds.length;
        speed = speeds[i]; speedBtn.textContent = speed + '×';
        audioEl.playbackRate = speed;
      });
    } else {
      const text = (LESSON.body || '').trim();
      function estimateDuration() { return Math.max(2, text.length / (14 * speed)); }
      ttsDuration = estimateDuration();
      tot.textContent = fmt(ttsDuration);
      function tick() {
        if (!ttsPlaying) return;
        const elapsed = (Date.now() - ttsStartTime) / 1000;
        cur.textContent = fmt(Math.min(elapsed, ttsDuration));
        const pct = Math.min(100, (elapsed / ttsDuration) * 100);
        fill.style.width = pct + '%';
        if (elapsed < ttsDuration) ttsTimer = setTimeout(tick, 250);
      }
      // Sentence-by-sentence TTS so we can underline the current line as it
      // is being read. After the last sentence on the current page, auto-flip
      // to the next page (with the slide animation) and keep going from its
      // first sentence — playback continues uninterrupted across pages.
      async function startTTS() {
        ttsPlaying = true;
        ttsStartTime = Date.now();
        ttsDuration = estimateDuration();
        tot.textContent = fmt(ttsDuration);
        playBtn.textContent = '⏸';
        tick();

        // Outer loop: advance through pages while the user hasn't paused.
        while (ttsPlaying) {
          // Always re-read SENTENCE_MAP at the start of each page so we
          // pick up the freshly-rendered text (page may have just changed).
          buildSentenceMap(document.getElementById('lesson-text'));
          const list = SENTENCE_MAP.length
            ? SENTENCE_MAP.map(s => s.text)
            : [text];

          for (let i = 0; i < list.length; i++) {
            if (!ttsPlaying) break;
            if (SENTENCE_MAP.length) setCurrentSentence(i);
            await new Promise(resolve => {
              TTS.speak(list[i], { rate: 0.9 * speed, onend: resolve });
            });
          }
          if (!ttsPlaying) break;

          // Last page reached — finish.
          if (pageIdx >= PAGES.length - 1) break;

          // Otherwise, slide to the next page and resume on its sentence 0.
          await new Promise(resolve => {
            goPage(+1);
            // Wait a hair longer than goPage's 300 ms slide so SENTENCE_MAP
            // is rebuilt for the new page before we loop again.
            setTimeout(resolve, 340);
          });
        }

        ttsPlaying = false;
        setCurrentSentence(-1);
        playBtn.textContent = '▶';
        fill.style.width = '100%';
        cur.textContent = fmt(ttsDuration);
      }
      function stopTTS() {
        ttsPlaying = false; TTS.stop();
        clearTimeout(ttsTimer);
        setCurrentSentence(-1);
        playBtn.textContent = '▶';
      }
      playBtn.addEventListener('click', () => { if (!ttsPlaying) startTTS(); else stopTTS(); });
      speedBtn.addEventListener('click', () => {
        const i = (speeds.indexOf(speed) + 1) % speeds.length;
        speed = speeds[i]; speedBtn.textContent = speed + '×';
        if (ttsPlaying) { stopTTS(); startTTS(); }
        else { ttsDuration = estimateDuration(); tot.textContent = fmt(ttsDuration); }
      });
    }
  }
})();
</script>
