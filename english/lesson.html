<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>레슨 · English</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="behind lesson-page">

  <main class="container">
    <div class="lesson-layout">
      <section class="lesson-main" id="lesson-main">
        <div class="lesson-title-row">
          <a class="back-btn" href="index.html" aria-label="뒤로">
            <img src="images/back.jpg" alt="뒤로" onerror="this.style.display='none';this.parentNode.textContent='‹';">
          </a>
          <h1 id="lesson-title">불러오는 중...</h1>
        </div>

        <div class="lesson-head">
          <div class="head-spacer"></div>
          <div class="head-tools">
            <button class="toggle-btn dict" id="tts-toggle-btn"  title="음성 엔진 전환 (Google Cloud ↔ Web Speech)">GC</button>
            <button class="toggle-btn dict" id="tx-toggle-btn"   title="번역기 전환 (DeepL ↔ Google)">DL</button>
            <button class="toggle-btn"      id="mode-toggle-btn" title="읽기 모드 전환 (하나씩 ↔ 이어서)">하나씩</button>
            <button class="toggle-btn"      id="bookmark-btn"    title="이 레슨을 찜한 레슨으로 추가/제거">찜</button>
          </div>
        </div>

        <div class="lesson-text-wrap" id="lesson-text-wrap">
          <div class="lesson-text" id="lesson-text"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- Anchored word popup. Small by default — drag UP to expand into Naver
       Endic, drag DOWN (only when small) to dismiss. The big view has a × in
       the top-right that closes the popup completely. -->
  <div class="word-pop" id="word-pop" hidden>
    <div class="wp-small" id="wp-small">
      <div class="wp-head">
        <button class="speak" id="wp-speak" title="발음 듣기">🔊</button>
        <span class="word-text" id="wp-word">—</span>
        <button class="wp-heart" id="wp-heart" title="퀴즈 카드에 추가" aria-pressed="false">♡</button>
        <button class="tx-state-badge" id="wp-state" style="display:none" title="단어 상태 변경">·</button>
        <button class="wp-close-x" id="wp-close-x" aria-label="닫기">×</button>
      </div>
      <div class="wp-trans" id="wp-trans"><span class="tx-loading">번역 중...</span></div>
      <ul class="wp-senses" id="wp-senses" hidden></ul>
      <div class="wp-hint">↑ 사전 · ← 예문 · ↓ 닫기 · <kbd>Esc</kbd></div>
    </div>

    <div class="wp-large" id="wp-large">
      <div class="wp-large-head">
        <span class="word-text" id="wp-word-large">—</span>
        <a class="open-naver" id="wp-naver-open" target="_blank" rel="noopener">Naver에서 열기 ↗</a>
        <button class="wp-close" id="wp-close" aria-label="닫기">×</button>
      </div>
      <div class="wp-iframe-wrap">
        <div class="wp-fallback">
          네이버 사전을 불러오는 중...<br>
          페이지가 비어 있다면 임베드가 차단된 것입니다.
          <a id="wp-naver-link" target="_blank" rel="noopener">Naver 사전에서 결과 열기 →</a>
        </div>
        <iframe id="wp-iframe" src="" title="Naver English Dictionary"
                referrerpolicy="origin"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
        <!-- KWIC corpus view: built from the user's own lessons. Shown when
             the dictionary toggle is set to C. -->
        <div class="wp-corpus" id="wp-corpus" hidden></div>
      </div>
    </div>
  </div>

  <!-- Default lesson bar — round play button on the left, page slider in
       the middle (so it's right above the user's thumb), and the practice
       button on the right. Pressing play swaps in the playbar below. -->
  <div class="lesson-bar" id="lesson-bar">
    <button class="lb-play" id="lb-play" aria-label="재생 시작">▶</button>
    <div class="lesson-progress lb-progress">
      <button class="lp-btn" id="page-prev" aria-label="이전 페이지">‹</button>
      <div class="lp-track">
        <div class="lp-fill" id="lp-fill"></div>
        <div class="lp-dot"  id="lp-dot"></div>
      </div>
      <span class="lp-pages" id="lp-pages">1 / 1</span>
      <button class="lp-btn" id="page-next" aria-label="다음 페이지">›</button>
    </div>
    <button class="lb-practice" id="lb-practice" aria-label="연습">
      <img src="images/card.png" alt="연습" onerror="this.style.display='none';this.parentNode.textContent='연습';">
    </button>
  </div>

  <!-- PC sidebar for 이어서 mode. Hidden on mobile (CSS) and unused in
       하나씩 / 이어서(밑줄) modes. Content mirrors what the popup card would
       show, plus a "+ 구문에 추가" button for saving phrases. -->
  <aside class="lesson-sidebar" id="lesson-sidebar" hidden>
    <button class="ls-close" id="ls-close" aria-label="사이드바 닫기" title="사이드바 닫기">
      <img src="images/closeside.png" alt="" onerror="this.style.display='none';this.parentNode.textContent='›';">
    </button>
    <div class="ls-empty" id="ls-empty">
      <div class="ls-empty-ico">↩</div>
      이어서 모드에서<br>단어를 선택하면<br>여기에 표시됩니다.
    </div>
    <div class="ls-card" id="ls-card" hidden>
      <div class="ls-card-head">
        <span class="ls-word" id="ls-word">—</span>
        <span class="ls-pos-tags" id="ls-pos-tags"></span>
        <button class="wp-heart" id="ls-heart" title="퀴즈 카드에 추가" aria-pressed="false">♡</button>
        <button class="speak" id="ls-speak" title="발음 듣기">🔊</button>
      </div>
      <div class="ls-section-label">한국어 뜻</div>
      <div class="ls-trans" id="ls-trans"><span class="tx-loading">번역 중...</span></div>
      <div class="ls-section-label" id="ls-meanings-label" hidden>Popular Meanings</div>
      <ul class="ls-senses" id="ls-senses" hidden></ul>
      <button class="ls-add" id="ls-add" hidden>
        <img src="images/add.jpg" alt="" onerror="this.style.display='none';">
        <span>구문에 추가</span>
      </button>
      <div class="ls-section-label">단계</div>
      <div class="level-bar" id="ls-level"></div>
    </div>
  </aside>
  <!-- Floating toggle so the user can re-open the sidebar after closing it,
       without leaving 이어서 mode. -->
  <button class="lesson-sidebar-toggle" id="ls-toggle" aria-label="사이드바 열기">
    <img src="images/closeside.png" alt="" onerror="this.style.display='none';this.parentNode.textContent='‹';">
  </button>

  <!-- Practice overlay. Switches between three stages: menu, word memo,
       sentence reorder, quiz. JS owns the contents of `practice-stage`. -->
  <div class="practice-overlay" id="practice-overlay" hidden>
    <div class="practice-stage" id="practice-stage" role="dialog" aria-label="연습"></div>
  </div>

  <!-- Audio playback bar (hidden until the play button on the lesson bar
       is pressed). The X on the right hides this bar and brings back the
       lesson bar. -->
  <div class="playbar" id="playbar" hidden>
    <button class="pb-btn pb-play" id="play-btn" aria-label="재생/일시정지">▶</button>
    <span class="time" id="time-cur">0:00</span>
    <div class="progress" id="prog"><i id="prog-fill"></i></div>
    <span class="time" id="time-tot">0:00</span>
    <button class="pb-btn" id="speed-btn" title="재생 속도">1×</button>
    <button class="pb-btn pb-close" id="pb-close" aria-label="플레이바 닫기">×</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/tts.js"></script>
<script src="js/translate.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  Auth.gate(async () => {
    await renderHeader();
    await renderLesson();
  });

  async function renderHeader() {
    // The lesson page no longer renders a topbar with account info, but this
    // function used to update those elements. Bail out gracefully when the
    // expected DOM nodes aren't present so the rest of renderLesson() runs.
    const name = document.getElementById('acct-name');
    if (!name) return;
    const avatar = document.getElementById('acct-avatar');
    if (DB.isTryMode()) { name.textContent = '체험 모드'; if (avatar) avatar.textContent = '체'; return; }
    const u = await DB.currentUser();
    const label = (u && (u.email || '').split('@')[0]) || '사용자';
    name.textContent = label;
    if (avatar) avatar.textContent = (label[0] || 'U').toUpperCase();
  }

  // ============== mode toggle ==============
  // MODE: 'single' (popup-per-word) | 'cont' (inline gray translations).
  // The dictionary (Naver vs Corpus) is no longer a toggle — it's chosen by
  // gesture on the small popup: drag UP for Naver, swipe LEFT for Corpus,
  // drag DOWN to close.
  const PREF_KEY = 'eng.v1.lessonPrefs';
  const prefs = (() => {
    try { return JSON.parse(localStorage.getItem(PREF_KEY) || '{}') || {}; }
    catch (e) { return {}; }
  })();
  // MODE values:
  //   single  — 하나씩       (popup card per click; existing default)
  //   cont    — 이어서       (popup card too, but selection accumulates within a sentence)
  //   contU   — 이어서(밑줄) — inline gray translation under the line; bigger KR font
  let MODE = ({ single: 'single', cont: 'cont', contU: 'contU' })[prefs.mode] || 'single';
  function savePrefs() {
    try { localStorage.setItem(PREF_KEY, JSON.stringify({ mode: MODE })); }
    catch (e) {}
  }
  function modeLabel(m) {
    return m === 'contU' ? '<u>이어서</u>'
         : m === 'cont'  ? '이어서'
         :                  '하나씩';
  }
  function nextMode(m) {
    return m === 'single' ? 'cont' : (m === 'cont' ? 'contU' : 'single');
  }
  // Selected words in 이어서 mode (Set of .w elements on the live page).
  const CONT_SELECTED = new Set();

  // ============== state metadata ==============
  const STATE_LABEL = {
    [-1]: '무시',
     0:   '새로운 단어',
     1:   '새로운 단어',
     2:   '어디선가 본 단어',
     3:   '익숙한 단어',
     4:   '배운 단어',
     5:   '완전히 아는 단어',
  };
  const STATE_GLYPH = { '-1': '🗑', '1': '1', '2': '2', '3': '3', '4': '4', '5': '✓' };
  function classFor(state) {
    if (state === -1) return 'sx';
    if (state >= 1 && state <= 5) return 's' + state;
    return '';
  }

  // ============== load + render lesson ==============
  const params = new URLSearchParams(location.search);
  const lessonId = params.get('id');

  let LESSON = null;
  let WORD_STATES = {};
  let PAGES = [];
  let pageIdx = 0;
  let CURRENT_WORD = null;
  let CURRENT_WORD_EL = null;
  let animating = false;

  // Finger-follow page swipe state. While the user is dragging horizontally
  // we live-translate the current page AND the next/prev page; on release
  // we either commit (animate to next slot) or snap back.
  let SWIPE = null;          // { direction, peekRoot, currentRoot, width }
  let lastSwipeT = 0;        // suppresses the synthetic click after a commit

  // Sentence index for the currently-rendered page. Lets us underline the
  // sentence the audio is reading and step through TTS one sentence at a time.
  let SENTENCE_MAP = [];     // [{ text, words: [HTMLElement] }]
  let CURRENT_SENTENCE = -1;

  // Per-page character counts. Used by audio-file playback to map the
  // current playback time to a page index (so we can auto-flip pages while
  // the audio keeps playing).
  let PAGE_CHARS  = [];
  let TOTAL_CHARS = 0;
  function computePageCharCounts() {
    PAGE_CHARS = (PAGES || []).map(p => (p || []).join(' ').length);
    TOTAL_CHARS = PAGE_CHARS.reduce((s, x) => s + x, 0);
  }

  async function renderLesson() {
    if (!lessonId) {
      document.getElementById('lesson-title').textContent = '레슨을 찾을 수 없습니다.';
      return;
    }
    LESSON = await DB.getLesson(lessonId);
    if (!LESSON) {
      document.getElementById('lesson-title').textContent = '레슨을 찾을 수 없습니다.';
      return;
    }
    WORD_STATES = await DB.loadWordStates();

    document.getElementById('lesson-title').textContent = LESSON.title || '제목 없음';
    refreshBookmarkBtn();

    applyModeClass();             // sets .mode-cont on lesson-text wrap if needed
    setupLessonBar();
    sizeLessonMain();
    await new Promise(r => requestAnimationFrame(r));
    PAGES = paginateByHeight(LESSON.body || '');
    computePageCharCounts();
    pageIdx = 0;
    renderInto(document.getElementById('lesson-text'), PAGES[pageIdx] || []);
    bindWordInteractions(document.getElementById('lesson-text'));
    buildSentenceMap(document.getElementById('lesson-text'));
    updateProgress();
    setupAudio();
    setupPopupDrag();
    setupToggles();
    setupKeyboardShortcuts();
    setupPracticeMenu();
    setupHeartButton();
    setupCloseXButton();
    setupSidebar();
    applySidebarVisibility();
  }

  // ============== PC sidebar (이어서 mode only) ==============
  let SIDEBAR_OPEN = true;          // user pref within cont mode
  let SIDEBAR_PHRASE = null;        // { text, ko } currently displayed (for the add button)

  function useSidebar() {
    return MODE === 'cont' && window.matchMedia('(min-width: 1024px)').matches;
  }

  function applySidebarVisibility() {
    const sb = document.getElementById('lesson-sidebar');
    const tg = document.getElementById('ls-toggle');
    if (!sb || !tg) return;
    const shouldShow = useSidebar();
    if (!shouldShow) {
      sb.hidden = true;
      tg.hidden = true;
      document.body.classList.remove('sidebar-open');
      return;
    }
    if (SIDEBAR_OPEN) {
      sb.hidden = false;
      tg.hidden = true;
      document.body.classList.add('sidebar-open');
    } else {
      sb.hidden = true;
      tg.hidden = false;
      document.body.classList.remove('sidebar-open');
    }
  }

  function setupSidebar() {
    const close = document.getElementById('ls-close');
    const toggle = document.getElementById('ls-toggle');
    const add = document.getElementById('ls-add');
    if (close)  close.addEventListener('click', () => { SIDEBAR_OPEN = false; applySidebarVisibility(); });
    if (toggle) toggle.addEventListener('click', () => { SIDEBAR_OPEN = true;  applySidebarVisibility(); });
    if (add) add.addEventListener('click', () => {
      if (!SIDEBAR_PHRASE) return;
      try { DB.addPhrase(SIDEBAR_PHRASE.text, SIDEBAR_PHRASE.ko, lessonId); } catch (e) {}
      add.classList.add('added');
      const span = add.querySelector('span');
      if (span) span.textContent = '추가됨 ✓';
    });
  }

  function clearSidebar() {
    const card  = document.getElementById('ls-card');
    const empty = document.getElementById('ls-empty');
    if (card)  card.hidden = true;
    if (empty) {
      empty.hidden = false;
      // Replace the placeholder with a list of words the user has clicked
      // before in this lesson, paired with the cached Korean meaning when
      // we have one. Keeps the sidebar useful even with no active selection.
      renderSidebarWordList(empty);
    }
    SIDEBAR_PHRASE = null;
  }

  function renderSidebarWordList(host) {
    // Pull every word state with state ≥ 1 (clicked at least twice).
    const entries = Object.entries(WORD_STATES || {})
      .filter(([w, v]) => v && v.state >= 1)
      .map(([w, v]) => ({ word: w, state: v.state }));
    if (!entries.length) {
      host.innerHTML = `
        <div class="ls-empty-ico">↩</div>
        이어서 모드에서<br>단어를 선택하면<br>여기에 표시됩니다.
      `;
      return;
    }
    // Group by state, keep highest first (newest clicks usually).
    entries.sort((a, b) => a.state - b.state);
    host.innerHTML = `
      <div class="ls-list-head">
        <span class="ls-list-title">내가 본 단어</span>
        <span class="ls-list-count">${entries.length}</span>
      </div>
      <ul class="ls-word-list" id="ls-word-list"></ul>
    `;
    const ul = host.querySelector('#ls-word-list');
    // Synchronously render rows; fill translations from cache if present,
    // otherwise lazy-fetch in the background so initial paint is instant.
    const STATE_COLOR = { 1:'word-1', 2:'word-2', 3:'word-3', 4:'word-4', 5:'word-5' };
    entries.forEach(e => {
      const li = document.createElement('li');
      li.className = 'ls-word-item';
      li.innerHTML = `
        <span class="ls-w" data-word="${escapeHtml(e.word)}">${escapeHtml(e.word)}</span>
        <span class="ls-tx muted">…</span>
      `;
      const sw = li.querySelector('.ls-w');
      sw.style.background = `var(--${STATE_COLOR[e.state] || 'word-new'})`;
      sw.onclick = () => {
        // Clicking a row in the empty-state list speaks the word and shows
        // the full card for it.
        TTS.speak(e.word);
        showInSidebar(e.word);
      };
      ul.appendChild(li);

      // Lazy translation: cache check first.
      Translate.translate(e.word).then(ko => {
        const tx = li.querySelector('.ls-tx');
        if (tx) { tx.textContent = ko || ''; tx.classList.remove('muted'); }
      }).catch(()=>{});
    });
  }

  async function showInSidebar(text) {
    const card  = document.getElementById('ls-card');
    const empty = document.getElementById('ls-empty');
    if (!card || !empty) return;
    card.hidden = false;
    empty.hidden = true;

    const isPhrase = /\s/.test(text);
    const lower = text.toLowerCase();
    document.getElementById('ls-word').textContent = text;

    const sp = document.getElementById('ls-speak');
    if (sp) sp.onclick = () => TTS.speak(text);
    TTS.speak(text);

    // Heart: only meaningful for a single word.
    const heart = document.getElementById('ls-heart');
    if (heart) {
      heart.style.display = isPhrase ? 'none' : '';
      if (!isPhrase) {
        const refresh = () => {
          const on = DB.isHearted(lower);
          heart.classList.toggle('on', on);
          heart.textContent = on ? '♥' : '♡';
        };
        heart.onclick = (e) => { e.stopPropagation(); DB.setHearted(lower, !DB.isHearted(lower)); refresh(); };
        refresh();
      }
    }

    // Level-picker bar at the bottom of the sidebar — same component the
    // quiz-feedback card uses. Phrases skip this (state is per-word).
    const levelHost = document.getElementById('ls-level');
    if (levelHost) {
      if (isPhrase) levelHost.innerHTML = '';
      else mountLevelBar(levelHost, text);
    }

    // Add button: only for phrases.
    const addBtn = document.getElementById('ls-add');
    if (addBtn) {
      addBtn.hidden = !isPhrase;
      addBtn.classList.remove('added');
      const span = addBtn.querySelector('span');
      if (span) span.textContent = '구문에 추가';
    }

    // Translation + senses (lazy-fill).
    const transEl    = document.getElementById('ls-trans');
    const sensesEl   = document.getElementById('ls-senses');
    const sensesLab  = document.getElementById('ls-meanings-label');
    const posTagsEl  = document.getElementById('ls-pos-tags');
    if (transEl)   transEl.innerHTML   = '<span class="tx-loading">번역 중...</span>';
    if (sensesEl)  { sensesEl.innerHTML = ''; sensesEl.hidden = true; }
    if (sensesLab) sensesLab.hidden = true;
    if (posTagsEl) posTagsEl.innerHTML = '';
    SIDEBAR_PHRASE = { text, ko: '' };

    try {
      const ko = await Translate.translate(text);
      SIDEBAR_PHRASE = { text, ko };
      if (transEl) transEl.innerHTML = `<span class="ko">${escapeHtml(ko)}</span>`;
    } catch (err) {
      if (transEl) transEl.innerHTML = '<span class="muted">번역을 불러오지 못했습니다.</span>';
    }

    if (!isPhrase && Translate.lookupSenses && sensesEl) {
      Translate.lookupSenses(text).then(senses => {
        if (!senses || senses.length < 1) return;
        // Part-of-speech tags rendered next to the word (Noun / Verb chips).
        const posSet = new Set();
        const byPos = {};
        for (const s of senses) {
          const k = (s.pos || '').trim();
          if (k) posSet.add(k);
          (byPos[k] = byPos[k] || []).push(s.ko);
        }
        if (posTagsEl) {
          for (const p of posSet) {
            const tag = document.createElement('span');
            tag.className = 'ls-pos-tag';
            tag.textContent = p;
            posTagsEl.appendChild(tag);
          }
        }
        // "Popular Meanings" — one row per Korean meaning, with a + button
        // (shown for visual parity with the reference; clicking is a noop
        // for now since we always use the primary translation).
        if (senses.length >= 2 || (senses.length === 1 && senses[0].ko !== (SIDEBAR_PHRASE && SIDEBAR_PHRASE.ko))) {
          sensesEl.innerHTML = '';
          for (const [pos, kos] of Object.entries(byPos)) {
            for (const ko of kos.slice(0, 6)) {
              const li = document.createElement('li');
              li.innerHTML =
                `<span class="ls-sense-ko">${escapeHtml(ko)}</span>` +
                (pos ? ` <span class="ls-sense-pos">${escapeHtml(pos)}</span>` : '');
              sensesEl.appendChild(li);
            }
          }
          sensesEl.hidden = false;
          if (sensesLab) sensesLab.hidden = false;
        }
      }).catch(()=>{});
    }
  }

  // ---------- keyboard shortcuts ----------
  // While the small word card is visible:
  //   Esc        — close
  //   Enter      — open Naver dictionary (drag-up equivalent)
  //   Space      — open Corpus  (swipe-left equivalent)
  // While the EXPANDED card is visible: Esc closes it.
  function setupKeyboardShortcuts() {
    document.addEventListener('keydown', (e) => {
      if (/(INPUT|TEXTAREA)/.test((e.target.tagName || ''))) return;
      const popVisible = !POP.hidden;
      if (!popVisible) return;
      if (e.key === 'Escape') { e.preventDefault(); hidePopup(); return; }
      if (POP.classList.contains('expanded')) return;     // only Esc above
      if (e.key === 'Enter') { e.preventDefault(); expandPopup('naver');  return; }
      if (e.code === 'Space') { e.preventDefault(); expandPopup('corpus'); return; }
    });
  }

  // ---------- heart button ----------
  function setupHeartButton() {
    const btn = document.getElementById('wp-heart');
    if (!btn) return;
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (!CURRENT_WORD) return;
      const next = !DB.isHearted(CURRENT_WORD);
      DB.setHearted(CURRENT_WORD, next);
      refreshHeart();
    });
  }
  function refreshHeart() {
    const btn = document.getElementById('wp-heart');
    if (!btn) return;
    const on = !!(CURRENT_WORD && DB.isHearted(CURRENT_WORD));
    btn.classList.toggle('on', on);
    btn.textContent = on ? '♥' : '♡';
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  }

  function renderPracticeMenu() {

          </button>

          <button class="qz-dots" aria-label="더 보기">

            <button class="pa-item" data-act="sentences">
