<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<title>The Space</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f1115;
    color: #fff;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; }

  /* ===== Desktop sidebar ===== */
  #sidebar {
    width: 280px;
    background: #161922;
    border-right: 1px solid #262a36;
    display: flex;
    flex-direction: column;
    padding: 20px;
    flex-shrink: 0;
  }
  #sidebar header { margin-bottom: 18px; }
  #sidebar h1 {
    font-size: 18px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.2px;
  }
  #sidebar .subtitle {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
  }
  #sidebar .back {
    display: inline-block;
    margin-top: 6px;
    font-size: 12px;
    color: #6366f1;
    text-decoration: none;
  }
  #sidebar .back:hover { text-decoration: underline; }

  .panel {
    background: #1c2030;
    border: 1px solid #262a36;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.55;
    margin-bottom: 16px;
  }
  .panel b { color: #e5e7eb; font-weight: 600; }

  .keys {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    margin-top: 8px;
  }
  .key {
    background: #262a36;
    color: #e5e7eb;
    text-align: center;
    padding: 6px 0;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  .key.empty { background: transparent; }

  #presencePanel { padding: 12px 14px; }
  #presencePanel .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  #presencePanel .header b { color: #e5e7eb; }
  #presenceCount {
    background: #262a36;
    color: #cbd5e1;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
  }
  #presenceList {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
  }
  .presence-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #cbd5e1;
  }
  .presence-row .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }
  .presence-row.me { color: #a5b4fc; font-weight: 600; }

  #chatForm {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #chatForm label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #6b7280;
    font-weight: 600;
  }
  #chatInput {
    width: 100%;
    padding: 11px 13px;
    background: #1c2030;
    color: #f1f5f9;
    border: 1px solid #2a2f3e;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  #chatInput::placeholder { color: #4b5563; }
  #chatInput:focus { border-color: #6366f1; }
  #chatSend {
    background: #6366f1;
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s;
  }
  #chatSend:hover { background: #4f46e5; }
  #chatSend:active { background: #4338ca; }
  #chatSend:disabled { background: #2a2f3e; cursor: not-allowed; color: #6b7280; }

  /* ===== World / stage ===== */
  #world {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a1f2e 0%, #0a0c12 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }
  #stageWrap {
    position: relative;
    transform-origin: center center;
  }
  #stage {
    position: relative;
    width: 1448px;
    height: 1086px;
    background-image: url('images/classroom.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    cursor: pointer;
  }

  .actor {
    position: absolute;
    width: 140px;
    height: 140px;
    will-change: left, top;
  }
  /* Remote characters get a short transition so their 10Hz updates
     look smooth instead of stepping in chunks. Local "me" has no
     transition so it stays perfectly responsive. */
  .actor.remote {
    transition: left 110ms linear, top 110ms linear;
  }
  .actor-sprite {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: auto;
    cursor: pointer;
    -webkit-user-drag: none;
  }
  .actor-name {
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    margin-bottom: 2px;
    background: rgba(15, 17, 21, 0.85);
    color: #fff;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .actor-name.show { opacity: 1; }

  .actor-bubble {
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    margin-bottom: 30px;
    background: #fff;
    color: #111827;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 500;
    max-width: 360px;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    line-height: 1.35;
    text-align: center;
  }
  .actor-bubble.show { opacity: 1; }
  .actor-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-style: solid;
    border-width: 10px 9px 0 9px;
    border-color: #fff transparent transparent transparent;
  }

  .hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    color: #e5e7eb;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 12px;
    pointer-events: none;
  }
  .status {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    color: #e5e7eb;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f59e0b;
    transition: background 0.3s;
  }
  .status.connected .dot { background: #22c55e; }
  .status.full .dot { background: #ef4444; }

  /* ===== Mobile-only UI ===== */
  .mobile-topbar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 40;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: rgba(15, 17, 21, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #262a36;
    align-items: center;
    gap: 12px;
  }
  .mt-back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: #1c2030;
    border: 1px solid #2a2f3e;
    border-radius: 10px;
    color: #e5e7eb;
    font-size: 18px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .mt-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .mt-name {
    font-size: 14px;
    font-weight: 700;
    color: #f1f5f9;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mt-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
  }
  .mt-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #f59e0b;
    transition: background 0.3s;
  }
  .mt-dot.connected { background: #22c55e; }
  .mt-dot.full       { background: #ef4444; }
  .mt-dot.offline    { background: #6b7280; }

  .fab {
    display: none;
    position: fixed;
    right: 18px;
    bottom: calc(env(safe-area-inset-bottom) + 22px);
    z-index: 50;
    height: 52px;
    padding: 0 20px;
    border-radius: 999px;
    background: #6366f1;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    border: none;
    box-shadow: 0 12px 28px rgba(99, 102, 241, 0.5);
    cursor: pointer;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .fab:active { transform: scale(0.96); }
  .fab .fab-emoji { font-size: 18px; }
  body.chat-open .fab {
    opacity: 0;
    transform: translateY(20px) scale(0.9);
    pointer-events: none;
  }

  .mobile-chat {
    display: none;
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: calc(env(safe-area-inset-bottom) + 14px);
    z-index: 60;
    background: #1c2030;
    border: 1px solid #2a2f3e;
    border-radius: 14px;
    padding: 8px;
    gap: 6px;
    align-items: center;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
    transform: translateY(120%);
    opacity: 0;
    transition: transform 0.22s cubic-bezier(.2,.8,.25,1), opacity 0.18s ease;
    pointer-events: none;
  }
  body.chat-open .mobile-chat {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-chat input {
    flex: 1;
    min-width: 0;
    background: #0f1115;
    border: 1px solid #2a2f3e;
    color: #f1f5f9;
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 16px; /* prevent iOS zoom */
    font-family: inherit;
    outline: none;
  }
  .mobile-chat input:focus { border-color: #6366f1; }
  .mobile-chat .mc-btn {
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 10px;
    height: 42px;
    padding: 0 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mobile-chat .mc-btn:active { background: #4f46e5; }
  .mobile-chat .mc-close {
    background: transparent;
    color: #94a3b8;
    border: none;
    width: 34px;
    height: 42px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    body { display: block; }
    #sidebar { display: none; }
    #world {
      width: 100vw;
      height: 100vh;
      padding-top: calc(env(safe-area-inset-top) + 64px);
      padding-bottom: calc(env(safe-area-inset-bottom) + 92px);
    }
    .mobile-topbar { display: flex; }
    .fab { display: inline-flex; }
    .mobile-chat { display: flex; }
    .hint, .status { display: none; }
    .actor-bubble { font-size: 22px; max-width: 70vw; }
  }

  /* ===== Blocker (no session) ===== */
  #blocker {
    position: fixed;
    inset: 0;
    background: rgba(15, 17, 21, 0.92);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    padding: 24px;
    text-align: center;
  }
  #blocker.show { display: flex; }
  #blocker h2 { font-size: 22px; margin-bottom: 10px; }
  #blocker p { color: #9ca3af; max-width: 360px; line-height: 1.5; }
  #blocker a {
    margin-top: 18px;
    background: #6366f1;
    color: #fff;
    padding: 10px 22px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
</style>
</head>
<body>
  <aside id="sidebar">
    <header>
      <h1>The Space</h1>
      <div class="subtitle">virtual classroom</div>
      <a class="back" href="../reading/home.html">← Back to lessons</a>
    </header>

    <div class="panel">
      <b>이동</b> · 화살표 키로 움직이거나, 가고 싶은 곳을 클릭해도 캐릭터가 따라갑니다.
      <div class="keys">
        <div class="key empty"></div>
        <div class="key">↑</div>
        <div class="key empty"></div>
        <div class="key">←</div>
        <div class="key">↓</div>
        <div class="key">→</div>
      </div>
    </div>

    <div class="panel" id="presencePanel">
      <div class="header">
        <b>접속 중</b>
        <span id="presenceCount">0 / 26</span>
      </div>
      <div id="presenceList"></div>
    </div>

    <form id="chatForm" autocomplete="off">
      <label for="chatInput">말하기</label>
      <input id="chatInput" type="text" placeholder="여기에 입력하고 Enter..." maxlength="120">
      <button id="chatSend" type="submit">전송</button>
    </form>
  </aside>

  <main id="world">
    <div id="stageWrap">
      <div id="stage"></div>
    </div>
    <div class="hint">화살표 키 또는 클릭으로 이동 · 다른 캐릭터를 누르면 이름이 보입니다</div>
    <div class="status" id="status"><span class="dot"></span><span id="statusText">연결 중...</span></div>
  </main>

  <!-- Mobile-only UI -->
  <header class="mobile-topbar" id="mobileTopbar">
    <a class="mt-back" href="../reading/home.html" aria-label="나가기">←</a>
    <div class="mt-info">
      <div class="mt-name" id="mtName">…</div>
      <div class="mt-meta">
        <span class="mt-dot" id="mtDot"></span>
        <span id="mtCount">0 / 26</span>
        <span>· 화면을 탭해 이동</span>
      </div>
    </div>
  </header>

  <button id="fab" type="button" class="fab" aria-label="말하기 열기">
    <span class="fab-emoji">💬</span>
    <span>말하기</span>
  </button>

  <form id="mobileChatForm" class="mobile-chat" autocomplete="off">
    <input id="mobileChatInput" type="text" placeholder="여기에 입력하고 전송" maxlength="120" enterkeyhint="send">
    <button class="mc-btn" type="submit">전송</button>
    <button class="mc-close" type="button" id="mobileChatClose" aria-label="닫기">✕</button>
  </form>

  <div id="blocker">
    <h2 id="blockerTitle">로그인이 필요합니다</h2>
    <p id="blockerMsg">The Space에 입장하려면 먼저 WordCatch에 로그인하세요.</p>
    <a id="blockerLink" href="../reading/index.html">로그인 화면으로</a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  // ---- config ---------------------------------------------------
  const SUPABASE_URL  = 'https://sbatsnivlrlywpfytlio.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_vwZUKHhhtBEjAgXrZQTNFQ_bQeM8Ypc';
  const CHANNEL_NAME  = 'the-space-room';
  const MAX_USERS     = 26;

  // ---- session check -------------------------------------------
  let session = null;
  try { session = JSON.parse(localStorage.getItem('wc.session.v1') || 'null'); } catch {}
  if (!session || !session.id || !session.real_name) {
    document.getElementById('blocker').classList.add('show');
    return;
  }
  const ME = {
    id:   String(session.id),
    name: String(session.real_name),
  };

  // Per-tab unique id used as the Realtime presence key. Critical:
  // if we used ME.id, two tabs/devices logged in as the same student
  // would collide on the same presence key and overwrite each other
  // (the newer track() would visually "kick" the older one off
  // everyone else's screen). A fresh UUID per tab keeps them
  // independent — multiple connections per user are allowed.
  const TAB_ID =
    (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : (Math.random().toString(36).slice(2) + Date.now().toString(36));

  // ---- refs ----------------------------------------------------
  const stage     = document.getElementById('stage');
  const stageWrap = document.getElementById('stageWrap');
  const world     = document.getElementById('world');
  const input     = document.getElementById('chatInput');
  const form      = document.getElementById('chatForm');
  const sendBtn   = document.getElementById('chatSend');
  const statusEl  = document.getElementById('status');
  const statusTxt = document.getElementById('statusText');
  const presList  = document.getElementById('presenceList');
  const presCount = document.getElementById('presenceCount');

  const fab          = document.getElementById('fab');
  const mForm        = document.getElementById('mobileChatForm');
  const mInput       = document.getElementById('mobileChatInput');
  const mCloseBtn    = document.getElementById('mobileChatClose');
  const mtName       = document.getElementById('mtName');
  const mtDot        = document.getElementById('mtDot');
  const mtCount      = document.getElementById('mtCount');

  mtName.textContent = ME.name;

  // ---- stage scaling -------------------------------------------
  const STAGE_W = 1448;
  const STAGE_H = 1086;
  const CHAR_W  = 140;
  const CHAR_H  = 140;
  const SPEED   = 5;

  const SPRITES = {
    down:  'images/go down.gif',
    up:    'images/go up.gif',
    left:  'images/go left.gif',
    right: 'images/go right.gif',
  };

  function fitStage() {
    const cs = getComputedStyle(world);
    const pt = parseFloat(cs.paddingTop)    || 0;
    const pb = parseFloat(cs.paddingBottom) || 0;
    const pl = parseFloat(cs.paddingLeft)   || 0;
    const pr = parseFloat(cs.paddingRight)  || 0;
    const buf = 16;
    const sw = world.clientWidth  - pl - pr - buf;
    const sh = world.clientHeight - pt - pb - buf;
    const scale = Math.min(sw / STAGE_W, sh / STAGE_H, 1);
    stageWrap.style.transform = 'scale(' + scale + ')';
  }
  fitStage();
  window.addEventListener('resize', fitStage);
  window.addEventListener('orientationchange', () => setTimeout(fitStage, 200));

  // ---- actor factory -------------------------------------------
  function createActor(id, name, isRemote) {
    const root = document.createElement('div');
    root.className = 'actor' + (isRemote ? ' remote' : '');
    root.dataset.id = id;
    root.innerHTML =
      '<div class="actor-bubble"></div>' +
      '<div class="actor-name"></div>' +
      '<img class="actor-sprite" src="' + SPRITES.down + '" alt="character" draggable="false">';

    const sprite = root.querySelector('.actor-sprite');
    const nameEl = root.querySelector('.actor-name');
    const bubble = root.querySelector('.actor-bubble');
    nameEl.textContent = name;

    const actor = {
      id, name, root, sprite, nameEl, bubble,
      pos: { x: STAGE_W / 2 - CHAR_W / 2, y: STAGE_H / 2 - CHAR_H / 2 },
      dir: 'down',
      bubbleTimer: null,
      nameTimer: null,
    };

    sprite.addEventListener('click', function (e) {
      e.stopPropagation();
      showName(actor, 3000);
    });

    stage.appendChild(root);
    placeActor(actor);
    return actor;
  }

  function placeActor(a) {
    a.root.style.left = a.pos.x + 'px';
    a.root.style.top  = a.pos.y + 'px';
  }

  function setDirection(a, dir) {
    if (a.dir === dir) return;
    a.dir = dir;
    a.sprite.src = SPRITES[dir];
  }

  function showName(a, ms) {
    a.nameEl.classList.add('show');
    if (a.nameTimer) clearTimeout(a.nameTimer);
    a.nameTimer = setTimeout(function () {
      a.nameEl.classList.remove('show');
    }, ms);
  }

  function showBubble(a, text) {
    a.bubble.textContent = text;
    a.bubble.classList.add('show');
    if (a.bubbleTimer) clearTimeout(a.bubbleTimer);
    a.bubbleTimer = setTimeout(function () {
      a.bubble.classList.remove('show');
    }, 10000);
  }

  function removeActor(a) {
    if (a.bubbleTimer) clearTimeout(a.bubbleTimer);
    if (a.nameTimer)   clearTimeout(a.nameTimer);
    a.root.remove();
  }

  // ---- me ------------------------------------------------------
  const me = createActor(ME.id, ME.name);
  me.pos.x = 200 + Math.random() * (STAGE_W - 400 - CHAR_W);
  me.pos.y = 600 + Math.random() * (STAGE_H - 700 - CHAR_H);
  placeActor(me);

  const remotes = new Map();

  // ---- input: keys + click-to-move -----------------------------
  const keys = Object.create(null);
  let moveTarget = null;

  function isFormTarget(el) {
    return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'BUTTON');
  }

  window.addEventListener('keydown', function (e) {
    if (isFormTarget(e.target)) return;
    if (e.key in { ArrowUp:1, ArrowDown:1, ArrowLeft:1, ArrowRight:1 }) {
      e.preventDefault();
      keys[e.key] = true;
      moveTarget = null;
    }
  });
  window.addEventListener('keyup', function (e) {
    if (e.key in { ArrowUp:1, ArrowDown:1, ArrowLeft:1, ArrowRight:1 }) {
      keys[e.key] = false;
    }
  });
  window.addEventListener('blur', function () {
    for (const k in keys) keys[k] = false;
  });

  stage.addEventListener('click', function (e) {
    const rect  = stage.getBoundingClientRect();
    const scale = rect.width / STAGE_W;
    const sx = (e.clientX - rect.left) / scale;
    const sy = (e.clientY - rect.top)  / scale;
    moveTarget = {
      x: clamp(sx - CHAR_W / 2, 0, STAGE_W - CHAR_W),
      y: clamp(sy - CHAR_H / 2, 0, STAGE_H - CHAR_H),
    };
  });

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  // ---- main loop -----------------------------------------------
  let moved = false;
  function step() {
    let dx = 0, dy = 0;

    if (keys.ArrowUp)    dy -= 1;
    if (keys.ArrowDown)  dy += 1;
    if (keys.ArrowLeft)  dx -= 1;
    if (keys.ArrowRight) dx += 1;

    if (dx !== 0 || dy !== 0) {
      moveTarget = null;
      if (dx !== 0 && dy !== 0) {
        const inv = 1 / Math.SQRT2;
        dx *= inv; dy *= inv;
      }
      applyMove(dx * SPEED, dy * SPEED);
    } else if (moveTarget) {
      const tx = moveTarget.x - me.pos.x;
      const ty = moveTarget.y - me.pos.y;
      const dist = Math.hypot(tx, ty);
      if (dist < SPEED) {
        me.pos.x = moveTarget.x;
        me.pos.y = moveTarget.y;
        moveTarget = null;
        placeActor(me);
        moved = true;
      } else {
        applyMove((tx / dist) * SPEED, (ty / dist) * SPEED);
      }
    }

    requestAnimationFrame(step);
  }

  function applyMove(dx, dy) {
    me.pos.x = clamp(me.pos.x + dx, 0, STAGE_W - CHAR_W);
    me.pos.y = clamp(me.pos.y + dy, 0, STAGE_H - CHAR_H);
    if (Math.abs(dx) >= Math.abs(dy)) setDirection(me, dx > 0 ? 'right' : 'left');
    else setDirection(me, dy > 0 ? 'down' : 'up');
    placeActor(me);
    moved = true;
  }

  // ---- chat: shared send + UI ---------------------------------
  function sendChat(rawText) {
    const text = String(rawText || '').trim();
    if (!text) return;
    showBubble(me, text);
    if (subscribed) {
      channel.send({
        type: 'broadcast',
        event: 'chat',
        payload: { tab_id: TAB_ID, text: text },
      });
    }
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    sendChat(input.value);
    input.value = '';
    input.blur();
  });

  function openMobileChat() {
    document.body.classList.add('chat-open');
    setTimeout(function () { mInput.focus(); }, 60);
  }
  function closeMobileChat() {
    document.body.classList.remove('chat-open');
    mInput.blur();
  }
  fab.addEventListener('click', openMobileChat);
  mCloseBtn.addEventListener('click', closeMobileChat);
  mForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const v = mInput.value;
    sendChat(v);
    mInput.value = '';
    closeMobileChat();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.body.classList.contains('chat-open')) {
      closeMobileChat();
    }
  });

  // ---- realtime: presence (identity) + broadcast (movement/chat) ----
  //
  //  Architecture
  //  ------------
  //  • Presence  → low-frequency: "who is online" + each tab's NAME
  //                and initial spawn position. Keyed by TAB_ID so two
  //                tabs from the same student account don't collide.
  //  • Broadcast → high-frequency: 'move' events at ~10 Hz with the
  //                sender's TAB_ID + position + facing direction, and
  //                'chat' events for speech bubbles. Broadcast is the
  //                right transport for ephemeral updates — presence
  //                sync would rate-limit and feel choppy.
  //  • Re-announce → when someone new joins, every existing tab fires
  //                one extra 'move' broadcast so the new joiner sees
  //                up-to-date positions instead of stale presence
  //                spawn coordinates.
  //  • Smoothing → remote actors carry CSS transition (110ms) so the
  //                10 Hz broadcasts render as smooth motion, while the
  //                local "me" stays instantly responsive.
  let subscribed = false;
  let capacityChecked = false;
  let kicked = false;
  let channel = null;

  if (!window.supabase || !window.supabase.createClient) {
    setStatus('offline', '오프라인 (Realtime 미지원)');
    requestAnimationFrame(step);
    return;
  }

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    realtime: { params: { eventsPerSecond: 20 } },
  });

  channel = client.channel(CHANNEL_NAME, {
    config: { presence: { key: TAB_ID } },
  });

  channel.on('presence', { event: 'sync' }, function () {
    if (kicked) return;
    const state = channel.presenceState();

    // First sync that includes our own track — verify capacity.
    if (subscribed && !capacityChecked && state[TAB_ID]) {
      capacityChecked = true;
      const others = Object.keys(state).filter(function (k) { return k !== TAB_ID; });
      if (others.length >= MAX_USERS) {
        kicked = true;
        setStatus('full', '입장 인원 가득 참 (' + MAX_USERS + '/' + MAX_USERS + ')');
        try { channel.untrack(); } catch {}
        try { channel.unsubscribe(); } catch {}
        return;
      }
    }

    // Reap remote actors whose tabs disappeared.
    for (const [tid, ra] of remotes) {
      if (!state[tid]) {
        removeActor(ra);
        remotes.delete(tid);
      }
    }

    // Add new remotes (initial spawn pos comes from presence payload).
    for (const tid of Object.keys(state)) {
      if (tid === TAB_ID) continue;
      const p = state[tid][0];
      if (!p) continue;
      let ra = remotes.get(tid);
      if (!ra) {
        ra = createActor(tid, p.name || 'Anonymous', true);
        if (typeof p.x === 'number') ra.pos.x = p.x;
        if (typeof p.y === 'number') ra.pos.y = p.y;
        if (p.dir && SPRITES[p.dir]) setDirection(ra, p.dir);
        placeActor(ra);
        remotes.set(tid, ra);
      } else if (p.name && ra.name !== p.name) {
        ra.name = p.name;
        ra.nameEl.textContent = p.name;
      }
    }

    renderPresenceList(state);
  });

  // Someone else joined → re-broadcast our position so they see us
  // at our current spot, not the stale presence spawn position.
  channel.on('presence', { event: 'join' }, function (payload) {
    if (!subscribed || kicked) return;
    if (!payload || payload.key === TAB_ID) return;
    channel.send({
      type: 'broadcast',
      event: 'move',
      payload: { tab_id: TAB_ID, x: me.pos.x, y: me.pos.y, dir: me.dir },
    });
  });

  // High-frequency position updates.
  channel.on('broadcast', { event: 'move' }, function (msg) {
    const p = msg.payload || {};
    if (!p.tab_id || p.tab_id === TAB_ID) return;
    const ra = remotes.get(p.tab_id);
    if (!ra) return;
    if (typeof p.x === 'number' && typeof p.y === 'number') {
      ra.pos.x = p.x;
      ra.pos.y = p.y;
      placeActor(ra);
    }
    if (p.dir && SPRITES[p.dir]) setDirection(ra, p.dir);
  });

  channel.on('broadcast', { event: 'chat' }, function (msg) {
    const p = msg.payload || {};
    if (!p.tab_id || p.tab_id === TAB_ID) return;
    const ra = remotes.get(p.tab_id);
    if (ra && p.text) showBubble(ra, p.text);
  });

  channel.subscribe(async function (status) {
    if (status === 'SUBSCRIBED') {
      subscribed = true;
      await channel.track({
        user_id: ME.id,
        name:    ME.name,
        x:       me.pos.x,
        y:       me.pos.y,
        dir:     me.dir,
      });
      setStatus('connected', '접속됨 · ' + ME.name);
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
      setStatus('offline', '연결 실패');
    } else if (status === 'CLOSED') {
      setStatus('offline', '연결 끊김');
    }
  });

  // Movement broadcast — fire whenever the local actor has moved
  // since the last tick. ~12 Hz keeps it under the 20 events/sec
  // channel budget while staying smooth (CSS transition fills gaps).
  const MOVE_MS = 80;
  setInterval(function () {
    if (!subscribed || kicked || !moved) return;
    moved = false;
    channel.send({
      type: 'broadcast',
      event: 'move',
      payload: { tab_id: TAB_ID, x: me.pos.x, y: me.pos.y, dir: me.dir },
    });
  }, MOVE_MS);

  // ---- ui helpers ---------------------------------------------
  function setStatus(state, text) {
    statusEl.className = 'status ' + state;
    statusTxt.textContent = text;
    mtDot.className = 'mt-dot ' + state;
    if (state === 'offline' || state === 'full') {
      sendBtn.disabled = (state === 'full');
    }
  }

  function renderPresenceList(state) {
    const ids = Object.keys(state);
    const countText = ids.length + ' / ' + MAX_USERS;
    presCount.textContent = countText;
    mtCount.textContent   = countText;
    presList.innerHTML = '';
    const sorted = ids.map(function (tid) {
      const p = state[tid][0] || {};
      return { tab_id: tid, name: p.name || 'Anonymous', isMe: tid === TAB_ID };
    }).sort(function (a, b) {
      if (a.isMe) return -1;
      if (b.isMe) return 1;
      return a.name.localeCompare(b.name);
    });
    for (const u of sorted) {
      const row = document.createElement('div');
      row.className = 'presence-row' + (u.isMe ? ' me' : '');
      row.innerHTML = '<span class="dot"></span><span></span>';
      row.querySelector('span:last-child').textContent =
        u.name + (u.isMe ? ' (나)' : '');
      presList.appendChild(row);
    }
  }

  window.addEventListener('beforeunload', function () {
    try { channel && channel.untrack(); } catch {}
    try { client.removeAllChannels(); } catch {}
  });

  requestAnimationFrame(step);
})();
</script>
</body>
</html>
