<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<title>The Space</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f1115;
    color: #fff;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; }

  /* ===== Desktop sidebar ===== */
  #sidebar {
    width: 280px;
    background: #161922;
    border-right: 1px solid #262a36;
    display: flex;
    flex-direction: column;
    padding: 20px;
    flex-shrink: 0;
  }
  #sidebar header { margin-bottom: 18px; }
  #sidebar h1 {
    font-size: 18px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.2px;
  }
  #sidebar .subtitle {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
  }
  #sidebar .back {
    display: inline-block;
    margin-top: 6px;
    font-size: 12px;
    color: #6366f1;
    text-decoration: none;
  }
  #sidebar .back:hover { text-decoration: underline; }

  .panel {
    background: #1c2030;
    border: 1px solid #262a36;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.55;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .panel b { color: #e5e7eb; font-weight: 600; }

  #presencePanel { padding: 12px 14px; }
  #presencePanel .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  #presencePanel .header b { color: #e5e7eb; }
  #presenceCount {
    background: #262a36;
    color: #cbd5e1;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
  }
  #presenceList {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
  }
  .presence-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #cbd5e1;
  }
  .presence-row .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }
  .presence-row.me { color: #a5b4fc; font-weight: 600; }

  /* Fitting Room button — opens the avatar editor popup. */
  #fittingRoomBtn {
    width: 100%;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    margin-bottom: 12px;
    flex-shrink: 0;
    transition: filter 0.15s;
  }
  #fittingRoomBtn:hover  { filter: brightness(1.1); }
  #fittingRoomBtn:active { filter: brightness(0.9); }

  /* Chat log — fills the remaining vertical space between the
     fitting-room button and the chat input form. Auto-scrolls
     to keep the latest line visible. */
  #chatLogPanel {
    flex: 1 1 0;
    min-height: 60px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    margin-bottom: 12px;
  }
  #chatLog {
    flex: 1 1 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
    line-height: 1.4;
  }
  .chat-log-row {
    color: #cbd5e1;
    word-wrap: break-word;
  }
  .chat-log-name {
    color: #a5b4fc;
    font-weight: 700;
    margin-right: 4px;
  }
  .chat-log-row.me .chat-log-name { color: #f0abfc; }
  .chat-log-empty {
    color: #4b5563;
    font-style: italic;
    text-align: center;
    margin-top: 12px;
  }

  #chatForm {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  #chatForm label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #6b7280;
    font-weight: 600;
  }
  #chatInput {
    width: 100%;
    padding: 11px 13px;
    background: #1c2030;
    color: #f1f5f9;
    border: 1px solid #2a2f3e;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  #chatInput::placeholder { color: #4b5563; }
  #chatInput:focus { border-color: #6366f1; }
  #chatSend {
    background: #6366f1;
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s;
  }
  #chatSend:hover { background: #4f46e5; }
  #chatSend:active { background: #4338ca; }
  #chatSend:disabled { background: #2a2f3e; cursor: not-allowed; color: #6b7280; }

  /* ===== World / stage =====
     Stage positioning is fully controlled by JS via a single
     transform on #stageWrap (translate + scale). We removed the
     previous flex-centering on #world so the same code path serves
     both desktop (fit-to-viewport) and mobile (camera follow). */
  #world {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a1f2e 0%, #0a0c12 100%);
    min-width: 0;
  }
  #stageWrap {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  #stage {
    position: relative;
    width: 1448px;
    height: 1086px;
    background-image: url('images/classroom.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    cursor: pointer;
    /* Disable the browser's own pan/zoom gestures so our drag-pan
       handler is the only thing reacting to touch on the map. */
    touch-action: none;
  }

  /* Foreground overlay layer.
     classroom-overlay.png is an OPTIONAL same-sized image that
     contains only the parts of objects that should appear ABOVE
     the character — typically the bottom/front face of desks and
     walls. Painting this over the actors gives a "walk behind a
     desk" effect: the character's feet are hidden when they stand
     just above the desk's front edge, but the character isn't
     covered when they walk past in front of it.
     Same z-index trick can be repeated with more layers if you
     ever need multiple depth bands. */
  .stage-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 1448px;
    height: 1086px;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: none;
    /* Sits above every actor. Actors get y-based z-index up to
       STAGE_H (1086) so the overlay must be higher than that. */
    z-index: 2000;
  }
  #stageOverlay { background-image: url('images/classroom-overlay.png'); }

  /* Actors are positioned via transform: translate3d() so that
     position updates are GPU-composited. The previous left/top
     animation caused thin streak artifacts on the trailing edge
     when remotes moved (visible on desktop while watching a phone
     player walk). Transform-only positioning + GPU layer fixes
     that completely. */
  .actor {
    position: absolute;
    left: 0;
    top: 0;
    width: 46px;
    height: 68px;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .actor.remote {
    transition: transform 110ms linear;
  }
  .actor-sprite {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: auto;
    cursor: pointer;
    -webkit-user-drag: none;
  }
  .actor-name {
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    margin-bottom: 2px;
    background: rgba(15, 17, 21, 0.85);
    color: #fff;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .actor-name.show { opacity: 1; }

  .actor-bubble {
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    margin-bottom: 30px;
    background: #fff;
    color: #111827;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 500;
    max-width: 360px;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    line-height: 1.35;
    text-align: center;
  }
  .actor-bubble.show { opacity: 1; }
  .actor-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-style: solid;
    border-width: 10px 9px 0 9px;
    border-color: #fff transparent transparent transparent;
  }

  .hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    color: #e5e7eb;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 12px;
    pointer-events: none;
    z-index: 5;
  }
  .status {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    color: #e5e7eb;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    z-index: 5;
  }
  .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f59e0b;
    transition: background 0.3s;
  }
  .status.connected .dot { background: #22c55e; }
  .status.full .dot { background: #ef4444; }

  /* ===== Mobile-only UI ===== */
  .mobile-topbar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 40;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: rgba(15, 17, 21, 0.78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(38, 42, 54, 0.6);
    align-items: center;
    gap: 12px;
  }
  .mt-back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: #1c2030;
    border: 1px solid #2a2f3e;
    border-radius: 10px;
    color: #e5e7eb;
    font-size: 18px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .mt-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .mt-name {
    font-size: 14px;
    font-weight: 700;
    color: #f1f5f9;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mt-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
  }
  .mt-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #f59e0b;
    transition: background 0.3s;
  }
  .mt-dot.connected { background: #22c55e; }
  .mt-dot.full      { background: #ef4444; }
  .mt-dot.offline   { background: #6b7280; }

  .fab {
    display: none;
    position: fixed;
    right: 18px;
    bottom: calc(env(safe-area-inset-bottom) + 22px);
    z-index: 50;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #6366f1;
    color: #fff;
    font-size: 26px;
    font-family: inherit;
    line-height: 1;
    border: none;
    box-shadow: 0 12px 28px rgba(99, 102, 241, 0.5);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, opacity 0.15s ease;
    padding: 0;
  }
  .fab:active { transform: scale(0.92); }
  body.chat-open .fab {
    opacity: 0;
    transform: translateY(20px) scale(0.9);
    pointer-events: none;
  }

  .mobile-chat {
    display: none;
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: calc(env(safe-area-inset-bottom) + 14px);
    z-index: 60;
    background: #1c2030;
    border: 1px solid #2a2f3e;
    border-radius: 14px;
    padding: 8px;
    gap: 6px;
    align-items: center;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
    transform: translateY(120%);
    opacity: 0;
    transition: transform 0.22s cubic-bezier(.2,.8,.25,1), opacity 0.18s ease;
    pointer-events: none;
  }
  body.chat-open .mobile-chat {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-chat input {
    flex: 1;
    min-width: 0;
    background: #0f1115;
    border: 1px solid #2a2f3e;
    color: #f1f5f9;
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 16px; /* prevent iOS zoom */
    font-family: inherit;
    outline: none;
  }
  .mobile-chat input:focus { border-color: #6366f1; }
  .mobile-chat .mc-btn {
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 10px;
    height: 42px;
    padding: 0 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mobile-chat .mc-btn:active { background: #4f46e5; }
  .mobile-chat .mc-close {
    background: transparent;
    color: #94a3b8;
    border: none;
    width: 34px;
    height: 42px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    body { display: block; }
    #sidebar { display: none; }
    #world {
      width: 100vw;
      height: 100vh;
    }
    /* The desktop hint/status bubbles are replaced by the mobile
       topbar; hide them to avoid duplication. */
    .hint, .status { display: none; }
    .mobile-topbar { display: flex; }
    .fab { display: inline-flex; }
    .mobile-chat { display: flex; }
    /* Speech bubbles and names live inside the scaled stage, so
       their on-screen size is (CSS-size × stage-scale). With the
       new 46×68 sprite the mobile camera scale is ~1.47 (was
       ~0.71 with the old 140px sprite), so the CSS values are
       cut down to keep the on-screen text the same readable
       size and stop bubbles from dominating the viewport. */
    .actor-bubble {
      font-size: 14px;
      max-width: 50vw;
      padding: 6px 10px;
      border-radius: 12px;
    }
    .actor-bubble::after {
      border-width: 6px 5px 0 5px;
      bottom: -6px;
    }
    .actor-name {
      font-size: 11px;
      padding: 3px 8px;
    }
  }

  /* ===== Wearable layers on actors =====
     Stacked PNGs that overlay the base character GIF/PNG, with
     per-category z-order matching the user-specified rules:
       face << glasses, beard << hair << hat
       (shoes < top in the body stack)
     Each wearable is processed once (#9193a6 colour-keyed) and
     positioned relative to the actor's 46×68 box. shoes is the
     odd one out — its art sits at the bottom of the 50×50 frame
     so we offset it down to align with the character's feet. */
  .wear {
    position: absolute;
    width: 50px;
    height: 50px;
    left: -2px;
    top: -2px;
    pointer-events: none;
    image-rendering: pixelated;
    -webkit-user-drag: none;
  }
  .wear.face    { width: 26px; height: 26px; left: 10px; top: 2px; z-index: 1; }
  .wear.glasses { z-index: 2; }
  .wear.beard   { z-index: 2; }
  .wear.hair    { z-index: 3; }
  .wear.hat     { z-index: 4; }
  .wear.shoes   { z-index: 5; top: 18px; }
  .wear.top     { z-index: 6; }
  .wear.hidden  { display: none; }
  .actor-bubble { z-index: 100; }
  .actor-name   { z-index: 100; }

  /* ===== Fitting Room popup ===== */
  .fr-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 17, 21, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .fr-overlay.show { display: flex; }
  .fr-modal {
    width: 100%;
    max-width: 460px;
    max-height: 92vh;
    background: #2a2f44;
    color: #f1f5f9;
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 64px rgba(0, 0, 0, 0.6);
  }

  .fr-preview {
    background: #3a3f5c;
    padding: 18px 16px 14px;
    position: relative;
    flex-shrink: 0;
  }
  .fr-name-pill {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(15, 17, 21, 0.75);
    padding: 7px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fr-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    border: none;
    color: #fff;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fr-close:hover { background: rgba(0, 0, 0, 0.3); }
  .fr-preview-char {
    width: 92px;
    height: 136px;
    margin: 56px auto 18px;
    position: relative;
  }
  .fr-preview-char .fr-shadow {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 22px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
  }
  .fr-preview-char .fr-canvas {
    position: absolute;
    inset: 0;
    transform: scale(2);
    transform-origin: top left;
    width: 46px;
    height: 68px;
    image-rendering: pixelated;
  }
  .fr-preview-char .fr-canvas .wear { transform: none; }

  .fr-tabs {
    display: flex;
    border-bottom: 1px solid #3a3f5c;
    padding: 0 12px;
    background: #1f2333;
  }
  .fr-tab {
    flex: 1;
    background: transparent;
    border: none;
    color: #6b7280;
    padding: 13px 0;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .fr-tab:hover { color: #cbd5e1; }
  .fr-tab.active {
    color: #fff;
    border-bottom-color: #fff;
  }

  .fr-body {
    overflow-y: auto;
    flex: 1;
    padding: 14px 16px 16px;
    background: #1f2333;
  }
  .fr-pills {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
  }
  .fr-pill {
    background: transparent;
    border: 1px solid #3a3f5c;
    color: #94a3b8;
    padding: 6px 16px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .fr-pill:hover { color: #cbd5e1; }
  .fr-pill.active {
    background: #6366f1;
    color: #fff;
    border-color: #6366f1;
  }
  .fr-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .fr-item {
    aspect-ratio: 1;
    background: #4a5076;
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    transition: border-color 0.15s, transform 0.1s;
    overflow: hidden;
  }
  .fr-item:active { transform: scale(0.96); }
  .fr-item.selected { border-color: #fff; }
  .fr-item.none {
    font-size: 11px;
    color: #cbd5e1;
    text-align: center;
    font-weight: 600;
    line-height: 1.2;
    padding: 8px;
  }
  .fr-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .fr-actions {
    display: flex;
    gap: 12px;
    padding: 14px 16px calc(env(safe-area-inset-bottom) + 14px);
    background: #1f2333;
    border-top: 1px solid #3a3f5c;
    flex-shrink: 0;
  }
  .fr-btn {
    flex: 1;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .fr-btn:active { filter: brightness(0.9); }
  .fr-btn-back {
    background: #4a5076;
    color: #fff;
  }
  .fr-btn-back:hover { filter: brightness(1.1); }
  .fr-btn-finish {
    background: #6ee7b7;
    color: #0f1115;
  }
  .fr-btn-finish:hover { filter: brightness(1.05); }

  /* ===== Blocker (no session) ===== */
  #blocker {
    position: fixed;

  let maskData = null;

  // ---- camera / fit -------------------------------------------
  //
  //  Desktop  → fit the whole stage inside #world (no follow).
  //  Mobile   → camera follows the local player. Scale is
  //             max(charScale, fillScale) so the character is at

  let lastTx = NaN, lastTy = NaN, lastScale = NaN;
  // Drag-pan state — declared up here (rather than alongside the
  // touch handlers further down) because fitOrFollow() below reads
  // panOffset, and the first call happens during `me` creation
  // before the touch-handler block has been reached. `let` is TDZ
  // so deferring the declaration would crash with a ReferenceError.
  let panOffset = { x: 0, y: 0 };
  let touchPan = null;
  let suppressClickAfterDrag = false;

  // that gets installed slightly above the `const me = ...` line;

  const remotes = new Map();
  function fitOrFollow() {
    const vw = world.clientWidth;
    const vh = world.clientHeight;
    let tx, ty, scale;

    if (isMobile()) {
      const charScale = MOBILE_CHAR_PX / CHAR_H;
      const fillScale = Math.max(vw / STAGE_W, vh / STAGE_H);
      scale = Math.max(charScale, fillScale);

      const charCx = (me.pos.x + CHAR_W / 2) * scale;
      const charCy = (me.pos.y + CHAR_H / 2) * scale;

      // Aim the camera at the centre of the visible playable area
      // (between the topbar and the FAB) rather than the raw
      // viewport centre — keeps the player from being hidden
      // behind the chrome.
      const TOPBAR_H = 70;
      const FAB_H    = 110;
      const playCx = vw / 2;
      const playCy = (TOPBAR_H + (vh - FAB_H)) / 2;

      // panOffset lets a finger-drag temporarily slide the camera
      // away from the player; clamping below still keeps the map
      // edges flush with the viewport.
      tx = playCx - charCx + panOffset.x;
      ty = playCy - charCy + panOffset.y;

      const sw = STAGE_W * scale, sh = STAGE_H * scale;
      if (sw > vw) tx = Math.min(0, Math.max(vw - sw, tx));
      else         tx = (vw - sw) / 2;
      if (sh > vh) ty = Math.min(0, Math.max(vh - sh, ty));
      else         ty = (vh - sh) / 2;
    } else {
      const buf = 40;
      scale = Math.min((vw - buf) / STAGE_W, (vh - buf) / STAGE_H, 1);
      const sw = STAGE_W * scale, sh = STAGE_H * scale;
      tx = (vw - sw) / 2 + panOffset.x;
      ty = (vh - sh) / 2 + panOffset.y;
      // Match the mobile clamp so a touchscreen desktop / tablet
      // drag also can't push the map past the viewport edges.
      if (sw > vw) tx = Math.min(0, Math.max(vw - sw, tx));
      else         tx = (vw - sw) / 2;
      if (sh > vh) ty = Math.min(0, Math.max(vh - sh, ty));
      else         ty = (vh - sh) / 2;
    }

    tx = Math.round(tx);
    ty = Math.round(ty);
    if (tx !== lastTx || ty !== lastTy || scale !== lastScale) {
      stageWrap.style.transform =
        'translate3d(' + tx + 'px, ' + ty + 'px, 0) scale(' + scale + ')';
      lastTx = tx; lastTy = ty; lastScale = scale;
    }

  // ---- #9193a6 colour-key -------------------------------------
  //
  //  Many wearable PNGs ship with a flat #9193a6 background fill
  //  surrounding the artwork. Per the spec: any horizontal OR
  //  vertical run of 5+ consecutive #9193a6 pixels is treated as
  //  background and replaced with transparent. Pixels of that
  //  exact colour that appear in short bursts (3-4 px wide) are
  //  preserved — those are usually intentional shadow detail.
  //
  //  We do two passes (rows, then columns) into a separate mask
  //  buffer so a single pixel that fails the horizontal threshold
  //  but appears in a long vertical run still gets cleared.
  function colourKey(imgData, runLen, kr, kg, kb) {
    const d = imgData.data;
    const w = imgData.width;
    const h = imgData.height;
    const mask = new Uint8Array(w * h);

    function isKey(idx) {
      return d[idx] === kr && d[idx + 1] === kg && d[idx + 2] === kb && d[idx + 3] > 0;
    }
    function markRow(y, lo, hi) {
      for (let k = lo; k < hi; k++) mask[y * w + k] = 1;
    }
    function markCol(x, lo, hi) {
      for (let k = lo; k < hi; k++) mask[k * w + x] = 1;
    }

    for (let y = 0; y < h; y++) {
      let start = -1;
      for (let x = 0; x < w; x++) {
        if (isKey((y * w + x) * 4)) {
          if (start < 0) start = x;
        } else if (start >= 0) {
          if (x - start >= runLen) markRow(y, start, x);
          start = -1;
        }
      }
      if (start >= 0 && w - start >= runLen) markRow(y, start, w);
    }
    for (let x = 0; x < w; x++) {
      let start = -1;
      for (let y = 0; y < h; y++) {
        if (isKey((y * w + x) * 4)) {
          if (start < 0) start = y;
        } else if (start >= 0) {
          if (y - start >= runLen) markCol(x, start, y);
          start = -1;
        }
      }
      if (start >= 0 && h - start >= runLen) markCol(x, start, h);
    }

    for (let p = 0; p < w * h; p++) {
      if (mask[p]) d[p * 4 + 3] = 0;
    }
  }

  // Returns a Promise<string> that resolves to the final src.
  // The cache stores Promises so concurrent requests for the same

  const processedSrcCache = new Map();
  function processWearable(url) {

          ctx.drawImage(img, 0, 0);
          const data = ctx.getImageData(0, 0, c.width, c.height);
          colourKey(data, 5, 0x91, 0x93, 0xa6);
          ctx.putImageData(data, 0, 0);
          resolve(c.toDataURL('image/png'));
        } catch (e) {
          // Tainted canvas (file:// or CORS) — fall back to the
          // raw image; the grey background will show but the
          // outfit still appears.
          resolve(url);
        }
      };
      img.onerror = function () { resolve(url); };
      img.src = url;
    });
    processedSrcCache.set(url, p);
    return p;
  }

  // Update one actor's wearable <img> layers to match the given
  // avatar config. Hides the layer if no item is selected for
  // that category; otherwise loads the processed src.
  function applyAvatarToActor(actor, avatar) {
    actor.avatar = avatar || {};
    if (!actor.wearEls) return;
    for (const cat of WEAR_CATEGORIES) {
      const el = actor.wearEls[cat];
      if (!el) continue;
      const id = actor.avatar[cat];
      const valid = id && (WEARABLES[cat] || []).indexOf(id) >= 0;
      if (!valid) {
        el.classList.add('hidden');
        el.removeAttribute('src');
        continue;
      }
      processWearable(wearableUrl(cat, id)).then(function (src) {
        // The selection might have changed by the time the image
        // finishes loading — only apply if it still matches.
        if (actor.avatar[cat] !== id) return;
        el.src = src;
        el.classList.remove('hidden');
      });
    }
  }

  // ---- actor factory -------------------------------------------
  function createActor(id, name, gender, isRemote) {
    const sprites = spritesFor(gender);
    const root = document.createElement('div');
    root.className = 'actor' + (isRemote ? ' remote' : '');
    root.dataset.id = id;
    // Start on the standing-still frame so a freshly-spawned
    // character isn't briefly seen walking in place.
    // Wearable <img>s are pre-inserted (hidden) so applyAvatar()
    // doesn't need to mutate the DOM — it just toggles src/visibility.
    root.innerHTML =
      '<div class="actor-bubble"></div>' +
      '<div class="actor-name"></div>' +
      '<img class="actor-sprite" src="' + sprites.stop.down + '" alt="character" draggable="false">' +
      '<img class="wear face hidden"    alt="" draggable="false">' +
      '<img class="wear glasses hidden" alt="" draggable="false">' +
      '<img class="wear beard hidden"   alt="" draggable="false">' +
      '<img class="wear hair hidden"    alt="" draggable="false">' +
      '<img class="wear hat hidden"     alt="" draggable="false">' +
      '<img class="wear shoes hidden"   alt="" draggable="false">' +
      '<img class="wear top hidden"     alt="" draggable="false">';

    const sprite = root.querySelector('.actor-sprite');
    const nameEl = root.querySelector('.actor-name');
    const bubble = root.querySelector('.actor-bubble');
    nameEl.textContent = name;

    const wearEls = {};
    for (const cat of WEAR_CATEGORIES) {
      wearEls[cat] = root.querySelector('.wear.' + cat);
    }

    const actor = {
      id: id, name: name, gender: gender, isRemote: !!isRemote,
      sprites: sprites,
      root: root, sprite: sprite, nameEl: nameEl, bubble: bubble,
      wearEls: wearEls,
      avatar: {}, // applyAvatarToActor() fills this in
      pos: { x: STAGE_W / 2 - CHAR_W / 2, y: STAGE_H / 2 - CHAR_H / 2 },
      dir: 'down',
      bubbleTimer: null,
      nameTimer: null,
      // Start frozen — they're not moving yet, so the "stop" PNG
      // we set above is the correct sprite.
      frozen: true,
      joyMode: false,
      joyTimer: null,
    };

    sprite.addEventListener('click', function (e) {
      e.stopPropagation();
      // A drag-pan ends with a synthetic click — swallow that one
      // so dragging across a character doesn't surface their name.
      if (suppressClickAfterDrag) {
        suppressClickAfterDrag = false;
        return;
      }
      showName(actor, 3000);
    });

    stage.appendChild(root);
    placeActor(actor);
    return actor;
  }

  function placeActor(a) {
    a.root.style.transform =
      'translate3d(' + a.pos.x + 'px, ' + a.pos.y + 'px, 0)';
    // Y-sort by the character's feet: the actor lower on the
    // screen (greater pos.y) gets a higher z-index and renders
    // in front of the actor above it. The overlay stays above
    // everyone (z-index: 2000).
    a.root.style.zIndex = Math.floor(a.pos.y + CHAR_H);
  }

  function setDirection(a, dir) {
    if (a.dir === dir) return;
    a.dir = dir;
    if (a.joyMode) return; // joy lock — keep joy.gif on screen
    // Pick the sprite that matches whether the actor is currently
    // walking or standing. Switching to a new GIF implicitly
    // restarts its animation from frame 1.
    a.sprite.src = a.frozen ? a.sprites.stop[dir] : a.sprites.walk[dir];
  }

  function showName(a, ms) {
    a.nameEl.classList.add('show');
    if (a.nameTimer) clearTimeout(a.nameTimer);
    a.nameTimer = setTimeout(function () {
      a.nameEl.classList.remove('show');
    }, ms);
  }

  function showBubble(a, text) {
    a.bubble.textContent = text;
    a.bubble.classList.add('show');
    if (a.bubbleTimer) clearTimeout(a.bubbleTimer);
    a.bubbleTimer = setTimeout(function () {
      a.bubble.classList.remove('show');
    }, 10000);
  }

  function removeActor(a) {
    if (a.bubbleTimer) clearTimeout(a.bubbleTimer);
    if (a.nameTimer)   clearTimeout(a.nameTimer);
    a.root.remove();
  }

  // ---- freeze / unfreeze / joy --------------------------------
  //
  //  Browsers will animate a GIF forever — there's no CSS or
  //  `<img>` API to pause one. We sidestep that by shipping a
  //  matching "stop {dir}.png" still for every walking GIF and
  //  swapping the <img>'s src to that PNG when the player stops.
  //  Unfreezing just restores the walking GIF src (the file is
  //  preloaded so there's no flicker).
  //
  //  joyMode overrides both — while it's active the actor stays
  //  on joy.gif regardless of movement state. When the joy timer
  //  expires we fall back to whichever sprite (walk vs stop) the
  //  actor's current state dictates.
  //
  //  markMoved() is called whenever an actor's position actually
  //  changes. A periodic ticker freezes any actor whose lastMoveAt
  //  is older than IDLE_FREEZE_MS.
  function freezeActor(a) {
    if (a.frozen) return;
    a.frozen = true;
    if (!a.joyMode) a.sprite.src = a.sprites.stop[a.dir];
  }

  function unfreezeActor(a) {
    if (!a.frozen) return;
    a.frozen = false;
    if (!a.joyMode) a.sprite.src = a.sprites.walk[a.dir];
  }

  function playJoy(a) {
    if (a.joyTimer) clearTimeout(a.joyTimer);
    a.joyMode = true;
    a.sprite.src = a.sprites.joy;
    a.joyTimer = setTimeout(function () {
      a.joyMode = false;
      a.joyTimer = null;
      // Restore whichever sprite the actor's current state wants.
      a.sprite.src = a.frozen ? a.sprites.stop[a.dir] : a.sprites.walk[a.dir];
    }, JOY_MS);
  }

  function deliverChat(a, text) {
    showBubble(a, text);
    if (isJoyText(text)) playJoy(a);
    appendChatLog(a, text);
  }

  // ---- chat log ------------------------------------------------
  //
  //  Side-panel running transcript of everything anyone says. We
  //  cap the row count so a long session doesn't grow the DOM
  //  unbounded — older lines are dropped, never persisted.
  const CHAT_LOG_MAX = 200;
  const chatLogEl = document.getElementById('chatLog');
  // Clear the placeholder once a real message arrives.
  let chatLogPrimed = false;

  function appendChatLog(actor, text) {
    if (!chatLogPrimed) {
      chatLogEl.innerHTML = '';
      chatLogPrimed = true;
    }
    const row = document.createElement('div');
    row.className = 'chat-log-row' + (actor === me ? ' me' : '');
    const nameEl = document.createElement('span');
    nameEl.className = 'chat-log-name';
    nameEl.textContent = actor.name;
    const txtEl = document.createElement('span');
    txtEl.className = 'chat-log-text';
    txtEl.textContent = text;
    row.appendChild(nameEl);
    row.appendChild(document.createTextNode(' '));
    row.appendChild(txtEl);
    chatLogEl.appendChild(row);
    while (chatLogEl.childNodes.length > CHAT_LOG_MAX) {
      chatLogEl.removeChild(chatLogEl.firstChild);
    }
    chatLogEl.scrollTop = chatLogEl.scrollHeight;
  }

  function markMoved(a) {
    a.lastMoveAt = performance.now();
    if (a.frozen) unfreezeActor(a);
  }

  setInterval(function () {
    const now = performance.now();
    if (!me.frozen && now - (me.lastMoveAt || 0) > IDLE_FREEZE_MS) {
      freezeActor(me);
    }
    for (const ra of remotes.values()) {
      if (!ra.frozen && now - (ra.lastMoveAt || 0) > IDLE_FREEZE_MS) {
        freezeActor(ra);
      }
    }
  }, 100);

  // ---- me ------------------------------------------------------
  const me = createActor(ME.id, ME.name, ME.gender, false);
  me.pos.x = 200 + Math.random() * (STAGE_W - 400 - CHAR_W);
  me.pos.y = 600 + Math.random() * (STAGE_H - 700 - CHAR_H);
  placeActor(me);
  applyAvatarToActor(me, ME.avatar);
  fitOrFollow();
  // `remotes` is declared earlier (next to fitOrFollow) so the
  // idle-freeze setInterval can safely close over it.

  // ---- collision against other characters ----------------------
  function collidesWithRemotes(x, y) {
    const cx = x + CHAR_W / 2, cy = y + CHAR_H / 2;
    for (const ra of remotes.values()) {
      const ox = ra.pos.x + CHAR_W / 2;
      const oy = ra.pos.y + CHAR_H / 2;
      if (Math.abs(cx - ox) < HITBOX * 2 &&
          Math.abs(cy - oy) < HITBOX * 2) {
        return true;
      }
    }
    return false;
  }

  // ---- collision against the map mask --------------------------
  //
  //  We sample a small rectangle at the character's "feet" rather
  //  than the centre of the sprite so the head can still overlap
  //  the top edge of a desk visually (matches gather.town's feel).
  //  Four corners of the feet rect are checked so a player can't
  //  thread a 1-pixel gap into an obstacle.
  function isBlockedByMap(x, y) {
    if (!maskData) return false;
    const fx = x + CHAR_W / 2;
    const fy = y + CHAR_H * 0.82;
    const HW = 6, HH = 4; // feet hitbox half-extents (scaled for 46×68 sprite)
    return (
      sampleMask(fx - HW, fy - HH) ||
      sampleMask(fx + HW, fy - HH) ||
      sampleMask(fx - HW, fy + HH) ||
      sampleMask(fx + HW, fy + HH)
    );
  }
  function sampleMask(x, y) {
    const px = x | 0, py = y | 0;
    if (px < 0 || py < 0 || px >= STAGE_W || py >= STAGE_H) return true;
    return maskData[(py * STAGE_W + px) * 4 + 3] > 128;
  }

  // ---- input: keys + click/tap-to-move + drag-pan --------------
  const keys = Object.create(null);
  let moveTarget = null;
  // panOffset / touchPan / suppressClickAfterDrag are declared up
  // near fitOrFollow() (they're read by it before this block runs).
  const DRAG_THRESHOLD = 8; // px before a touch counts as a drag

  function isFormTarget(el) {
    return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'BUTTON');
  }

  window.addEventListener('keydown', function (e) {
    if (isFormTarget(e.target)) return;
    // Spacebar in the world → jump focus into the chat input
    // (or open the mobile chat panel) so you can type without
    // reaching for the mouse.
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (isMobile()) openMobileChat();
      else            input.focus();
      return;
    }
    if (e.key in { ArrowUp:1, ArrowDown:1, ArrowLeft:1, ArrowRight:1 }) {
      e.preventDefault();
      keys[e.key] = true;
      moveTarget = null;
    }
  });
  window.addEventListener('keyup', function (e) {
    if (e.key in { ArrowUp:1, ArrowDown:1, ArrowLeft:1, ArrowRight:1 }) {
      keys[e.key] = false;
    }
  });
  window.addEventListener('blur', function () {
    for (const k in keys) keys[k] = false;
  });

  stage.addEventListener('click', function (e) {
    if (suppressClickAfterDrag) {
      suppressClickAfterDrag = false;
      return;
    }
    const rect  = stage.getBoundingClientRect();
    const scale = rect.width / STAGE_W;
    const sx = (e.clientX - rect.left) / scale;
    const sy = (e.clientY - rect.top)  / scale;
    moveTarget = {
      x: clamp(sx - CHAR_W / 2, 0, STAGE_W - CHAR_W),
      y: clamp(sy - CHAR_H / 2, 0, STAGE_H - CHAR_H),
    };
  });

  // Touch drag → pan the camera. The synthetic click after the
  // drag is suppressed so panning doesn't accidentally also move
  // the player. Single-finger only; multi-touch cancels.
  stage.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) { touchPan = null; return; }
    const t = e.touches[0];
    touchPan = {
      startX: t.clientX,
      startY: t.clientY,
      baseX:  panOffset.x,
      baseY:  panOffset.y,
      moved:  false,
    };
  }, { passive: true });

  stage.addEventListener('touchmove', function (e) {
    if (!touchPan || e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - touchPan.startX;
    const dy = t.clientY - touchPan.startY;
    if (!touchPan.moved && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
      touchPan.moved = true;
    }
    if (touchPan.moved) {
      panOffset.x = touchPan.baseX + dx;
      panOffset.y = touchPan.baseY + dy;
      e.preventDefault(); // stop the page from scrolling
    }
  }, { passive: false });

  stage.addEventListener('touchend', function () {
    if (touchPan && touchPan.moved) {
      suppressClickAfterDrag = true;
      // Snap the camera back to follow the player.
      panOffset.x = 0;
      panOffset.y = 0;
    }
    touchPan = null;
  });
  stage.addEventListener('touchcancel', function () {
    touchPan = null;
    panOffset.x = 0;
    panOffset.y = 0;
  });

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  // ---- movement core ------------------------------------------
  function applyMove(dx, dy) {
    const oldX = me.pos.x, oldY = me.pos.y;
    const nx = clamp(me.pos.x + dx, 0, STAGE_W - CHAR_W);
    const ny = clamp(me.pos.y + dy, 0, STAGE_H - CHAR_H);

    // Axis-separated collision so the player slides along an
    // obstacle instead of jamming. Moving diagonally into a wall
    // still progresses on whichever axis is clear. The map mask
    // and remote-character hitboxes are both checked per axis.
    if (dx !== 0 && !collidesWithRemotes(nx, me.pos.y) && !isBlockedByMap(nx, me.pos.y)) {
      me.pos.x = nx;
    }
    if (dy !== 0 && !collidesWithRemotes(me.pos.x, ny) && !isBlockedByMap(me.pos.x, ny)) {
      me.pos.y = ny;
    }

    if (Math.abs(dx) >= Math.abs(dy)) setDirection(me, dx > 0 ? 'right' : 'left');
    else                              setDirection(me, dy > 0 ? 'down' : 'up');
    placeActor(me);

    if (me.pos.x !== oldX || me.pos.y !== oldY) {
      // Actually moved → refresh the idle timer and queue a
      // broadcast so other clients see the step.
      markMoved(me);
      moved = true;
    } else if (!me.frozen) {
      // Fully blocked on both axes (wall or another character).
      // Don't wait for IDLE_FREEZE_MS — snap to the stop sprite
      // for the direction we're facing right now.
      freezeActor(me);
    }
  }

  // ---- main loop ----------------------------------------------
  let moved = false;
  function step() {
    let dx = 0, dy = 0;
    if (keys.ArrowUp)    dy -= 1;
    if (keys.ArrowDown)  dy += 1;
    if (keys.ArrowLeft)  dx -= 1;
    if (keys.ArrowRight) dx += 1;

    if (dx !== 0 || dy !== 0) {
      moveTarget = null;
      if (dx !== 0 && dy !== 0) {
        const inv = 1 / Math.SQRT2;
        dx *= inv; dy *= inv;
      }
      applyMove(dx * SPEED, dy * SPEED);
    } else if (moveTarget) {
      const tx = moveTarget.x - me.pos.x;
      const ty = moveTarget.y - me.pos.y;
      const dist = Math.hypot(tx, ty);
      if (dist < SPEED) {
        if (!collidesWithRemotes(moveTarget.x, moveTarget.y) &&
            !isBlockedByMap(moveTarget.x, moveTarget.y)) {
          me.pos.x = moveTarget.x;
          me.pos.y = moveTarget.y;
          placeActor(me);
          markMoved(me);
          moved = true;
        }
        moveTarget = null;
      } else {
        const oldX = me.pos.x, oldY = me.pos.y;
        applyMove((tx / dist) * SPEED, (ty / dist) * SPEED);
        // Fully blocked → abandon the click target rather than
        // burning frames pressed against an obstacle.
        if (me.pos.x === oldX && me.pos.y === oldY) moveTarget = null;
      }
    }

    fitOrFollow();
    requestAnimationFrame(step);
  }

  // ---- chat: shared send + UI ---------------------------------
  function sendChat(rawText) {
    const text = String(rawText || '').trim();
    if (!text) return;
    deliverChat(me, text);
    if (subscribed) {
      channel.send({
        type: 'broadcast',
        event: 'chat',
        payload: { tab_id: TAB_ID, text: text },
      });
    }
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    sendChat(input.value);
    input.value = '';
    input.blur();
  });

  function openMobileChat() {
    document.body.classList.add('chat-open');
    setTimeout(function () { mInput.focus(); }, 60);
  }
  function closeMobileChat() {
    document.body.classList.remove('chat-open');
    mInput.blur();
  }
  fab.addEventListener('click', openMobileChat);
  mCloseBtn.addEventListener('click', closeMobileChat);
  mForm.addEventListener('submit', function (e) {
    e.preventDefault();
    sendChat(mInput.value);
    mInput.value = '';
    closeMobileChat();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.body.classList.contains('chat-open')) {
      closeMobileChat();
    }
  });

  // ---- realtime: presence (identity) + broadcast (motion/chat) ----
  let subscribed = false;
  let capacityChecked = false;
  let kicked = false;
  let channel = null;

  if (!window.supabase || !window.supabase.createClient) {
    setStatus('offline', 'Offline (no realtime)');
    requestAnimationFrame(step);
    return;
  }

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    realtime: { params: { eventsPerSecond: 20 } },
  });

  channel = client.channel(CHANNEL_NAME, {
    config: { presence: { key: TAB_ID } },
  });

  channel.on('presence', { event: 'sync' }, function () {
    if (kicked) return;
    const state = channel.presenceState();

    if (subscribed && !capacityChecked && state[TAB_ID]) {
      capacityChecked = true;
      const others = Object.keys(state).filter(function (k) { return k !== TAB_ID; });
      if (others.length >= MAX_USERS) {
        kicked = true;
        setStatus('full', 'The Space is full (' + MAX_USERS + '/' + MAX_USERS + ')');
        try { channel.untrack();    } catch {}
        try { channel.unsubscribe();} catch {}
        return;
      }
    }

    for (const [tid, ra] of remotes) {
      if (!state[tid]) {
        removeActor(ra);
        remotes.delete(tid);
      }
    }

    for (const tid of Object.keys(state)) {
      if (tid === TAB_ID) continue;
      const p = state[tid][0];
      if (!p) continue;
      let ra = remotes.get(tid);
      if (!ra) {
        ra = createActor(tid, p.name || 'Anonymous', p.gender, true);
        if (typeof p.x === 'number') ra.pos.x = p.x;
        if (typeof p.y === 'number') ra.pos.y = p.y;
        if (p.dir && ra.sprites.walk[p.dir]) setDirection(ra, p.dir);
        placeActor(ra);
        if (p.avatar) applyAvatarToActor(ra, p.avatar);
        remotes.set(tid, ra);
      } else {
        if (p.name && ra.name !== p.name) {
          ra.name = p.name;
          ra.nameEl.textContent = p.name;
        }
        // Outfit change after Finish Editing → swap layers.
        if (p.avatar && JSON.stringify(p.avatar) !== JSON.stringify(ra.avatar)) {
          applyAvatarToActor(ra, p.avatar);
        }
      }
    }

    renderPresenceList(state);
  });

  channel.on('presence', { event: 'join' }, function (payload) {
    if (!subscribed || kicked) return;
    if (!payload || payload.key === TAB_ID) return;
    // Someone new joined → re-announce our current position so
    // they don't see us at a stale spawn coordinate.
    channel.send({
      type: 'broadcast',
      event: 'move',
      payload: { tab_id: TAB_ID, x: me.pos.x, y: me.pos.y, dir: me.dir },
    });
  });

  channel.on('broadcast', { event: 'move' }, function (msg) {
    const p = msg.payload || {};
    if (!p.tab_id || p.tab_id === TAB_ID) return;
    const ra = remotes.get(p.tab_id);
    if (!ra) return;
    let actuallyMoved = false;
    if (typeof p.x === 'number' && typeof p.y === 'number') {
      if (p.x !== ra.pos.x || p.y !== ra.pos.y) actuallyMoved = true;
      ra.pos.x = p.x;
      ra.pos.y = p.y;
      placeActor(ra);
    }
    if (p.dir && ra.sprites.walk[p.dir]) setDirection(ra, p.dir);
    // Only count this as motion when the position genuinely
    // changed — otherwise the "rebroadcast on join" event would
    // cause every idle character to twitch back into walking
    // animation when a new player connects.
    if (actuallyMoved) markMoved(ra);
  });

  channel.on('broadcast', { event: 'chat' }, function (msg) {
    const p = msg.payload || {};
    if (!p.tab_id || p.tab_id === TAB_ID) return;
    const ra = remotes.get(p.tab_id);
    if (ra && p.text) deliverChat(ra, p.text);
  });

  channel.subscribe(async function (status) {
    if (status === 'SUBSCRIBED') {
      subscribed = true;
      await channel.track({
        user_id: ME.id,
        name:    ME.name,
        gender:  ME.gender,
        avatar:  ME.avatar,
        x:       me.pos.x,
        y:       me.pos.y,
        dir:     me.dir,
      });
      setStatus('connected', 'Online · ' + ME.name);
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
      setStatus('offline', 'Connection failed');
    } else if (status === 'CLOSED') {
      setStatus('offline', 'Disconnected');
    }
  });

  // High-frequency motion broadcasts, fired only when the local
  // actor actually moved since the last tick (~12 Hz).
  const MOVE_MS = 80;
  setInterval(function () {
    if (!subscribed || kicked || !moved) return;
    moved = false;
    channel.send({
      type: 'broadcast',
      event: 'move',
      payload: { tab_id: TAB_ID, x: me.pos.x, y: me.pos.y, dir: me.dir },
    });
  }, MOVE_MS);

  // ---- ui helpers ---------------------------------------------
  function setStatus(state, text) {
    statusEl.className = 'status ' + state;
    statusTxt.textContent = text;
    mtDot.className = 'mt-dot ' + state;
    sendBtn.disabled = (state === 'full');
  }

  function renderPresenceList(state) {
    const ids = Object.keys(state);
    const countText = ids.length + ' / ' + MAX_USERS;
    presCount.textContent = countText;
    mtCount.textContent   = countText;
    presList.innerHTML = '';
    const sorted = ids.map(function (tid) {
      const p = state[tid][0] || {};
      return { tab_id: tid, name: p.name || 'Anonymous', isMe: tid === TAB_ID };
    }).sort(function (a, b) {
      if (a.isMe) return -1;
      if (b.isMe) return 1;
      return a.name.localeCompare(b.name);
    });
    for (const u of sorted) {
      const row = document.createElement('div');
      row.className = 'presence-row' + (u.isMe ? ' me' : '');
      row.innerHTML = '<span class="dot"></span><span></span>';
      row.querySelector('span:last-child').textContent =
        u.name + (u.isMe ? ' (you)' : '');
      presList.appendChild(row);
    }
  }

  window.addEventListener('beforeunload', function () {
    try { channel && channel.untrack(); } catch {}
    try { client.removeAllChannels();   } catch {}
  });

  // ---- Fitting Room popup -------------------------------------
  //
  //  Three-tab editor matching wearables/reference.png:
  //    Base        → Skin (face) / Hair / Facial Hair (beard)
  //    Clothing    → Top / Shoes
  //    Accessories → Glasses / Hat
  //  Picks are kept in a draft copy of the avatar until the user
  //  hits "Finish Editing"; "Back" / "×" discard the draft. The
  //  preview at the top of the popup is a mini-actor rendered
  //  with applyAvatarToActor() so the same code drives both.
  const FR_STRUCTURE = [
    { tab: 'Base',        pills: [['Skin','face'], ['Hair','hair'], ['Facial Hair','beard']] },
    { tab: 'Clothing',    pills: [['Top','top'], ['Shoes','shoes']] },
    { tab: 'Accessories', pills: [['Glasses','glasses'], ['Hat','hat']] },
  ];

  const frOverlay   = document.getElementById('frOverlay');
  const frTabsEl    = document.getElementById('frTabs');
  const frPillsEl   = document.getElementById('frPills');
  const frGridEl    = document.getElementById('frGrid');
  const frPreviewEl = document.getElementById('frPreviewChar');
  const frNamePill  = document.getElementById('frNamePill');

  let frActiveTab  = 0;
  let frActivePill = 0;
  let frDraft      = {};
  let frPreviewActor = null;

  function openFittingRoom() {
    frDraft = Object.assign({}, ME.avatar || {});
    frNamePill.textContent = ME.name;
    frOverlay.classList.add('show');
    frOverlay.setAttribute('aria-hidden', 'false');
    frActiveTab = 0;
    frActivePill = 0;
    renderFRTabs();
    renderFRPills();
    renderFRGrid();
    renderFRPreview();
  }
  function closeFittingRoom() {
    frOverlay.classList.remove('show');
    frOverlay.setAttribute('aria-hidden', 'true');
  }

  function renderFRTabs() {
    frTabsEl.innerHTML = '';
    FR_STRUCTURE.forEach(function (t, i) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'fr-tab' + (i === frActiveTab ? ' active' : '');
      b.textContent = t.tab;
      b.addEventListener('click', function () {
        if (frActiveTab === i) return;
        frActiveTab  = i;
        frActivePill = 0;
        renderFRTabs();
        renderFRPills();
        renderFRGrid();
      });
      frTabsEl.appendChild(b);
    });
  }

  function renderFRPills() {
    frPillsEl.innerHTML = '';
    const pills = FR_STRUCTURE[frActiveTab].pills;
    pills.forEach(function (p, i) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'fr-pill' + (i === frActivePill ? ' active' : '');
      b.textContent = p[0];
      b.addEventListener('click', function () {
        if (frActivePill === i) return;
        frActivePill = i;
        renderFRPills();
        renderFRGrid();
      });
      frPillsEl.appendChild(b);
    });
  }

  function renderFRGrid() {
    frGridEl.innerHTML = '';
    const cat = FR_STRUCTURE[frActiveTab].pills[frActivePill][1];
    const ids = WEARABLES[cat] || [];

    // "None" tile clears whatever is currently selected for this
    // category so the player can go back to no hat, no glasses, etc.
    const noneBtn = document.createElement('button');
    noneBtn.type = 'button';
    noneBtn.className = 'fr-item none' + (!frDraft[cat] ? ' selected' : '');
    noneBtn.textContent = 'None';
    noneBtn.addEventListener('click', function () {
      frDraft[cat] = null;
      renderFRGrid();
      renderFRPreview();
    });
    frGridEl.appendChild(noneBtn);

    ids.forEach(function (id) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'fr-item' + (frDraft[cat] === id ? ' selected' : '');
      const img = document.createElement('img');
      img.alt = '';
      img.draggable = false;
      processWearable(wearableUrl(cat, id)).then(function (src) {
        img.src = src;
      });
      b.appendChild(img);
      b.addEventListener('click', function () {
        frDraft[cat] = id;
        renderFRGrid();
        renderFRPreview();
      });
      frGridEl.appendChild(b);
    });
  }

  function renderFRPreview() {
    if (!frPreviewActor) {
      // Build the mini-actor inside the preview area once. Same
      // structure as a real .actor so applyAvatarToActor() works
      // on it unchanged.
      frPreviewEl.innerHTML =
        '<img class="actor-sprite" alt="" draggable="false">' +
        '<img class="wear face hidden"    alt="" draggable="false">' +
        '<img class="wear glasses hidden" alt="" draggable="false">' +
        '<img class="wear beard hidden"   alt="" draggable="false">' +
        '<img class="wear hair hidden"    alt="" draggable="false">' +
        '<img class="wear hat hidden"     alt="" draggable="false">' +
        '<img class="wear shoes hidden"   alt="" draggable="false">' +
        '<img class="wear top hidden"     alt="" draggable="false">';
      const sprite = frPreviewEl.querySelector('.actor-sprite');
      sprite.style.position = 'absolute';
      sprite.style.left   = '0';
      sprite.style.top    = '0';
      sprite.style.width  = '46px';
      sprite.style.height = '68px';
      const wearEls = {};
      for (const cat of WEAR_CATEGORIES) wearEls[cat] = frPreviewEl.querySelector('.wear.' + cat);
      frPreviewActor = { wearEls: wearEls, avatar: {} };
    }
    frPreviewActor.wearEls.face.parentNode.querySelector('.actor-sprite').src = me.sprites.stop.down;
    applyAvatarToActor(frPreviewActor, frDraft);
  }

  document.getElementById('fittingRoomBtn').addEventListener('click', openFittingRoom);
  document.getElementById('frClose').addEventListener('click', closeFittingRoom);
  document.getElementById('frBack' ).addEventListener('click', closeFittingRoom);
  document.getElementById('frFinish').addEventListener('click', function () {
    ME.avatar = Object.assign({}, frDraft);
    applyAvatarToActor(me, ME.avatar);
    try {
      localStorage.setItem('virtual.avatar.v1', JSON.stringify(ME.avatar));
    } catch {}
    // Push the new outfit to everyone else's screen.
    if (subscribed) {
      channel.track({
        user_id: ME.id,
        name:    ME.name,
        gender:  ME.gender,
        avatar:  ME.avatar,
        x:       me.pos.x,
        y:       me.pos.y,
        dir:     me.dir,
      });
    }
    closeFittingRoom();
  });
  // Escape closes the popup as a convenience.
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && frOverlay.classList.contains('show')) {
      closeFittingRoom();
    }
  });

  requestAnimationFrame(step);
})();
</script>
</body>
</html>
