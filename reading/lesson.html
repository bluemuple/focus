<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WordCatch — Reading</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="wc-lesson-layout">
  <div class="wc-shell wc-shell-wide">
    <header class="wc-header">
      <div class="wc-logo" onclick="location.href='./home.html'">Word<span class="catch">Catch</span></div>
      <div class="wc-user-chip" id="userChip">
        <span id="userName">…</span>
        <span class="coin" title="Coins">🪙 <span id="userMoney">0</span></span>
        <a href="./profile.html" style="color:var(--brand-2); font-weight:600;">My Pets</a>
        <span style="color:var(--line);">|</span>
        <a href="#" id="logoutBtn" style="color:var(--ink-soft);">Sign out</a>
      </div>
    </header>

    <div class="wc-lesson-grid">
      <!-- main reading column -->
      <article class="wc-card wc-lesson-main">
        <h1 id="lessonTitle" style="margin:0 0 16px;">Loading…</h1>

        <div class="wc-lesson-toolbar" role="toolbar" aria-label="Reading controls">
          <button id="btnPlay"   class="wc-btn">▶ Listen</button>
          <button id="btnStop"   class="wc-btn ghost">⏹ Stop</button>
          <button id="btnSingle" class="wc-btn ghost">One sentence: OFF</button>
          <button id="btnPrev"   class="wc-btn ghost wc-hidden">◀ Prev</button>
          <button id="btnNext"   class="wc-btn ghost wc-hidden">Next ▶</button>
        </div>

        <div id="lessonBody">
          <p class="wc-muted">Loading lesson…</p>
        </div>

        <p class="wc-muted wc-center wc-mt-24" style="font-size:14px;">
          Tap any word for its meaning. Words change colour as you learn them. 🌟
        </p>
      </article>

      <!-- sidebar column -->
      <aside class="wc-sidebar" aria-label="My progress">
        <button class="wc-side-toggle" id="sideToggle" aria-expanded="true">⟩</button>
        <section id="sideProgress"    class="wc-side-section"></section>
        <section id="sideWordStats"   class="wc-side-section"></section>
        <section id="sideViz"         class="wc-side-section"></section>
        <section id="sideReplies"     class="wc-side-section"></section>
      </aside>
    </div>
  </div>

  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/assets.js"></script>
  <script src="./js/levels.js"></script>
  <script src="./js/tts.js"></script>
  <script src="./js/word-popup.js"></script>
  <script src="./js/lesson.js"></script>
  <script src="./js/sidebar.js"></script>
  <script src="./js/quiz.js"></script>
  <script src="./js/encounter.js"></script>
  <script>
    // Sidebar collapse toggle (mobile and tight desktops).
    (function () {
      const btn = document.getElementById('sideToggle');
      const root = document.body;
      btn.addEventListener('click', () => {
        const collapsed = root.classList.toggle('wc-sidebar-collapsed');
        btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        btn.textContent = collapsed ? '⟨' : '⟩';
      });
    })();
  </script>
</body>
</html>
